<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0509">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Study</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --bg: #170a12;
  --bg-deep: #0b0509;
  --bg-card: rgba(255, 255, 255, 0.035);
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --border: rgba(224, 138, 159, 0.18);
  --accent: #e08a9f;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --info: #7DD3FC;
  --cream: #f3e8da;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --font-serif: Georgia, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
  color-scheme: dark;
}

/* Reuses this app's shared near-black wine / dusty-rose aesthetic already
   established by index.html (Main), entertainment.html (Media) and
   braindump.html (Brain Dump) — same base gradient, same --accent hue,
   same cream button gradient — rather than inventing a new palette.
   Structure below combines two reference photos: a Notion "Idea Bank"
   gallery/database (tag chips, cover-art cards) and a Notion "Goals"
   dashboard (collapsible grouped list with per-item progress bars). */
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  min-height: 100%;
}
body::before {
  content: '';
  position: fixed; inset: -10%; z-index: -2;
  background:
    radial-gradient(60% 45% at 82% 12%, rgba(232, 164, 99, 0.10) 0%, transparent 55%),
    radial-gradient(55% 45% at 18% 90%, rgba(224, 138, 159, 0.08) 0%, transparent 55%),
    linear-gradient(180deg, #170a12 0%, #0b0509 100%);
  filter: blur(40px) saturate(1.05);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.7;
  pointer-events: none;
}
html, body { scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { width: 0 !important; height: 0 !important; display: none !important; }

.shell { max-width: 1000px; margin: 0 auto; padding: 24px 16px 60px; }

/* ===== Back to dashboard ===== */
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px 8px 10px; margin: 0 0 14px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px; color: var(--text-secondary);
  font-family: var(--font); font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
  text-decoration: none; -webkit-tap-highlight-color: transparent;
  transition: background 0.15s ease, color 0.15s ease;
}
.back-btn:hover, .back-btn:active { background: rgba(255,255,255,0.07); color: var(--text-primary); }
.back-btn svg { display: block; }

/* ===== Header ===== */
.std-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
.std-title { font-family: var(--font-serif); font-size: 26px; font-weight: 700; letter-spacing: -0.01em; }
.std-header-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.std-header-actions .btn-secondary { padding: 10px 16px; white-space: nowrap; }
.btn-add {
  flex-shrink: 0; padding: 10px 16px;
  border: 1px solid rgba(243,232,218,0.85);
  background: linear-gradient(180deg, var(--cream) 0%, #d9a0ae 100%);
  color: #2a0d14; border-radius: 999px;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.45), 0 4px 14px rgba(61,15,26,0.45);
  -webkit-tap-highlight-color: transparent;
}
.btn-add:hover { transform: translateY(-1px); }
.btn-add:active { transform: translateY(0) scale(0.97); }

/* ===== Summary callout ===== */
.std-summary {
  display: flex; align-items: center; flex-wrap: wrap; gap: 8px 6px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 13px 16px; margin-bottom: 18px;
  font-size: 13px; color: var(--text-secondary);
}
.std-summary strong { color: var(--accent); font-weight: 800; }

/* ===== Chips ===== */
.chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.chip {
  padding: 7px 14px; border: 1px solid var(--border);
  background: rgba(255,255,255,0.04); color: var(--text-secondary);
  border-radius: 999px; font-family: inherit; font-size: 12.5px; font-weight: 600;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.chip:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
.chip.active {
  background: linear-gradient(180deg, var(--cream) 0%, #d9a0ae 100%);
  color: #2a0d14; border-color: transparent; font-weight: 800;
}
.chip-row-view { margin-bottom: 10px; }
.chip-view { font-size: 13.5px; padding: 9px 16px; }
.chip-view.active {
  background: linear-gradient(180deg, var(--accent), #3d0f1a);
  color: #fff; border-color: transparent;
  box-shadow: 0 4px 14px rgba(224,138,159,0.30);
}

/* ===== Progress bar (shared by list rows + gallery cards) ===== */
.std-bar { height: 6px; border-radius: 999px; background: rgba(255,255,255,0.08); overflow: hidden; }
.std-bar-fill { height: 100%; border-radius: 999px; background: var(--accent); transition: width 0.2s; }

/* ===== List view — collapsible subject groups (Goals reference) ===== */
.std-group { margin-bottom: 14px; }
.std-group-head {
  display: flex; align-items: center; gap: 8px; padding: 8px 6px;
  cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
}
.std-caret { font-size: 10px; color: var(--accent); width: 14px; text-align: center; transition: transform 0.15s; flex-shrink: 0; }
.std-group.collapsed .std-caret { transform: rotate(-90deg); }
.std-group-icon { font-size: 16px; flex-shrink: 0; }
.std-group-name { font-family: var(--font-serif); font-size: 16px; font-weight: 700; color: var(--text-primary); }
.std-group-count { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); flex-shrink: 0; }
.std-group-spacer { flex: 1; }
.std-group-pct { font-size: 12.5px; color: var(--accent); font-weight: 800; font-family: var(--font-mono); flex-shrink: 0; min-width: 38px; text-align: right; }
.std-group-edit {
  background: transparent; border: none; color: var(--text-tertiary); cursor: pointer;
  font-size: 13px; padding: 4px 6px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s, color 0.15s;
}
.std-group-head:hover .std-group-edit { opacity: 1; }
.std-group-edit:hover { color: var(--text-primary); }
.std-group-body { display: flex; flex-direction: column; padding-left: 22px; }
.std-group.collapsed .std-group-body { display: none; }
.std-empty-groups { color: var(--text-tertiary); font-size: 13px; padding: 30px 10px; text-align: center; }

.std-topic-row { display: flex; align-items: flex-start; gap: 10px; padding: 9px 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.std-topic-row:last-child { border-bottom: none; }
.std-topic-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; background: var(--text-tertiary); }
.std-topic-dot.in-progress { background: var(--warning); }
.std-topic-dot.done { background: var(--success); }
.std-topic-body { flex: 1; min-width: 0; cursor: pointer; }
.std-topic-title { font-size: 13.5px; font-weight: 600; color: var(--text-primary); }
.std-topic-row.is-done .std-topic-title { color: var(--text-tertiary); text-decoration: line-through; }
.std-topic-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.std-topic-meta .std-bar { flex: 1; max-width: 160px; }
.std-topic-pct { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); flex-shrink: 0; min-width: 30px; }
.std-priority-pill {
  font-size: 9.5px; font-weight: 700; padding: 2px 7px; border-radius: 999px;
  font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.04em; flex-shrink: 0;
}
.std-priority-pill.low { color: var(--info); background: rgba(125,211,252,0.12); }
.std-priority-pill.medium { color: var(--warning); background: rgba(242,192,99,0.12); }
.std-priority-pill.high { color: var(--danger); background: rgba(255,107,107,0.12); }
.std-topic-actions { display: flex; gap: 4px; flex-shrink: 0; }
.std-topic-actions button {
  background: transparent; border: 1px solid rgba(255,255,255,0.10); color: var(--text-tertiary);
  cursor: pointer; font-size: 12px; padding: 3px 7px; border-radius: 5px; font-family: inherit; line-height: 1;
}
.std-topic-actions button:hover { color: var(--text-primary); }

.std-quick-add { display: flex; gap: 8px; margin: 6px 6px 4px; }
.std-quick-add input {
  flex: 1; min-width: 0; padding: 9px 12px;
  border: 1px solid var(--border); background: rgba(0,0,0,0.28);
  color: var(--text-primary); border-radius: 8px; font-family: inherit; font-size: 13px;
}
.std-quick-add input:focus { outline: none; border-color: rgba(255,255,255,0.40); }
.std-quick-add button {
  padding: 9px 14px; border: 1px solid var(--border); background: rgba(255,255,255,0.04);
  color: var(--text-primary); border-radius: 8px; font-family: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer;
}
.std-quick-add button:hover { background: rgba(255,255,255,0.10); }

/* ===== Gallery view — topic cards (Idea Bank reference) ===== */
.ent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
.ent-empty { color: var(--text-tertiary); font-size: 13px; padding: 40px 10px; text-align: center; }
.ent-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
  overflow: hidden; cursor: pointer;
  transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
}
.ent-card:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 8px 22px rgba(224,138,159,0.18); }
.ent-cover { position: relative; aspect-ratio: 16 / 10; background: rgba(255,255,255,0.04); overflow: hidden; }
.ent-cover::after {
  content: ''; position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(180deg, transparent 55%, rgba(11,5,9,0.55) 100%); pointer-events: none;
}
.ent-cover-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
.ent-cover-fallback { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 34px; opacity: 0.3; z-index: 0; }
.badge {
  position: absolute; top: 7px; left: 7px; z-index: 2;
  font-size: 9.5px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 4px 8px; border-radius: 999px; background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); color: #fff;
}
.badge.priority-low { color: var(--info); }
.badge.priority-medium { color: var(--warning); }
.badge.priority-high { color: var(--danger); }
.card-actions { position: absolute; top: 6px; right: 6px; z-index: 3; display: flex; gap: 4px; }
.icon-btn-sm {
  width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(255,255,255,0.14); background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  color: #fff; border-radius: 8px; font-size: 12px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn-sm:hover { background: rgba(0,0,0,0.75); }
.card-body { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 7px; }
.card-title {
  font-size: 13.5px; font-weight: 600; line-height: 1.3; color: var(--text-primary);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 2.5em;
}
.card-author { font-size: 11px; color: var(--text-tertiary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: -4px; }
.tag-row { display: flex; flex-wrap: wrap; gap: 5px; }
.tag {
  display: inline-flex; align-self: flex-start; align-items: center; gap: 5px;
  font-size: 10px; padding: 3px 9px; border-radius: 999px; font-weight: 700; letter-spacing: 0.04em;
  background: rgba(255,255,255,0.06); color: var(--text-secondary);
  font-family: var(--font-mono); text-transform: uppercase;
}
.tag.status-in-progress { color: var(--warning); background: rgba(242,192,99,0.12); }
.tag.status-done { color: var(--success); background: rgba(110,231,183,0.12); }
.card-bar-row { display: flex; align-items: center; gap: 8px; }
.card-bar-row .std-bar { flex: 1; }
.card-bar-pct { font-size: 10.5px; color: var(--text-tertiary); font-family: var(--font-mono); flex-shrink: 0; }

/* ===== Modal ===== */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(6px); z-index: 100; align-items: center; justify-content: center; padding: 24px; }
.modal-bg.show { display: flex; }
.modal { width: 100%; max-width: 460px; background: #17090f; border: 1px solid var(--border); border-radius: 16px; padding: 22px; max-height: 88vh; overflow-y: auto; }
.modal h3 { margin: 0 0 16px; font-size: 17px; font-weight: 700; font-family: var(--font-serif); }
.field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.field > label { font-size: 10.5px; color: var(--text-tertiary); font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; }
.field input[type="text"], .field input[type="url"], .field select, .field textarea {
  padding: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.28);
  color: var(--text-primary); border-radius: 10px; font-family: inherit; font-size: 14px;
}
.field select { appearance: none; -webkit-appearance: none; }
.field textarea { resize: vertical; min-height: 56px; line-height: 1.5; }
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none; border-color: rgba(255,255,255,0.40); box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
}
.field input[type="range"] { width: 100%; accent-color: var(--accent); }
.url-row { display: flex; gap: 8px; }
.url-row input { flex: 1; min-width: 0; }
.cover-preview { max-width: 100%; max-height: 140px; border-radius: 10px; margin-top: 8px; object-fit: cover; display: none; }
.btn-primary {
  width: 100%; padding: 13px; border: 1px solid rgba(243,232,218,0.85);
  background: linear-gradient(180deg, var(--cream) 0%, #d9a0ae 100%);
  color: #2a0d14; border-radius: 12px; font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer; box-shadow: inset 0 1px 0 rgba(255,255,255,0.45), 0 4px 14px rgba(61,15,26,0.45);
  -webkit-tap-highlight-color: transparent;
}
.btn-primary:hover { transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0) scale(0.98); }
.btn-secondary {
  padding: 11px 16px; border: 1px solid var(--border); background: rgba(255,255,255,0.04);
  color: var(--text-primary); border-radius: 12px; font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.btn-secondary:hover { background: rgba(255,255,255,0.10); }
.modal-actions { display: flex; gap: 8px; margin-top: 18px; }
.modal-actions button { flex: 1; }
.delete-link { display: block; text-align: center; margin-top: 12px; font-size: 12px; color: var(--danger); cursor: pointer; text-decoration: underline; padding: 6px; }

@media (max-width: 480px) {
  .std-title { font-size: 21px; }
  .ent-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
  .card-title { font-size: 12.5px; }
  .std-topic-meta .std-bar { max-width: 100px; }
}
</style>
</head>
<body>

<div class="shell">
  <a href="index.html" class="back-btn" aria-label="Back to dashboard">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    Dashboard
  </a>

  <div class="std-header">
    <h1 class="std-title">Study</h1>
    <div class="std-header-actions">
      <button class="btn-secondary" id="stdAddSubjectBtn" type="button">+ Subject</button>
      <button class="btn-add" id="stdAddTopicBtn" type="button">+ Add Topic</button>
    </div>
  </div>

  <div class="std-summary" id="stdSummary"></div>

  <div class="chip-row chip-row-view" id="stdViewRow"></div>
  <div class="chip-row" id="stdSubjectFilterRow" hidden></div>
  <div class="chip-row" id="stdStatusFilterRow" hidden></div>

  <div id="stdListView"></div>
  <div id="stdGalleryView" hidden>
    <div class="ent-grid" id="stdGrid"></div>
    <p class="ent-empty" id="stdGalleryEmpty" hidden>No topics yet — tap "+ Add Topic" to save your first one.</p>
  </div>
</div>

<!-- Add / Edit Subject Modal -->
<div class="modal-bg" id="stdSubjectModalBg">
  <div class="modal" id="stdSubjectModal">
    <h3 id="stdSubjectModalTitle">Add subject</h3>
    <div class="field">
      <label>Icon</label>
      <input type="text" id="stdSubjectIcon" maxlength="4" placeholder="📘">
    </div>
    <div class="field">
      <label>Name</label>
      <input type="text" id="stdSubjectName" placeholder="e.g. Organic Chemistry">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="stdSubjectCancel" type="button">Cancel</button>
      <button class="btn-primary" id="stdSubjectSave" type="button">Save</button>
    </div>
    <span class="delete-link" id="stdSubjectDelete" style="display:none">Delete this subject (and its topics)</span>
  </div>
</div>

<!-- Add / Edit Topic Modal -->
<div class="modal-bg" id="stdTopicModalBg">
  <div class="modal" id="stdTopicModal">
    <h3 id="stdTopicModalTitle">Add topic</h3>

    <div class="field">
      <label>Subject</label>
      <select id="stdTopicSubject"></select>
    </div>

    <div class="field">
      <label>Title</label>
      <input type="text" id="stdTopicTitle" placeholder="e.g. Chapter 4 — Alkenes">
    </div>

    <div class="field">
      <label>Category / tag</label>
      <input type="text" id="stdTopicCategory" placeholder="optional, e.g. Midterm 2">
    </div>

    <div class="field">
      <label>Status</label>
      <div class="chip-row" id="stdTopicStatusRow" style="margin-bottom:0"></div>
    </div>

    <div class="field">
      <label>Priority</label>
      <div class="chip-row" id="stdTopicPriorityRow" style="margin-bottom:0"></div>
    </div>

    <div class="field">
      <label>Progress — <span id="stdTopicProgressVal">0%</span></label>
      <input type="range" id="stdTopicProgress" min="0" max="100" step="5">
    </div>

    <div class="field">
      <label>Next step</label>
      <input type="text" id="stdTopicNextStep" placeholder="optional, e.g. Review flashcards Friday">
    </div>

    <div class="field">
      <label>Cover image</label>
      <div class="url-row">
        <input type="url" id="stdTopicCoverUrl" placeholder="Paste an image URL (optional)">
        <button class="btn-secondary" id="stdTopicCoverUploadBtn" type="button">Upload</button>
      </div>
      <input type="file" id="stdTopicCoverFile" accept="image/*" hidden>
      <img class="cover-preview" id="stdTopicCoverPreview" alt="">
    </div>

    <div class="field">
      <label>Notes</label>
      <textarea id="stdTopicNotes" rows="3" placeholder="optional"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-secondary" id="stdTopicCancel" type="button">Cancel</button>
      <button class="btn-primary" id="stdTopicSave" type="button">Save</button>
    </div>
    <span class="delete-link" id="stdTopicDelete" style="display:none">Delete this topic</span>
  </div>
</div>

<script>
(function () {
  'use strict';

  var SUBJECTS_KEY = 'study:subjects';
  var TOPICS_KEY = 'study:topics';
  var VIEW_KEY = 'study:view';

  var STATUSES = [
    { key: 'not-started', label: 'Not Started' },
    { key: 'in-progress', label: 'In Progress' },
    { key: 'done', label: 'Done' }
  ];
  var PRIORITIES = ['Low', 'Medium', 'High'];

  var subjects = [];
  var topics = [];
  var activeView = 'list';
  var activeSubjectFilter = 'All';
  var activeStatusFilter = 'All';
  var collapsedIds = {};
  var editingSubjectId = null;
  var editingTopicId = null;
  var selectedTopicStatus = 'not-started';
  var selectedTopicPriority = 'Medium';
  var currentTopicCover = '';

  function $(id) { return document.getElementById(id); }
  function genId(prefix) { return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
  function statusLabel(key) { var s = STATUSES.filter(function (x) { return x.key === key; })[0]; return s ? s.label : 'Not Started'; }
  function subjectById(id) { return subjects.filter(function (s) { return s.id === id; })[0] || null; }

  // -------- storage --------
  function loadSubjects() {
    var arr = [];
    try { arr = JSON.parse(localStorage.getItem(SUBJECTS_KEY)) || []; } catch (e) {}
    return Array.isArray(arr) ? arr : [];
  }
  function saveSubjects(arr) {
    try { localStorage.setItem(SUBJECTS_KEY, JSON.stringify(arr)); } catch (e) {}
  }
  function loadTopics() {
    var arr = [];
    try { arr = JSON.parse(localStorage.getItem(TOPICS_KEY)) || []; } catch (e) {}
    return Array.isArray(arr) ? arr : [];
  }
  function saveTopics(arr) {
    try { localStorage.setItem(TOPICS_KEY, JSON.stringify(arr)); } catch (e) {}
  }

  function compressImageDataUrl(dataUrl, maxDim, quality) {
    maxDim = maxDim || 480;
    quality = quality == null ? 0.82 : quality;
    return new Promise((resolve) => {
      var img = new Image();
      img.onload = () => {
        var w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
        if (w > maxDim || h > maxDim) {
          if (w >= h) { h = Math.round(h * (maxDim / w)); w = maxDim; }
          else { w = Math.round(w * (maxDim / h)); h = maxDim; }
        }
        var c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        try { resolve(c.toDataURL('image/jpeg', quality)); } catch (e) { resolve(dataUrl); }
      };
      img.onerror = () => resolve(dataUrl);
      img.src = dataUrl;
    });
  }

  function makeChip(label, active, onClick, extraClass) {
    var b = document.createElement('button');
    b.type = 'button';
    b.className = 'chip' + (active ? ' active' : '') + (extraClass ? ' ' + extraClass : '');
    b.textContent = label;
    b.addEventListener('click', onClick);
    return b;
  }

  function topicsForSubject(subjectId) {
    return topics.filter(function (t) { return t.subjectId === subjectId; });
  }
  function subjectAvgProgress(subjectId) {
    var list = topicsForSubject(subjectId);
    if (!list.length) return 0;
    var sum = list.reduce(function (acc, t) { return acc + (Number(t.progress) || 0); }, 0);
    return Math.round(sum / list.length);
  }

  // -------- summary --------
  function renderSummary() {
    var el = $('stdSummary');
    var doneCount = topics.filter(function (t) { return t.status === 'done'; }).length;
    var inProgressCount = topics.filter(function (t) { return t.status === 'in-progress'; }).length;
    var avg = topics.length ? Math.round(topics.reduce(function (a, t) { return a + (Number(t.progress) || 0); }, 0) / topics.length) : 0;
    if (!subjects.length) {
      el.innerHTML = '📚 Add your first subject to start tracking study progress.';
      return;
    }
    el.innerHTML = '📚 <strong>' + subjects.length + '</strong> subject' + (subjects.length === 1 ? '' : 's')
      + ' &middot; <strong>' + topics.length + '</strong> topic' + (topics.length === 1 ? '' : 's')
      + ' &middot; <strong>' + avg + '%</strong> average progress'
      + ' &middot; <strong>' + inProgressCount + '</strong> in progress'
      + ' &middot; <strong>' + doneCount + '</strong> done';
  }

  // -------- view toggle + filters --------
  function renderViewRow() {
    var row = $('stdViewRow');
    row.innerHTML = '';
    row.appendChild(makeChip('📋 By Subject', activeView === 'list', function () {
      activeView = 'list';
      try { localStorage.setItem(VIEW_KEY, activeView); } catch (e) {}
      renderAll();
    }, 'chip-view'));
    row.appendChild(makeChip('🗂️ Gallery', activeView === 'gallery', function () {
      activeView = 'gallery';
      try { localStorage.setItem(VIEW_KEY, activeView); } catch (e) {}
      renderAll();
    }, 'chip-view'));
  }
  function renderSubjectFilterRow() {
    var row = $('stdSubjectFilterRow');
    row.hidden = activeView !== 'gallery';
    if (activeView !== 'gallery') return;
    row.innerHTML = '';
    row.appendChild(makeChip('All Subjects', activeSubjectFilter === 'All', function () {
      activeSubjectFilter = 'All'; renderSubjectFilterRow(); renderGalleryView();
    }));
    subjects.forEach(function (s) {
      row.appendChild(makeChip(s.icon + ' ' + s.name, activeSubjectFilter === s.id, function () {
        activeSubjectFilter = s.id; renderSubjectFilterRow(); renderGalleryView();
      }));
    });
  }
  function renderStatusFilterRow() {
    var row = $('stdStatusFilterRow');
    row.hidden = activeView !== 'gallery';
    if (activeView !== 'gallery') return;
    row.innerHTML = '';
    row.appendChild(makeChip('All Statuses', activeStatusFilter === 'All', function () {
      activeStatusFilter = 'All'; renderStatusFilterRow(); renderGalleryView();
    }));
    STATUSES.forEach(function (s) {
      row.appendChild(makeChip(s.label, activeStatusFilter === s.key, function () {
        activeStatusFilter = s.key; renderStatusFilterRow(); renderGalleryView();
      }));
    });
  }

  // -------- list view (grouped, collapsible, progress bars) --------
  function buildTopicRow(topic) {
    var row = document.createElement('div');
    row.className = 'std-topic-row' + (topic.status === 'done' ? ' is-done' : '');
    row.dataset.id = topic.id;

    var dot = document.createElement('span');
    dot.className = 'std-topic-dot' + (topic.status === 'in-progress' ? ' in-progress' : topic.status === 'done' ? ' done' : '');
    row.appendChild(dot);

    var body = document.createElement('div');
    body.className = 'std-topic-body';
    body.dataset.action = 'edit-topic';
    var title = document.createElement('div');
    title.className = 'std-topic-title';
    title.textContent = topic.title;
    body.appendChild(title);

    var meta = document.createElement('div');
    meta.className = 'std-topic-meta';
    var bar = document.createElement('div');
    bar.className = 'std-bar';
    var fill = document.createElement('div');
    fill.className = 'std-bar-fill';
    fill.style.width = (Number(topic.progress) || 0) + '%';
    bar.appendChild(fill);
    meta.appendChild(bar);
    var pct = document.createElement('span');
    pct.className = 'std-topic-pct';
    pct.textContent = (Number(topic.progress) || 0) + '%';
    meta.appendChild(pct);
    var pri = document.createElement('span');
    pri.className = 'std-priority-pill ' + String(topic.priority || 'Medium').toLowerCase();
    pri.textContent = topic.priority || 'Medium';
    meta.appendChild(pri);
    body.appendChild(meta);
    row.appendChild(body);

    var actions = document.createElement('div');
    actions.className = 'std-topic-actions';
    var editBtn = document.createElement('button');
    editBtn.type = 'button'; editBtn.dataset.action = 'edit-topic'; editBtn.setAttribute('aria-label', 'Edit'); editBtn.textContent = '✎';
    var delBtn = document.createElement('button');
    delBtn.type = 'button'; delBtn.dataset.action = 'delete-topic'; delBtn.setAttribute('aria-label', 'Delete'); delBtn.textContent = '✕';
    actions.appendChild(editBtn); actions.appendChild(delBtn);
    row.appendChild(actions);

    return row;
  }

  function buildSubjectGroup(subject) {
    var group = document.createElement('div');
    group.className = 'std-group' + (collapsedIds[subject.id] ? ' collapsed' : '');
    group.dataset.id = subject.id;

    var head = document.createElement('div');
    head.className = 'std-group-head';
    head.dataset.action = 'toggle-group';

    var caret = document.createElement('span');
    caret.className = 'std-caret';
    caret.textContent = '▼';
    head.appendChild(caret);

    var icon = document.createElement('span');
    icon.className = 'std-group-icon';
    icon.textContent = subject.icon || '📘';
    head.appendChild(icon);

    var name = document.createElement('span');
    name.className = 'std-group-name';
    name.textContent = subject.name;
    head.appendChild(name);

    var list = topicsForSubject(subject.id);
    var count = document.createElement('span');
    count.className = 'std-group-count';
    count.textContent = list.length;
    head.appendChild(count);

    var spacer = document.createElement('span');
    spacer.className = 'std-group-spacer';
    head.appendChild(spacer);

    var pct = document.createElement('span');
    pct.className = 'std-group-pct';
    pct.textContent = subjectAvgProgress(subject.id) + '%';
    head.appendChild(pct);

    var edit = document.createElement('button');
    edit.type = 'button'; edit.className = 'std-group-edit'; edit.dataset.action = 'edit-subject';
    edit.setAttribute('aria-label', 'Edit subject'); edit.textContent = '✎';
    head.appendChild(edit);

    group.appendChild(head);

    var body = document.createElement('div');
    body.className = 'std-group-body';
    list.forEach(function (t) { body.appendChild(buildTopicRow(t)); });

    var quick = document.createElement('div');
    quick.className = 'std-quick-add';
    var input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'Quick-add a topic, press Enter…';
    input.dataset.subjectId = subject.id;
    var addBtn = document.createElement('button');
    addBtn.type = 'button';
    addBtn.textContent = '+ Add';
    addBtn.addEventListener('click', function () { quickAddTopic(subject.id, input); });
    input.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); quickAddTopic(subject.id, input); } });
    quick.appendChild(input); quick.appendChild(addBtn);
    body.appendChild(quick);

    group.appendChild(body);
    return group;
  }

  function renderListView() {
    var wrap = $('stdListView');
    wrap.innerHTML = '';
    if (!subjects.length) {
      var empty = document.createElement('p');
      empty.className = 'std-empty-groups';
      empty.textContent = 'No subjects yet — tap "+ Subject" to add your first one.';
      wrap.appendChild(empty);
      return;
    }
    subjects.forEach(function (s) { wrap.appendChild(buildSubjectGroup(s)); });
  }

  function quickAddTopic(subjectId, input) {
    var title = input.value.trim();
    if (!title) return;
    topics.push({
      id: genId('top'), subjectId: subjectId, title: title,
      category: '', status: 'not-started', priority: 'Medium', progress: 0,
      nextStep: '', notes: '', cover: '', createdAt: Date.now()
    });
    saveTopics(topics);
    input.value = '';
    renderAll();
  }

  // -------- gallery view (topic cards, Idea Bank reference) --------
  function buildTopicCard(topic) {
    var subject = subjectById(topic.subjectId);
    var el = document.createElement('div');
    el.className = 'ent-card';
    el.dataset.id = topic.id;

    var cover = document.createElement('div');
    cover.className = 'ent-cover';
    if (topic.cover) {
      var img = document.createElement('img');
      img.className = 'ent-cover-img'; img.loading = 'lazy'; img.alt = ''; img.src = topic.cover;
      img.addEventListener('error', function () { img.style.display = 'none'; });
      cover.appendChild(img);
    }
    var fallback = document.createElement('span');
    fallback.className = 'ent-cover-fallback';
    fallback.textContent = (subject && subject.icon) || '📘';
    cover.appendChild(fallback);

    var badge = document.createElement('span');
    badge.className = 'badge priority-' + String(topic.priority || 'Medium').toLowerCase();
    badge.textContent = topic.priority || 'Medium';
    cover.appendChild(badge);

    var actions = document.createElement('div');
    actions.className = 'card-actions';
    var editBtn = document.createElement('button');
    editBtn.type = 'button'; editBtn.className = 'icon-btn-sm'; editBtn.dataset.action = 'edit-topic';
    editBtn.setAttribute('aria-label', 'Edit'); editBtn.textContent = '✎';
    var delBtn = document.createElement('button');
    delBtn.type = 'button'; delBtn.className = 'icon-btn-sm'; delBtn.dataset.action = 'delete-topic';
    delBtn.setAttribute('aria-label', 'Delete'); delBtn.textContent = '✕';
    actions.appendChild(editBtn); actions.appendChild(delBtn);
    cover.appendChild(actions);

    var body = document.createElement('div');
    body.className = 'card-body';
    var title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = topic.title;
    body.appendChild(title);
    var author = document.createElement('div');
    author.className = 'card-author';
    author.textContent = subject ? (subject.icon + ' ' + subject.name) : 'No subject';
    body.appendChild(author);

    var tagRow = document.createElement('div');
    tagRow.className = 'tag-row';
    var statusTag = document.createElement('span');
    statusTag.className = 'tag status-' + topic.status;
    statusTag.textContent = statusLabel(topic.status);
    tagRow.appendChild(statusTag);
    if (topic.category) {
      var catTag = document.createElement('span');
      catTag.className = 'tag';
      catTag.textContent = topic.category;
      tagRow.appendChild(catTag);
    }
    body.appendChild(tagRow);

    var barRow = document.createElement('div');
    barRow.className = 'card-bar-row';
    var bar = document.createElement('div');
    bar.className = 'std-bar';
    var fill = document.createElement('div');
    fill.className = 'std-bar-fill';
    fill.style.width = (Number(topic.progress) || 0) + '%';
    bar.appendChild(fill);
    barRow.appendChild(bar);
    var pct = document.createElement('span');
    pct.className = 'card-bar-pct';
    pct.textContent = (Number(topic.progress) || 0) + '%';
    barRow.appendChild(pct);
    body.appendChild(barRow);

    el.appendChild(cover); el.appendChild(body);
    return el;
  }

  function renderGalleryView() {
    var grid = $('stdGrid');
    var empty = $('stdGalleryEmpty');
    grid.innerHTML = '';
    var list = topics.filter(function (t) {
      if (activeSubjectFilter !== 'All' && t.subjectId !== activeSubjectFilter) return false;
      if (activeStatusFilter !== 'All' && t.status !== activeStatusFilter) return false;
      return true;
    });
    empty.hidden = list.length !== 0;
    list.forEach(function (t) { grid.appendChild(buildTopicCard(t)); });
  }

  function renderAll() {
    renderViewRow();
    renderSubjectFilterRow();
    renderStatusFilterRow();
    renderSummary();
    $('stdListView').hidden = activeView !== 'list';
    $('stdGalleryView').hidden = activeView !== 'gallery';
    if (activeView === 'list') renderListView();
    else renderGalleryView();
  }

  // -------- subject modal --------
  function openSubjectModal(subject) {
    editingSubjectId = subject ? subject.id : null;
    $('stdSubjectModalTitle').textContent = subject ? 'Edit subject' : 'Add subject';
    $('stdSubjectIcon').value = subject ? (subject.icon || '') : '📘';
    $('stdSubjectName').value = subject ? subject.name : '';
    $('stdSubjectDelete').style.display = subject ? 'block' : 'none';
    $('stdSubjectModalBg').classList.add('show');
  }
  function closeSubjectModal() { $('stdSubjectModalBg').classList.remove('show'); editingSubjectId = null; }

  function saveSubjectFromModal() {
    var name = $('stdSubjectName').value.trim();
    if (!name) return;
    var icon = $('stdSubjectIcon').value.trim() || '📘';
    if (editingSubjectId) {
      subjects = subjects.map(function (s) { return s.id === editingSubjectId ? Object.assign({}, s, { name: name, icon: icon }) : s; });
    } else {
      subjects.push({ id: genId('subj'), name: name, icon: icon, createdAt: Date.now() });
    }
    saveSubjects(subjects);
    closeSubjectModal();
    renderAll();
  }
  function deleteSubject(id) {
    if (!confirm('Delete this subject and all of its topics?')) return;
    subjects = subjects.filter(function (s) { return s.id !== id; });
    topics = topics.filter(function (t) { return t.subjectId !== id; });
    saveSubjects(subjects);
    saveTopics(topics);
    closeSubjectModal();
    renderAll();
  }

  // -------- topic modal --------
  function populateTopicSubjectSelect(presetId) {
    var sel = $('stdTopicSubject');
    sel.innerHTML = '';
    subjects.forEach(function (s) {
      var opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = s.icon + ' ' + s.name;
      sel.appendChild(opt);
    });
    if (presetId) sel.value = presetId;
  }
  function renderTopicStatusChips() {
    var row = $('stdTopicStatusRow');
    row.innerHTML = '';
    STATUSES.forEach(function (s) {
      row.appendChild(makeChip(s.label, selectedTopicStatus === s.key, function () {
        selectedTopicStatus = s.key;
        if (s.key === 'done') { $('stdTopicProgress').value = 100; $('stdTopicProgressVal').textContent = '100%'; }
        renderTopicStatusChips();
      }));
    });
  }
  function renderTopicPriorityChips() {
    var row = $('stdTopicPriorityRow');
    row.innerHTML = '';
    PRIORITIES.forEach(function (p) {
      row.appendChild(makeChip(p, selectedTopicPriority === p, function () {
        selectedTopicPriority = p; renderTopicPriorityChips();
      }));
    });
  }
  function updateTopicCoverPreview() {
    var img = $('stdTopicCoverPreview');
    if (currentTopicCover) { img.src = currentTopicCover; img.style.display = 'block'; }
    else { img.removeAttribute('src'); img.style.display = 'none'; }
  }

  function openTopicModal(topic, presetSubjectId) {
    if (!subjects.length) { alert('Add a subject first.'); return; }
    editingTopicId = topic ? topic.id : null;
    $('stdTopicModalTitle').textContent = topic ? 'Edit topic' : 'Add topic';
    populateTopicSubjectSelect(topic ? topic.subjectId : presetSubjectId);
    $('stdTopicTitle').value = topic ? topic.title : '';
    $('stdTopicCategory').value = topic ? (topic.category || '') : '';
    $('stdTopicNextStep').value = topic ? (topic.nextStep || '') : '';
    $('stdTopicNotes').value = topic ? (topic.notes || '') : '';
    $('stdTopicCoverUrl').value = '';
    currentTopicCover = topic ? (topic.cover || '') : '';
    updateTopicCoverPreview();
    selectedTopicStatus = topic ? topic.status : 'not-started';
    selectedTopicPriority = topic ? (topic.priority || 'Medium') : 'Medium';
    var progress = topic ? (Number(topic.progress) || 0) : 0;
    $('stdTopicProgress').value = progress;
    $('stdTopicProgressVal').textContent = progress + '%';
    renderTopicStatusChips();
    renderTopicPriorityChips();
    $('stdTopicDelete').style.display = topic ? 'block' : 'none';
    $('stdTopicModalBg').classList.add('show');
  }
  function closeTopicModal() { $('stdTopicModalBg').classList.remove('show'); editingTopicId = null; }

  function saveTopicFromModal() {
    var title = $('stdTopicTitle').value.trim();
    if (!title) return;
    var subjectId = $('stdTopicSubject').value;
    if (!subjectId) return;
    var topic = {
      id: editingTopicId || genId('top'),
      subjectId: subjectId,
      title: title,
      category: $('stdTopicCategory').value.trim(),
      status: selectedTopicStatus,
      priority: selectedTopicPriority,
      progress: Number($('stdTopicProgress').value) || 0,
      nextStep: $('stdTopicNextStep').value.trim(),
      notes: $('stdTopicNotes').value.trim(),
      cover: currentTopicCover || '',
      createdAt: editingTopicId ? (topics.filter(function (t) { return t.id === editingTopicId; })[0] || {}).createdAt || Date.now() : Date.now()
    };
    if (editingTopicId) {
      topics = topics.map(function (t) { return t.id === editingTopicId ? topic : t; });
    } else {
      topics.unshift(topic);
    }
    saveTopics(topics);
    closeTopicModal();
    renderAll();
  }
  function deleteTopic(id) {
    topics = topics.filter(function (t) { return t.id !== id; });
    saveTopics(topics);
    renderAll();
  }

  function findTopic(id) { return topics.filter(function (t) { return t.id === id; })[0] || null; }
  function findSubject(id) { return subjects.filter(function (s) { return s.id === id; })[0] || null; }

  function wire() {
    $('stdAddSubjectBtn').addEventListener('click', function () { openSubjectModal(null); });
    $('stdSubjectCancel').addEventListener('click', closeSubjectModal);
    $('stdSubjectModalBg').addEventListener('click', function (e) { if (e.target.id === 'stdSubjectModalBg') closeSubjectModal(); });
    $('stdSubjectSave').addEventListener('click', saveSubjectFromModal);
    $('stdSubjectDelete').addEventListener('click', function () { if (editingSubjectId) deleteSubject(editingSubjectId); });

    $('stdAddTopicBtn').addEventListener('click', function () { openTopicModal(null, activeSubjectFilter !== 'All' ? activeSubjectFilter : null); });
    $('stdTopicCancel').addEventListener('click', closeTopicModal);
    $('stdTopicModalBg').addEventListener('click', function (e) { if (e.target.id === 'stdTopicModalBg') closeTopicModal(); });
    $('stdTopicProgress').addEventListener('input', function () { $('stdTopicProgressVal').textContent = $('stdTopicProgress').value + '%'; });
    $('stdTopicCoverUrl').addEventListener('change', function () {
      var v = $('stdTopicCoverUrl').value.trim();
      if (v) { currentTopicCover = v; updateTopicCoverPreview(); }
    });
    $('stdTopicCoverUploadBtn').addEventListener('click', function () { $('stdTopicCoverFile').click(); });
    $('stdTopicCoverFile').addEventListener('change', function (e) {
      var file = e.target.files && e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = async function () {
        currentTopicCover = await compressImageDataUrl(String(reader.result), 480, 0.82);
        updateTopicCoverPreview();
      };
      reader.readAsDataURL(file);
    });
    $('stdTopicSave').addEventListener('click', saveTopicFromModal);
    $('stdTopicDelete').addEventListener('click', function () {
      if (!editingTopicId) return;
      if (!confirm('Delete this topic?')) return;
      deleteTopic(editingTopicId);
      closeTopicModal();
    });

    $('stdListView').addEventListener('click', function (e) {
      var actionEl = e.target.closest('[data-action]');
      if (!actionEl) return;
      var groupEl = e.target.closest('.std-group');
      var rowEl = e.target.closest('.std-topic-row');
      if (actionEl.dataset.action === 'toggle-group' && groupEl) {
        var sid = groupEl.dataset.id;
        collapsedIds[sid] = !collapsedIds[sid];
        groupEl.classList.toggle('collapsed', !!collapsedIds[sid]);
        return;
      }
      if (actionEl.dataset.action === 'edit-subject' && groupEl) {
        e.stopPropagation();
        openSubjectModal(findSubject(groupEl.dataset.id));
        return;
      }
      if (actionEl.dataset.action === 'edit-topic' && rowEl) {
        openTopicModal(findTopic(rowEl.dataset.id));
        return;
      }
      if (actionEl.dataset.action === 'delete-topic' && rowEl) {
        if (!confirm('Delete this topic?')) return;
        deleteTopic(rowEl.dataset.id);
        return;
      }
    });

    $('stdGrid').addEventListener('click', function (e) {
      var actionBtn = e.target.closest('[data-action]');
      var cardEl = e.target.closest('.ent-card');
      if (!cardEl) return;
      var id = cardEl.dataset.id;
      if (actionBtn) {
        e.stopPropagation();
        if (actionBtn.dataset.action === 'edit-topic') openTopicModal(findTopic(id));
        else if (actionBtn.dataset.action === 'delete-topic') { if (confirm('Delete this topic?')) deleteTopic(id); }
        return;
      }
      openTopicModal(findTopic(id));
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    subjects = loadSubjects();
    topics = loadTopics();
    var savedView = null;
    try { savedView = localStorage.getItem(VIEW_KEY); } catch (e) {}
    if (savedView === 'list' || savedView === 'gallery') activeView = savedView;
    renderAll();
    wire();

    if (typeof initCloudSync === 'function') {
      initCloudSync({
        appKey: 'study',
        syncedPrefixes: ['study:'],
        onApplied: function () {
          subjects = loadSubjects();
          topics = loadTopics();
          renderAll();
        }
      });
    }
  });
})();
</script>
</body>
</html>
