<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0509">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Media</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
/* =============================================================
   Re-themed to match Dream Board's dark cinematic look (near-black +
   warm champagne/gold, frosted-glass surfaces, italic serif display
   type, per-page hero cover section) — an explicit, deliberate request
   to match that page's own already-granted reference-photo exception
   (see CLAUDE.md §6/DO NOT MODIFY rule 2 and dreamboard.html's
   changelog), not a generic palette swap. The prior dusty-rose/wine
   "boutique gallery" theme is retired; token *names* are kept where
   existing selectors depend on them, values repointed to Dream Board's.
   ============================================================= */
:root {
  --bg: #0b0a08;
  --bg-deep: #050403;
  --bg-card: rgba(255, 255, 255, 0.08);
  --text-primary: #f5f1e9;
  --text-secondary: rgba(245, 241, 233, 0.68);
  --text-tertiary: rgba(245, 241, 233, 0.44);
  --border: rgba(201, 168, 118, 0.22);
  --accent: #c9a876;
  --accent-bright: #e8cf9f;
  --accent-tint: rgba(201, 168, 118, 0.14);
  --good: #6BE3A4;
  --warn: #F2C063;
  --bad: #FF6B6B;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --font-serif: "Cormorant Garamond", Georgia, "Iowan Old Style", serif;
  color-scheme: dark;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  min-height: 100%;
}

body::before {
  content: '';
  position: fixed;
  inset: -10%;
  z-index: -2;
  background:
    radial-gradient(55% 42% at 82% 10%, rgba(201, 168, 118, 0.20) 0%, transparent 55%),
    radial-gradient(50% 40% at 14% 92%, rgba(120, 90, 50, 0.16) 0%, transparent 55%),
    linear-gradient(180deg, rgba(11,10,8,0.78) 0%, rgba(5,4,3,0.88) 100%);
  filter: blur(40px) saturate(1.05);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.6;
  pointer-events: none;
}
/* Page-wide cover-photo backdrop — the active gallery's hero photo,
   blurred/dimmed, shown behind the ENTIRE page so the frosted gallery
   cards actually have something to blur/reveal, same technique and
   same reasoning as Dream Board's #dbPageBg. Updated by renderPageBg()
   whenever the active gallery or its photo changes. */
#entPageBg {
  position: fixed; inset: 0; z-index: -3;
  background-size: cover; background-position: center; background-repeat: no-repeat;
  transform: scale(1.15);
  filter: blur(60px) saturate(1.35) brightness(0.55);
  transition: background-image 0.3s ease;
  pointer-events: none;
}

:focus-visible { outline: 2px solid var(--accent-bright); outline-offset: 2px; border-radius: 4px; }

html, body { scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { width: 0 !important; height: 0 !important; display: none !important; }

/* ===== Hero — one per gallery ("mini page"), styled after Dream Board's
   per-tab hero: full-bleed cover photo/video, dark gradient scrim,
   tracked-caps eyebrow, large serif headline, subtext, frosted-glass
   pill CTA, "scroll to explore" flourish. Swapped by renderHero()
   whenever the active gallery changes. ===== */
.ent-hero {
  position: relative; min-height: 78vh; display: flex; flex-direction: column;
  justify-content: flex-end; overflow: hidden; padding: 90px 20px 46px;
}
.ent-hero-media { position: absolute; inset: 0; z-index: 0; background: #16130f; }
.ent-hero-media img, .ent-hero-media video { width: 100%; height: 100%; object-fit: cover; }
.ent-hero-photo-choice {
  position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 10px; padding: 20px;
}
.ent-hero-photo-choice-btn {
  background: rgba(11,10,8,0.4); border: 1px solid var(--border); border-radius: 999px;
  color: var(--text-tertiary); font-size: 12.5px; font-weight: 600; letter-spacing: 0.03em;
  cursor: pointer; padding: 9px 18px;
}
.ent-hero-photo-choice-btn:hover { color: var(--accent-bright); border-color: var(--accent); }
.ent-hero-reattach {
  position: absolute; inset: 0; z-index: 1; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; color: var(--text-tertiary); background: rgba(0,0,0,0.3); text-align: center; padding: 20px;
}
.ent-hero-reattach-icon { font-size: 30px; }
.ent-hero-reattach-label { font-size: 12.5px; font-weight: 600; }
.ent-hero-reattach-btn {
  background: rgba(11,10,8,0.6); border: 1px solid var(--border); color: var(--text-primary);
  border-radius: 999px; padding: 7px 16px; font-size: 11.5px; font-weight: 700; cursor: pointer;
}
.ent-hero-reattach-btn:hover { border-color: var(--accent); color: var(--accent-bright); }
#entPageBgVideo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.ent-hero-overlay {
  position: absolute; inset: 0; z-index: 1; pointer-events: none;
  background:
    linear-gradient(180deg, rgba(5,4,3,0.55) 0%, rgba(5,4,3,0.15) 32%, rgba(5,4,3,0.35) 62%, rgba(5,4,3,0.92) 100%);
}
.ent-back-btn {
  position: absolute; top: max(14px, env(safe-area-inset-top)); left: max(14px, env(safe-area-inset-left)); z-index: 5;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px 8px 10px;
  background: rgba(11, 10, 8, 0.55); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  border-radius: 999px; color: var(--text-secondary);
  font-family: var(--font); font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
  text-decoration: none; -webkit-tap-highlight-color: transparent;
  transition: background 0.15s ease, color 0.15s ease;
}
.ent-back-btn:hover, .ent-back-btn:active { background: rgba(11, 10, 8, 0.8); color: var(--text-primary); }
.ent-back-btn svg { display: block; }
.ent-hero-photo-tools {
  position: absolute; top: max(14px, env(safe-area-inset-top)); right: max(14px, env(safe-area-inset-right)); z-index: 5;
  display: flex; gap: 6px;
}
.ent-hero-photo-tools button {
  background: rgba(11, 10, 8, 0.55); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--border);
  color: var(--text-secondary); border-radius: 999px; padding: 7px 12px; font-size: 11px; font-weight: 700;
  letter-spacing: 0.04em; cursor: pointer;
}
.ent-hero-photo-tools button:hover { color: var(--accent-bright); border-color: var(--accent); }

.ent-hero-content { position: relative; z-index: 2; max-width: 640px; }
.ent-hero-eyebrow {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--accent-bright); margin-bottom: 14px; outline-offset: 4px;
}
.ent-hero-eyebrow::before { content: ''; display: inline-block; width: 22px; height: 1px; background: var(--accent); margin-right: 10px; vertical-align: middle; }
.ent-hero-title {
  display: block; width: 100%; background: transparent; border: none; resize: none; overflow: hidden;
  font-family: var(--font-serif); font-weight: 500; color: var(--text-primary);
  font-size: clamp(34px, 8vw, 58px); line-height: 1.06; letter-spacing: -0.01em;
  padding: 0; margin-bottom: 16px; text-shadow: 0 4px 30px rgba(0,0,0,0.5);
}
.ent-hero-title::placeholder { color: rgba(245,241,233,0.35); }
.ent-hero-subtext {
  font-size: 14px; line-height: 1.6; color: var(--text-secondary); max-width: 440px; margin-bottom: 26px;
  outline-offset: 4px;
}
.ent-hero-cta {
  display: inline-flex; align-items: center; gap: 10px;
  background: linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.03) 100%);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--border); border-radius: 999px;
  padding: 13px 24px; cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: border-color 0.15s, background 0.15s;
}
.ent-hero-cta:hover { border-color: var(--accent); background: rgba(201,168,118,0.10); }
.ent-hero-cta-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-primary);
}
.ent-hero-cta-arrow { color: var(--accent-bright); font-size: 13px; }
.ent-hero-scroll-hint {
  position: absolute; right: 20px; bottom: 26px; z-index: 2;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-tertiary);
}
.ent-hero-scroll-hint span:first-child { writing-mode: vertical-rl; }
.ent-hero-scroll-arrow {
  width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center; color: var(--accent);
  animation: ent-scroll-bounce 2.2s ease-in-out infinite;
}
@keyframes ent-scroll-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(4px); } }
@media (max-width: 620px) {
  .ent-hero { min-height: 84vh; padding: 84px 16px 34px; }
  .ent-hero-scroll-hint { display: none; }
}

.shell {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 0 60px;
}
.shell-inner { padding: 24px 16px 0; }

/* ===== Header ===== */
.ent-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; gap: 12px;
}
.ent-title { font-family: var(--font-serif); font-size: 26px; font-weight: 600; letter-spacing: -0.01em; color: var(--text-primary); }
.ent-header-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.ent-header-actions .btn-secondary, .ent-header-actions .sort-select { padding: 10px 16px; white-space: nowrap; }
.btn-add {
  flex-shrink: 0;
  padding: 10px 16px;
  border: 1px solid var(--accent);
  background: linear-gradient(180deg, var(--accent-bright) 0%, var(--accent) 100%);
  color: #24190c; border-radius: 999px;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), 0 4px 14px rgba(5,4,3,0.45);
  -webkit-tap-highlight-color: transparent;
}
.btn-add:hover { transform: translateY(-1px); }
.btn-add:active { transform: translateY(0) scale(0.97); }

/* ===== Chips (filter row + category picker) ===== */
.chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.chip {
  padding: 7px 14px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
  border-radius: 999px;
  font-family: inherit; font-size: 12.5px; font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.chip:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
.chip.active {
  background: var(--accent-tint);
  color: var(--accent-bright); border-color: var(--accent); font-weight: 800;
}
.chip.dashed { border-style: dashed; }

/* Gallery-type switcher — the page's primary nav ("mini pages": Podcasts/
   Stories/Entertainment/Playlists/Favorites), styled as Dream Board's own
   tab-row pills so switching a gallery reads exactly like switching a
   Dream Board tab — distinct sizing from the secondary status-filter
   chips below it, same active-state recipe as .chip.active above. */
.chip-row-gallery { margin-bottom: 10px; }
.chip-gallery { font-size: 13.5px; padding: 9px 16px; }
.chip-gallery.active {
  background: var(--accent-tint);
  color: var(--accent-bright); border-color: var(--accent);
  box-shadow: none;
}

/* ===== Gallery grid ===== */
.ent-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}
.ent-empty {
  color: var(--text-tertiary); font-size: 13px;
  padding: 40px 10px; text-align: center;
}
.ent-card {
  background: var(--bg-card);
  -webkit-backdrop-filter: blur(22px) saturate(1.6);
  backdrop-filter: blur(22px) saturate(1.6);
  border: 1px solid rgba(255, 255, 255, 0.22);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 1px 0 rgba(255,255,255,0.10) inset, 0 14px 36px rgba(0,0,0,0.35);
  transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
}
.ent-card:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
  box-shadow: 0 1px 0 rgba(255,255,255,0.10) inset, 0 8px 22px rgba(201,168,118,0.24);
}
.ent-cover {
  position: relative;
  aspect-ratio: 16 / 10;
  background: rgba(255,255,255,0.04);
  overflow: hidden;
}
.ent-cover::after {
  content: '';
  position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(180deg, transparent 55%, rgba(5,4,3,0.55) 100%);
  pointer-events: none;
}
.ent-cover-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; z-index: 1;
}
.ent-cover-fallback {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 34px; opacity: 0.25; z-index: 0;
}
.badge {
  position: absolute; top: 7px; left: 7px; z-index: 2;
  font-size: 9.5px; font-weight: 800; letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 4px 8px; border-radius: 999px;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  color: #fff;
}
.badge.spotify { color: #6ee7b7; }
.badge.youtube { color: #ff8a8a; }
.badge.link { color: var(--text-secondary); }
.badge.finished { color: var(--good); }
.card-actions {
  position: absolute; top: 6px; right: 6px; z-index: 3;
  display: flex; gap: 4px;
}
.icon-btn-sm {
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(255,255,255,0.14);
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  color: #fff; border-radius: 8px;
  font-size: 12px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn-sm:hover { background: rgba(0,0,0,0.75); }
.icon-btn-sm.fav-active { color: var(--accent-bright); border-color: var(--accent-bright); }
.card-reorder {
  position: absolute; top: 6px; left: 6px; z-index: 3;
  display: flex; flex-direction: column; gap: 1px;
}
.card-reorder button {
  width: 18px; height: 14px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(255,255,255,0.14);
  background: rgba(0,0,0,0.55);
  color: #fff; border-radius: 4px; font-size: 8px; padding: 0; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.card-reorder button:hover:not(:disabled) { background: rgba(0,0,0,0.75); }
.card-reorder button:disabled { opacity: 0.3; cursor: default; }
.card-body {
  padding: 10px 12px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.card-title {
  font-size: 13.5px; font-weight: 600; line-height: 1.3;
  color: var(--text-primary);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
  min-height: 2.5em;
}
.card-author {
  font-size: 11px; color: var(--text-tertiary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  margin-top: -4px;
}
.tag {
  display: inline-flex; align-self: flex-start;
  align-items: center; gap: 5px;
  font-size: 10px; padding: 3px 9px;
  border-radius: 999px; font-weight: 700; letter-spacing: 0.04em;
  background: rgba(255,255,255,0.06); color: var(--text-secondary);
  font-family: var(--font-mono); text-transform: uppercase;
}
.card-rating { font-size: 11px; color: var(--warn); letter-spacing: 1px; }
.card-rating .off { color: rgba(255,255,255,0.14); }
.ent-card-url {
  display: block;
  font-size: 10.5px;
  font-family: var(--font-mono);
  color: var(--text-tertiary);
  text-decoration: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ent-card-url:hover { color: var(--text-secondary); text-decoration: underline; }

/* ===== Modal — real frosted glass over the page-wide cover-photo
   backdrop, same recipe as Dream Board's .modal. ===== */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(5,4,3,0.65);
  z-index: 100; align-items: center; justify-content: center;
  padding: 24px;
}
.modal-bg.show { display: flex; }
.modal {
  width: 100%; max-width: 460px;
  background: rgba(20, 17, 13, 0.72);
  -webkit-backdrop-filter: blur(24px) saturate(1.4); backdrop-filter: blur(24px) saturate(1.4);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: var(--radius-lg);
  padding: 22px; max-height: 88vh; overflow-y: auto;
}
.modal h3 { margin: 0 0 16px; font-family: var(--font-serif); font-size: 20px; font-weight: 600; color: var(--text-primary); }
.field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.field > label {
  font-size: 10.5px; color: var(--text-tertiary); font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
}
.field input[type="text"], .field input[type="url"], .field textarea {
  padding: 12px; border: 1px solid var(--border);
  background: rgba(255,255,255,0.04); color: var(--text-primary);
  border-radius: 10px; font-family: inherit; font-size: 14px;
}
.field textarea { resize: vertical; min-height: 64px; line-height: 1.5; }
.field input:focus, .field textarea:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(201,168,118,0.14);
}
.field-hint { font-size: 11.5px; color: var(--text-tertiary); line-height: 1.4; min-height: 1.4em; }
.url-row { display: flex; gap: 8px; }
.url-row input { flex: 1; min-width: 0; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.newcat-row { display: flex; gap: 8px; margin-top: 8px; }
.newcat-row[hidden] { display: none; }
.newcat-row input { flex: 1; min-width: 0; }
.cover-edit-row { display: flex; gap: 12px; align-items: flex-start; }
.cover-preview {
  width: 84px; height: 60px; border-radius: 10px;
  object-fit: cover; background: rgba(255,255,255,0.06);
  border: 1px solid var(--border); flex-shrink: 0; display: none;
}
.cover-edit-controls { flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 0; }
.upload-btn {
  display: inline-flex; align-items: center; justify-content: center;
  text-align: center; cursor: pointer;
}
.rating-row { display: flex; gap: 6px; align-items: center; }
.rating-star {
  background: transparent; border: none; cursor: pointer;
  font-size: 22px; color: rgba(255,255,255,0.18); padding: 2px;
  -webkit-tap-highlight-color: transparent; line-height: 1;
}
.rating-star.on { color: var(--warn); }
.rating-clear {
  font-size: 11px; color: var(--text-tertiary); cursor: pointer;
  text-decoration: underline; margin-left: 4px;
}

.btn-primary {
  width: 100%; padding: 13px;
  border: 1px solid var(--accent);
  background: linear-gradient(180deg, var(--accent-bright) 0%, var(--accent) 100%);
  color: #24190c; border-radius: 12px;
  font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), 0 4px 14px rgba(5,4,3,0.45);
  -webkit-tap-highlight-color: transparent;
}
.btn-primary:hover { transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0) scale(0.98); }
.btn-secondary {
  padding: 11px 16px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary); border-radius: 12px;
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.15s, border-color 0.15s;
}
.btn-secondary:hover { color: var(--accent-bright); border-color: var(--accent); background: rgba(255,255,255,0.06); }
.sort-select {
  padding: 11px 16px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary); border-radius: 12px;
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.15s, border-color 0.15s;
}

.modal-actions button { flex: 1; }

}

@media (prefers-reduced-motion: reduce) {

<script>
(function () {
  'use strict';

  // ============================================================
  // GALLERIES — the page's four independent media collections. Each
  // has its own storage key and its own fixed status vocabulary.
  // Podcasts is the only gallery with a second filter dimension
  // (Backlog/Finished) — confirmed with the user, not applied to the
  // other three.
  // ============================================================
  var GALLERIES = [
    { key: 'podcasts', label: 'Podcasts', icon: '🎙️', dataKey: 'media:podcasts', hasProgress: true,
      statuses: ['Learning', 'Photography / Videography', 'True Crime'] },
    { key: 'stories', label: 'Stories', icon: '📖', dataKey: 'media:stories', hasProgress: false,
      statuses: ['Horror Stories', 'Spicy Stories / Immersive Experience'] },
    { key: 'entertainment', label: 'Entertainment', icon: '🎬', dataKey: 'media:entertainment', hasProgress: false,
      statuses: ['Funny', 'Gaming', 'Scary Videos', 'Vlog-Type', 'Other', 'Favorite Videos'] },
    { key: 'playlists', label: 'Playlists', icon: '🎧', dataKey: 'media:playlists', hasProgress: false,
      statuses: ['Chill', 'Binaural Beats', 'Dark / Gothic / Horror / Romance', 'EDM / Electronic', 'Fantasy', 'Metal', 'ASMR'] },
    { key: 'favorites', label: 'Favorites', icon: '⭐', dataKey: null, hasProgress: false,
      statuses: [], isFavorites: true }
  ];
  var ACTIVE_GALLERY_KEY = 'media:active_gallery';

  // Legacy sort preference — asc/desc only. Migrated on boot into the new
  // sortMode scheme below (see the DOMContentLoaded handler) rather than
  // being deleted; same one-time-normalize-on-load precedent this app
  // already uses elsewhere for an evolving stored shape.
  var SORT_DIR_KEY = 'media:sort_dir';
  var SORT_MODE_KEY = 'media:sort_mode';
  var SORT_MODES = ['title-asc', 'title-desc', 'date-desc', 'date-asc', 'rating-desc', 'manual'];
  var activeGalleryKey = 'podcasts';
  var activeStatus = 'All';
  var activeProgress = 'All';
  var sortMode = 'title-asc';
  var cards = [];
  var editingId = null;
  var editingCard = null;
  var currentThumbnail = '';
  var selectedStatus = null;
  var selectedProgress = 'backlog';
  var selectedRating = 0;
  var titleManuallyEdited = false;

  function $(id) { return document.getElementById(id); }
  function galleryByKey(key) { return GALLERIES.filter(function (g) { return g.key === key; })[0] || GALLERIES[0]; }
  function activeGallery() { return galleryByKey(activeGalleryKey); }

  function genId() {
    return 'c_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  // ============================================================
  // HERO — one per gallery ("mini page"), same eyebrow/title/subtext/
  // CTA/cover-photo-or-video shape and mechanism as Dream Board's
  // per-tab hero (see dreamboard.html). Stored under one key,
  // `media:heroes` (an object keyed by gallery key), which already
  // rides the existing `syncedPrefixes: ['media:']` initCloudSync
  // config below — no sync.js changes needed. Cover photos start empty
  // by default (same as a fresh Dream Board tab) — this page has no
  // access to whatever photos already live in Dream Board's own
  // Supabase row, so nothing is pre-filled here.
  // ============================================================
  var HERO_KEY = 'media:heroes';
  var DEFAULT_HEROES = {
    podcasts: { eyebrow: 'LISTEN & LEARN', title: 'Podcasts', subtext: 'Learning, photography, videography, true crime — everything worth pressing play on.', ctaLabel: 'BROWSE PODCASTS' },
    stories: { eyebrow: 'GET LOST IN IT', title: 'Stories', subtext: 'Horror stories, spicy stories, immersive experiences — narratives that pull you in.', ctaLabel: 'BROWSE STORIES' },
    entertainment: { eyebrow: 'JUST FOR FUN', title: 'Entertainment', subtext: 'Funny clips, gaming, scary videos, vlogs — everything else worth watching.', ctaLabel: 'BROWSE ENTERTAINMENT' },
    playlists: { eyebrow: 'SET THE MOOD', title: 'Playlists', subtext: 'Chill, dark, EDM, fantasy, metal, ASMR — a soundtrack for every mood.', ctaLabel: 'BROWSE PLAYLISTS' },
    favorites: { eyebrow: 'THE BEST OF IT ALL', title: 'Favorites', subtext: 'Everything you starred, gathered from every gallery in one place.', ctaLabel: 'BROWSE FAVORITES' }
  };
  // Uploaded video files never touch localStorage/Supabase (no backend to
  // store them — see CLAUDE.md §2/§4) — object URLs live only in this map
  // for the current tab lifetime, keyed by gallery key. A gallery with
  // mediaType:'video' and no entry here (e.g. right after a reload)
  // renders as a "re-attach" prompt, same as Dream Board's hero.
  var sessionVideoBlobs = {};

  function loadHeroes() {
    var raw = null;
    try { raw = JSON.parse(localStorage.getItem(HERO_KEY)); } catch (e) {}
    return (raw && typeof raw === 'object') ? raw : {};
  }
  function saveHeroes(all) {
    try { localStorage.setItem(HERO_KEY, JSON.stringify(all)); } catch (e) {}
  }
  function currentHero() {
    var all = loadHeroes();
    var stored = all[activeGalleryKey] || {};
    var def = DEFAULT_HEROES[activeGalleryKey] || DEFAULT_HEROES.podcasts;
    return {
      eyebrow: typeof stored.eyebrow === 'string' ? stored.eyebrow : def.eyebrow,
      title: typeof stored.title === 'string' ? stored.title : def.title,
      subtext: typeof stored.subtext === 'string' ? stored.subtext : def.subtext,
      ctaLabel: typeof stored.ctaLabel === 'string' ? stored.ctaLabel : def.ctaLabel,
      photo: typeof stored.photo === 'string' ? stored.photo : '',
      photoColor: typeof stored.photoColor === 'string' ? stored.photoColor : '',
      mediaType: stored.mediaType === 'video' ? 'video' : 'image'
    };
  }
  function patchHero(patch) {
    var all = loadHeroes();
    all[activeGalleryKey] = Object.assign({}, currentHero(), patch);
    saveHeroes(all);
  }
  function autosize(ta) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }
  function wireInlineEdit(el, onCommit, opts) {
    opts = opts || {};
    var original = el.textContent;
    el.addEventListener('focus', function () { original = el.textContent; });
    el.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !opts.multiline) { e.preventDefault(); el.blur(); }
      else if (e.key === 'Escape') { e.preventDefault(); el.textContent = original; el.blur(); }
    });
    el.addEventListener('blur', function () {
      var val = el.textContent.trim();
      if (!val) { el.textContent = original; return; }
      if (val === original) return;
      onCommit(val);
    });
  }
  function revokeHeroVideoBlob(key) {
    if (sessionVideoBlobs[key]) { try { URL.revokeObjectURL(sessionVideoBlobs[key]); } catch (e) {} delete sessionVideoBlobs[key]; }
  }
  function renderPageBg() {
    var hero = currentHero();
    var bg = $('entPageBg'), video = $('entPageBgVideo');
    if (hero.mediaType === 'video' && sessionVideoBlobs[activeGalleryKey]) {
      bg.style.backgroundImage = 'none';
      video.src = sessionVideoBlobs[activeGalleryKey];
      video.style.display = 'block';
      video.play().catch(function () {});
    } else {
      video.pause(); video.removeAttribute('src'); video.style.display = 'none';
      bg.style.backgroundImage = hero.photo ? 'url("' + hero.photo + '")' : 'none';
    }
  }
  function renderHero() {
    var hero = currentHero();
    $('entHeroEyebrow').textContent = hero.eyebrow;
    $('entHeroTitle').value = hero.title;
    $('entHeroSubtext').textContent = hero.subtext;
    $('entHeroCtaLabel').textContent = hero.ctaLabel || 'EXPLORE';
    autosize($('entHeroTitle'));

    var img = $('entHeroPhotoImg'), video = $('entHeroVideoEl'), reattach = $('entHeroReattach'),
      choice = $('entHeroPhotoChoice'), tools = $('entHeroPhotoTools');
    img.style.display = 'none'; img.src = '';
    video.pause(); video.style.display = 'none';
    reattach.style.display = 'none';
    choice.style.display = 'none';
    tools.style.display = 'none';

    if (hero.mediaType === 'video') {
      var blobUrl = sessionVideoBlobs[activeGalleryKey];
      if (blobUrl) {
        video.src = blobUrl; video.style.display = 'block'; video.play().catch(function () {});
      } else {
        reattach.style.display = 'flex';
      }
      tools.style.display = 'flex';
    } else if (hero.photo) {
      img.src = hero.photo; img.style.display = 'block'; tools.style.display = 'flex';
    } else {
      choice.style.display = 'flex';
    }
    renderPageBg();
  }
  // Explicit 'image'|'video' rather than one input with a combined
  // accept="image/*,video/*" — combined-type accept values are known to
  // behave unpredictably in some mobile pickers (see Dream Board's own
  // changelog on this exact bug). The two "+ Add a cover photo/video"
  // buttons (and "Change," which reuses whichever kind is already set)
  // each force a single, unambiguous accept value before opening.
  function openHeroFilePicker(mediaKind) {
    var input = $('entHeroPhotoInput');
    input.accept = mediaKind === 'video' ? 'video/*' : 'image/*';
    input.value = '';
    input.click();
  }
  function reattachHeroVideo() {
    var input = document.createElement('input');
    input.type = 'file'; input.accept = 'video/*'; input.style.display = 'none';
    document.body.appendChild(input);
    var keyAtOpen = activeGalleryKey;
    input.addEventListener('change', function () {
      var file = input.files[0];
      document.body.removeChild(input);
      if (!file) return;
      if (file.size > 8 * 1024 * 1024) { alert('Video files are capped at 8MB for this session-only feature.'); return; }
      revokeHeroVideoBlob(keyAtOpen);
      sessionVideoBlobs[keyAtOpen] = URL.createObjectURL(file);
      if (keyAtOpen === activeGalleryKey) renderHero();
    });
    input.click();
  }
  // Cheap average-RGB sample from a downscaled copy — same approximation
  // Dream Board uses for its "match tab photo" tint option; not used for
  // anything on this page yet, kept for parity with the mechanism being
  // matched and in case a future tint feature wants it.
  function extractDominantColor(dataUrl) {
    return new Promise(function (resolve) {
      var img = new Image();
      img.onload = function () {
        try {
          var size = 32;
          var c = document.createElement('canvas');
          c.width = size; c.height = size;
          var ctx = c.getContext('2d');
          ctx.drawImage(img, 0, 0, size, size);
          var data = ctx.getImageData(0, 0, size, size).data;
          var r = 0, g = 0, b = 0, count = 0;
          for (var i = 0; i < data.length; i += 4) { r += data[i]; g += data[i + 1]; b += data[i + 2]; count++; }
          if (!count) { resolve(''); return; }
          function toHex(v) { return Math.round(v / count).toString(16).padStart(2, '0'); }
          resolve('#' + toHex(r) + toHex(g) + toHex(b));
        } catch (e) { resolve(''); }
      };
      img.onerror = function () { resolve(''); };
      img.src = dataUrl;
    });
  }
  function handleHeroMediaFile() {
    var file = $('entHeroPhotoInput').files[0];
    if (!file) return;
    var keyAtUpload = activeGalleryKey;
    var isVideo = file.type.indexOf('video') === 0;
    if (isVideo) {
      if (file.size > 8 * 1024 * 1024) { alert('Video files are capped at 8MB for this session-only feature.'); return; }
      revokeHeroVideoBlob(keyAtUpload);
      sessionVideoBlobs[keyAtUpload] = URL.createObjectURL(file);
      patchHero({ mediaType: 'video', photo: '', photoColor: '' });
      renderHero();
      return;
    }
    var reader = new FileReader();
    reader.onload = async function () {
      var compressed = await compressImageDataUrl(String(reader.result), 1100, 0.78);
      var color = await extractDominantColor(compressed);
      revokeHeroVideoBlob(keyAtUpload);
      patchHero({ mediaType: 'image', photo: compressed, photoColor: color });
      renderHero();
    };
    reader.readAsDataURL(file);
  }
  function wireHero() {
    wireInlineEdit($('entHeroEyebrow'), function (val) { patchHero({ eyebrow: val }); });
    wireInlineEdit($('entHeroSubtext'), function (val) { patchHero({ subtext: val }); }, { multiline: true });
    wireInlineEdit($('entHeroCtaLabel'), function (val) { patchHero({ ctaLabel: val }); });
    $('entHeroTitle').addEventListener('input', function () { autosize($('entHeroTitle')); });
    $('entHeroTitle').addEventListener('blur', function () { patchHero({ title: $('entHeroTitle').value.trim() || DEFAULT_HEROES[activeGalleryKey].title }); renderHero(); });
    $('entHeroAddPhotoBtn').addEventListener('click', function () { openHeroFilePicker('image'); });
    $('entHeroAddVideoBtn').addEventListener('click', function () { openHeroFilePicker('video'); });
    $('entHeroPhotoChangeBtn').addEventListener('click', function (e) {
      e.stopPropagation();
      openHeroFilePicker(currentHero().mediaType === 'video' ? 'video' : 'image');
    });
    $('entHeroPhotoRemoveBtn').addEventListener('click', function (e) {
      e.stopPropagation();
      revokeHeroVideoBlob(activeGalleryKey);
      patchHero({ photo: '', photoColor: '', mediaType: 'image' });
      renderHero();
    });
    $('entHeroReattachBtn').addEventListener('click', function (e) { e.stopPropagation(); reattachHeroVideo(); });
    $('entHeroPhotoInput').addEventListener('change', handleHeroMediaFile);
    $('entHeroCta').addEventListener('click', function () {
      $('galleryTabsRow').scrollIntoView({ behavior: window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 'auto' : 'smooth', block: 'start' });
    });
  }

  // -------- storage (per-gallery) --------
  function loadCards(galleryKeyArg) {
    var g = galleryByKey(galleryKeyArg || activeGalleryKey);
    if (g.isFavorites) return loadFavoriteCards();
    var arr = [];
    try { arr = JSON.parse(localStorage.getItem(g.dataKey)) || []; } catch (e) {}
    return Array.isArray(arr) ? arr : [];
  }
  function saveCards(arr, galleryKeyArg) {
    var g = galleryByKey(galleryKeyArg || activeGalleryKey);
    try { localStorage.setItem(g.dataKey, JSON.stringify(arr)); } catch (e) {}
  }

  // -------- Favorites — a virtual gallery aggregated from the other four,
  // not its own storage key. A favorited card keeps living in its home
  // gallery's array (just gets `favorite: true`); this view only reads
  // and re-writes through that home gallery via updateCardEverywhere/
  // deleteCardEverywhere below, tagging each aggregated card with a
  // transient `_sourceGallery` (never persisted) so those helpers know
  // where to write back. --------
  function loadFavoriteCards() {
    var out = [];
    GALLERIES.forEach(function (gg) {
      if (gg.isFavorites) return;
      var arr = [];
      try { arr = JSON.parse(localStorage.getItem(gg.dataKey)) || []; } catch (e) {}
      if (!Array.isArray(arr)) return;
      arr.forEach(function (c) {
        if (c.favorite) out.push(Object.assign({}, c, { _sourceGallery: gg.key }));
      });
    });
    return out;
  }
  function updateCardEverywhere(card, patch) {
    var gKey = card._sourceGallery || activeGalleryKey;
    var arr = loadCards(gKey).map(function (c) {
      return c.id === card.id ? Object.assign({}, c, patch) : c;
    });
    saveCards(arr, gKey);
  }
  function deleteCardEverywhere(card) {
    var gKey = card._sourceGallery || activeGalleryKey;
    var arr = loadCards(gKey).filter(function (c) { return c.id !== card.id; });
    saveCards(arr, gKey);
  }

  // ============================================================
  // ONE-TIME MIGRATION — folds the old single flat gallery (`ent:cards`
  // + freeform `ent:categories`) into the four new galleries. Runs once
  // (guarded by media:migrated_v1); `ent:cards`/`ent:categories` are left
  // untouched afterward (orphaned, same treatment as other removed
  // features elsewhere in this app — see CLAUDE.md). The keyword match
  // is best-effort: anything unrecognized lands in Entertainment → Other
  // (an explicit catch-all status) with a note flagging its old category
  // so it's easy to find and re-file by hand.
  // ============================================================
  function migrateLegacyMedia() {
    if (localStorage.getItem('media:migrated_v1')) return;
    var old = [];
    try { old = JSON.parse(localStorage.getItem('ent:cards')) || []; } catch (e) {}
    if (Array.isArray(old) && old.length) {
      var buckets = { podcasts: [], stories: [], entertainment: [], playlists: [] };
      old.forEach(function (c) {
        var cat = String(c.category || '').toLowerCase();
        var target = 'entertainment', status = 'Other';
        if (cat.indexOf('podcast') !== -1) { target = 'podcasts'; status = 'Learning'; }
        else if (cat.indexOf('horror') !== -1 && cat.indexOf('stor') !== -1) { target = 'stories'; status = 'Horror Stories'; }
        else if (cat.indexOf('spicy') !== -1 || cat.indexOf('immersive') !== -1) { target = 'stories'; status = 'Spicy Stories / Immersive Experience'; }
        else if (/music|playlist|chill|edm|electronic|metal|asmr|binaural|fantasy|gothic|romance/.test(cat)) {
          target = 'playlists';
          status = cat.indexOf('asmr') !== -1 ? 'ASMR'
            : cat.indexOf('edm') !== -1 || cat.indexOf('electronic') !== -1 ? 'EDM / Electronic'
            : cat.indexOf('metal') !== -1 ? 'Metal'
            : cat.indexOf('binaural') !== -1 ? 'Binaural Beats'
            : cat.indexOf('fantasy') !== -1 ? 'Fantasy'
            : cat.indexOf('gothic') !== -1 || cat.indexOf('romance') !== -1 ? 'Dark / Gothic / Horror / Romance'
            : 'Chill';
        }
        var card = {
          id: 'mig_' + (c.id || genId()),
          url: c.url || '', source: c.source || 'link',
          title: c.title || 'Untitled', author: '',
          thumbnail: c.thumbnail || '',
          status: status,
          progress: 'backlog',
          description: '', length: '', songCount: '', rating: 0,
          notes: c.category ? ('Migrated from old category "' + c.category + '".') : '',
          createdAt: c.createdAt || Date.now()
        };
        buckets[target].push(card);
      });
      GALLERIES.forEach(function (g) {
        if (buckets[g.key] && buckets[g.key].length) {
          var existing = loadCards(g.key);
          saveCards(existing.concat(buckets[g.key]), g.key);
        }
      });
    }
    try { localStorage.setItem('media:migrated_v1', '1'); } catch (e) {}
  }

  // -------- link parsing / preview fetch --------
  function detectSource(url) {
    try {
      var u = new URL(url);
      var h = u.hostname.replace(/^www\./, '');
      if (h === 'youtu.be' || h.endsWith('youtube.com')) return 'youtube';
      if (h.endsWith('spotify.com')) return 'spotify';
    } catch (e) {}
    return null;
  }
  function getYouTubeId(url) {
    try {
      var u = new URL(url);
      if (u.hostname.indexOf('youtu.be') !== -1) return u.pathname.slice(1).split('/')[0] || null;
      if (u.hostname.indexOf('youtube.com') !== -1) {
        if (u.pathname === '/watch') return u.searchParams.get('v');
        var m = u.pathname.match(/\/(shorts|embed)\/([^/?]+)/);
        if (m) return m[2];
      }
    } catch (e) {}
    return null;
  }
  async function fetchPreview(url, source) {
    var result = { title: '', thumbnail: '', author: '' };
    if (source === 'youtube') {
      var id = getYouTubeId(url);
      if (id) result.thumbnail = 'https://img.youtube.com/vi/' + id + '/hqdefault.jpg';
      try {
        var res = await fetch('https://www.youtube.com/oembed?url=' + encodeURIComponent(url) + '&format=json');
        if (res.ok) {
          var data = await res.json();
          if (data.title) result.title = data.title;
          if (data.thumbnail_url) result.thumbnail = data.thumbnail_url;
          if (data.author_name) result.author = data.author_name;
        }
      } catch (e) {}
      return result;
    }
    if (source === 'spotify') {
      try {
        var res2 = await fetch('https://open.spotify.com/oembed?url=' + encodeURIComponent(url));
        if (res2.ok) {
          var data2 = await res2.json();
          if (data2.title) result.title = data2.title;
          if (data2.thumbnail_url) result.thumbnail = data2.thumbnail_url;
        }
      } catch (e) {}
      return result;
    }
    return result;
  }

  function compressImageDataUrl(dataUrl, maxDim, quality) {
    maxDim = maxDim || 480;
    quality = quality == null ? 0.82 : quality;
    return new Promise((resolve) => {
      var img = new Image();
      img.onload = () => {
        var w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
        if (w > maxDim || h > maxDim) {
          if (w >= h) { h = Math.round(h * (maxDim / w)); w = maxDim; }
          else { w = Math.round(w * (maxDim / h)); h = maxDim; }
        }
        var c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        try { resolve(c.toDataURL('image/jpeg', quality)); } catch (e) { resolve(dataUrl); }
      };
      img.onerror = () => resolve(dataUrl);
      img.src = dataUrl;
    });
  }

  // -------- chip helper --------
  function makeChip(label, active, onClick, dashed, extraClass) {
    var b = document.createElement('button');
    b.type = 'button';
    b.className = 'chip' + (active ? ' active' : '') + (dashed ? ' dashed' : '') + (extraClass ? ' ' + extraClass : '');
    b.textContent = label;
    b.addEventListener('click', onClick);
    return b;
  }

  // -------- gallery-type switcher --------
  function updateAddBtnVisibility() {
    $('entAddBtn').style.display = activeGallery().isFavorites ? 'none' : '';
  }
  function renderGalleryTabs() {
    var row = $('galleryTabsRow');
    row.innerHTML = '';
    GALLERIES.forEach(function (g) {
      row.appendChild(makeChip(g.icon + ' ' + g.label, g.key === activeGalleryKey, function () {
        activeGalleryKey = g.key;
        activeStatus = 'All';
        activeProgress = 'All';
        try { localStorage.setItem(ACTIVE_GALLERY_KEY, activeGalleryKey); } catch (e) {}
        cards = loadCards();
        renderGalleryTabs();
        renderFilterBar();
        renderProgressFilterBar();
        updateAddBtnVisibility();
        renderGrid();
        renderHero();
      }, false, 'chip-gallery'));
    });
  }

  // -------- status filter bar (scoped to the active gallery; hidden for
  // the Favorites virtual gallery, which has no status vocabulary of its
  // own — each card keeps showing its home gallery's status as a tag) --------
  function renderFilterBar() {
    var row = $('entFilterRow');
    var g = activeGallery();
    row.hidden = g.statuses.length === 0;
    if (row.hidden) return;
    row.innerHTML = '';
    row.appendChild(makeChip('All', activeStatus === 'All', function () {
      activeStatus = 'All'; renderFilterBar(); renderGrid();
    }));
    g.statuses.forEach(function (status) {
      row.appendChild(makeChip(status, activeStatus === status, function () {
        activeStatus = status; renderFilterBar(); renderGrid();
      }));
    });
  }
  function renderProgressFilterBar() {
    var row = $('progressFilterRow');
    var g = activeGallery();
    row.hidden = !g.hasProgress;
    if (!g.hasProgress) return;
    row.innerHTML = '';
    [['All', 'All'], ['Backlog', 'backlog'], ['Finished', 'finished']].forEach(function (pair) {
      row.appendChild(makeChip(pair[0], activeProgress === pair[1], function () {
        activeProgress = pair[1]; renderProgressFilterBar(); renderGrid();
      }));
    });
  }

  // -------- sort control --------
  // Title A→Z / Z→A, Newest/Oldest (createdAt), Rating high→low, and
  // Manual (preserves/edits the underlying array order via up/down
  // reorder buttons on each card — this app has no drag-and-drop
  // anywhere, only up/down-arrow swaps, e.g. Life Areas and the Overview
  // notes sections on index.html, so Manual follows that same pattern).
  // Manual doesn't apply to the aggregated Favorites view (there's no
  // single underlying array to reorder), so it silently falls back to
  // Title A→Z there without touching the saved preference.
  function titleCmp(a, b) {
    return String(a.title || '').localeCompare(String(b.title || ''), undefined, { sensitivity: 'base' });
  }
  function getVisibleList() {
    var g = activeGallery();
    var list = cards.filter(function (c) {
      if (!g.isFavorites) {
        if (activeStatus !== 'All' && c.status !== activeStatus) return false;
        if (g.hasProgress && activeProgress !== 'All' && (c.progress || 'backlog') !== activeProgress) return false;
      }
      return true;
    });
    var manualActive = sortMode === 'manual' && !g.isFavorites;
    if (!manualActive) {
      list = list.slice().sort(function (a, b) {
        switch (sortMode) {
          case 'title-desc': return -titleCmp(a, b);
          case 'date-desc': return (b.createdAt || 0) - (a.createdAt || 0);
          case 'date-asc': return (a.createdAt || 0) - (b.createdAt || 0);
          case 'rating-desc': return (Number(b.rating) || 0) - (Number(a.rating) || 0);
          default: return titleCmp(a, b);
        }
      });
    }
    return { list: list, manualActive: manualActive };
  }
  function moveCardManual(id, dir) {
    var visList = getVisibleList().list;
    var idx = -1;
    for (var i = 0; i < visList.length; i++) { if (visList[i].id === id) { idx = i; break; } }
    var swapIdx = idx + dir;
    if (idx === -1 || swapIdx < 0 || swapIdx >= visList.length) return;
    var otherId = visList[swapIdx].id;
    var iA = -1, iB = -1;
    for (var j = 0; j < cards.length; j++) {
      if (cards[j].id === id) iA = j;
      if (cards[j].id === otherId) iB = j;
    }
    if (iA === -1 || iB === -1) return;
    var tmp = cards[iA]; cards[iA] = cards[iB]; cards[iB] = tmp;
    saveCards(cards);
    renderGrid();
  }
  function updateSortSelect() { $('entSortSelect').value = sortMode; }
  function wireSortSelect() {
    $('entSortSelect').addEventListener('change', function () {
      sortMode = $('entSortSelect').value;
      try { localStorage.setItem(SORT_MODE_KEY, sortMode); } catch (e) {}
      renderGrid();
    });
  }

  // -------- gallery grid --------
  function ratingHtml(rating) {
    rating = Number(rating) || 0;
    if (!rating) return '';
    var out = '<div class="card-rating">';
    for (var i = 1; i <= 5; i++) out += i <= rating ? '★' : '<span class="off">★</span>';
    out += '</div>';
    return out;
  }
  function buildCardEl(card, index, total, manualActive) {
    var g = activeGallery();
    // For an aggregated Favorites card, per-card icon/progress semantics
    // should reflect its own home gallery, not the virtual one.
    var srcG = card._sourceGallery ? galleryByKey(card._sourceGallery) : g;
    var el = document.createElement('div');
    el.className = 'ent-card';
    el.dataset.id = card.id;

    var cover = document.createElement('div');
    cover.className = 'ent-cover';

    if (card.thumbnail) {
      var img = document.createElement('img');
      img.className = 'ent-cover-img';
      img.loading = 'lazy';
      img.alt = '';
      img.src = card.thumbnail;
      img.addEventListener('error', function () { img.style.display = 'none'; });
      cover.appendChild(img);
    }
    var fallback = document.createElement('span');
    fallback.className = 'ent-cover-fallback';
    fallback.textContent = card.source === 'spotify' ? '♫' : card.source === 'youtube' ? '▶' : srcG.icon;
    cover.appendChild(fallback);

    var badge = document.createElement('span');
    if (srcG.hasProgress && card.progress === 'finished') {
      badge.className = 'badge finished';
      badge.textContent = 'Finished';
    } else {
      badge.className = 'badge ' + (card.source || 'link');
      badge.textContent = card.source === 'spotify' ? 'Spotify' : card.source === 'youtube' ? 'YouTube' : 'Link';
    }
    cover.appendChild(badge);

    if (manualActive) {
      var reorder = document.createElement('div');
      reorder.className = 'card-reorder';
      var upBtn = document.createElement('button');
      upBtn.type = 'button'; upBtn.dataset.action = 'move-up';
      upBtn.textContent = '▲'; upBtn.setAttribute('aria-label', 'Move up');
      upBtn.disabled = index === 0;
      var downBtn = document.createElement('button');
      downBtn.type = 'button'; downBtn.dataset.action = 'move-down';
      downBtn.textContent = '▼'; downBtn.setAttribute('aria-label', 'Move down');
      downBtn.disabled = index === total - 1;
      reorder.appendChild(upBtn); reorder.appendChild(downBtn);
      cover.appendChild(reorder);
    }

    var actions = document.createElement('div');
    actions.className = 'card-actions';
    var favBtn = document.createElement('button');
    favBtn.type = 'button'; favBtn.className = 'icon-btn-sm' + (card.favorite ? ' fav-active' : '');
    favBtn.dataset.action = 'favorite';
    favBtn.setAttribute('aria-label', card.favorite ? 'Unfavorite' : 'Favorite');
    favBtn.textContent = card.favorite ? '★' : '☆';
    actions.appendChild(favBtn);
    if (!g.isFavorites) {
      var editBtn = document.createElement('button');
      editBtn.type = 'button'; editBtn.className = 'icon-btn-sm'; editBtn.dataset.action = 'edit';
      editBtn.setAttribute('aria-label', 'Edit'); editBtn.textContent = '✎';
      actions.appendChild(editBtn);
    }
    var delBtn = document.createElement('button');
    delBtn.type = 'button'; delBtn.className = 'icon-btn-sm'; delBtn.dataset.action = 'delete';
    delBtn.setAttribute('aria-label', 'Delete'); delBtn.textContent = '✕';
    actions.appendChild(delBtn);
    cover.appendChild(actions);

    var body = document.createElement('div');
    body.className = 'card-body';
    var title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = card.title;
    body.appendChild(title);
    if (card.author) {
      var author = document.createElement('div');
      author.className = 'card-author';
      author.textContent = card.author;
      body.appendChild(author);
    }
    var tag = document.createElement('span');
    tag.className = 'tag';
    tag.textContent = g.isFavorites ? (srcG.label + ' · ' + (card.status || '—')) : (card.status || '—');
    body.appendChild(tag);
    if (card.rating) {
      var ratingEl = document.createElement('div');
      ratingEl.innerHTML = ratingHtml(card.rating);
      body.appendChild(ratingEl.firstChild);
    }
    var link = document.createElement('a');
    link.className = 'ent-card-url';
    link.href = card.url;
    link.target = '_blank';
    link.rel = 'noopener';
    link.textContent = card.url;
    body.appendChild(link);

    el.appendChild(cover); el.appendChild(body);
    return el;
  }

  function renderGrid() {
    var grid = $('entGrid');
    var empty = $('entEmpty');
    grid.innerHTML = '';
    var res = getVisibleList();
    var list = res.list;
    empty.hidden = list.length !== 0;
    empty.textContent = activeGallery().isFavorites
      ? 'No favorites yet — tap the ☆ on any item in your other galleries to add it here.'
      : 'No items yet — tap "+ Add" to save your first link.';
    list.forEach(function (card, i) {
      grid.appendChild(buildCardEl(card, i, list.length, res.manualActive));
    });
  }

  function deleteCard(card) {
    deleteCardEverywhere(card);
    cards = cards.filter(function (c) { return c.id !== card.id; });
    renderGrid();
  }

  // -------- modal --------
  function updateCoverPreview() {
    var img = $('entCoverPreview');
    if (currentThumbnail) { img.src = currentThumbnail; img.style.display = 'block'; }
    else { img.removeAttribute('src'); img.style.display = 'none'; }
  }
  function renderCatChips() {
    var row = $('entCatRow');
    row.innerHTML = '';
    activeGallery().statuses.forEach(function (status) {
      row.appendChild(makeChip(status, selectedStatus === status, function () {
        selectedStatus = status; renderCatChips();
      }));
    });
  }
  function renderProgressChips() {
    var g = activeGallery();
    $('entProgressField').hidden = !g.hasProgress;
    if (!g.hasProgress) return;
    var row = $('entProgressRow');
    row.innerHTML = '';
    [['Backlog', 'backlog'], ['Finished', 'finished']].forEach(function (pair) {
      row.appendChild(makeChip(pair[0], selectedProgress === pair[1], function () {
        selectedProgress = pair[1]; renderProgressChips();
      }));
    });
  }
  function renderRatingRow() {
    var row = $('entRatingRow');
    row.innerHTML = '';
    for (var i = 1; i <= 5; i++) {
      (function (i) {
        var b = document.createElement('button');
        b.type = 'button';
        b.className = 'rating-star' + (i <= selectedRating ? ' on' : '');
        b.textContent = '★';
        b.setAttribute('aria-label', i + ' star' + (i === 1 ? '' : 's'));
        b.addEventListener('click', function () { selectedRating = i; renderRatingRow(); });
        row.appendChild(b);
      })(i);
    }
    var clear = document.createElement('span');
    clear.className = 'rating-clear';
    clear.textContent = 'clear';
    clear.addEventListener('click', function () { selectedRating = 0; renderRatingRow(); });
    row.appendChild(clear);
  }

  function openModal(card) {
    editingCard = card || null;
    editingId = card ? card.id : null;
    titleManuallyEdited = !!card;
    $('entModalTitle').textContent = card ? 'Edit item' : 'Add item';
    $('entUrl').value = card ? card.url : '';
    $('entTitle').value = card ? card.title : '';
    $('entAuthor').value = card ? (card.author || '') : '';
    $('entDescription').value = card ? (card.description || '') : '';
    $('entLength').value = card ? (card.length || '') : '';
    $('entSongCount').value = card ? (card.songCount || '') : '';
    $('entNotes').value = card ? (card.notes || '') : '';
    $('entCoverUrlInput').value = '';
    $('entUrlHint').textContent = '';
    currentThumbnail = card ? (card.thumbnail || '') : '';
    updateCoverPreview();
    selectedStatus = card ? card.status : (activeGallery().statuses[0] || null);
    selectedProgress = card ? (card.progress || 'backlog') : 'backlog';
    selectedRating = card ? (Number(card.rating) || 0) : 0;
    renderCatChips();
    renderProgressChips();
    renderRatingRow();
    $('entDelete').style.display = card ? 'block' : 'none';
    $('entModalBg').classList.add('show');
  }
  function closeModal() {
    $('entModalBg').classList.remove('show');
    editingCard = null; editingId = null;
  }

  async function maybeAutoFetch() {
    var url = $('entUrl').value.trim();
    var hint = $('entUrlHint');
    if (!url) return;
    var source = detectSource(url);
    if (!source) {
      hint.textContent = "Doesn't look like a Spotify or YouTube link — you can still save it and set the cover manually.";
      return;
    }
    hint.textContent = 'Fetching preview…';
    var preview = await fetchPreview(url, source);
    if (!titleManuallyEdited && preview.title) $('entTitle').value = preview.title;
    if (preview.author && !$('entAuthor').value.trim()) $('entAuthor').value = preview.author;
    if (preview.thumbnail) { currentThumbnail = preview.thumbnail; updateCoverPreview(); }
    hint.textContent = (preview.title || preview.thumbnail)
      ? ''
      : "Couldn't auto-fetch a preview — paste an image URL or upload a cover below.";
  }

  function wireModal() {
    $('entAddBtn').addEventListener('click', function () { openModal(null); });
    $('entModalCancel').addEventListener('click', closeModal);
    $('entModalBg').addEventListener('click', function (e) { if (e.target.id === 'entModalBg') closeModal(); });

    $('entUrl').addEventListener('change', maybeAutoFetch);
    $('entFetchBtn').addEventListener('click', maybeAutoFetch);
    $('entTitle').addEventListener('input', function () { titleManuallyEdited = true; });

    $('entCoverUrlInput').addEventListener('change', function () {
      var v = $('entCoverUrlInput').value.trim();
      if (v) { currentThumbnail = v; updateCoverPreview(); }
    });
    $('entCoverFile').addEventListener('change', function (e) {
      var file = e.target.files && e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = async function () {
        var compressed = await compressImageDataUrl(String(reader.result), 480, 0.82);
        currentThumbnail = compressed;
        updateCoverPreview();
      };
      reader.readAsDataURL(file);
    });

    $('entModalSave').addEventListener('click', function () {
      var url = $('entUrl').value.trim();
      var title = $('entTitle').value.trim();
      var hint = $('entUrlHint');
      if (!url) { hint.textContent = 'Paste a link first.'; return; }
      if (!title) { hint.textContent = 'Give it a title.'; return; }
      if (!selectedStatus) { hint.textContent = 'Pick a status.'; return; }
      var source = detectSource(url) || 'link';
      var card = {
        id: editingId || genId(),
        url: url, source: source, title: title,
        author: $('entAuthor').value.trim(),
        thumbnail: currentThumbnail || '',
        status: selectedStatus,
        progress: activeGallery().hasProgress ? selectedProgress : undefined,
        description: $('entDescription').value.trim(),
        length: $('entLength').value.trim(),
        songCount: $('entSongCount').value.trim(),
        rating: selectedRating || 0,
        notes: $('entNotes').value.trim(),
        createdAt: editingCard ? editingCard.createdAt : Date.now()
      };
      if (editingId) {
        cards = cards.map(function (c) { return c.id === editingId ? card : c; });
      } else {
        cards.unshift(card);
      }
      saveCards(cards);
      closeModal();
      renderGrid();
    });

    $('entDelete').addEventListener('click', function () {
      if (!editingCard) return;
      if (!confirm('Delete this item?')) return;
      deleteCard(editingCard);
      closeModal();
    });

    $('entGrid').addEventListener('click', function (e) {
      if (e.target.closest('.ent-card-url')) return;
      var actionBtn = e.target.closest('[data-action]');
      var cardEl = e.target.closest('.ent-card');
      if (!cardEl) return;
      var id = cardEl.dataset.id;
      var card = cards.filter(function (c) { return c.id === id; })[0];
      if (!card) return;
      if (actionBtn) {
        e.stopPropagation();
        var action = actionBtn.dataset.action;
        if (action === 'edit') openModal(card);
        else if (action === 'delete') {
          if (confirm('Delete "' + card.title + '"?')) deleteCard(card);
        } else if (action === 'favorite') {
          var newFav = !card.favorite;
          updateCardEverywhere(card, { favorite: newFav });
          if (activeGallery().isFavorites) {
            cards = cards.filter(function (c) { return c.id !== id; });
          } else {
            cards = cards.map(function (c) { return c.id === id ? Object.assign({}, c, { favorite: newFav }) : c; });
          }
          renderGrid();
        } else if (action === 'move-up') {
          moveCardManual(id, -1);
        } else if (action === 'move-down') {
          moveCardManual(id, 1);
        }
        return;
      }
      window.open(card.url, '_blank', 'noopener');
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    migrateLegacyMedia();
    var savedGallery = null;
    try { savedGallery = localStorage.getItem(ACTIVE_GALLERY_KEY); } catch (e) {}
    if (savedGallery && GALLERIES.some(function (g) { return g.key === savedGallery; })) activeGalleryKey = savedGallery;
    var savedSortMode = null;
    try { savedSortMode = localStorage.getItem(SORT_MODE_KEY); } catch (e) {}
    if (savedSortMode && SORT_MODES.indexOf(savedSortMode) !== -1) {
      sortMode = savedSortMode;
    } else {
      var legacyDir = null;
      try { legacyDir = localStorage.getItem(SORT_DIR_KEY); } catch (e) {}
      if (legacyDir === 'desc') sortMode = 'title-desc';
    }
    cards = loadCards();
    renderGalleryTabs();
    renderFilterBar();
    renderProgressFilterBar();
    updateAddBtnVisibility();
    updateSortSelect();
    renderGrid();
    renderHero();
    wireModal();
    wireHero();
    wireSortSelect();

    if (typeof initCloudSync === 'function') {
      initCloudSync({
        appKey: 'entertainment',
        syncedKeys: ['ent:cards', 'ent:categories', 'media:active_gallery', 'media:migrated_v1'],
        syncedPrefixes: ['media:'],
        onApplied: function () {
          cards = loadCards();
          renderGrid();
          renderHero();
        }
      });
    }
  });
})();
</script>
</body>
</html>
