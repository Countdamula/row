<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0509">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Media</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --bg: #170a12;
  --bg-deep: #0b0509;
  --bg-card: rgba(255, 255, 255, 0.04);
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --border: rgba(255, 255, 255, 0.08);
  --accent: #E07658;
  --good: #6ee7b7;
  --warn: #fbbf24;
  --bad: #ff8a8a;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  /* Re-graded to match two reference photos: a dark wine/black velvet
     "Welcome / Enter Gently" hero (candles, roses, birdcage lanterns) and
     a dark boutique gallery page (dusty-rose peonies, elegant serif
     script). --tile-border and --pink-accent are the same two tokens the
     original per-file exception introduced (see CLAUDE.md §6) — their
     hues just moved from hot-pink/red-coral to dusty rose/wine to match
     the new reference. --wine/--candle/--cream/--font-serif are new,
     added for the hero banner only, same "explicit literal instruction"
     exception as before, not a generic palette swap.
  */
  --tile-border: rgba(196, 110, 130, 0.32);
  --pink-accent: #e08a9f;
  --wine: #3d0f1a;
  --candle: #e8a463;
  --cream: #f3e8da;
  --font-serif: Georgia, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
  color-scheme: dark;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  min-height: 100%;
}

body::before {
  content: '';
  position: fixed;
  inset: -10%;
  z-index: -2;
  background:
    radial-gradient(60% 45% at 82% 12%, rgba(232, 164, 99, 0.10) 0%, transparent 55%),
    radial-gradient(55% 45% at 18% 90%, rgba(224, 138, 159, 0.08) 0%, transparent 55%),
    linear-gradient(180deg, #170a12 0%, #0b0509 100%);
  filter: blur(40px) saturate(1.05);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.7;
  pointer-events: none;
}

html, body { scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { width: 0 !important; height: 0 !important; display: none !important; }

/* ===== Hero banner — abstract, not the reference photos' actual imagery
   (no roses/candles/curtain assets exist to drop in). Re-creates the
   mood in CSS only: a wine-red glow rising into near-black (the velvet
   curtain photo) plus a soft dusty-rose corner glow (the floral gallery
   photo), an elegant serif display title, and a thin rule + tracked-caps
   subtext echoing "WELCOME — ENTER GENTLY". ===== */
.ent-banner {
  position: relative;
  overflow: hidden;
  padding: 76px 24px 56px;
  text-align: center;
  border-bottom: 1px solid var(--tile-border);
  background:
    radial-gradient(120% 85% at 50% -15%, rgba(122, 20, 42, 0.55) 0%, rgba(11, 5, 9, 0.92) 55%, transparent 100%),
    radial-gradient(38% 30% at 88% 18%, rgba(232, 164, 99, 0.16) 0%, transparent 65%),
    radial-gradient(30% 26% at 10% 82%, rgba(224, 138, 159, 0.14) 0%, transparent 65%);
}
.ent-banner-grain {
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.6;
}
.ent-banner-title {
  position: relative; z-index: 1;
  font-family: var(--font-serif);
  font-weight: 400;
  text-transform: uppercase;
  font-size: clamp(38px, 9vw, 60px);
  letter-spacing: 0.06em;
  color: var(--cream);
  text-shadow: 0 2px 30px rgba(0,0,0,0.6), 0 0 40px rgba(232,164,99,0.12);
}
.ent-banner-rule {
  position: relative; z-index: 1;
  display: flex; align-items: center; gap: 10px; justify-content: center;
  max-width: 220px; margin: 18px auto 0;
}
.ent-banner-rule::before, .ent-banner-rule::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--tile-border));
}
.ent-banner-rule::after { background: linear-gradient(90deg, var(--tile-border), transparent); }
.ent-banner-rule span { font-size: 11px; color: var(--pink-accent); }
.ent-banner-subtext {
  position: relative; z-index: 1;
  margin-top: 14px;
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--text-secondary);
}
.ent-banner-cta {
  position: relative; z-index: 1;
  display: inline-flex; align-items: center;
  margin-top: 24px; padding: 12px 26px;
  border: 1px solid var(--tile-border); border-radius: 999px;
  background: transparent; color: var(--cream);
  font-family: inherit; font-size: 11px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, border-color 0.15s;
}
.ent-banner-cta:hover { background: rgba(224,138,159,0.10); border-color: var(--pink-accent); }

.ent-section-divider {
  width: 100%; height: 30px; margin: 22px 0 22px;
  background: repeating-conic-gradient(rgba(224,138,159,0.16) 0deg 0.5deg, transparent 0.5deg 12deg);
  -webkit-mask: radial-gradient(circle at 50% 0%, #000 0%, #000 2%, transparent 2.4%);
  mask: radial-gradient(circle at 50% 0%, #000 0%, #000 2%, transparent 2.4%);
  opacity: 0.7;
}

@media (max-width: 480px) {
  .ent-banner { padding: 52px 16px 40px; }
}

.shell {
  max-width: 1000px;
  margin: 0 auto;
  padding: 24px 16px 60px;
}

/* ===== Back to dashboard ===== */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px 8px 10px;
  margin: 0 0 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px;
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s ease, color 0.15s ease;
}
.back-btn:hover, .back-btn:active {
  background: rgba(255,255,255,0.07);
  color: var(--text-primary);
}
.back-btn svg { display: block; }

/* ===== Header ===== */
.ent-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; gap: 12px;
}
.ent-title { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
.ent-header-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.ent-header-actions .btn-secondary { padding: 10px 16px; white-space: nowrap; }
.btn-add {
  flex-shrink: 0;
  padding: 10px 16px;
  border: 1px solid rgba(243,232,218,0.85);
  background: linear-gradient(180deg, var(--cream) 0%, #d9a0ae 100%);
  color: #2a0d14; border-radius: 999px;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.45), 0 4px 14px rgba(61,15,26,0.45);
  -webkit-tap-highlight-color: transparent;
}
.btn-add:hover { transform: translateY(-1px); }
.btn-add:active { transform: translateY(0) scale(0.97); }

/* ===== Chips (filter row + category picker) ===== */
.chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.chip {
  padding: 7px 14px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
  border-radius: 999px;
  font-family: inherit; font-size: 12.5px; font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.chip:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
.chip.active {
  background: linear-gradient(180deg, var(--cream) 0%, #d9a0ae 100%);
  color: #2a0d14; border-color: transparent; font-weight: 800;
}
.chip.dashed { border-style: dashed; }

/* Gallery-type switcher — the page's primary nav, uses the pink accent
   for its active state so it reads as the "top level" choice, distinct
   from the secondary status-filter chips below it. */
.chip-row-gallery { margin-bottom: 10px; }
.chip-gallery { font-size: 13.5px; padding: 9px 16px; }
.chip-gallery.active {
  background: linear-gradient(180deg, var(--pink-accent), var(--wine));
  color: #fff; border-color: transparent;
  box-shadow: 0 4px 14px rgba(224,138,159,0.30);
}

/* ===== Gallery grid ===== */
.ent-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}
.ent-empty {
  color: var(--text-tertiary); font-size: 13px;
  padding: 40px 10px; text-align: center;
}
.ent-card {
  background: var(--bg-card);
  border: 1px solid var(--tile-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
}
.ent-card:hover {
  transform: translateY(-2px);
  border-color: var(--pink-accent);
  box-shadow: 0 8px 22px rgba(224,138,159,0.18);
}
.ent-cover {
  position: relative;
  aspect-ratio: 16 / 10;
  background: rgba(255,255,255,0.04);
  overflow: hidden;
}
.ent-cover::after {
  content: '';
  position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(180deg, transparent 55%, rgba(11,5,9,0.55) 100%);
  pointer-events: none;
}
.ent-cover-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; z-index: 1;
}
.ent-cover-fallback {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 34px; opacity: 0.25; z-index: 0;
}
.badge {
  position: absolute; top: 7px; left: 7px; z-index: 2;
  font-size: 9.5px; font-weight: 800; letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 4px 8px; border-radius: 999px;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  color: #fff;
}
.badge.spotify { color: #6ee7b7; }
.badge.youtube { color: #ff8a8a; }
.badge.link { color: var(--text-secondary); }
.badge.finished { color: var(--good); }
.card-actions {
  position: absolute; top: 6px; right: 6px; z-index: 3;
  display: flex; gap: 4px;
}
.icon-btn-sm {
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(255,255,255,0.14);
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  color: #fff; border-radius: 8px;
  font-size: 12px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn-sm:hover { background: rgba(0,0,0,0.75); }
.card-body {
  padding: 10px 12px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.card-title {
  font-size: 13.5px; font-weight: 600; line-height: 1.3;
  color: var(--text-primary);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
  min-height: 2.5em;
}
.card-author {
  font-size: 11px; color: var(--text-tertiary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  margin-top: -4px;
}
.tag {
  display: inline-flex; align-self: flex-start;
  align-items: center; gap: 5px;
  font-size: 10px; padding: 3px 9px;
  border-radius: 999px; font-weight: 700; letter-spacing: 0.04em;
  background: rgba(255,255,255,0.06); color: var(--text-secondary);
  font-family: var(--font-mono); text-transform: uppercase;
}
.card-rating { font-size: 11px; color: var(--warn); letter-spacing: 1px; }
.card-rating .off { color: rgba(255,255,255,0.14); }
.ent-card-url {
  display: block;
  font-size: 10.5px;
  font-family: var(--font-mono);
  color: var(--text-tertiary);
  text-decoration: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ent-card-url:hover { color: var(--text-secondary); text-decoration: underline; }

/* ===== Modal ===== */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(6px);
  z-index: 100; align-items: center; justify-content: center;
  padding: 24px;
}
.modal-bg.show { display: flex; }
.modal {
  width: 100%; max-width: 460px;
  background: #111113;
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 16px;
  padding: 22px; max-height: 88vh; overflow-y: auto;
}
.modal h3 { margin: 0 0 16px; font-size: 17px; font-weight: 700; }
.field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.field > label {
  font-size: 10.5px; color: var(--text-tertiary); font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
}
.field input[type="text"], .field input[type="url"], .field textarea {
  padding: 12px; border: 1px solid var(--border);
  background: rgba(0,0,0,0.28); color: var(--text-primary);
  border-radius: 10px; font-family: inherit; font-size: 14px;
}
.field textarea { resize: vertical; min-height: 64px; line-height: 1.5; }
.field input:focus, .field textarea:focus {
  outline: none; border-color: rgba(255,255,255,0.40);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
}
.field-hint { font-size: 11.5px; color: var(--text-tertiary); line-height: 1.4; min-height: 1.4em; }
.url-row { display: flex; gap: 8px; }
.url-row input { flex: 1; min-width: 0; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.newcat-row { display: flex; gap: 8px; margin-top: 8px; }
.newcat-row[hidden] { display: none; }
.newcat-row input { flex: 1; min-width: 0; }
.cover-edit-row { display: flex; gap: 12px; align-items: flex-start; }
.cover-preview {
  width: 84px; height: 60px; border-radius: 10px;
  object-fit: cover; background: rgba(255,255,255,0.06);
  border: 1px solid var(--border); flex-shrink: 0; display: none;
}
.cover-edit-controls { flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 0; }
.upload-btn {
  display: inline-flex; align-items: center; justify-content: center;
  text-align: center; cursor: pointer;
}
.rating-row { display: flex; gap: 6px; align-items: center; }
.rating-star {
  background: transparent; border: none; cursor: pointer;
  font-size: 22px; color: rgba(255,255,255,0.18); padding: 2px;
  -webkit-tap-highlight-color: transparent; line-height: 1;
}
.rating-star.on { color: var(--warn); }
.rating-clear {
  font-size: 11px; color: var(--text-tertiary); cursor: pointer;
  text-decoration: underline; margin-left: 4px;
}

.btn-primary {
  width: 100%; padding: 13px;
  border: 1px solid rgba(243,232,218,0.85);
  background: linear-gradient(180deg, var(--cream) 0%, #d9a0ae 100%);
  color: #2a0d14; border-radius: 12px;
  font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.45), 0 4px 14px rgba(61,15,26,0.45);
  -webkit-tap-highlight-color: transparent;
}
.btn-primary:hover { transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0) scale(0.98); }
.btn-secondary {
  padding: 11px 16px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  color: var(--text-primary); border-radius: 12px;
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.btn-secondary:hover { background: rgba(255,255,255,0.10); }
.modal-actions { display: flex; gap: 8px; margin-top: 18px; }
.modal-actions button { flex: 1; }
.delete-link {
  display: block; text-align: center; margin-top: 12px;
  font-size: 12px; color: var(--bad); cursor: pointer;
  text-decoration: underline; padding: 6px;
}

@media (max-width: 480px) {
  .ent-title { font-size: 20px; }
  .ent-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
  .card-title { font-size: 12.5px; }
  .two-col { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="ent-banner">
  <div class="ent-banner-grain" aria-hidden="true"></div>
  <div class="ent-banner-title">Entertainment</div>
  <div class="ent-banner-rule" aria-hidden="true"><span>&#10022;</span></div>
  <div class="ent-banner-subtext">Podcasts &middot; Stories &middot; Entertainment &middot; Playlists</div>
  <button class="ent-banner-cta" type="button" id="entBannerCta">Browse the Collection</button>
</div>

<div class="shell">
  <div class="ent-section-divider" aria-hidden="true"></div>

  <a href="index.html" class="back-btn" aria-label="Back to dashboard">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    Dashboard
  </a>

  <div class="ent-header">
    <h1 class="ent-title">Media</h1>
    <div class="ent-header-actions">
      <button class="btn-secondary" id="entSortBtn" type="button">Sort: A&rarr;Z</button>
      <button class="btn-add" id="entAddBtn" type="button">+ Add</button>
    </div>
  </div>

  <div class="chip-row chip-row-gallery" id="galleryTabsRow"></div>
  <div class="chip-row" id="entFilterRow"></div>
  <div class="chip-row" id="progressFilterRow" hidden></div>

  <div class="ent-grid" id="entGrid"></div>
  <p class="ent-empty" id="entEmpty" hidden>No items yet — tap "+ Add" to save your first link.</p>

</div>

<!-- Add / Edit Modal -->
<div class="modal-bg" id="entModalBg">
  <div class="modal" id="entModal">
    <h3 id="entModalTitle">Add item</h3>

    <div class="field">
      <label>Link</label>
      <div class="url-row">
        <input type="url" id="entUrl" placeholder="Paste a Spotify or YouTube link">
        <button type="button" class="btn-secondary" id="entFetchBtn">Fetch</button>
      </div>
      <div class="field-hint" id="entUrlHint"></div>
    </div>

    <div class="two-col">
      <div class="field">
        <label>Title</label>
        <input type="text" id="entTitle" placeholder="Title">
      </div>
      <div class="field">
        <label>Author / creator</label>
        <input type="text" id="entAuthor" placeholder="Author">
      </div>
    </div>

    <div class="field">
      <label>Status</label>
      <div class="chip-row" id="entCatRow" style="margin-bottom:0"></div>
    </div>

    <div class="field" id="entProgressField" hidden>
      <label>Progress</label>
      <div class="chip-row" id="entProgressRow" style="margin-bottom:0"></div>
    </div>

    <div class="field">
      <label>Cover</label>
      <div class="cover-edit-row">
        <img id="entCoverPreview" class="cover-preview" alt="">
        <div class="cover-edit-controls">
          <input type="url" id="entCoverUrlInput" placeholder="Paste image URL">
          <label class="btn-secondary upload-btn">
            Upload cover
            <input type="file" id="entCoverFile" accept="image/*" hidden>
          </label>
        </div>
      </div>
    </div>

    <div class="field">
      <label>Description</label>
      <textarea id="entDescription" placeholder="What is this?"></textarea>
    </div>

    <div class="two-col">
      <div class="field">
        <label>Length</label>
        <input type="text" id="entLength" placeholder="e.g. 45 min">
      </div>
      <div class="field">
        <label>Song / episode count</label>
        <input type="text" id="entSongCount" placeholder="e.g. 24 songs">
      </div>
    </div>

    <div class="field">
      <label>Rating</label>
      <div class="rating-row" id="entRatingRow"></div>
    </div>

    <div class="field">
      <label>Notes</label>
      <textarea id="entNotes" placeholder="Anything else worth remembering…"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-secondary" id="entModalCancel" type="button">Cancel</button>
      <button class="btn-primary" id="entModalSave" type="button">Save</button>
    </div>
    <span class="delete-link" id="entDelete" style="display:none">Delete this item</span>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ============================================================
  // GALLERIES — the page's four independent media collections. Each
  // has its own storage key and its own fixed status vocabulary.
  // Podcasts is the only gallery with a second filter dimension
  // (Backlog/Finished) — confirmed with the user, not applied to the
  // other three.
  // ============================================================
  var GALLERIES = [
    { key: 'podcasts', label: 'Podcasts', icon: '🎙️', dataKey: 'media:podcasts', hasProgress: true,
      statuses: ['Learning', 'Photography / Videography', 'True Crime'] },
    { key: 'stories', label: 'Stories', icon: '📖', dataKey: 'media:stories', hasProgress: false,
      statuses: ['Horror Stories', 'Spicy Stories / Immersive Experience'] },
    { key: 'entertainment', label: 'Entertainment', icon: '🎬', dataKey: 'media:entertainment', hasProgress: false,
      statuses: ['Funny', 'Gaming', 'Scary Videos', 'Vlog-Type', 'Other', 'Favorite Videos'] },
    { key: 'playlists', label: 'Playlists', icon: '🎧', dataKey: 'media:playlists', hasProgress: false,
      statuses: ['Chill', 'Binaural Beats', 'Dark / Gothic / Horror / Romance', 'EDM / Electronic', 'Fantasy', 'Metal', 'ASMR'] }
  ];
  var ACTIVE_GALLERY_KEY = 'media:active_gallery';

  var SORT_DIR_KEY = 'media:sort_dir';
  var activeGalleryKey = 'podcasts';
  var activeStatus = 'All';
  var activeProgress = 'All';
  var sortDir = 'asc';
  var cards = [];
  var editingId = null;
  var editingCard = null;
  var currentThumbnail = '';
  var selectedStatus = null;
  var selectedProgress = 'backlog';
  var selectedRating = 0;
  var titleManuallyEdited = false;

  function $(id) { return document.getElementById(id); }
  function galleryByKey(key) { return GALLERIES.filter(function (g) { return g.key === key; })[0] || GALLERIES[0]; }
  function activeGallery() { return galleryByKey(activeGalleryKey); }

  function genId() {
    return 'c_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  // -------- storage (per-gallery) --------
  function loadCards(galleryKeyArg) {
    var g = galleryByKey(galleryKeyArg || activeGalleryKey);
    var arr = [];
    try { arr = JSON.parse(localStorage.getItem(g.dataKey)) || []; } catch (e) {}
    return Array.isArray(arr) ? arr : [];
  }
  function saveCards(arr, galleryKeyArg) {
    var g = galleryByKey(galleryKeyArg || activeGalleryKey);
    try { localStorage.setItem(g.dataKey, JSON.stringify(arr)); } catch (e) {}
  }

  // ============================================================
  // ONE-TIME MIGRATION — folds the old single flat gallery (`ent:cards`
  // + freeform `ent:categories`) into the four new galleries. Runs once
  // (guarded by media:migrated_v1); `ent:cards`/`ent:categories` are left
  // untouched afterward (orphaned, same treatment as other removed
  // features elsewhere in this app — see CLAUDE.md). The keyword match
  // is best-effort: anything unrecognized lands in Entertainment → Other
  // (an explicit catch-all status) with a note flagging its old category
  // so it's easy to find and re-file by hand.
  // ============================================================
  function migrateLegacyMedia() {
    if (localStorage.getItem('media:migrated_v1')) return;
    var old = [];
    try { old = JSON.parse(localStorage.getItem('ent:cards')) || []; } catch (e) {}
    if (Array.isArray(old) && old.length) {
      var buckets = { podcasts: [], stories: [], entertainment: [], playlists: [] };
      old.forEach(function (c) {
        var cat = String(c.category || '').toLowerCase();
        var target = 'entertainment', status = 'Other';
        if (cat.indexOf('podcast') !== -1) { target = 'podcasts'; status = 'Learning'; }
        else if (cat.indexOf('horror') !== -1 && cat.indexOf('stor') !== -1) { target = 'stories'; status = 'Horror Stories'; }
        else if (cat.indexOf('spicy') !== -1 || cat.indexOf('immersive') !== -1) { target = 'stories'; status = 'Spicy Stories / Immersive Experience'; }
        else if (/music|playlist|chill|edm|electronic|metal|asmr|binaural|fantasy|gothic|romance/.test(cat)) {
          target = 'playlists';
          status = cat.indexOf('asmr') !== -1 ? 'ASMR'
            : cat.indexOf('edm') !== -1 || cat.indexOf('electronic') !== -1 ? 'EDM / Electronic'
            : cat.indexOf('metal') !== -1 ? 'Metal'
            : cat.indexOf('binaural') !== -1 ? 'Binaural Beats'
            : cat.indexOf('fantasy') !== -1 ? 'Fantasy'
            : cat.indexOf('gothic') !== -1 || cat.indexOf('romance') !== -1 ? 'Dark / Gothic / Horror / Romance'
            : 'Chill';
        }
        var card = {
          id: 'mig_' + (c.id || genId()),
          url: c.url || '', source: c.source || 'link',
          title: c.title || 'Untitled', author: '',
          thumbnail: c.thumbnail || '',
          status: status,
          progress: 'backlog',
          description: '', length: '', songCount: '', rating: 0,
          notes: c.category ? ('Migrated from old category "' + c.category + '".') : '',
          createdAt: c.createdAt || Date.now()
        };
        buckets[target].push(card);
      });
      GALLERIES.forEach(function (g) {
        if (buckets[g.key].length) {
          var existing = loadCards(g.key);
          saveCards(existing.concat(buckets[g.key]), g.key);
        }
      });
    }
    try { localStorage.setItem('media:migrated_v1', '1'); } catch (e) {}
  }

  // -------- link parsing / preview fetch --------
  function detectSource(url) {
    try {
      var u = new URL(url);
      var h = u.hostname.replace(/^www\./, '');
      if (h === 'youtu.be' || h.endsWith('youtube.com')) return 'youtube';
      if (h.endsWith('spotify.com')) return 'spotify';
    } catch (e) {}
    return null;
  }
  function getYouTubeId(url) {
    try {
      var u = new URL(url);
      if (u.hostname.indexOf('youtu.be') !== -1) return u.pathname.slice(1).split('/')[0] || null;
      if (u.hostname.indexOf('youtube.com') !== -1) {
        if (u.pathname === '/watch') return u.searchParams.get('v');
        var m = u.pathname.match(/\/(shorts|embed)\/([^/?]+)/);
        if (m) return m[2];
      }
    } catch (e) {}
    return null;
  }
  async function fetchPreview(url, source) {
    var result = { title: '', thumbnail: '', author: '' };
    if (source === 'youtube') {
      var id = getYouTubeId(url);
      if (id) result.thumbnail = 'https://img.youtube.com/vi/' + id + '/hqdefault.jpg';
      try {
        var res = await fetch('https://www.youtube.com/oembed?url=' + encodeURIComponent(url) + '&format=json');
        if (res.ok) {
          var data = await res.json();
          if (data.title) result.title = data.title;
          if (data.thumbnail_url) result.thumbnail = data.thumbnail_url;
          if (data.author_name) result.author = data.author_name;
        }
      } catch (e) {}
      return result;
    }
    if (source === 'spotify') {
      try {
        var res2 = await fetch('https://open.spotify.com/oembed?url=' + encodeURIComponent(url));
        if (res2.ok) {
          var data2 = await res2.json();
          if (data2.title) result.title = data2.title;
          if (data2.thumbnail_url) result.thumbnail = data2.thumbnail_url;
        }
      } catch (e) {}
      return result;
    }
    return result;
  }

  function compressImageDataUrl(dataUrl, maxDim, quality) {
    maxDim = maxDim || 480;
    quality = quality == null ? 0.82 : quality;
    return new Promise((resolve) => {
      var img = new Image();
      img.onload = () => {
        var w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
        if (w > maxDim || h > maxDim) {
          if (w >= h) { h = Math.round(h * (maxDim / w)); w = maxDim; }
          else { w = Math.round(w * (maxDim / h)); h = maxDim; }
        }
        var c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        try { resolve(c.toDataURL('image/jpeg', quality)); } catch (e) { resolve(dataUrl); }
      };
      img.onerror = () => resolve(dataUrl);
      img.src = dataUrl;
    });
  }

  // -------- chip helper --------
  function makeChip(label, active, onClick, dashed, extraClass) {
    var b = document.createElement('button');
    b.type = 'button';
    b.className = 'chip' + (active ? ' active' : '') + (dashed ? ' dashed' : '') + (extraClass ? ' ' + extraClass : '');
    b.textContent = label;
    b.addEventListener('click', onClick);
    return b;
  }

  // -------- gallery-type switcher --------
  function renderGalleryTabs() {
    var row = $('galleryTabsRow');
    row.innerHTML = '';
    GALLERIES.forEach(function (g) {
      row.appendChild(makeChip(g.icon + ' ' + g.label, g.key === activeGalleryKey, function () {
        activeGalleryKey = g.key;
        activeStatus = 'All';
        activeProgress = 'All';
        try { localStorage.setItem(ACTIVE_GALLERY_KEY, activeGalleryKey); } catch (e) {}
        cards = loadCards();
        renderGalleryTabs();
        renderFilterBar();
        renderProgressFilterBar();
        renderGrid();
      }, false, 'chip-gallery'));
    });
  }

  // -------- status filter bar (scoped to the active gallery) --------
  function renderFilterBar() {
    var row = $('entFilterRow');
    row.innerHTML = '';
    var g = activeGallery();
    row.appendChild(makeChip('All', activeStatus === 'All', function () {
      activeStatus = 'All'; renderFilterBar(); renderGrid();
    }));
    g.statuses.forEach(function (status) {
      row.appendChild(makeChip(status, activeStatus === status, function () {
        activeStatus = status; renderFilterBar(); renderGrid();
      }));
    });
  }
  function renderProgressFilterBar() {
    var row = $('progressFilterRow');
    var g = activeGallery();
    row.hidden = !g.hasProgress;
    if (!g.hasProgress) return;
    row.innerHTML = '';
    [['All', 'All'], ['Backlog', 'backlog'], ['Finished', 'finished']].forEach(function (pair) {
      row.appendChild(makeChip(pair[0], activeProgress === pair[1], function () {
        activeProgress = pair[1]; renderProgressFilterBar(); renderGrid();
      }));
    });
  }

  // -------- sort control (alphabetical by title, all galleries) --------
  function updateSortBtn() {
    $('entSortBtn').textContent = sortDir === 'asc' ? 'Sort: A→Z' : 'Sort: Z→A';
  }
  function wireSortBtn() {
    $('entSortBtn').addEventListener('click', function () {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      try { localStorage.setItem(SORT_DIR_KEY, sortDir); } catch (e) {}
      updateSortBtn();
      renderGrid();
    });
  }

  // -------- gallery grid --------
  function ratingHtml(rating) {
    rating = Number(rating) || 0;
    if (!rating) return '';
    var out = '<div class="card-rating">';
    for (var i = 1; i <= 5; i++) out += i <= rating ? '★' : '<span class="off">★</span>';
    out += '</div>';
    return out;
  }
  function buildCardEl(card) {
    var g = activeGallery();
    var el = document.createElement('div');
    el.className = 'ent-card';
    el.dataset.id = card.id;

    var cover = document.createElement('div');
    cover.className = 'ent-cover';

    if (card.thumbnail) {
      var img = document.createElement('img');
      img.className = 'ent-cover-img';
      img.loading = 'lazy';
      img.alt = '';
      img.src = card.thumbnail;
      img.addEventListener('error', function () { img.style.display = 'none'; });
      cover.appendChild(img);
    }
    var fallback = document.createElement('span');
    fallback.className = 'ent-cover-fallback';
    fallback.textContent = card.source === 'spotify' ? '♫' : card.source === 'youtube' ? '▶' : g.icon;
    cover.appendChild(fallback);

    var badge = document.createElement('span');
    if (g.hasProgress && card.progress === 'finished') {
      badge.className = 'badge finished';
      badge.textContent = 'Finished';
    } else {
      badge.className = 'badge ' + (card.source || 'link');
      badge.textContent = card.source === 'spotify' ? 'Spotify' : card.source === 'youtube' ? 'YouTube' : 'Link';
    }
    cover.appendChild(badge);

    var actions = document.createElement('div');
    actions.className = 'card-actions';
    var editBtn = document.createElement('button');
    editBtn.type = 'button'; editBtn.className = 'icon-btn-sm'; editBtn.dataset.action = 'edit';
    editBtn.setAttribute('aria-label', 'Edit'); editBtn.textContent = '✎';
    var delBtn = document.createElement('button');
    delBtn.type = 'button'; delBtn.className = 'icon-btn-sm'; delBtn.dataset.action = 'delete';
    delBtn.setAttribute('aria-label', 'Delete'); delBtn.textContent = '✕';
    actions.appendChild(editBtn); actions.appendChild(delBtn);
    cover.appendChild(actions);

    var body = document.createElement('div');
    body.className = 'card-body';
    var title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = card.title;
    body.appendChild(title);
    if (card.author) {
      var author = document.createElement('div');
      author.className = 'card-author';
      author.textContent = card.author;
      body.appendChild(author);
    }
    var tag = document.createElement('span');
    tag.className = 'tag';
    tag.textContent = card.status || '—';
    body.appendChild(tag);
    if (card.rating) {
      var ratingEl = document.createElement('div');
      ratingEl.innerHTML = ratingHtml(card.rating);
      body.appendChild(ratingEl.firstChild);
    }
    var link = document.createElement('a');
    link.className = 'ent-card-url';
    link.href = card.url;
    link.target = '_blank';
    link.rel = 'noopener';
    link.textContent = card.url;
    body.appendChild(link);

    el.appendChild(cover); el.appendChild(body);
    return el;
  }

  function renderGrid() {
    var grid = $('entGrid');
    var empty = $('entEmpty');
    var g = activeGallery();
    grid.innerHTML = '';
    var list = cards.filter(function (c) {
      if (activeStatus !== 'All' && c.status !== activeStatus) return false;
      if (g.hasProgress && activeProgress !== 'All' && (c.progress || 'backlog') !== activeProgress) return false;
      return true;
    });
    list.sort(function (a, b) {
      var cmp = String(a.title || '').localeCompare(String(b.title || ''), undefined, { sensitivity: 'base' });
      return sortDir === 'asc' ? cmp : -cmp;
    });
    empty.hidden = list.length !== 0;
    list.forEach(function (card) { grid.appendChild(buildCardEl(card)); });
  }

  function deleteCard(id) {
    cards = cards.filter(function (c) { return c.id !== id; });
    saveCards(cards);
    renderGrid();
  }

  // -------- modal --------
  function updateCoverPreview() {
    var img = $('entCoverPreview');
    if (currentThumbnail) { img.src = currentThumbnail; img.style.display = 'block'; }
    else { img.removeAttribute('src'); img.style.display = 'none'; }
  }
  function renderCatChips() {
    var row = $('entCatRow');
    row.innerHTML = '';
    activeGallery().statuses.forEach(function (status) {
      row.appendChild(makeChip(status, selectedStatus === status, function () {
        selectedStatus = status; renderCatChips();
      }));
    });
  }
  function renderProgressChips() {
    var g = activeGallery();
    $('entProgressField').hidden = !g.hasProgress;
    if (!g.hasProgress) return;
    var row = $('entProgressRow');
    row.innerHTML = '';
    [['Backlog', 'backlog'], ['Finished', 'finished']].forEach(function (pair) {
      row.appendChild(makeChip(pair[0], selectedProgress === pair[1], function () {
        selectedProgress = pair[1]; renderProgressChips();
      }));
    });
  }
  function renderRatingRow() {
    var row = $('entRatingRow');
    row.innerHTML = '';
    for (var i = 1; i <= 5; i++) {
      (function (i) {
        var b = document.createElement('button');
        b.type = 'button';
        b.className = 'rating-star' + (i <= selectedRating ? ' on' : '');
        b.textContent = '★';
        b.setAttribute('aria-label', i + ' star' + (i === 1 ? '' : 's'));
        b.addEventListener('click', function () { selectedRating = i; renderRatingRow(); });
        row.appendChild(b);
      })(i);
    }
    var clear = document.createElement('span');
    clear.className = 'rating-clear';
    clear.textContent = 'clear';
    clear.addEventListener('click', function () { selectedRating = 0; renderRatingRow(); });
    row.appendChild(clear);
  }

  function openModal(card) {
    editingCard = card || null;
    editingId = card ? card.id : null;
    titleManuallyEdited = !!card;
    $('entModalTitle').textContent = card ? 'Edit item' : 'Add item';
    $('entUrl').value = card ? card.url : '';
    $('entTitle').value = card ? card.title : '';
    $('entAuthor').value = card ? (card.author || '') : '';
    $('entDescription').value = card ? (card.description || '') : '';
    $('entLength').value = card ? (card.length || '') : '';
    $('entSongCount').value = card ? (card.songCount || '') : '';
    $('entNotes').value = card ? (card.notes || '') : '';
    $('entCoverUrlInput').value = '';
    $('entUrlHint').textContent = '';
    currentThumbnail = card ? (card.thumbnail || '') : '';
    updateCoverPreview();
    selectedStatus = card ? card.status : (activeGallery().statuses[0] || null);
    selectedProgress = card ? (card.progress || 'backlog') : 'backlog';
    selectedRating = card ? (Number(card.rating) || 0) : 0;
    renderCatChips();
    renderProgressChips();
    renderRatingRow();
    $('entDelete').style.display = card ? 'block' : 'none';
    $('entModalBg').classList.add('show');
  }
  function closeModal() {
    $('entModalBg').classList.remove('show');
    editingCard = null; editingId = null;
  }

  async function maybeAutoFetch() {
    var url = $('entUrl').value.trim();
    var hint = $('entUrlHint');
    if (!url) return;
    var source = detectSource(url);
    if (!source) {
      hint.textContent = "Doesn't look like a Spotify or YouTube link — you can still save it and set the cover manually.";
      return;
    }
    hint.textContent = 'Fetching preview…';
    var preview = await fetchPreview(url, source);
    if (!titleManuallyEdited && preview.title) $('entTitle').value = preview.title;
    if (preview.author && !$('entAuthor').value.trim()) $('entAuthor').value = preview.author;
    if (preview.thumbnail) { currentThumbnail = preview.thumbnail; updateCoverPreview(); }
    hint.textContent = (preview.title || preview.thumbnail)
      ? ''
      : "Couldn't auto-fetch a preview — paste an image URL or upload a cover below.";
  }

  function wireModal() {
    $('entBannerCta').addEventListener('click', function () {
      $('galleryTabsRow').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    $('entAddBtn').addEventListener('click', function () { openModal(null); });
    $('entModalCancel').addEventListener('click', closeModal);
    $('entModalBg').addEventListener('click', function (e) { if (e.target.id === 'entModalBg') closeModal(); });

    $('entUrl').addEventListener('change', maybeAutoFetch);
    $('entFetchBtn').addEventListener('click', maybeAutoFetch);
    $('entTitle').addEventListener('input', function () { titleManuallyEdited = true; });

    $('entCoverUrlInput').addEventListener('change', function () {
      var v = $('entCoverUrlInput').value.trim();
      if (v) { currentThumbnail = v; updateCoverPreview(); }
    });
    $('entCoverFile').addEventListener('change', function (e) {
      var file = e.target.files && e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = async function () {
        var compressed = await compressImageDataUrl(String(reader.result), 480, 0.82);
        currentThumbnail = compressed;
        updateCoverPreview();
      };
      reader.readAsDataURL(file);
    });

    $('entModalSave').addEventListener('click', function () {
      var url = $('entUrl').value.trim();
      var title = $('entTitle').value.trim();
      var hint = $('entUrlHint');
      if (!url) { hint.textContent = 'Paste a link first.'; return; }
      if (!title) { hint.textContent = 'Give it a title.'; return; }
      if (!selectedStatus) { hint.textContent = 'Pick a status.'; return; }
      var source = detectSource(url) || 'link';
      var card = {
        id: editingId || genId(),
        url: url, source: source, title: title,
        author: $('entAuthor').value.trim(),
        thumbnail: currentThumbnail || '',
        status: selectedStatus,
        progress: activeGallery().hasProgress ? selectedProgress : undefined,
        description: $('entDescription').value.trim(),
        length: $('entLength').value.trim(),
        songCount: $('entSongCount').value.trim(),
        rating: selectedRating || 0,
        notes: $('entNotes').value.trim(),
        createdAt: editingCard ? editingCard.createdAt : Date.now()
      };
      if (editingId) {
        cards = cards.map(function (c) { return c.id === editingId ? card : c; });
      } else {
        cards.unshift(card);
      }
      saveCards(cards);
      closeModal();
      renderGrid();
    });

    $('entDelete').addEventListener('click', function () {
      if (!editingId) return;
      if (!confirm('Delete this item?')) return;
      deleteCard(editingId);
      closeModal();
    });

    $('entGrid').addEventListener('click', function (e) {
      if (e.target.closest('.ent-card-url')) return;
      var actionBtn = e.target.closest('[data-action]');
      var cardEl = e.target.closest('.ent-card');
      if (!cardEl) return;
      var id = cardEl.dataset.id;
      var card = cards.filter(function (c) { return c.id === id; })[0];
      if (!card) return;
      if (actionBtn) {
        e.stopPropagation();
        if (actionBtn.dataset.action === 'edit') openModal(card);
        else if (actionBtn.dataset.action === 'delete') {
          if (confirm('Delete "' + card.title + '"?')) deleteCard(id);
        }
        return;
      }
      window.open(card.url, '_blank', 'noopener');
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    migrateLegacyMedia();
    var savedGallery = null;
    try { savedGallery = localStorage.getItem(ACTIVE_GALLERY_KEY); } catch (e) {}
    if (savedGallery && GALLERIES.some(function (g) { return g.key === savedGallery; })) activeGalleryKey = savedGallery;
    var savedSortDir = null;
    try { savedSortDir = localStorage.getItem(SORT_DIR_KEY); } catch (e) {}
    if (savedSortDir === 'asc' || savedSortDir === 'desc') sortDir = savedSortDir;
    cards = loadCards();
    renderGalleryTabs();
    renderFilterBar();
    renderProgressFilterBar();
    updateSortBtn();
    renderGrid();
    wireModal();
    wireSortBtn();

    if (typeof initCloudSync === 'function') {
      initCloudSync({
        appKey: 'entertainment',
        syncedKeys: ['ent:cards', 'ent:categories', 'media:active_gallery', 'media:migrated_v1'],
        syncedPrefixes: ['media:'],
        onApplied: function () {
          cards = loadCards();
          renderGrid();
        }
      });
    }
  });
})();
</script>
</body>
