<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Projects</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --bg: #0A0A0B;
  --bg-deep: #050506;
  --bg-card: rgba(255, 255, 255, 0.04);
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --border: rgba(255, 255, 255, 0.08);
  --accent: #E07658;
  --good: #6ee7b7;
  --warn: #fbbf24;
  --bad: #ff8a8a;
  --info: #7dd3fc;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  color-scheme: dark;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  min-height: 100%;
}

body::before {
  content: '';
  position: fixed;
  inset: -10%;
  z-index: -2;
  background:
    radial-gradient(60% 45% at 82% 14%, rgba(224, 118, 88, 0.16) 0%, transparent 55%),
    radial-gradient(55% 45% at 18% 90%, rgba(180, 180, 200, 0.06) 0%, transparent 55%),
    linear-gradient(180deg, #0A0A0B 0%, #050506 100%);
  filter: blur(40px) saturate(1.05);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.7;
  pointer-events: none;
}

html, body { scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { width: 0 !important; height: 0 !important; display: none !important; }

.shell {
  max-width: 1000px;
  margin: 0 auto;
  padding: 24px 16px 60px;
}

/* ===== Back to dashboard ===== */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px 8px 10px;
  margin: 0 0 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px;
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s ease, color 0.15s ease;
}
.back-btn:hover, .back-btn:active {
  background: rgba(255,255,255,0.07);
  color: var(--text-primary);
}
.back-btn svg { display: block; }

/* ===== Header ===== */
.ent-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; gap: 12px;
}
.ent-title { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
.btn-add {
  flex-shrink: 0;
  padding: 10px 16px;
  border: 1px solid rgba(255,255,255,0.85);
  background: linear-gradient(180deg, #ffffff 0%, #e8e5dd 100%);
  color: #0a0a0b; border-radius: 999px;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.55), 0 4px 14px rgba(0,0,0,0.40);
  -webkit-tap-highlight-color: transparent;
}
.btn-add:hover { transform: translateY(-1px); }
.btn-add:active { transform: translateY(0) scale(0.97); }

/* ===== Toolbar: filter chips + search ===== */
.proj-toolbar {
  display: flex; flex-wrap: wrap; gap: 12px;
  align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.search-input {
  padding: 9px 14px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  color: var(--text-primary);
  border-radius: 999px;
  font-family: inherit; font-size: 12.5px;
  min-width: 180px; flex: 1 1 180px; max-width: 280px;
}
.search-input:focus { outline: none; border-color: rgba(255,255,255,0.30); }

/* ===== Chips (filter row + status/group pickers) ===== */
.chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 7px 14px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
  border-radius: 999px;
  font-family: inherit; font-size: 12.5px; font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.chip:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
.chip.active {
  background: linear-gradient(180deg, #ffffff 0%, #e8e5dd 100%);
  color: #0a0a0b; border-color: transparent; font-weight: 800;
}
.chip.dashed { border-style: dashed; }

/* ===== Grouped sections ===== */
.proj-section { margin-bottom: 30px; }
.proj-section-title {
  display: flex; align-items: center; gap: 12px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--text-tertiary);
  margin-bottom: 14px;
}
.proj-section-title::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, rgba(255,255,255,0.14), transparent);
}

/* ===== Gallery grid ===== */
.ent-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 14px;
}
.ent-empty {
  color: var(--text-tertiary); font-size: 13px;
  padding: 40px 10px; text-align: center;
}
.ent-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s ease, border-color 0.15s ease;
}
.ent-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.16); }
.ent-cover {
  position: relative;
  aspect-ratio: 16 / 10;
  background: rgba(255,255,255,0.04);
  overflow: hidden;
}
.ent-cover-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; z-index: 1;
}
.ent-cover-fallback {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 34px; font-weight: 700;
  color: var(--text-secondary);
  opacity: 0.25; z-index: 0;
}
.badge {
  position: absolute; top: 7px; left: 7px; z-index: 2;
  font-size: 9.5px; font-weight: 800; letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 4px 8px; border-radius: 999px;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  color: #fff;
}
.card-actions {
  position: absolute; top: 6px; right: 6px; z-index: 3;
  display: flex; gap: 4px;
}
.icon-btn-sm {
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(255,255,255,0.14);
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  color: #fff; border-radius: 8px;
  font-size: 12px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn-sm:hover { background: rgba(0,0,0,0.75); }
.card-body {
  padding: 10px 12px 12px;
  display: flex; flex-direction: column; gap: 7px;
}
.card-title {
  font-size: 13.5px; font-weight: 600; line-height: 1.3;
  color: var(--text-primary);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
  min-height: 2.5em;
}
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tag {
  display: inline-flex; align-self: flex-start;
  align-items: center; gap: 5px;
  font-size: 10px; padding: 3px 9px;
  border-radius: 999px; font-weight: 700; letter-spacing: 0.04em;
  background: rgba(255,255,255,0.06); color: var(--text-secondary);
  font-family: var(--font-mono); text-transform: uppercase;
}
.card-notes-preview {
  font-size: 11.5px; line-height: 1.4; color: var(--text-tertiary);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ===== Shared field styles (reused on the project page) ===== */
.field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.field > label {
  font-size: 10.5px; color: var(--text-tertiary); font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
}
.field input[type="text"], .field input[type="url"], .field textarea {
  padding: 12px; border: 1px solid var(--border);
  background: rgba(0,0,0,0.28); color: var(--text-primary);
  border-radius: 10px; font-family: inherit; font-size: 14px;
}
.field input:focus, .field textarea:focus {
  outline: none; border-color: rgba(255,255,255,0.40);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
}
.newcat-row { display: flex; gap: 8px; margin-top: 8px; }
.newcat-row[hidden] { display: none; }
.newcat-row input { flex: 1; min-width: 0; }
.cover-edit-row { display: flex; gap: 12px; align-items: flex-start; }
.cover-preview {
  width: 84px; height: 60px; border-radius: 10px;
  object-fit: cover; background: rgba(255,255,255,0.06);
  border: 1px solid var(--border); flex-shrink: 0; display: none;
}
.cover-edit-controls { flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 0; }
.upload-btn {
  display: inline-flex; align-items: center; justify-content: center;
  text-align: center; cursor: pointer;
}

/* Tag editor (multi-value chips + input) */
.tag-editor {
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
  padding: 8px; border: 1px solid var(--border); border-radius: 10px;
  background: rgba(0,0,0,0.28);
}
.tag-chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.08); color: var(--text-primary);
  font-size: 11.5px; font-weight: 600;
  padding: 4px 6px 4px 10px; border-radius: 999px;
  white-space: nowrap;
}
.tag-chip-remove {
  background: transparent; border: none; color: var(--text-tertiary);
  cursor: pointer; font-size: 10px; padding: 2px;
  -webkit-tap-highlight-color: transparent;
}
.tag-chip-remove:hover { color: var(--bad); }
.tag-editor-input {
  flex: 1 1 80px; min-width: 80px;
  background: transparent; border: none; outline: none;
  color: var(--text-primary); font-family: inherit; font-size: 13px;
  padding: 4px;
}

.btn-primary {
  padding: 11px 20px;
  border: 1px solid rgba(255,255,255,0.85);
  background: linear-gradient(180deg, #ffffff 0%, #e8e5dd 100%);
  color: #0a0a0b; border-radius: 12px;
  font-family: inherit; font-size: 13.5px; font-weight: 700;
  cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.55), 0 4px 14px rgba(0,0,0,0.40);
  -webkit-tap-highlight-color: transparent;
}
.btn-primary:hover { transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0) scale(0.98); }
.btn-secondary {
  padding: 10px 16px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  color: var(--text-primary); border-radius: 12px;
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.btn-secondary:hover { background: rgba(255,255,255,0.10); }

/* ===== Full-page project view ===== */
.project-page-bg {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: var(--bg-deep);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.project-page-bg.show { display: block; }
.project-page {
  max-width: 720px; margin: 0 auto;
  padding: max(16px, env(safe-area-inset-top)) 16px 80px;
}
.pp-topbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
}
.pp-topbar-actions { display: flex; gap: 8px; }
.pp-title-input {
  width: 100%;
  background: transparent; border: none; outline: none;
  color: var(--text-primary); font-family: inherit;
  font-size: 26px; font-weight: 700; letter-spacing: -0.02em;
  padding: 6px 0 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 18px;
}
.pp-section-label {
  font-size: 10.5px; color: var(--text-tertiary); font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  margin: 22px 0 10px;
  display: flex; align-items: center; gap: 10px;
}
.pp-section-label::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, rgba(255,255,255,0.12), transparent);
}

/* Block toolbar + list */
.block-toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.block-list { display: flex; flex-direction: column; gap: 12px; }
.block {
  position: relative;
  border: 1px solid var(--border); border-radius: 12px;
  padding: 14px; background: rgba(255,255,255,0.02);
}
.block-callout {
  background: rgba(125,211,252,0.07);
  border-color: rgba(125,211,252,0.20);
}
.block-type-label {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.10em;
  text-transform: uppercase; color: var(--text-tertiary);
  margin-bottom: 8px; display: block; padding-right: 70px;
}
.callout-header {
  font-size: 11px; font-weight: 800; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--info);
  margin-bottom: 8px; padding-right: 70px;
  display: flex; align-items: center; gap: 6px;
}
.block-textarea {
  width: 100%; min-height: 70px; resize: vertical;
  background: rgba(0,0,0,0.28); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px;
  color: var(--text-primary); font-family: inherit;
  font-size: 13.5px; line-height: 1.5;
}
.block-textarea:focus {
  outline: none; border-color: rgba(255,255,255,0.40);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
}
.block-controls {
  position: absolute; top: 12px; right: 12px; z-index: 2;
  display: flex; gap: 4px;
}
.block-mini-btn {
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-tertiary);
  font-size: 11px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.block-mini-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.12); }
.block-link-row { display: flex; gap: 8px; align-items: center; }
.block-link-row input { flex: 1; min-width: 0; }
.block-link-open {
  flex-shrink: 0; font-size: 12px; color: var(--info); text-decoration: none;
  padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
  white-space: nowrap;
}
.block-link-open:hover { background: rgba(255,255,255,0.06); }
.block-empty-hint {
  color: var(--text-tertiary); font-size: 12.5px;
  padding: 16px 0; text-align: center;
}

@media (max-width: 480px) {
  .ent-title { font-size: 20px; }
  .ent-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
  .card-title { font-size: 12.5px; }
  .search-input { max-width: none; }
  .pp-title-input { font-size: 21px; }
}
</style>
</head>
<body>
<div class="shell">

  <a href="index.html" class="back-btn" aria-label="Back to dashboard">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    Dashboard
  </a>

  <div class="ent-header">
    <h1 class="ent-title">Projects</h1>
    <button class="btn-add" id="projAddBtn" type="button">+ Add</button>
  </div>

  <div class="proj-toolbar">
    <div class="chip-row" id="projFilterRow"></div>
    <input type="text" id="projSearch" class="search-input" placeholder="Search titles…">
  </div>

  <div id="projSections"></div>
  <p class="ent-empty" id="projEmpty" hidden>No projects yet — tap "+ Add" to start your first one.</p>

</div>

<!-- Full-page project view -->
<div class="project-page-bg" id="projectPageBg">
  <div class="project-page">
    <div class="pp-topbar">
      <button class="btn-secondary" id="ppBack" type="button">← Back</button>
      <div class="pp-topbar-actions">
        <button class="btn-secondary" id="ppDelete" type="button" style="display:none">Delete</button>
        <button class="btn-primary" id="ppSave" type="button">Save</button>
      </div>
    </div>

    <input type="text" id="ppTitle" class="pp-title-input" placeholder="Project title">

    <div class="field">
      <label>Cover</label>
      <div class="cover-edit-row">
        <img id="ppCoverPreview" class="cover-preview" alt="">
        <div class="cover-edit-controls">
          <input type="url" id="ppCoverUrlInput" placeholder="Paste image URL">
          <label class="btn-secondary upload-btn">
            Upload cover
            <input type="file" id="ppCoverFile" accept="image/*" hidden>
          </label>
        </div>
      </div>
    </div>

    <div class="field">
      <label>Status</label>
      <div class="chip-row" id="ppStatusRow"></div>
      <div class="newcat-row" id="ppNewStatusRow" hidden>
        <input type="text" id="ppNewStatusInput" placeholder="New status name">
        <button type="button" class="btn-secondary" id="ppNewStatusAdd">Add</button>
      </div>
    </div>

    <div class="field">
      <label>Group</label>
      <div class="chip-row" id="ppGroupRow"></div>
      <div class="newcat-row" id="ppNewGroupRow" hidden>
        <input type="text" id="ppNewGroupInput" placeholder="New group name">
        <button type="button" class="btn-secondary" id="ppNewGroupAdd">Add</button>
      </div>
    </div>

    <div class="field">
      <label>Tags</label>
      <div class="tag-editor" id="ppTagEditor"></div>
    </div>

    <div class="pp-section-label">Content</div>
    <div class="block-toolbar">
      <button class="btn-secondary block-add-btn" type="button" data-type="text">+ Text</button>
      <button class="btn-secondary block-add-btn" type="button" data-type="callout">+ Callout (AI prompt)</button>
      <button class="btn-secondary block-add-btn" type="button" data-type="link">+ Link</button>
    </div>
    <div class="block-list" id="ppBlocks"></div>
    <p class="block-empty-hint" id="ppBlocksEmpty" hidden>No content yet — add a text note, an AI-prompt callout, or a link above.</p>
  </div>
</div>

<script>
(function () {
  'use strict';

  var CARDS_KEY = 'proj:cards';
  var STATUSES_KEY = 'proj:statuses';
  var GROUPS_KEY = 'proj:groups';
  var DEFAULT_STATUSES = ['Idea', 'In Progress', 'Done'];
  var DEFAULT_GROUPS = ['Week 1', 'Week 2', 'Week 3', 'Week 4'];

  var statuses = [];
  var groups = [];
  var cards = [];
  var activeFilter = 'All';
  var searchQuery = '';
  var editingId = null;
  var editingCard = null;
  var currentCover = '';
  var selectedStatus = null;
  var selectedGroup = null;
  var currentTags = [];
  var currentBlocks = [];

  function $(id) { return document.getElementById(id); }

  function genId(prefix) {
    return (prefix || 'x') + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  // -------- storage --------
  function loadStatuses() {
    var st = [];
    try { st = JSON.parse(localStorage.getItem(STATUSES_KEY)) || []; } catch (e) {}
    if (!Array.isArray(st) || st.length === 0) {
      st = DEFAULT_STATUSES.slice();
      saveStatuses(st);
    }
    return st;
  }
  function saveStatuses(st) {
    try { localStorage.setItem(STATUSES_KEY, JSON.stringify(st)); } catch (e) {}
  }
  function loadGroups() {
    var g = [];
    try { g = JSON.parse(localStorage.getItem(GROUPS_KEY)) || []; } catch (e) {}
    if (!Array.isArray(g) || g.length === 0) {
      g = DEFAULT_GROUPS.slice();
      saveGroups(g);
    }
    return g;
  }
  function saveGroups(g) {
    try { localStorage.setItem(GROUPS_KEY, JSON.stringify(g)); } catch (e) {}
  }
  function loadCards() {
    var arr = [];
    try { arr = JSON.parse(localStorage.getItem(CARDS_KEY)) || []; } catch (e) {}
    if (!Array.isArray(arr)) arr = [];
    // Migrate older cards saved before groups/blocks existed.
    arr.forEach(function (c) {
      if (!Array.isArray(c.blocks)) {
        c.blocks = c.notes ? [{ id: genId('b'), type: 'text', content: c.notes }] : [];
      }
      delete c.notes;
      if (!c.tags) c.tags = [];
    });
    return arr;
  }
  function saveCards(arr) {
    try { localStorage.setItem(CARDS_KEY, JSON.stringify(arr)); } catch (e) {}
  }

  function statusColor(status) {
    var s = (status || '').toLowerCase();
    if (s === 'done') return '#6ee7b7';
    if (s === 'in progress') return '#fbbf24';
    if (s === 'idea') return '#7dd3fc';
    return '#B8B6B0';
  }

  function compressImageDataUrl(dataUrl, maxDim, quality) {
    maxDim = maxDim || 480;
    quality = quality == null ? 0.82 : quality;
    return new Promise((resolve) => {
      var img = new Image();
      img.onload = () => {
        var w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
        if (w > maxDim || h > maxDim) {
          if (w >= h) { h = Math.round(h * (maxDim / w)); w = maxDim; }
          else { w = Math.round(w * (maxDim / h)); h = maxDim; }
        }
        var c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        try { resolve(c.toDataURL('image/jpeg', quality)); } catch (e) { resolve(dataUrl); }
      };
      img.onerror = () => resolve(dataUrl);
      img.src = dataUrl;
    });
  }

  // -------- chip helper --------
  function makeChip(label, active, onClick, dashed) {
    var b = document.createElement('button');
    b.type = 'button';
    b.className = 'chip' + (active ? ' active' : '') + (dashed ? ' dashed' : '');
    b.textContent = label;
    b.addEventListener('click', onClick);
    return b;
  }

  // -------- filter bar --------
  function renderFilterBar() {
    var row = $('projFilterRow');
    row.innerHTML = '';
    row.appendChild(makeChip('All', activeFilter === 'All', function () {
      activeFilter = 'All'; renderFilterBar(); renderGrid();
    }));
    statuses.forEach(function (st) {
      row.appendChild(makeChip(st, activeFilter === st, function () {
        activeFilter = st; renderFilterBar(); renderGrid();
      }));
    });
  }

  function getFilteredCards() {
    return cards.filter(function (c) {
      if (activeFilter !== 'All' && c.status !== activeFilter) return false;
      if (searchQuery && (c.title || '').toLowerCase().indexOf(searchQuery) === -1) return false;
      return true;
    });
  }

  function firstPreviewText(card) {
    var blocks = card.blocks || [];
    for (var i = 0; i < blocks.length; i++) {
      if (blocks[i].content && blocks[i].content.trim()) {
        var prefix = blocks[i].type === 'callout' ? '💡 ' : blocks[i].type === 'link' ? '🔗 ' : '';
        return prefix + blocks[i].content.trim();
      }
    }
    return '';
  }

  // -------- gallery grid --------
  function buildCardEl(card) {
    var el = document.createElement('div');
    el.className = 'ent-card';
    el.dataset.id = card.id;

    var cover = document.createElement('div');
    cover.className = 'ent-cover';

    if (card.cover) {
      var img = document.createElement('img');
      img.className = 'ent-cover-img';
      img.loading = 'lazy';
      img.alt = '';
      img.src = card.cover;
      img.addEventListener('error', function () { img.style.display = 'none'; });
      cover.appendChild(img);
    }
    var fallback = document.createElement('span');
    fallback.className = 'ent-cover-fallback';
    fallback.textContent = (card.title || '?').trim().charAt(0).toUpperCase() || '?';
    cover.appendChild(fallback);

    var badge = document.createElement('span');
    badge.className = 'badge';
    badge.style.color = statusColor(card.status);
    badge.textContent = card.status || 'No status';
    cover.appendChild(badge);

    var actions = document.createElement('div');
    actions.className = 'card-actions';
    var delBtn = document.createElement('button');
    delBtn.type = 'button'; delBtn.className = 'icon-btn-sm'; delBtn.dataset.action = 'delete';
    delBtn.setAttribute('aria-label', 'Delete'); delBtn.textContent = '✕';
    actions.appendChild(delBtn);
    cover.appendChild(actions);

    var body = document.createElement('div');
    body.className = 'card-body';
    var title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = card.title;
    body.appendChild(title);

    if (card.tags && card.tags.length) {
      var tagsRow = document.createElement('div');
      tagsRow.className = 'card-tags';
      card.tags.forEach(function (t) {
        var tag = document.createElement('span');
        tag.className = 'tag';
        tag.textContent = t;
        tagsRow.appendChild(tag);
      });
      body.appendChild(tagsRow);
    }

    var previewText = firstPreviewText(card);
    if (previewText) {
      var preview = document.createElement('div');
      preview.className = 'card-notes-preview';
      preview.textContent = previewText;
      body.appendChild(preview);
    }

    el.appendChild(cover); el.appendChild(body);
    return el;
  }

  function buildSectionEl(label, cardsInGroup) {
    var section = document.createElement('div');
    section.className = 'proj-section';
    var header = document.createElement('div');
    header.className = 'proj-section-title';
    header.textContent = label;
    var grid = document.createElement('div');
    grid.className = 'ent-grid';
    cardsInGroup.forEach(function (card) { grid.appendChild(buildCardEl(card)); });
    section.appendChild(header);
    section.appendChild(grid);
    return section;
  }

  function renderGrid() {
    var wrap = $('projSections');
    var empty = $('projEmpty');
    wrap.innerHTML = '';
    var filtered = getFilteredCards();
    var shown = 0;
    groups.forEach(function (g) {
      var cardsInGroup = filtered.filter(function (c) { return (c.group || groups[0]) === g; });
      if (!cardsInGroup.length) return;
      shown += cardsInGroup.length;
      wrap.appendChild(buildSectionEl(g, cardsInGroup));
    });
    var ungrouped = filtered.filter(function (c) { return groups.indexOf(c.group || groups[0]) === -1; });
    if (ungrouped.length) {
      shown += ungrouped.length;
      wrap.appendChild(buildSectionEl('Ungrouped', ungrouped));
    }
    empty.hidden = shown !== 0;
  }

  function deleteCard(id) {
    cards = cards.filter(function (c) { return c.id !== id; });
    saveCards(cards);
    renderGrid();
  }

  // -------- shared cover / tag editor (used on the project page) --------
  function updateCoverPreview() {
    var img = $('ppCoverPreview');
    if (currentCover) { img.src = currentCover; img.style.display = 'block'; }
    else { img.removeAttribute('src'); img.style.display = 'none'; }
  }
  function renderStatusChips() {
    var row = $('ppStatusRow');
    row.innerHTML = '';
    statuses.forEach(function (st) {
      row.appendChild(makeChip(st, selectedStatus === st, function () {
        selectedStatus = st; renderStatusChips();
      }));
    });
    row.appendChild(makeChip('+ New', false, function () {
      $('ppNewStatusRow').hidden = false;
      $('ppNewStatusInput').focus();
    }, true));
  }
  function addNewStatus() {
    var input = $('ppNewStatusInput');
    var name = input.value.trim();
    if (!name) return;
    var existing = statuses.filter(function (s) { return s.toLowerCase() === name.toLowerCase(); })[0];
    if (!existing) { statuses.push(name); saveStatuses(statuses); renderFilterBar(); }
    selectedStatus = existing || name;
    input.value = '';
    $('ppNewStatusRow').hidden = true;
    renderStatusChips();
  }
  function renderGroupChips() {
    var row = $('ppGroupRow');
    row.innerHTML = '';
    groups.forEach(function (g) {
      row.appendChild(makeChip(g, selectedGroup === g, function () {
        selectedGroup = g; renderGroupChips();
      }));
    });
    row.appendChild(makeChip('+ New', false, function () {
      $('ppNewGroupRow').hidden = false;
      $('ppNewGroupInput').focus();
    }, true));
  }
  function addNewGroup() {
    var input = $('ppNewGroupInput');
    var name = input.value.trim();
    if (!name) return;
    var existing = groups.filter(function (g) { return g.toLowerCase() === name.toLowerCase(); })[0];
    if (!existing) { groups.push(name); saveGroups(groups); }
    selectedGroup = existing || name;
    input.value = '';
    $('ppNewGroupRow').hidden = true;
    renderGroupChips();
  }
  function renderTagEditor() {
    var wrap = $('ppTagEditor');
    wrap.innerHTML = '';
    currentTags.forEach(function (tag, idx) {
      var chip = document.createElement('span');
      chip.className = 'tag-chip';
      var txt = document.createElement('span');
      txt.textContent = tag;
      var rm = document.createElement('button');
      rm.type = 'button'; rm.className = 'tag-chip-remove'; rm.textContent = '✕';
      rm.setAttribute('aria-label', 'Remove tag');
      rm.addEventListener('click', function () { currentTags.splice(idx, 1); renderTagEditor(); });
      chip.appendChild(txt); chip.appendChild(rm);
      wrap.appendChild(chip);
    });
    var input = document.createElement('input');
    input.type = 'text';
    input.className = 'tag-editor-input';
    input.placeholder = currentTags.length ? 'Add tag…' : 'Add tags (press Enter)';
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        var v = input.value.trim().replace(/,+$/, '');
        if (v && currentTags.indexOf(v) === -1) { currentTags.push(v); renderTagEditor(); }
        else input.value = '';
      } else if (e.key === 'Backspace' && !input.value && currentTags.length) {
        currentTags.pop(); renderTagEditor();
      }
    });
    wrap.appendChild(input);
  }

  // -------- block editor --------
  function buildBlockEl(block) {
    var el = document.createElement('div');
    el.className = 'block block-' + block.type;
    el.dataset.id = block.id;

    var controls = document.createElement('div');
    controls.className = 'block-controls';
    var upBtn = document.createElement('button');
    upBtn.type = 'button'; upBtn.className = 'block-mini-btn'; upBtn.dataset.action = 'up';
    upBtn.textContent = '↑'; upBtn.setAttribute('aria-label', 'Move up');
    var downBtn = document.createElement('button');
    downBtn.type = 'button'; downBtn.className = 'block-mini-btn'; downBtn.dataset.action = 'down';
    downBtn.textContent = '↓'; downBtn.setAttribute('aria-label', 'Move down');
    var delBtn = document.createElement('button');
    delBtn.type = 'button'; delBtn.className = 'block-mini-btn'; delBtn.dataset.action = 'remove';
    delBtn.textContent = '✕'; delBtn.setAttribute('aria-label', 'Remove block');
    controls.appendChild(upBtn); controls.appendChild(downBtn); controls.appendChild(delBtn);
    el.appendChild(controls);

    if (block.type === 'callout') {
      var ch = document.createElement('div');
      ch.className = 'callout-header';
      ch.textContent = '💡 AI Prompt';
      el.appendChild(ch);
      var ta = document.createElement('textarea');
      ta.className = 'block-textarea';
      ta.placeholder = 'Paste or write an AI prompt…';
      ta.value = block.content || '';
      ta.addEventListener('input', function () { block.content = ta.value; });
      el.appendChild(ta);
    } else if (block.type === 'link') {
      var lbl = document.createElement('span');
      lbl.className = 'block-type-label';
      lbl.textContent = 'Link';
      el.appendChild(lbl);
      var row = document.createElement('div');
      row.className = 'block-link-row';
      var inp = document.createElement('input');
      inp.type = 'url'; inp.placeholder = 'https://…'; inp.value = block.content || '';
      var open = document.createElement('a');
      open.className = 'block-link-open'; open.textContent = 'Open ↗';
      open.target = '_blank'; open.rel = 'noopener';
      open.href = block.content || '#';
      inp.addEventListener('input', function () { block.content = inp.value; open.href = inp.value || '#'; });
      row.appendChild(inp); row.appendChild(open);
      el.appendChild(row);
    } else {
      var lbl2 = document.createElement('span');
      lbl2.className = 'block-type-label';
      lbl2.textContent = 'Note';
      el.appendChild(lbl2);
      var ta2 = document.createElement('textarea');
      ta2.className = 'block-textarea';
      ta2.placeholder = 'Write a note…';
      ta2.value = block.content || '';
      ta2.addEventListener('input', function () { block.content = ta2.value; });
      el.appendChild(ta2);
    }
    return el;
  }
  function renderBlocks() {
    var wrap = $('ppBlocks');
    wrap.innerHTML = '';
    currentBlocks.forEach(function (block) { wrap.appendChild(buildBlockEl(block)); });
    $('ppBlocksEmpty').hidden = currentBlocks.length !== 0;
  }

  // -------- project page (add / detail / edit) --------
  function openProjectPage(card) {
    editingCard = card || null;
    editingId = card ? card.id : null;
    $('ppTitle').value = card ? card.title : '';
    $('ppCoverUrlInput').value = '';
    $('ppNewStatusRow').hidden = true;
    $('ppNewGroupRow').hidden = true;
    currentCover = card ? (card.cover || '') : '';
    updateCoverPreview();
    selectedStatus = card ? card.status : (statuses[0] || null);
    renderStatusChips();
    selectedGroup = card && groups.indexOf(card.group) !== -1 ? card.group : (groups[0] || null);
    renderGroupChips();
    currentTags = card && Array.isArray(card.tags) ? card.tags.slice() : [];
    renderTagEditor();
    currentBlocks = card && Array.isArray(card.blocks)
      ? card.blocks.map(function (b) { return { id: b.id, type: b.type, content: b.content }; })
      : [];
    renderBlocks();
    $('ppDelete').style.display = card ? '' : 'none';
    var bg = $('projectPageBg');
    bg.classList.add('show');
    bg.scrollTop = 0;
  }
  function closeProjectPage() {
    $('projectPageBg').classList.remove('show');
    editingCard = null; editingId = null;
  }

  function wireProjectPage() {
    $('projAddBtn').addEventListener('click', function () { openProjectPage(null); });
    $('ppBack').addEventListener('click', closeProjectPage);

    $('ppNewStatusAdd').addEventListener('click', addNewStatus);
    $('ppNewStatusInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); addNewStatus(); }
    });
    $('ppNewGroupAdd').addEventListener('click', addNewGroup);
    $('ppNewGroupInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); addNewGroup(); }
    });

    $('ppCoverUrlInput').addEventListener('change', function () {
      var v = $('ppCoverUrlInput').value.trim();
      if (v) { currentCover = v; updateCoverPreview(); }
    });
    $('ppCoverFile').addEventListener('change', function (e) {
      var file = e.target.files && e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = async function () {
        var compressed = await compressImageDataUrl(String(reader.result), 480, 0.82);
        currentCover = compressed;
        updateCoverPreview();
      };
      reader.readAsDataURL(file);
    });

    document.querySelectorAll('.block-add-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        currentBlocks.push({ id: genId('b'), type: btn.dataset.type, content: '' });
        renderBlocks();
      });
    });
    $('ppBlocks').addEventListener('click', function (e) {
      var btn = e.target.closest('[data-action]');
      if (!btn) return;
      var blockEl = e.target.closest('.block');
      var id = blockEl.dataset.id;
      var idx = currentBlocks.findIndex(function (b) { return b.id === id; });
      if (idx === -1) return;
      if (btn.dataset.action === 'remove') {
        currentBlocks.splice(idx, 1);
      } else if (btn.dataset.action === 'up' && idx > 0) {
        var tmp = currentBlocks[idx - 1]; currentBlocks[idx - 1] = currentBlocks[idx]; currentBlocks[idx] = tmp;
      } else if (btn.dataset.action === 'down' && idx < currentBlocks.length - 1) {
        var tmp2 = currentBlocks[idx + 1]; currentBlocks[idx + 1] = currentBlocks[idx]; currentBlocks[idx] = tmp2;
      }
      renderBlocks();
    });

    $('ppSave').addEventListener('click', function () {
      var title = $('ppTitle').value.trim();
      if (!title) { $('ppTitle').focus(); return; }
      var card = {
        id: editingId || genId('p'),
        title: title,
        cover: currentCover || '',
        status: selectedStatus || (statuses[0] || ''),
        group: selectedGroup || (groups[0] || ''),
        tags: currentTags.slice(),
        blocks: currentBlocks.map(function (b) { return { id: b.id, type: b.type, content: b.content }; }),
        createdAt: editingCard ? editingCard.createdAt : Date.now()
      };
      if (editingId) {
        cards = cards.map(function (c) { return c.id === editingId ? card : c; });
      } else {
        cards.unshift(card);
      }
      saveCards(cards);
      closeProjectPage();
      renderGrid();
    });

    $('ppDelete').addEventListener('click', function () {
      if (!editingId) return;
      if (!confirm('Delete this project?')) return;
      deleteCard(editingId);
      closeProjectPage();
    });

    $('projSearch').addEventListener('input', function () {
      searchQuery = $('projSearch').value.trim().toLowerCase();
      renderGrid();
    });

    $('projSections').addEventListener('click', function (e) {
      var actionBtn = e.target.closest('[data-action]');
      var cardEl = e.target.closest('.ent-card');
      if (!cardEl) return;
      var id = cardEl.dataset.id;
      var card = cards.filter(function (c) { return c.id === id; })[0];
      if (!card) return;
      if (actionBtn) {
        e.stopPropagation();
        if (actionBtn.dataset.action === 'delete') {
          if (confirm('Delete "' + card.title + '"?')) deleteCard(id);
        }
        return;
      }
      openProjectPage(card);
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    statuses = loadStatuses();
    groups = loadGroups();
    cards = loadCards();
    renderFilterBar();
    renderGrid();
    wireProjectPage();

    if (typeof initCloudSync === 'function') {
      initCloudSync({
        appKey: 'projects',
        syncedKeys: ['proj:cards', 'proj:statuses', 'proj:groups'],
        onApplied: function () {
          statuses = loadStatuses();
          groups = loadGroups();
          cards = loadCards();
          renderFilterBar();
          renderGrid();
        }
      });
    }
  });
})();
</script>
</body>
</html>
