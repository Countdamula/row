<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FBF8F3">
<title>Business Hub</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js" defer></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<script src="business-data.js" defer></script>
<style>
/* =============================================================
   Business Hub — reuses Dream Board's exact engine (editable tabs, a
   3-column drag-and-drop widget board, per-widget color-grading tint,
   Add Widget / Reset to Default) per an explicit request, restyled to a
   light cream/rust "Content Hub" Notion-template look per a reference
   photo (sidebar subpages under an avatar, platform toggle cards, a
   content-plan grid, a resources grid, plus a content summary/posting
   schedule/gallery grouped into the board's third column standing in for
   the reference's right-hand sidebar). Own self-contained :root tokens —
   same "explicit reference-photo instruction" exception category as
   dreamboard.html/braindump.html/gym.html (see CLAUDE.md §6/DO NOT
   MODIFY rule 2). No other page's tokens are touched.
   ============================================================= */
:root {
  --bh-bg: #fbf8f3;
  --bh-bg-deep: #f3ede1;
  --bh-card: #ffffff;
  --bh-card-alt: #f5f0e6;
  --bh-border: #e7e0d2;
  --bh-ink: #2b2622;
  --bh-text-dim: #6e675c;
  --bh-text-mute: #9c9385;
  --bh-accent: #b5651d;
  --bh-accent-bright: #d98a4b;
  --bh-accent-tint: rgba(181, 101, 29, 0.10);
  --success: #4c9a6a;
  --warning: #d9a441;
  --danger: #d9614c;
  --info: #5b84b1;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  color-scheme: light;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bh-bg); color: var(--bh-ink); font-family: var(--font); min-height: 100%; -webkit-font-smoothing: antialiased; }
html, body { scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { width: 0 !important; height: 0 !important; display: none !important; }
img, video { max-width: 100%; display: block; }
button, input, textarea, select { font-family: inherit; color: inherit; }
:focus-visible { outline: 2px solid var(--bh-accent); outline-offset: 2px; border-radius: 4px; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important; animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important; scroll-behavior: auto !important;
  }
}

.shell { max-width: 1240px; margin: 0 auto; padding: 0 0 60px; }

/* ===== Cover banner — a warm gradient (or uploaded photo) with a
   scalloped / "pinked" bottom edge, echoing the reference photo's
   fabric-edge banner. ===== */
.bh-banner {
  position: relative; height: 150px; overflow: visible;
  background: linear-gradient(120deg, #cfc3ae 0%, #b7a88e 55%, #8f7d63 100%);
}
.bh-banner-inner { position: absolute; inset: 0; overflow: hidden; }
.bh-banner-inner img { width: 100%; height: 100%; object-fit: cover; }
.bh-banner::after {
  content: ''; position: absolute; left: 0; right: 0; bottom: -1px; height: 17px; z-index: 2;
  background: var(--bh-bg);
  -webkit-mask-image: radial-gradient(circle at 9px 0, transparent 9px, black 9.5px);
  mask-image: radial-gradient(circle at 9px 0, transparent 9px, black 9.5px);
  -webkit-mask-size: 18px 18px; mask-size: 18px 18px;
  -webkit-mask-repeat: repeat-x; mask-repeat: repeat-x;
}
.bh-back-btn {
  position: absolute; top: max(14px, env(safe-area-inset-top)); left: max(14px, env(safe-area-inset-left)); z-index: 5;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px 8px 10px;
  background: rgba(255,255,255,0.75); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.6);
  border-radius: 999px; color: #40372b;
  font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
  text-decoration: none; -webkit-tap-highlight-color: transparent;
}
.bh-back-btn:hover { background: rgba(255,255,255,0.92); }
.bh-banner-choice, .bh-banner-tools {
  position: absolute; z-index: 3;
}
.bh-banner-choice { inset: 0; display: flex; align-items: center; justify-content: center; }
.bh-banner-choice-btn {
  background: rgba(255,255,255,0.55); border: 1px solid rgba(255,255,255,0.7); border-radius: 999px;
  color: #40372b; font-size: 12.5px; font-weight: 700; letter-spacing: 0.02em; cursor: pointer; padding: 9px 18px;
}
.bh-banner-choice-btn:hover { background: rgba(255,255,255,0.8); }
.bh-banner-tools { top: max(14px, env(safe-area-inset-top)); right: max(14px, env(safe-area-inset-right)); display: flex; gap: 6px; }
.bh-banner-tools button {
  background: rgba(255,255,255,0.75); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.6);
  color: #40372b; border-radius: 999px; padding: 7px 12px; font-size: 11px; font-weight: 700; cursor: pointer;
}
.bh-banner-tools button:hover { background: rgba(255,255,255,0.92); }

/* ===== Header — avatar overlapping the banner, editable name/tagline ===== */
.bh-header { position: relative; padding: 0 24px; margin-top: -34px; display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
.bh-avatar {
  position: relative; width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0;
  background: var(--bh-accent); border: 4px solid var(--bh-bg);
  display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer;
  font-size: 28px; color: #fff;
}
.bh-avatar img { width: 100%; height: 100%; object-fit: cover; }
.bh-avatar:hover::after {
  content: 'Change'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.45); color: #fff; font-size: 10px; font-weight: 700; text-align: center; padding: 4px;
}
.bh-header-text { flex: 1; min-width: 200px; padding-bottom: 4px; }
.bh-name { font-size: 26px; font-weight: 800; letter-spacing: -0.01em; outline-offset: 4px; }
.bh-tagline { margin-top: 4px; font-size: 13.5px; color: var(--bh-text-dim); max-width: 560px; outline-offset: 4px; }
.bh-sync-status {
  font-size: 11px; font-weight: 600; color: var(--bh-text-mute); display: flex; align-items: center; gap: 5px;
  padding-bottom: 8px; white-space: nowrap;
}
.bh-sync-status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--bh-text-mute); flex-shrink: 0; }
.bh-sync-status.is-saved .bh-sync-status-dot { background: var(--success); }
.bh-sync-status.is-saved { color: var(--bh-text-dim); }
.bh-sync-status.is-error, .bh-sync-status.is-offline { color: var(--danger); }
.bh-sync-status.is-error .bh-sync-status-dot, .bh-sync-status.is-offline .bh-sync-status-dot {
  background: var(--danger); animation: bh-sync-pulse 1.4s ease-in-out infinite;
}
@keyframes bh-sync-pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(217,97,76,0.5); } 50% { box-shadow: 0 0 0 4px rgba(217,97,76,0); } }

/* ===== Layout: sidebar (subpages) + main (board) ===== */
.bh-layout { display: grid; grid-template-columns: 240px 1fr; gap: 26px; padding: 22px 24px 0; align-items: start; }
@media (max-width: 780px) { .bh-layout { grid-template-columns: 1fr; } }

.bh-sidebar { display: flex; flex-direction: column; gap: 14px; }
@media (min-width: 781px) { .bh-sidebar { position: sticky; top: 16px; } }
.bh-sidebar-desc { font-size: 12.5px; line-height: 1.55; color: var(--bh-text-dim); }
.bh-sidebar-label {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--bh-text-mute);
  margin-top: 4px;
}
.bh-subpages { display: flex; flex-direction: column; gap: 2px; }
.bh-subpage {
  display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 13.5px; font-weight: 600; color: var(--bh-text-dim);
  -webkit-tap-highlight-color: transparent; transition: background 0.15s, color 0.15s;
}
.bh-subpage:hover { background: var(--bh-card-alt); color: var(--bh-ink); }
.bh-subpage.active { background: var(--bh-accent-tint); color: var(--bh-accent); }
.bh-subpage-icon { flex-shrink: 0; font-size: 14px; cursor: text; }
.bh-subpage-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bh-subpage-edit { font-size: 11px; opacity: 0; cursor: pointer; flex-shrink: 0; }
.bh-subpage:hover .bh-subpage-edit, .bh-subpage.active .bh-subpage-edit { opacity: 0.55; }
.bh-subpage-edit:hover { opacity: 1 !important; }
.bh-subpage-rename-input {
  flex: 1; min-width: 0; background: var(--bh-card); border: 1px solid var(--bh-accent); border-radius: 6px;
  padding: 4px 6px; font-size: 13px; font-weight: 600; color: var(--bh-ink);
}

/* ===== Main / board actions ===== */
.bh-main-actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.bh-btn-primary, .bh-btn-secondary, .bh-btn-ghost {
  border-radius: 999px; padding: 9px 16px; font-size: 12px; font-weight: 700;
  cursor: pointer; -webkit-tap-highlight-color: transparent; letter-spacing: 0.02em;
  transition: background 0.15s, border-color 0.15s, opacity 0.15s;
}
.bh-btn-primary { background: var(--bh-accent); color: #fff; border: 1px solid var(--bh-accent); }
.bh-btn-primary:hover { background: var(--bh-accent-bright); border-color: var(--bh-accent-bright); }
.bh-btn-secondary { background: var(--bh-card); color: var(--bh-ink); border: 1px solid var(--bh-border); }
.bh-btn-secondary:hover { border-color: var(--bh-accent); color: var(--bh-accent); }
.bh-btn-ghost { background: transparent; color: var(--bh-text-mute); border: 1px solid var(--bh-border); }
.bh-btn-ghost:hover { color: var(--bh-ink); border-color: var(--bh-text-mute); }

/* ===== Board ===== */
.bh-board { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; align-items: start; }
@media (max-width: 980px) { .bh-board { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
@media (max-width: 620px) { .bh-board { grid-template-columns: 1fr; } }
.bh-col { display: flex; flex-direction: column; gap: 14px; min-width: 0; min-height: 40px; }

/* ===== Widget card chassis — a clean white card, hairline border, subtle
   shadow. Numbered index + hover-reveal drag/wide/tint/delete row, same
   engine as Dream Board's .dw-card, just a light-card recipe instead of
   frosted glass. ===== */
.bw-card {
  position: relative; overflow: hidden;
  background: var(--bh-card);
  border: 1px solid var(--bh-border);
  border-radius: var(--radius-lg);
  padding: 14px 14px 16px;
  box-shadow: 0 1px 2px rgba(43,38,34,0.04), 0 8px 20px rgba(43,38,34,0.05);
  --tint: transparent;
}
.bw-card::before { content: ''; position: absolute; inset: 0; z-index: 0; pointer-events: none; background: var(--tint); opacity: 0.16; }
.bw-card-head, .bw-card-title-row, .bw-card-body { position: relative; z-index: 1; }
.bw-card-ghost { opacity: 0.4; border: 1px dashed var(--bh-accent); background: var(--bh-accent-tint); }
.sortable-chosen { box-shadow: 0 10px 26px rgba(43,38,34,0.16); }

.bw-card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.bw-card-index { font-family: var(--font-mono); font-size: 10.5px; font-weight: 700; letter-spacing: 0.05em; color: var(--bh-accent); }
.bw-card-hover-actions { display: flex; align-items: center; gap: 2px; opacity: 0.5; transition: opacity 0.15s; }
.bw-card:hover .bw-card-hover-actions, .bw-card:focus-within .bw-card-hover-actions { opacity: 1; }
.bw-drag-handle { flex-shrink: 0; cursor: grab; color: var(--bh-text-mute); font-size: 13px; line-height: 1; letter-spacing: -1px; padding: 4px; }
.bw-drag-handle:active { cursor: grabbing; }
.bw-card-del, .bw-wide-toggle {
  background: transparent; border: none; color: var(--bh-text-mute); font-size: 14px; line-height: 1;
  cursor: pointer; padding: 4px 6px; border-radius: 6px;
}
.bw-card-del:hover { color: var(--danger); background: rgba(217,97,76,0.10); }
.bw-wide-toggle { font-size: 9.5px; letter-spacing: 0.05em; }
.bw-wide-toggle:hover { background: var(--bh-accent-tint); color: var(--bh-accent); }

.bw-tint-btn { flex-shrink: 0; width: 17px; height: 17px; border-radius: 50%; padding: 0; cursor: pointer; border: 1.5px solid var(--bh-border); background: transparent; }
.bw-tint-btn-empty { background: repeating-conic-gradient(rgba(43,38,34,0.14) 0% 25%, transparent 0% 50%) 0 0/8px 8px; }
.bw-tint-popover { margin: 8px 0 4px; padding: 10px; border-radius: var(--radius-md); background: var(--bh-card-alt); border: 1px solid var(--bh-border); }
.bw-tint-label { font-size: 9.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--bh-text-mute); margin-bottom: 6px; }
.bw-tint-swatches { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
.bw-tint-swatch { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--bh-border); cursor: pointer; }
.bw-tint-swatch:hover { border-color: var(--bh-accent); }
.bw-tint-custom-row { display: flex; align-items: center; gap: 10px; }
.bw-tint-custom-row input[type="color"] { width: 40px; height: 30px; border: 1px solid var(--bh-border); border-radius: 8px; padding: 0; background: none; cursor: pointer; flex-shrink: 0; }
.bw-tint-hex { flex: 1; font-family: var(--font-mono); font-size: 11.5px; font-weight: 600; color: var(--bh-text-dim); }
.bw-tint-clear { background: transparent; border: 1px solid var(--bh-border); color: var(--bh-text-dim); border-radius: 999px; padding: 5px 12px; font-size: 11px; font-weight: 700; cursor: pointer; }
.bw-tint-clear:hover { color: var(--bh-ink); border-color: var(--bh-text-mute); }

.bw-card-title-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
.bw-card-title { flex: 1; min-width: 0; font-weight: 700; font-size: 15.5px; color: var(--bh-ink); outline-offset: 3px; word-break: break-word; }

/* ===== Checklist / plain list / affirmation (reused Dream Board types) ===== */
.bw-plain-list, .bw-affirm-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
.bw-plain-row { display: flex; align-items: flex-start; gap: 9px; padding: 6px 6px; border-radius: var(--radius-sm); transition: background 0.15s; }
.bw-plain-row:hover { background: var(--bh-card-alt); }
.bw-plain-row .bw-check-cb { margin-top: 3px; flex-shrink: 0; width: 15px; height: 15px; accent-color: var(--bh-accent); cursor: pointer; }
.bw-item-text { flex: 1; min-width: 0; font-size: 13px; line-height: 1.5; outline-offset: 3px; word-break: break-word; }
.bw-item-done .bw-item-text { text-decoration: line-through; color: var(--bh-text-mute); }
.bw-item-del { flex-shrink: 0; background: transparent; border: none; color: var(--bh-text-mute); opacity: 0; font-size: 14px; cursor: pointer; padding: 0 4px; transition: opacity 0.15s; }
.bw-plain-row:hover .bw-item-del, .bw-affirm-row:hover .bw-item-del { opacity: 1; }
.bw-item-del:hover { color: var(--danger); }
.bw-affirm-row { position: relative; background: var(--bh-card-alt); border: 1px solid var(--bh-border); border-radius: var(--radius-md); padding: 10px 28px 10px 12px; }
.bw-affirm-text { font-style: italic; font-size: 13.5px; line-height: 1.45; color: var(--bh-ink); outline-offset: 3px; display: block; }
.bw-affirm-row .bw-item-del { position: absolute; top: 6px; right: 6px; }
.bw-additem-row { display: flex; gap: 6px; }
.bw-additem-row input { flex: 1; min-width: 0; background: var(--bh-card-alt); border: 1px solid var(--bh-border); border-radius: var(--radius-sm); padding: 7px 9px; font-size: 12.5px; color: var(--bh-ink); }
.bw-additem-btn { flex-shrink: 0; background: var(--bh-accent); color: #fff; border: none; border-radius: var(--radius-sm); width: 30px; font-size: 15px; font-weight: 700; cursor: pointer; }

/* ===== Note ===== */
.bw-note-textarea { width: 100%; min-height: 80px; resize: vertical; border: 1px solid var(--bh-border); background: var(--bh-card-alt); border-radius: var(--radius-sm); padding: 9px 11px; font-size: 13px; line-height: 1.5; color: var(--bh-ink); }

/* ===== Quote ===== */
.bw-quote-body { padding: 4px 4px 2px; position: relative; }
.bw-quote-body::before { content: '\201C'; position: absolute; top: -18px; left: -2px; font-size: 52px; color: var(--bh-accent); opacity: 0.28; line-height: 1; }
.bw-quote-text { position: relative; font-style: italic; font-size: 15px; line-height: 1.4; color: var(--bh-ink); outline-offset: 4px; padding-top: 4px; }
.bw-quote-author { margin-top: 8px; font-size: 11px; font-weight: 700; letter-spacing: 0.03em; color: var(--bh-accent); text-transform: uppercase; outline-offset: 3px; }
.bw-quote-author::before { content: '\2014\00A0'; }

/* ===== Steps tracker ===== */
.bw-steps-body { display: flex; flex-direction: column; gap: 7px; }
.bw-steps-row, .bw-steps-goal-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--bh-text-mute); }
.bw-steps-input { width: 84px; font-family: var(--font-mono); font-size: 18px; font-weight: 700; color: var(--bh-ink); background: var(--bh-card-alt); border: 1px solid var(--bh-border); border-radius: var(--radius-sm); padding: 5px 7px; }
.bw-steps-goal-input { width: 64px; font-family: var(--font-mono); font-size: 12px; color: var(--bh-ink); background: var(--bh-card-alt); border: 1px solid var(--bh-border); border-radius: var(--radius-sm); padding: 4px 6px; }
.bw-progress-bar { height: 7px; border-radius: 999px; background: var(--bh-card-alt); overflow: hidden; border: 1px solid var(--bh-border); }
.bw-progress-fill { height: 100%; background: var(--bh-accent); border-radius: 999px; transition: width 0.3s ease; }
.bw-steps-pct { font-size: 10.5px; color: var(--bh-text-mute); font-weight: 600; }

/* ===== Photo / video grid ===== */
.bw-photo-grid { display: grid; grid-template-columns: 1fr; gap: 7px; }
.bw-photo-grid-2 { grid-template-columns: 1fr 1fr; }
.bw-photo-slot { position: relative; border-radius: var(--radius-md); overflow: hidden; background: var(--bh-card-alt); border: 1px solid var(--bh-border); aspect-ratio: 4 / 3; }
.bw-photo-slot img, .bw-photo-slot video { width: 100%; height: 100%; object-fit: cover; }
.bw-photo-slot-empty, .bw-photo-slot-broken { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; color: var(--bh-text-mute); font-size: 10.5px; text-align: center; padding: 8px; }
.bw-photo-broken-icon { font-size: 20px; }
.bw-photo-reattach-btn { background: var(--bh-card); border: 1px solid var(--bh-border); border-radius: 999px; padding: 4px 10px; font-size: 10.5px; font-weight: 700; cursor: pointer; color: var(--bh-ink); }
.bw-slot-del { position: absolute; top: 5px; right: 5px; width: 21px; height: 21px; border-radius: 50%; background: rgba(43,38,34,0.55); color: #fff; border: none; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.bw-photo-addslot { aspect-ratio: 4 / 3; border: 1px dashed var(--bh-text-mute); border-radius: var(--radius-md); background: transparent; color: var(--bh-text-mute); font-size: 11.5px; font-weight: 600; cursor: pointer; }
.bw-photo-addslot:hover { background: var(--bh-card-alt); color: var(--bh-accent); border-color: var(--bh-accent); }
.bw-photo-caption { margin-top: 8px; font-size: 10px; color: var(--bh-text-mute); line-height: 1.5; }

/* ===== Feature card ===== */
.bw-feature-photo { position: relative; border-radius: var(--radius-md); overflow: hidden; background: var(--bh-card-alt); border: 1px solid var(--bh-border); aspect-ratio: 3 / 4; }
.bw-feature-photo img { width: 100%; height: 100%; object-fit: cover; }
.bw-feature-photo-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, transparent 45%, rgba(30,24,18,0.82) 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; }
.bw-feature-title { font-weight: 700; font-size: 16px; color: #fff; outline-offset: 3px; }
.bw-feature-caption { margin-top: 4px; font-size: 10.5px; color: rgba(255,255,255,0.82); outline-offset: 3px; }
.bw-feature-addphoto { position: absolute; inset: 0; width: 100%; height: 100%; background: transparent; border: none; color: var(--bh-text-mute); font-size: 12px; font-weight: 600; cursor: pointer; }
.bw-feature-addphoto:hover { color: var(--bh-accent); }
.bw-feature-photo-change { position: absolute; top: 8px; right: 8px; z-index: 2; background: rgba(30,24,18,0.55); border: 1px solid rgba(255,255,255,0.4); color: #fff; border-radius: 999px; padding: 4px 10px; font-size: 10px; font-weight: 700; cursor: pointer; }

/* ===== Info card ===== */
.bw-infocard-body { text-align: center; padding: 8px 4px 4px; }
.bw-infocard-icon { font-size: 24px; margin-bottom: 8px; outline-offset: 3px; }
.bw-infocard-title { font-size: 10.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--bh-accent); outline-offset: 3px; }
.bw-infocard-subtitle { margin-top: 5px; font-size: 12px; color: var(--bh-text-dim); outline-offset: 3px; }

/* ===== Calendar ===== */
.bw-cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.bw-cal-nav { background: var(--bh-card-alt); border: 1px solid var(--bh-border); border-radius: 50%; width: 24px; height: 24px; font-size: 13px; cursor: pointer; color: var(--bh-ink); }
.bw-cal-label { font-size: 12px; font-weight: 700; color: var(--bh-ink); }
.bw-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.bw-cal-dow { font-size: 9px; font-weight: 700; color: var(--bh-text-mute); text-align: center; padding-bottom: 4px; }
.bw-cal-day { position: relative; aspect-ratio: 1; border: 1px solid transparent; border-radius: 6px; background: var(--bh-card-alt); font-size: 10.5px; color: var(--bh-ink); cursor: pointer; display: flex; align-items: flex-start; justify-content: flex-start; padding: 3px 4px; }
.bw-cal-day:hover { border-color: var(--bh-border); background: var(--bh-accent-tint); }
.bw-cal-day-empty { background: transparent; cursor: default; pointer-events: none; }
.bw-cal-day-today { border-color: var(--bh-accent); font-weight: 700; }
.bw-cal-note-dot { position: absolute; bottom: 4px; right: 4px; width: 5px; height: 5px; border-radius: 50%; background: var(--bh-accent); }

/* ===== Platform card (new) ===== */
.bw-platform-body { display: flex; flex-direction: column; gap: 10px; }
.bw-platform-cover {
  position: relative; aspect-ratio: 4 / 3; border-radius: var(--radius-md); overflow: hidden;
  background: linear-gradient(135deg, var(--bh-accent) 0%, var(--bh-accent-bright) 100%);
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  color: #fff; font-size: 44px; font-weight: 700;
}
.bw-platform-cover img { width: 100%; height: 100%; object-fit: cover; }
.bw-platform-cover-change {
  position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.4); color: #fff; border: none;
  border-radius: 999px; padding: 3px 9px; font-size: 9.5px; font-weight: 700; cursor: pointer;
}
.bw-platform-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.bw-platform-active-label { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; color: var(--bh-text-dim); cursor: pointer; }
.bw-platform-active-label input { width: 15px; height: 15px; accent-color: var(--success); cursor: pointer; }

/* ===== Content plan card (new) ===== */
.bw-cc-cover { aspect-ratio: 16 / 10; border-radius: var(--radius-md); overflow: hidden; background: var(--bh-card-alt); border: 1px solid var(--bh-border); margin-bottom: 10px; cursor: pointer; position: relative; }
.bw-cc-cover img { width: 100%; height: 100%; object-fit: cover; }
.bw-cc-cover-empty { height: 100%; display: flex; align-items: center; justify-content: center; color: var(--bh-text-mute); font-size: 11.5px; font-weight: 600; }
.bw-cc-row { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--bh-text-dim); margin-bottom: 6px; }
.bw-cc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: var(--bh-text-mute); }
.bw-cc-platform-input { border: none; background: transparent; font-size: 11.5px; font-weight: 600; color: var(--bh-text-dim); width: 100%; outline-offset: 2px; }
.bw-cc-status-select { border: 1px solid transparent; background: transparent; font-size: 11.5px; font-weight: 600; color: var(--bh-ink); cursor: pointer; padding: 1px 2px; border-radius: 4px; }
.bw-cc-status-select:hover { border-color: var(--bh-border); }
.bw-cc-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
.bw-cc-tag {
  display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.02em;
  background: var(--bh-card-alt); color: var(--bh-text-dim); border: 1px solid var(--bh-border);
}
.bw-cc-tag button { background: none; border: none; color: inherit; opacity: 0.6; cursor: pointer; font-size: 10px; padding: 0; }
.bw-cc-tag button:hover { opacity: 1; color: var(--danger); }
.bw-cc-tag-add { display: flex; gap: 5px; margin-bottom: 8px; }
.bw-cc-tag-add input { flex: 1; min-width: 0; font-size: 11px; border: 1px solid var(--bh-border); background: var(--bh-card-alt); border-radius: 999px; padding: 4px 9px; }
.bw-cc-date-row { display: flex; gap: 6px; margin-bottom: 6px; }
.bw-cc-date-row input { flex: 1; min-width: 0; font-size: 11px; border: 1px solid var(--bh-border); background: var(--bh-card-alt); border-radius: var(--radius-sm); padding: 5px 7px; color: var(--bh-ink); }
.bw-cc-due { font-size: 11.5px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; color: var(--bh-text-dim); }
.bw-cc-due::before { content: '●'; font-size: 8px; color: var(--bh-text-mute); }
.bw-cc-due.is-published::before { color: var(--success); }
.bw-cc-due.is-today::before { color: var(--warning); }
.bw-cc-due.is-overdue::before { color: var(--danger); }
.bw-cc-checklist { display: flex; flex-direction: column; gap: 4px; }

/* ===== Resource tile (new) ===== */
.bw-resource-body { display: flex; flex-direction: column; gap: 6px; }
.bw-resource-icon { font-size: 22px; outline-offset: 3px; }
.bw-resource-desc { font-size: 11.5px; line-height: 1.5; color: var(--bh-text-dim); outline-offset: 3px; min-height: 1.2em; }
.bw-resource-status { align-self: flex-start; }
.bw-status-pill {
  display: inline-flex; align-items: center; gap: 5px; padding: 2px 9px; border-radius: 999px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase;
  background: rgba(76,154,106,0.12); color: var(--success); border: none; cursor: pointer;
}
.bw-status-pill.is-idle { background: rgba(156,147,133,0.16); color: var(--bh-text-dim); }
.bw-status-pill.is-archived { background: rgba(217,97,76,0.12); color: var(--danger); }

/* ===== Summary widget (new) — live-computed rollup ===== */
.bw-summary-body { display: flex; flex-direction: column; gap: 10px; }
.bw-summary-stat-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--bh-text-dim); }
.bw-summary-stat-row strong { color: var(--bh-ink); font-size: 15px; }
.bw-summary-bar-row { display: flex; flex-direction: column; gap: 3px; }
.bw-summary-bar-label { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--bh-text-dim); }
.bw-summary-empty { font-size: 11.5px; color: var(--bh-text-mute); font-style: italic; }

/* ===== Schedule widget (new) ===== */
.bw-schedule-body { display: flex; flex-direction: column; gap: 10px; }
.bw-schedule-group-label { font-size: 10.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--bh-accent); margin-bottom: 4px; }
.bw-schedule-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; padding: 3px 0; color: var(--bh-text-dim); }
.bw-schedule-row-del { background: none; border: none; color: var(--bh-text-mute); cursor: pointer; opacity: 0; font-size: 12px; padding: 0 4px; }
.bw-schedule-row:hover .bw-schedule-row-del { opacity: 1; }
.bw-schedule-row-del:hover { color: var(--danger); }
.bw-schedule-add-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
.bw-schedule-add-row select, .bw-schedule-add-row input {
  border: 1px solid var(--bh-border); background: var(--bh-card-alt); border-radius: var(--radius-sm);
  padding: 5px 6px; font-size: 11px; color: var(--bh-ink); flex: 1; min-width: 68px;
}

/* ===== Modals ===== */
.modal-bg { display: none; position: fixed; inset: 0; z-index: 60; background: rgba(43,38,34,0.35); align-items: center; justify-content: center; padding: 20px; }
.modal-bg.show { display: flex; }
.modal { background: var(--bh-card); border: 1px solid var(--bh-border); border-radius: var(--radius-lg); padding: 22px; width: 100%; max-width: 440px; max-height: 86vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(43,38,34,0.18); }
.bh-modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.bh-modal-head h3 { font-size: 18px; font-weight: 700; color: var(--bh-ink); }
.bh-modal-close { background: transparent; border: none; font-size: 18px; color: var(--bh-text-mute); cursor: pointer; }
.bh-modal-close:hover { color: var(--bh-ink); }
.bh-modal-or { text-align: center; font-size: 11px; color: var(--bh-text-mute); margin: 10px 0; }
.bh-modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
.bh-modal-textarea { width: 100%; min-height: 120px; border: 1px solid var(--bh-border); background: var(--bh-card-alt); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13px; resize: vertical; color: var(--bh-ink); }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; font-weight: 700; color: var(--bh-text-mute); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
.field input, .field select { width: 100%; border: 1px solid var(--bh-border); background: var(--bh-card-alt); border-radius: var(--radius-sm); padding: 9px 10px; font-size: 13px; color: var(--bh-ink); }
.bh-widget-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media (max-width: 420px) { .bh-widget-menu { grid-template-columns: 1fr; } }
.bh-widget-menu-item { text-align: left; background: var(--bh-card-alt); border: 1px solid var(--bh-border); border-radius: var(--radius-md); padding: 10px 12px; cursor: pointer; display: flex; flex-direction: column; gap: 3px; color: var(--bh-ink); }
.bh-widget-menu-item:hover { background: var(--bh-accent-tint); border-color: var(--bh-accent); }
.bh-widget-menu-item strong { font-size: 12.5px; }
.bh-widget-menu-item span { font-size: 10px; color: var(--bh-text-mute); line-height: 1.35; }
</style>
</head>
<body>
<div class="shell">
  <div class="bh-banner" id="bhBanner">
    <div class="bh-banner-inner" id="bhBannerInner"><img id="bhBannerImg" style="display:none;" alt=""></div>
    <div class="bh-banner-choice" id="bhBannerChoice">
      <button type="button" class="bh-banner-choice-btn" id="bhBannerAddBtn">+ Add a cover photo</button>
    </div>
    <div class="bh-banner-tools" id="bhBannerTools" style="display:none;">
      <button type="button" id="bhBannerChangeBtn">Change</button>
      <button type="button" id="bhBannerRemoveBtn">Remove</button>
    </div>
    <input type="file" id="bhBannerInput" accept="image/*" style="display:none;">
    <a href="index.html" class="bh-back-btn" aria-label="Back to dashboard">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      <span>Back</span>
    </a>
  </div>

  <div class="bh-header">
    <div class="bh-avatar" id="bhAvatar">
      <img id="bhAvatarImg" style="display:none;" alt="">
      <span id="bhAvatarFallback">💼</span>
    </div>
    <input type="file" id="bhAvatarInput" accept="image/*" style="display:none;">
    <div class="bh-header-text">
      <div class="bh-name" id="bhName" contenteditable="true"></div>
      <div class="bh-tagline" id="bhTagline" contenteditable="true"></div>
    </div>
    <span class="bh-sync-status" id="bhSyncStatus"></span>
  </div>

  <div class="bh-layout">
    <aside class="bh-sidebar">
      <div class="bh-sidebar-desc">Everything for planning, producing, and tracking your content — organized into subpages, just like the rest of this business.</div>
      <div class="bh-sidebar-label">Subpages</div>
      <nav class="bh-subpages" id="bhSubpages"></nav>
    </aside>
    <main class="bh-main">
      <div class="bh-main-actions">
        <button type="button" class="bh-btn-secondary" id="bhAddWidgetBtn">+ Add Widget</button>
        <button type="button" class="bh-btn-ghost" id="bhResetBtn">Reset to Default</button>
      </div>
      <div class="bh-board" id="bhBoard"></div>
    </main>
  </div>
</div>

<div class="modal-bg" id="bhAddWidgetModalBg">
  <div class="modal">
    <div class="bh-modal-head"><h3>Add a widget</h3><button type="button" class="bh-modal-close" id="bhAddWidgetCloseBtn" aria-label="Close">&times;</button></div>
    <div class="bh-widget-menu">
      <button type="button" class="bh-widget-menu-item" data-wtype="platform"><strong>Platform</strong><span>A toggleable platform card (Instagram, Tiktok, etc.)</span></button>
      <button type="button" class="bh-widget-menu-item" data-wtype="contentcard"><strong>Content Plan Card</strong><span>A piece of content with status, tags, date, and a mini checklist</span></button>
      <button type="button" class="bh-widget-menu-item" data-wtype="resource"><strong>Resource</strong><span>An icon, title, description, and status</span></button>
      <button type="button" class="bh-widget-menu-item" data-wtype="summary"><strong>Content Summary</strong><span>Auto-computed overview of this tab's content cards</span></button>
      <button type="button" class="bh-widget-menu-item" data-wtype="schedule"><strong>Posting Schedule</strong><span>Platform + day + time rows, grouped by platform</span></button>
      <button type="button" class="bh-widget-menu-item" data-wtype="checklist"><strong>Checklist</strong><span>Any to-do list</span></button>
      <button type="button" class="bh-widget-menu-item" data-wtype="list"><strong>List</strong><span>Plain items — ideas, values, notes</span></button>
      <button type="button" class="bh-widget-menu-item" data-wtype="note"><strong>Note</strong><span>A freeform block of text</span></button>
      <button type="button" class="bh-widget-menu-item" data-wtype="quote"><strong>Quote</strong><span>A quote with an attribution</span></button>
      <button type="button" class="bh-widget-menu-item" data-wtype="affirmation"><strong>Affirmation</strong><span>A set of affirmation cards</span></button>
      <button type="button" class="bh-widget-menu-item" data-wtype="steps"><strong>Steps Tracker</strong><span>A daily count vs. a goal</span></button>
      <button type="button" class="bh-widget-menu-item" data-wtype="photos"><strong>Photo / Video Grid</strong><span>A gallery of media</span></button>
      <button type="button" class="bh-widget-menu-item" data-wtype="calendar"><strong>Calendar</strong><span>This month, with a note per day</span></button>
      <button type="button" class="bh-widget-menu-item" data-wtype="feature"><strong>Feature Card</strong><span>A single numbered photo with a title and caption</span></button>
      <button type="button" class="bh-widget-menu-item" data-wtype="infocard"><strong>Info Card</strong><span>A small icon, title, and one-line note</span></button>
    </div>
  </div>
</div>

<div class="modal-bg" id="bhPhotoModalBg">
  <div class="modal">
    <div class="bh-modal-head"><h3 id="bhPhotoModalTitle">Add photo or video</h3><button type="button" class="bh-modal-close" id="bhPhotoModalCloseBtn" aria-label="Close">&times;</button></div>
    <div class="field" id="bhSlotTypeField">
      <label>Type</label>
      <select id="bhSlotTypeSelect"><option value="image">Photo</option><option value="video">Video</option></select>
    </div>
    <div class="field">
      <label>Upload a file</label>
      <input type="file" id="bhSlotFileInput" accept="image/*,video/*">
    </div>
    <div class="bh-modal-or">— or —</div>
    <div class="field">
      <label>Paste a URL</label>
      <input type="text" id="bhSlotUrlInput" placeholder="https://…">
    </div>
    <div class="bh-modal-actions"><button type="button" class="bh-btn-primary" id="bhSlotAddBtn">Add</button></div>
  </div>
</div>

<div class="modal-bg" id="bhDayNoteModalBg">
  <div class="modal">
    <div class="bh-modal-head"><h3>Note for <span id="bhDayNoteDateLabel"></span></h3><button type="button" class="bh-modal-close" id="bhDayNoteCloseBtn" aria-label="Close">&times;</button></div>
    <textarea id="bhDayNoteInput" class="bh-modal-textarea" placeholder="Add a note for this day…"></textarea>
    <div class="bh-modal-actions">
      <button type="button" class="bh-btn-ghost" id="bhDayNoteClearBtn">Clear</button>
      <button type="button" class="bh-btn-primary" id="bhDayNoteSaveBtn">Save</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  function $(id) { return document.getElementById(id); }
  function storeGet(key) { try { const raw = localStorage.getItem(key); return raw == null ? null : JSON.parse(raw); } catch (e) { return null; } }
  function storeSet(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {} }

  const ACTIVE_TAB_KEY = 'business:active_tab';
  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  const WIDGET_TYPE_LABELS = {
    checklist: 'New Checklist', list: 'New List', note: 'New Note', quote: 'New Quote',
    affirmation: 'New Affirmation', steps: 'Daily Steps', photos: 'Photo / Video Grid', calendar: 'Calendar',
    feature: 'New Feature Card', infocard: 'New Info Card',
    platform: 'New Platform', contentcard: 'New Content', resource: 'New Resource',
    summary: 'Content Overview', schedule: 'Posting Schedule'
  };

  let DB = null;
  let activeTabId = null;
  let renamingTabId = null;
  let sortableInstances = [];
  let addSlotTargetWidgetId = null;
  let addSlotSingleTarget = false;
  let addSlotField = 'photo'; // which data field a single-target photo add writes to (feature/platform/contentcard covers)
  let dayNoteTarget = null;
  let tintPopoverWidgetId = null;
  const TINT_PRESETS = ['#e07a5f', '#e3b23c', '#7a9e7e', '#5b84b1', '#a888c2', '#c98a4b'];
  let sessionVideoBlobs = {};

  function openModal(el) { el.classList.add('show'); }
  function closeModal(el) { el.classList.remove('show'); }
  function autosize(ta) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }

  function wireInlineEdit(el, onCommit, opts) {
    opts = opts || {};
    let original = el.textContent;
    el.addEventListener('focus', function () { original = el.textContent; });
    el.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !opts.multiline) { e.preventDefault(); el.blur(); }
      else if (e.key === 'Escape') { e.preventDefault(); el.textContent = original; el.blur(); }
    });
    el.addEventListener('blur', function () {
      const val = el.textContent.trim();
      if (!val && opts.allowEmpty === false) { el.textContent = original; return; }
      if (val === original) return;
      onCommit(val);
    });
  }

  // ============================================================
  // SYNC STATUS — same honest, local-only feedback as dreamboard.html's
  // (see business-data.js's storeSet()).
  // ============================================================
  let syncStatusTimer = null;
  function setSyncStatus(mode, text) {
    const el = $('bhSyncStatus');
    if (!el) return;
    el.className = 'bh-sync-status' + (mode ? ' is-' + mode : '');
    el.textContent = '';
    const dot = document.createElement('span'); dot.className = 'bh-sync-status-dot';
    const label = document.createElement('span'); label.textContent = text;
    el.appendChild(dot); el.appendChild(label);
  }
  function handleSaveEvent(e) {
    if (!navigator.onLine) { setSyncStatus('offline', 'Offline — will sync when reconnected'); return; }
    if (e.detail && e.detail.ok === false) {
      setSyncStatus('error', "Couldn't save — your browser's storage may be full.");
      return;
    }
    setSyncStatus('saved', 'Saved — syncing…');
    clearTimeout(syncStatusTimer);
    syncStatusTimer = setTimeout(function () { if (navigator.onLine) setSyncStatus('saved', 'Synced'); }, 1800);
  }

  // ============================================================
  // PROFILE — banner / avatar / name / tagline. One global record (not
  // per-tab), since only the whole hub has this header, matching the
  // reference photo's single persistent sidebar/header across subpages.
  // ============================================================
  function renderProfile() {
    const p = DB.getProfile();
    $('bhName').textContent = p.name;
    $('bhTagline').textContent = p.tagline;

    const bannerImg = $('bhBannerImg'), choice = $('bhBannerChoice'), tools = $('bhBannerTools');
    if (p.bannerPhoto) { bannerImg.src = p.bannerPhoto; bannerImg.style.display = 'block'; choice.style.display = 'none'; tools.style.display = 'flex'; }
    else { bannerImg.style.display = 'none'; bannerImg.src = ''; choice.style.display = 'flex'; tools.style.display = 'none'; }

    const avImg = $('bhAvatarImg'), avFallback = $('bhAvatarFallback');
    if (p.avatarPhoto) { avImg.src = p.avatarPhoto; avImg.style.display = 'block'; avFallback.style.display = 'none'; }
    else { avImg.style.display = 'none'; avImg.src = ''; avFallback.style.display = 'block'; }
  }
  function openBannerPicker() { const i = $('bhBannerInput'); i.value = ''; i.click(); }
  function handleBannerFile() {
    const file = $('bhBannerInput').files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async function () {
      const compressed = await DB.compressImageDataUrl(String(reader.result), 1400, 0.8);
      DB.saveProfile({ bannerPhoto: compressed });
      renderProfile();
    };
    reader.readAsDataURL(file);
  }
  function handleAvatarFile() {
    const file = $('bhAvatarInput').files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async function () {
      const compressed = await DB.compressImageDataUrl(String(reader.result), 300, 0.82);
      DB.saveProfile({ avatarPhoto: compressed });
      renderProfile();
    };
    reader.readAsDataURL(file);
  }

  // ============================================================
  // SUBPAGES (tabs) — sidebar nav, rename-in-place like Dream Board's tabs
  // ============================================================
  function renderSubpages() {
    const tabs = DB.tabsSorted();
    const wrap = $('bhSubpages');
    wrap.innerHTML = '';
    tabs.forEach(function (t) {
      const row = document.createElement('div');
      row.className = 'bh-subpage' + (t.id === activeTabId ? ' active' : '');
      row.dataset.tabId = t.id;

      const icon = document.createElement('span'); icon.className = 'bh-subpage-icon'; icon.contentEditable = 'true'; icon.textContent = t.icon;
      icon.addEventListener('click', function (e) { e.stopPropagation(); });
      wireInlineEdit(icon, function (v) { DB.Tabs.update(t.id, { icon: v }); renderSubpages(); }, { allowEmpty: false });
      row.appendChild(icon);

      if (renamingTabId === t.id) {
        const input = document.createElement('input');
        input.type = 'text'; input.className = 'bh-subpage-rename-input'; input.value = t.title;
        input.addEventListener('click', function (e) { e.stopPropagation(); });
        input.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') { e.preventDefault(); commitTabRename(t.id, input.value); }
          else if (e.key === 'Escape') { renamingTabId = null; renderSubpages(); }
        });
        input.addEventListener('blur', function () { commitTabRename(t.id, input.value); });
        row.appendChild(input);
        wrap.appendChild(row);
        setTimeout(function () { input.focus(); input.select(); }, 0);
        return;
      }

      const title = document.createElement('span'); title.className = 'bh-subpage-title'; title.textContent = t.title;
      row.appendChild(title);

      const edit = document.createElement('span');
      edit.className = 'bh-subpage-edit'; edit.textContent = '✎'; edit.title = 'Rename';
      edit.setAttribute('role', 'button'); edit.tabIndex = 0;

  function mutateWidget(widget, dataPatch) {
    DB.Widgets.update(widget.id, { data: Object.assign({}, widget.data, dataPatch) });

  function hashToIndex(str, mod) {
    let h = 0;
    for (let i = 0; i < str.length; i++) { h = (h * 31 + str.charCodeAt(i)) | 0; }
    return Math.abs(h) % mod;
  }

  function buildItemRow(widget, item, opts, key) {

      cb.addEventListener('change', function () {
        const items = (widget.data[key] || []).map(function (x) { return x.id === item.id ? Object.assign({}, x, { done: cb.checked }) : x; });
        mutateWidget(widget, { [key]: items });
        renderBoard();
      });
      row.appendChild(cb);
    }

    const text = document.createElement('span');
    text.className = opts.cardStyle ? 'bw-affirm-text' : 'bw-item-text';

        const items = (widget.data[key] || []).filter(function (x) { return x.id !== item.id; });
        mutateWidget(widget, { [key]: items });
        renderBoard();
        return;
      }
      const items = (widget.data[key] || []).map(function (x) { return x.id === item.id ? Object.assign({}, x, { text: newVal }) : x; });
      mutateWidget(widget, { [key]: items });

  function revokeSessionBlob(slotId) {
    if (sessionVideoBlobs[slotId]) { try { URL.revokeObjectURL(sessionVideoBlobs[slotId]); } catch (e) {} delete sessionVideoBlobs[slotId]; }
  }
  function buildPhotoSlotEl(widget, slot) {
    const el = document.createElement('div');
    el.className = 'bw-photo-slot';
    el.dataset.slotId = slot.id;
    const liveUrl = (slot.type === 'video' && slot.sessionOnly) ? sessionVideoBlobs[slot.id] : slot.url;
    if (liveUrl) {
      let media;
      if (slot.type === 'video') { media = document.createElement('video'); media.src = liveUrl; media.controls = true; media.playsInline = true; }
      else { media = document.createElement('img'); media.src = liveUrl; media.alt = slot.name || ''; }
      el.appendChild(media);
    } else if (slot.type === 'video' && slot.sessionOnly) {
      const ph = document.createElement('div'); ph.className = 'bw-photo-slot-broken';
      const icon = document.createElement('div'); icon.className = 'bw-photo-broken-icon'; icon.textContent = '🎬';
      const label = document.createElement('div'); label.textContent = 'Video needs to be re-attached';
      const reBtn = document.createElement('button'); reBtn.type = 'button'; reBtn.className = 'bw-photo-reattach-btn'; reBtn.textContent = 'Re-attach';
      reBtn.addEventListener('click', function () { reattachVideoSlot(widget.id, slot.id); });
      ph.appendChild(icon); ph.appendChild(label); ph.appendChild(reBtn);
      el.appendChild(ph);
    } else {
      const ph = document.createElement('div'); ph.className = 'bw-photo-slot-empty'; ph.textContent = 'No media';
      el.appendChild(ph);
    }
    const del = document.createElement('button');
    del.type = 'button'; del.className = 'bw-slot-del'; del.setAttribute('aria-label', 'Remove'); del.textContent = '×';
    del.addEventListener('click', function (e) { e.stopPropagation(); deletePhotoSlot(widget.id, slot.id); });
    el.appendChild(del);
    return el;
  }
  function reattachVideoSlot(widgetId, slotId) {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = 'video/*'; input.style.display = 'none';
    document.body.appendChild(input);
    input.addEventListener('change', function () {
      const file = input.files[0];
      document.body.removeChild(input);
      if (!file) return;
      if (file.size > 8 * 1024 * 1024) { alert('Video files are capped at 8MB for this session-only feature.'); return; }
      sessionVideoBlobs[slotId] = URL.createObjectURL(file);
      renderBoard();
    });
    input.click();
  }
  function deletePhotoSlot(widgetId, slotId) {
    const w = DB.Widgets.get(widgetId);
    if (!w) return;
    revokeSessionBlob(slotId);
    const slots = (w.data.slots || []).filter(function (s) { return s.id !== slotId; });
    DB.Widgets.update(widgetId, { data: Object.assign({}, w.data, { slots: slots }) });
    renderBoard();
  }

  function shiftCalMonth(widgetId, year, month, delta) {
    let m = month + delta, y = year;
    if (m < 0) { m = 11; y -= 1; } else if (m > 11) { m = 0; y += 1; }
    const w = DB.Widgets.get(widgetId);
    if (!w) return;
    DB.Widgets.update(widgetId, { data: Object.assign({}, w.data, { viewYear: y, viewMonth: m }) });
    renderBoard();
  }
  function buildCalendarBody(widget) {
    const wrap = document.createElement('div');
    const now = new Date();
    const year = widget.data.viewYear != null ? widget.data.viewYear : now.getFullYear();
    const month = widget.data.viewMonth != null ? widget.data.viewMonth : now.getMonth();
    const head = document.createElement('div'); head.className = 'bw-cal-head';
    const prevBtn = document.createElement('button'); prevBtn.type = 'button'; prevBtn.className = 'bw-cal-nav'; prevBtn.textContent = '‹'; prevBtn.setAttribute('aria-label', 'Previous month');
    const label = document.createElement('span'); label.className = 'bw-cal-label'; label.textContent = MONTH_NAMES[month] + ' ' + year;
    const nextBtn = document.createElement('button'); nextBtn.type = 'button'; nextBtn.className = 'bw-cal-nav'; nextBtn.textContent = '›'; nextBtn.setAttribute('aria-label', 'Next month');
    prevBtn.addEventListener('click', function () { shiftCalMonth(widget.id, year, month, -1); });
    nextBtn.addEventListener('click', function () { shiftCalMonth(widget.id, year, month, 1); });
    head.appendChild(prevBtn); head.appendChild(label); head.appendChild(nextBtn);
    wrap.appendChild(head);
    const grid = document.createElement('div'); grid.className = 'bw-cal-grid';
    ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'].forEach(function (d) {
      const dow = document.createElement('div'); dow.className = 'bw-cal-dow'; dow.textContent = d; grid.appendChild(dow);
    });
    const firstDow = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    for (let i = 0; i < firstDow; i++) { const blank = document.createElement('div'); blank.className = 'bw-cal-day bw-cal-day-empty'; grid.appendChild(blank); }
    const todayStr = DB.todayISO();
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
      const cell = document.createElement('button');
      cell.type = 'button'; cell.className = 'bw-cal-day' + (dateStr === todayStr ? ' bw-cal-day-today' : '');
      const num = document.createElement('span'); num.textContent = String(d);
      cell.appendChild(num);
      if (widget.data.notes && widget.data.notes[dateStr]) { const dot = document.createElement('span'); dot.className = 'bw-cal-note-dot'; cell.appendChild(dot); }
      cell.addEventListener('click', function () { openDayNoteModal(widget.id, dateStr); });
      grid.appendChild(cell);
    }
    wrap.appendChild(grid);
    return wrap;
  }

  function buildSummaryBody(widget) {
    const wrap = document.createElement('div'); wrap.className = 'bw-summary-body';
    const cards = DB.contentCardsForTab(widget.tabId);
    if (!cards.length) {
      const empty = document.createElement('div'); empty.className = 'bw-summary-empty';
      empty.textContent = 'No content cards on this page yet.';
      wrap.appendChild(empty);
      return wrap;
    }
    const total = cards.length;
    const byStatus = {};
    DB.CONTENT_STATUSES.forEach(function (s) { byStatus[s.key] = 0; });
    let overdue = 0, openChecklist = 0;
    cards.forEach(function (c) {
      byStatus[c.data.status] = (byStatus[c.data.status] || 0) + 1;
      const due = DB.computeDueLabel(c.data.status, c.data.scheduledDate);
      if (c.data.status !== 'published' && (due.indexOf('ago') !== -1 || due === 'Due yesterday')) overdue++;
      (c.data.checklist || []).forEach(function (item) { if (!item.done) openChecklist++; });
    });

    const topRow = document.createElement('div'); topRow.className = 'bw-summary-stat-row';
    const totalStat = document.createElement('span'); totalStat.innerHTML = ''; totalStat.appendChild(document.createTextNode('Total content'));
    const totalVal = document.createElement('strong'); totalVal.textContent = String(total);
    const totalWrap = document.createElement('div'); totalWrap.style.display = 'flex'; totalWrap.style.gap = '6px'; totalWrap.style.alignItems = 'baseline';
    totalWrap.appendChild(totalVal);
    topRow.appendChild(totalStat); topRow.appendChild(totalWrap);
    wrap.appendChild(topRow);

    DB.CONTENT_STATUSES.forEach(function (s) {
      const count = byStatus[s.key] || 0;
      const pct = total ? Math.round((count / total) * 100) : 0;
      const barRow = document.createElement('div'); barRow.className = 'bw-summary-bar-row';
      const barLabel = document.createElement('div'); barLabel.className = 'bw-summary-bar-label';
      const lbl = document.createElement('span'); lbl.textContent = s.label;
      const val = document.createElement('span'); val.textContent = count + ' · ' + pct + '%';
      barLabel.appendChild(lbl); barLabel.appendChild(val);
      const bar = document.createElement('div'); bar.className = 'bw-progress-bar';
      const fill = document.createElement('div'); fill.className = 'bw-progress-fill'; fill.style.width = pct + '%';
      bar.appendChild(fill);
      barRow.appendChild(barLabel); barRow.appendChild(bar);
      wrap.appendChild(barRow);
    });

    const overdueRow = document.createElement('div'); overdueRow.className = 'bw-summary-stat-row';
    const overdueLabel = document.createElement('span'); overdueLabel.textContent = 'Overdue';
    const overdueVal = document.createElement('strong'); overdueVal.textContent = String(overdue);
    overdueVal.style.color = overdue ? 'var(--danger)' : 'var(--bh-ink)';
    overdueRow.appendChild(overdueLabel); overdueRow.appendChild(overdueVal);
    wrap.appendChild(overdueRow);

    const checklistRow = document.createElement('div'); checklistRow.className = 'bw-summary-stat-row';
    const checklistLabel = document.createElement('span'); checklistLabel.textContent = 'Open checklist items';
    const checklistVal = document.createElement('strong'); checklistVal.textContent = String(openChecklist);
    checklistRow.appendChild(checklistLabel); checklistRow.appendChild(checklistVal);
    wrap.appendChild(checklistRow);

    return wrap;
  }

  function buildScheduleBody(widget) {
    const wrap = document.createElement('div'); wrap.className = 'bw-schedule-body';
    const rows = widget.data.rows || [];
    const groups = {};
    const order = [];
    rows.forEach(function (r) {
      const key = r.platform || 'Other';
      if (!groups[key]) { groups[key] = []; order.push(key); }
      groups[key].push(r);
    });
    if (!order.length) {
      const empty = document.createElement('div'); empty.className = 'bw-summary-empty'; empty.textContent = 'No scheduled slots yet.';
      wrap.appendChild(empty);
    }
    order.forEach(function (platform) {
      const label = document.createElement('div'); label.className = 'bw-schedule-group-label'; label.textContent = platform + ' schedule';
      wrap.appendChild(label);
      groups[platform].forEach(function (r) {
        const row = document.createElement('div'); row.className = 'bw-schedule-row';
        const text = document.createElement('span'); text.textContent = r.day + ' · ' + formatTime(r.time);
        const del = document.createElement('button'); del.type = 'button'; del.className = 'bw-schedule-row-del'; del.textContent = '×'; del.setAttribute('aria-label', 'Remove');
        del.addEventListener('click', function () {
          mutateWidget(widget, { rows: (widget.data.rows || []).filter(function (x) { return x.id !== r.id; }) });
          renderBoard();
        });
        row.appendChild(text); row.appendChild(del);
        wrap.appendChild(row);
      });
    });

    const addRow = document.createElement('div'); addRow.className = 'bw-schedule-add-row';
    const platInput = document.createElement('input'); platInput.type = 'text'; platInput.placeholder = 'Platform';
    const daySelect = document.createElement('select');
    DB.SCHEDULE_DAYS.forEach(function (d) { const opt = document.createElement('option'); opt.value = d; opt.textContent = d; daySelect.appendChild(opt); });
    const timeInput = document.createElement('input'); timeInput.type = 'time'; timeInput.value = '09:00';
    const addBtn = document.createElement('button'); addBtn.type = 'button'; addBtn.className = 'bw-additem-btn'; addBtn.textContent = '+'; addBtn.setAttribute('aria-label', 'Add schedule row');
    addBtn.addEventListener('click', function () {
      const platform = platInput.value.trim();
      if (!platform) return;
      const newRows = (widget.data.rows || []).concat([{ id: DB.uid('sr'), platform: platform, day: daySelect.value, time: timeInput.value }]);
      mutateWidget(widget, { rows: newRows });
      platInput.value = '';
      renderBoard();
    });
    addRow.appendChild(platInput); addRow.appendChild(daySelect); addRow.appendChild(timeInput); addRow.appendChild(addBtn);
    wrap.appendChild(addRow);
    return wrap;
  }
  function formatTime(t) {
    if (!t) return '';
    const parts = t.split(':'); let h = Number(parts[0]) || 0; const m = parts[1] || '00';
    const ampm = h >= 12 ? 'PM' : 'AM'; h = h % 12; if (h === 0) h = 12;
    return h + ':' + m + ' ' + ampm;
  }

  function effectiveTint(widget) {
    if (widget.tint) return widget.tint;
    if (widget.accent === 'blush') return '#e07a5f';
    return null;
  }
  function setWidgetTint(widgetId, tint) { DB.Widgets.update(widgetId, { tint: tint }); renderBoard(); }
  function previewWidgetTint(widgetId, hex) {

  function buildTintPopover(widget) {

      case 'list': body.appendChild(buildItemListBody(widget, { checkable: false, cardStyle: false })); break;

      case 'platform': body.appendChild(buildPlatformBody(widget)); break;
      case 'contentcard': body.appendChild(buildContentCardBody(widget)); break;

    card.appendChild(body);
    return card;
  }

  function destroySortables() {
    sortableInstances.forEach(function (s) { try { s.destroy(); } catch (e) {} });
    sortableInstances = [];
  }
  function persistColumnOrder() {
    const cols = [];
    for (let i = 0; i < 3; i++) {
      const colEl = document.querySelector('#bhBoard .bh-col[data-col="' + i + '"]');
      cols.push(Array.from(colEl.children).map(function (el) { return el.dataset.widgetId; }));
    }
    DB.reorderTab(activeTabId, cols);
  }
  function wireSortable() {
    if (typeof Sortable === 'undefined') return;
    const reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const groupName = 'bhcol-' + activeTabId;
    document.querySelectorAll('#bhBoard .bh-col').forEach(function (col) {
      sortableInstances.push(new Sortable(col, {
        group: groupName,
        handle: '.bw-drag-handle',
        animation: reduced ? 0 : 150,
        ghostClass: 'bw-card-ghost',
        onEnd: function () { persistColumnOrder(); renderBoard(); }
      }));
    });
  }
  function computeDisplayIndexes(cols) {
    const indexMap = {};
    let counter = 1;
    const maxLen = Math.max(cols[0].length, cols[1].length, cols[2].length);
    for (let row = 0; row < maxLen; row++) {
      for (let c = 0; c < 3; c++) { if (cols[c][row]) { indexMap[cols[c][row].id] = counter++; } }
    }
    return indexMap;
  }
  function renderBoard() {
    destroySortables();
    const board = $('bhBoard');
    board.innerHTML = '';
    if (!activeTabId) return;
    const cols = DB.columnsForTab(activeTabId);
    const indexMap = computeDisplayIndexes(cols);
    for (let i = 0; i < 3; i++) {
      const colEl = document.createElement('div');
      colEl.className = 'bh-col'; colEl.dataset.col = String(i);
      cols[i].forEach(function (w) { colEl.appendChild(buildWidgetCard(w, indexMap[w.id])); });
      board.appendChild(colEl);
    }
    wireSortable();
  }

  function addWidgetToActiveTab(type, title) {
    if (!activeTabId) return;
    const cols = DB.columnsForTab(activeTabId);
    let colIdx = 0, minLen = cols[0].length;
    for (let i = 1; i < 3; i++) { if (cols[i].length < minLen) { minLen = cols[i].length; colIdx = i; } }
    DB.Widgets.add({ tabId: activeTabId, column: colIdx, order: cols[colIdx].length, type: type, title: title, data: DB.defaultWidgetData(type) });
    closeModal($('bhAddWidgetModalBg'));
    renderBoard();
  }

    document.querySelectorAll('.bh-widget-menu-item').forEach(function (btn) {
      btn.addEventListener('click', function () {

        addWidgetToActiveTab(type, WIDGET_TYPE_LABELS[type] || 'New Widget');
      });
    });

  function resetBoard() {
    if (!confirm('Reset the Business Hub to its default subpages and widgets? This deletes everything currently on the board.')) return;
    Object.keys(sessionVideoBlobs).forEach(function (id) { try { URL.revokeObjectURL(sessionVideoBlobs[id]); } catch (e) {} });
    sessionVideoBlobs = {};
    DB.seedDefaultBoard();
    const tabs = DB.tabsSorted();
    activeTabId = (tabs[0] || {}).id || null;
    storeSet(ACTIVE_TAB_KEY, activeTabId);
    renderSubpages();
    renderBoard();
  }

  // ============================================================
  // PHOTO MODAL — shared by every cover-photo-having widget type
  // (Photos multi-slot grid, Feature/Platform/Content-card single field).
  // `opts.field` names which `widget.data` key a single-target add writes
  // to — a small generalization of Dream Board's single/slots split so
  // the same modal serves platform/content-card covers too.
  // ============================================================
  function openPhotoModal(widgetId, opts) {
    opts = opts || {};
    addSlotTargetWidgetId = widgetId;
    addSlotSingleTarget = !!opts.single;
    addSlotField = opts.field || 'photo';
    $('bhPhotoModalTitle').textContent = addSlotSingleTarget ? 'Add photo' : 'Add photo or video';
    $('bhSlotTypeField').style.display = addSlotSingleTarget ? 'none' : '';
    $('bhSlotTypeSelect').value = 'image';
    $('bhSlotFileInput').accept = (addSlotSingleTarget || $('bhSlotTypeSelect').value !== 'video') ? 'image/*' : 'video/*';
    $('bhSlotFileInput').value = '';
    $('bhSlotUrlInput').value = '';
    openModal($('bhPhotoModalBg'));
  }
  function addSlotToWidget(widgetId, slot) {
    const w = DB.Widgets.get(widgetId);
    if (!w) return;
    const slots = (w.data.slots || []).concat([slot]);
    DB.Widgets.update(widgetId, { data: Object.assign({}, w.data, { slots: slots }) });
    renderBoard();
  }
  function setSingleFieldPhoto(widgetId, field, url) {
    const w = DB.Widgets.get(widgetId);
    if (!w) return;
    DB.Widgets.update(widgetId, { data: Object.assign({}, w.data, { [field]: url }) });
    renderBoard();
  }
  function handleAddSlotSubmit() {
    const widgetId = addSlotTargetWidgetId;
    const single = addSlotSingleTarget;
    const field = addSlotField;
    const file = $('bhSlotFileInput').files[0];
    const urlVal = $('bhSlotUrlInput').value.trim();
    const selectedType = single ? 'image' : $('bhSlotTypeSelect').value;
    if (file) {
      const isVideo = !single && (file.type.indexOf('video') === 0 || (file.type.indexOf('image') !== 0 && selectedType === 'video'));
      if (isVideo) {
        if (file.size > 8 * 1024 * 1024) { alert('Video files are capped at 8MB for this session-only feature.'); return; }
        const slotId = DB.uid('slot');
        sessionVideoBlobs[slotId] = URL.createObjectURL(file);
        addSlotToWidget(widgetId, { id: slotId, type: 'video', url: '', sessionOnly: true, name: file.name });
        closeModal($('bhPhotoModalBg'));
      } else {
        const reader = new FileReader();
        reader.onload = async function () {
          const compressed = await DB.compressImageDataUrl(String(reader.result), single ? 900 : 640, 0.8);
          if (single) setSingleFieldPhoto(widgetId, field, compressed);
          else addSlotToWidget(widgetId, { id: DB.uid('slot'), type: 'image', url: compressed, sessionOnly: false, name: file.name });
          closeModal($('bhPhotoModalBg'));
        };
        reader.readAsDataURL(file);
      }
    } else if (urlVal) {
      if (!DB.isValidMediaUrl(urlVal)) { alert('Please enter a valid http(s) URL.'); return; }
      if (single) setSingleFieldPhoto(widgetId, field, urlVal);
      else addSlotToWidget(widgetId, { id: DB.uid('slot'), type: selectedType, url: urlVal, sessionOnly: false, name: '' });
      closeModal($('bhPhotoModalBg'));
    } else {
      alert('Choose a file or paste a URL first.');
    }
  }

    DB.Widgets.update(dayNoteTarget.widgetId, { data: Object.assign({}, w.data, { notes: notes }) });
    closeModal($('bhDayNoteModalBg'));

  // ============================================================
  // BOOT
  // ============================================================
  function init() {
    DB = window.BusinessData;
    if (!DB) return;

    const tabs = DB.tabsSorted();
    const savedTab = storeGet(ACTIVE_TAB_KEY);
    activeTabId = (tabs.find(function (t) { return t.id === savedTab; }) || tabs[0] || {}).id || null;
    renderProfile();
    renderSubpages();
    renderBoard();

    setSyncStatus(navigator.onLine ? null : 'offline', navigator.onLine ? 'Changes save automatically' : 'Offline — will sync when reconnected');
    window.addEventListener('business:save', handleSaveEvent);
    window.addEventListener('online', function () { setSyncStatus('saved', 'Back online — syncing…'); });
    window.addEventListener('offline', function () { setSyncStatus('offline', 'Offline — will sync when reconnected'); });

    wireInlineEdit($('bhName'), function (v) { DB.saveProfile({ name: v }); }, { allowEmpty: false });
    wireInlineEdit($('bhTagline'), function (v) { DB.saveProfile({ tagline: v }); }, { multiline: true, allowEmpty: true });
    $('bhAvatar').addEventListener('click', function () { $('bhAvatarInput').value = ''; $('bhAvatarInput').click(); });
    $('bhAvatarInput').addEventListener('change', handleAvatarFile);
    $('bhBannerAddBtn').addEventListener('click', openBannerPicker);
    $('bhBannerChangeBtn').addEventListener('click', openBannerPicker);
    $('bhBannerRemoveBtn').addEventListener('click', function () { DB.saveProfile({ bannerPhoto: '' }); renderProfile(); });
    $('bhBannerInput').addEventListener('change', handleBannerFile);

    $('bhAddWidgetBtn').addEventListener('click', function () { openModal($('bhAddWidgetModalBg')); });
    $('bhAddWidgetCloseBtn').addEventListener('click', function () { closeModal($('bhAddWidgetModalBg')); });
    $('bhAddWidgetModalBg').addEventListener('click', function (e) { if (e.target === this) closeModal(this); });
    wireAddWidgetMenu();

    $('bhResetBtn').addEventListener('click', resetBoard);

    $('bhPhotoModalCloseBtn').addEventListener('click', function () { closeModal($('bhPhotoModalBg')); });
    $('bhPhotoModalBg').addEventListener('click', function (e) { if (e.target === this) closeModal(this); });
    $('bhSlotAddBtn').addEventListener('click', handleAddSlotSubmit);
    $('bhSlotTypeSelect').addEventListener('change', function () {
      $('bhSlotFileInput').accept = $('bhSlotTypeSelect').value === 'video' ? 'video/*' : 'image/*';
    });

    $('bhDayNoteCloseBtn').addEventListener('click', function () { closeModal($('bhDayNoteModalBg')); });
    $('bhDayNoteModalBg').addEventListener('click', function (e) { if (e.target === this) closeModal(this); });
    $('bhDayNoteClearBtn').addEventListener('click', function () { $('bhDayNoteInput').value = ''; });
    $('bhDayNoteSaveBtn').addEventListener('click', saveDayNote);

    // Empty-storage seed-race safety window — same reasoning/timing as
    // dreamboard.html's maybeSeedAfterSyncAttempt() (see business-data.js's
    // own comment): don't seed a fresh default board before the cloud has
    // had a real chance to answer, or a device with empty local storage
    // can clobber another device's real data.
    let remoteAppliedOnce = false;
    function maybeSeedAfterSyncAttempt() {
      if (remoteAppliedOnce) return;
      if (DB.Tabs.list().length > 0 || DB.Widgets.list().length > 0) return;
      DB.seedIfEmpty();
      const freshTabs = DB.tabsSorted();
      activeTabId = (freshTabs[0] || {}).id || null;
      storeSet(ACTIVE_TAB_KEY, activeTabId);
      renderSubpages();
      renderBoard();
    }

    if (typeof initCloudSync === 'function') {
      initCloudSync({
        appKey: 'business',
        syncedPrefixes: ['business:'],
        onApplied: function () {
          remoteAppliedOnce = true;
          renderProfile();
          const tabs2 = DB.tabsSorted();
          if (!tabs2.find(function (t) { return t.id === activeTabId; })) activeTabId = (tabs2[0] || {}).id || null;
          renderSubpages();
          renderBoard();
        }
      });
      if (tabs.length === 0) { setTimeout(maybeSeedAfterSyncAttempt, 5000); }
    } else if (tabs.length === 0) {
      maybeSeedAfterSyncAttempt();
    }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
