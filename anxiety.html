<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0B">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Anxiety</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<script src="anxiety-data.js" defer></script>
<style>
/* =============================================================
   Anxiety — no reference photo/aesthetic instruction was given for this
   page, so it stays on this app's actual standard palette (see CLAUDE.md
   §3): near-black background, off-white text, the existing long-form
   --success/--warning/--danger/--info semantic accents. --accent is
   repointed to --info's own blue value rather than a new hue — the same
   call household.html/selfcare.html's original builds made for the same
   reason (DO NOT MODIFY §2: reuse an existing token's value, don't
   invent one).
   ============================================================= */
:root {
  --bg: #0A0A0B;
  --bg-deep: #050506;
  --bg-card: rgba(255, 255, 255, 0.04);
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --border: rgba(255, 255, 255, 0.08);
  --success: #6ee7b7;
  --warning: #fbbf24;
  --danger: #ff8a8a;
  --info: #7dd3fc;
  --accent: #7dd3fc;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --font-serif: Georgia, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
  color-scheme: dark;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg-deep); color: var(--text-primary); font-family: var(--font); -webkit-font-smoothing: antialiased; min-height: 100%; }
html, body { scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { width: 0 !important; height: 0 !important; display: none !important; }

body::before {
  content: '';
  position: fixed; inset: -10%; z-index: -2;
  background:
    radial-gradient(55% 42% at 82% 10%, rgba(125, 211, 252, 0.10) 0%, transparent 55%),
    radial-gradient(50% 40% at 14% 92%, rgba(110, 231, 183, 0.08) 0%, transparent 55%),
    linear-gradient(180deg, #0A0A0B 0%, #050506 100%);
  filter: blur(40px) saturate(1.05);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.7;
  pointer-events: none;
}

.shell { max-width: 880px; margin: 0 auto; padding: 24px 16px 40px; }

.anx-back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px 8px 10px; margin: 0 0 14px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px; color: var(--text-secondary);
  font-family: var(--font); font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
  text-decoration: none; -webkit-tap-highlight-color: transparent;
  transition: background 0.15s ease, color 0.15s ease;
}
.anx-back-btn:hover { background: rgba(255,255,255,0.07); color: var(--text-primary); }
.anx-back-btn svg { display: block; }

/* ===== Cover banner — same shared structure as index.html/gym.html/
   braindump.html/finance.html/household.html: sunburst emblem, italic
   serif title, tracked-caps subtext, outlined pill CTA, radiating-line
   divider. Recolored with this file's own --accent (info-blue), not a
   new hue. ===== */
.anx-cover {
  position: relative; width: 100%; overflow: hidden;
  padding: 48px 24px 36px; text-align: center; border-radius: 20px;
  margin-bottom: 22px; border: 1px solid var(--border);
  background:
    radial-gradient(120% 85% at 50% -15%, rgba(125, 211, 252, 0.16) 0%, rgba(10, 10, 11, 0.92) 55%, transparent 100%),
    radial-gradient(38% 30% at 88% 18%, rgba(110, 231, 183, 0.10) 0%, transparent 65%),
    radial-gradient(30% 26% at 10% 82%, rgba(125, 211, 252, 0.10) 0%, transparent 65%);
}
.anx-cover-emblem { position: relative; width: 60px; height: 60px; margin: 0 auto 18px; }
.anx-cover-emblem-rays {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 140px; height: 140px;
  background: repeating-conic-gradient(rgba(125,211,252,0.45) 0deg 0.7deg, transparent 0.7deg 15deg);
  border-radius: 50%; opacity: 0.85;
}
.anx-cover-emblem-circle {
  position: absolute; inset: 0; border: 1px solid var(--accent); border-radius: 50%;
  background: #050506; display: flex; align-items: center; justify-content: center;
  font-size: 24px;
}
.anx-cover-title {
  position: relative; z-index: 1; font-family: var(--font-serif); font-style: italic; font-weight: 400;
  font-size: clamp(30px, 7vw, 46px); color: var(--text-primary); letter-spacing: -0.01em;
  text-shadow: 0 2px 28px rgba(0,0,0,0.6), 0 0 40px rgba(125,211,252,0.12);
}
.anx-cover-subtext {
  position: relative; z-index: 1; margin-top: 14px; font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-secondary); line-height: 2.1;
}
.anx-cover-cta {
  position: relative; z-index: 1; display: inline-flex; align-items: center;
  margin-top: 18px; padding: 11px 26px; border: 1px solid var(--border); border-radius: 999px;
  background: transparent; color: var(--text-primary); font-family: inherit; font-size: 11px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, border-color 0.15s;
}
.anx-cover-cta:hover { background: rgba(125,211,252,0.10); border-color: var(--accent); }
@media (max-width: 480px) { .anx-cover { padding: 38px 16px 28px; } }

.anx-section-divider {
  width: 100%; height: 28px; margin: 4px 0 18px;
  background: repeating-conic-gradient(rgba(125,211,252,0.16) 0deg 0.5deg, transparent 0.5deg 12deg);
  -webkit-mask: radial-gradient(circle at 50% 0%, #000 0%, #000 2%, transparent 2.4%);
  mask: radial-gradient(circle at 50% 0%, #000 0%, #000 2%, transparent 2.4%);
  opacity: 0.7;
}

/* ===== Section nav ===== */
.anx-subnav { margin-bottom: 22px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.anx-tabs { display: flex; gap: 22px; flex-wrap: wrap; align-items: center; }
.anx-tab {
  background: none; border: none; padding: 6px 0; margin-bottom: 8px;
  font-family: inherit; font-size: 14px; font-weight: 600;
  color: var(--text-tertiary); cursor: pointer; position: relative;
  -webkit-tap-highlight-color: transparent;
}
.anx-tab:hover { color: var(--text-secondary); }
.anx-tab.active { color: var(--accent); }
.anx-tab.active::after { content: ''; position: absolute; left: 0; right: 0; bottom: -9px; height: 2px; background: var(--accent); }
.section[hidden] { display: none !important; }

.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; box-shadow: 0 1px 0 0 rgba(255,255,255,0.06) inset, 0 12px 40px rgba(0,0,0,0.45); }
.anx-empty { text-align: center; padding: 48px 20px; color: var(--text-tertiary); background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); }
.anx-empty-icon { font-size: 28px; margin-bottom: 10px; opacity: 0.6; }
.anx-empty-title { font-size: 15px; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; }
.anx-empty-text { font-size: 12.5px; line-height: 1.6; max-width: 360px; margin: 0 auto; }

.btn-primary {
  padding: 11px 20px; border: 1px solid rgba(250,250,250,0.85);
  background: linear-gradient(180deg, #FAFAFA 0%, #cfe9f7 100%); color: #0a1a22; border-radius: 12px;
  font-family: inherit; font-size: 13.5px; font-weight: 700; cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.45), 0 4px 14px rgba(10,26,34,0.45);
}
.btn-primary:hover { transform: translateY(-1px); }
.btn-secondary {
  padding: 10px 16px; border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.04);
  color: var(--text-primary); border-radius: 12px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
}
.btn-primary:disabled, .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.sc-btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-tertiary); padding: 10px 16px; border-radius: 12px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; }
.sc-btn-ghost:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }

.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(6px); z-index: 300; align-items: center; justify-content: center; padding: 24px; }
.modal-bg.show { display: flex; }
.modal { width: 100%; max-width: 460px; background: #111113; border: 1px solid rgba(255,255,255,0.14); border-radius: 16px; padding: 22px; max-height: 88vh; overflow-y: auto; }
.modal h3 { margin: 0 0 16px; font-size: 17px; font-weight: 700; }
.modal-actions { display: flex; gap: 8px; margin-top: 18px; }
.modal-actions button { flex: 1; }
.delete-link { display: block; text-align: center; margin-top: 12px; font-size: 12px; color: var(--danger); cursor: pointer; text-decoration: underline; padding: 6px; }
.field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.field > label { font-size: 10.5px; color: var(--text-tertiary); font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; }
.field input[type="text"], .field input[type="number"], .field select, .field textarea {
  padding: 12px; border: 1px solid rgba(255,255,255,0.10); background: rgba(0,0,0,0.28); color: var(--text-primary);
  border-radius: 10px; font-family: inherit; font-size: 14px; width: 100%;
}
.field textarea { min-height: 100px; resize: vertical; line-height: 1.6; }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: rgba(255,255,255,0.40); box-shadow: 0 0 0 3px rgba(255,255,255,0.06); }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.four-col { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
@media (max-width: 480px) { .two-col { grid-template-columns: 1fr; } .four-col { grid-template-columns: repeat(2, 1fr); } }
.field-hint { font-size: 11px; color: var(--text-tertiary); margin-top: -6px; }
.fav-field { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); font-weight: 600; margin: -4px 0 14px; cursor: pointer; }
.fav-field input { accent-color: var(--warning); cursor: pointer; }

.chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.chip {
  padding: 7px 14px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04);
  color: var(--text-secondary); border-radius: 999px; font-family: inherit; font-size: 12.5px; font-weight: 600;
  cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.chip:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
.chip.active { background: linear-gradient(180deg, #FAFAFA 0%, #cfe9f7 100%); color: #0a1a22; border-color: transparent; font-weight: 800; }
.chip.fav-chip.active { background: rgba(251,191,36,0.16); color: var(--warning); border-color: rgba(251,191,36,0.4); }
.tag {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; padding: 3px 9px; border-radius: 999px; font-weight: 700; letter-spacing: 0.04em;
  background: rgba(255,255,255,0.06); color: var(--text-secondary);
  font-family: var(--font-mono); text-transform: uppercase;
}

.anx-toolbar { display: flex; gap: 10px; margin-bottom: 14px; }
.anx-search {
  flex: 1; padding: 11px 14px; border: 1px solid rgba(255,255,255,0.10); background: rgba(0,0,0,0.28);
  color: var(--text-primary); border-radius: 10px; font-family: inherit; font-size: 13.5px;
}
.anx-search:focus { outline: none; border-color: rgba(255,255,255,0.40); }
.anx-search::placeholder { color: var(--text-tertiary); }
@media (max-width: 480px) { .anx-toolbar { flex-direction: column; } .anx-toolbar .btn-primary { width: 100%; } }

/* ===== Breathwork grid ===== */
.brw-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
.brw-card { position: relative; background: rgba(255,255,255,0.025); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px 16px 14px; }
.brw-fav-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; cursor: pointer; font-size: 18px; line-height: 1; color: var(--text-tertiary); padding: 2px; -webkit-tap-highlight-color: transparent; }
.brw-fav-btn:hover, .brw-fav-btn.active { color: var(--warning); }
.brw-card-title { font-size: 15px; font-weight: 700; color: var(--text-primary); padding-right: 26px; margin-bottom: 8px; line-height: 1.35; }
.brw-card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.brw-pattern { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); margin-bottom: 10px; }
.brw-card-desc { font-size: 12.5px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.brw-card-actions { display: flex; align-items: center; gap: 8px; }
.brw-card-actions .btn-primary, .brw-card-actions .btn-secondary { padding: 8px 10px; font-size: 12.5px; flex: 1; }
.brw-del-btn { background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 14px; padding: 6px; flex-shrink: 0; }
.brw-del-btn:hover { color: var(--danger); }

/* ===== Tips grid ===== */
.tip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
.tip-card { position: relative; background: rgba(255,255,255,0.025); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px 16px 14px; }
.tip-fav-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; cursor: pointer; font-size: 18px; line-height: 1; color: var(--text-tertiary); padding: 2px; -webkit-tap-highlight-color: transparent; }
.tip-fav-btn:hover, .tip-fav-btn.active { color: var(--warning); }
.tip-card-title { font-size: 15px; font-weight: 700; color: var(--text-primary); padding-right: 26px; margin-bottom: 8px; line-height: 1.35; }
.tip-card-meta { margin-bottom: 8px; }
.tip-card-body { font-size: 12.5px; color: var(--text-secondary); line-height: 1.55; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
.tip-card-actions { display: flex; align-items: center; gap: 8px; }
.tip-card-actions .btn-secondary { padding: 8px 10px; font-size: 12.5px; flex: 1; }
.tip-del-btn { background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 14px; padding: 6px; flex-shrink: 0; }
.tip-del-btn:hover { color: var(--danger); }

/* ===== Breathing pacer ===== */
.pacer-modal { max-width: 380px; text-align: center; }
.pacer-technique-name { font-size: 15px; font-weight: 700; color: var(--text-secondary); margin-bottom: 4px; }
.pacer-cycle-label { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); margin-bottom: 22px; }
.pacer-ring-wrap { position: relative; width: 220px; height: 220px; margin: 0 auto 22px; display: flex; align-items: center; justify-content: center; }
.pacer-ring-static { position: absolute; inset: 0; border-radius: 50%; border: 1px dashed rgba(255,255,255,0.12); }
.pacer-circle {
  width: 100%; height: 100%; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, rgba(125,211,252,0.55) 0%, rgba(125,211,252,0.18) 62%, rgba(125,211,252,0.05) 100%);
  border: 1px solid rgba(125,211,252,0.5);
  transform: scale(0.55);
  box-shadow: 0 0 60px rgba(125,211,252,0.25);
}
.pacer-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
.pacer-phase-label { font-size: 19px; font-weight: 800; letter-spacing: 0.04em; color: var(--text-primary); text-transform: uppercase; }
.pacer-countdown { font-size: 34px; font-weight: 800; font-family: var(--font-mono); color: var(--accent); margin-top: 4px; }
.pacer-done { font-size: 14px; color: var(--success); font-weight: 700; margin-bottom: 18px; }
.pacer-actions { display: flex; gap: 8px; justify-content: center; }
.pacer-actions button { flex: 1; }
</style>
</head>
<body>
<div class="shell">

<a href="index.html" class="anx-back-btn" aria-label="Back to dashboard">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
  <span>Back</span>
</a>

<div class="anx-cover">
  <div class="anx-cover-emblem">
    <div class="anx-cover-emblem-rays"></div>
    <div class="anx-cover-emblem-circle">🫁</div>
  </div>
  <div class="anx-cover-title">Anxiety</div>
  <div class="anx-cover-subtext">Breathe<br>Ground<br>Return</div>
  <button class="anx-cover-cta" type="button" id="anxCoverCtaBtn">Start Breathing</button>
</div>
<div class="anx-section-divider" aria-hidden="true"></div>

<div class="anx-subnav">
  <div class="anx-tabs" id="anxTabs">
    <button type="button" class="anx-tab active" data-tab="breathwork">Breathwork</button>
    <button type="button" class="anx-tab" data-tab="tips">Tips &amp; Techniques</button>
  </div>
</div>

<div class="section" data-section="breathwork">
  <div class="anx-toolbar">
    <input type="text" id="brwSearchInput" class="anx-search" placeholder="Search breathwork techniques…">
    <button class="btn-primary" type="button" id="brwAddBtn">+ New Technique</button>
  </div>
  <div class="chip-row" id="brwGoalChips"></div>
  <div id="brwGrid" class="brw-grid"></div>
</div>

<div class="section" data-section="tips" hidden>
  <div class="anx-toolbar">
    <input type="text" id="tipSearchInput" class="anx-search" placeholder="Search tips &amp; techniques…">
    <button class="btn-primary" type="button" id="tipAddBtn">+ New Tip</button>
  </div>
  <div class="chip-row" id="tipCategoryChips"></div>
  <div id="tipGrid" class="tip-grid"></div>
</div>

</div>

<!-- ===== BREATHWORK — add / edit ===== -->
<div class="modal-bg" id="brwModalBg">
  <div class="modal" id="brwModal">
    <h3 id="brwModalTitle">New Breathing Technique</h3>
    <div class="field"><label>Name</label><input type="text" id="brwNameInput" placeholder="e.g. Box Breathing"></div>
    <div class="field"><label>Description</label><textarea id="brwDescInput" placeholder="What it's for, when to use it…" style="min-height:70px"></textarea></div>
    <div class="field"><label>Best for</label><select id="brwGoalSelect"></select></div>
    <div class="field">
      <label>Pattern (seconds per phase)</label>
      <div class="four-col">
        <div><label class="field-hint" style="display:block;margin-bottom:4px">Inhale</label><input type="number" min="1" id="brwInhaleInput" value="4"></div>
        <div><label class="field-hint" style="display:block;margin-bottom:4px">Hold</label><input type="number" min="0" id="brwHoldInInput" value="0"></div>
        <div><label class="field-hint" style="display:block;margin-bottom:4px">Exhale</label><input type="number" min="1" id="brwExhaleInput" value="4"></div>
        <div><label class="field-hint" style="display:block;margin-bottom:4px">Hold</label><input type="number" min="0" id="brwHoldOutInput" value="0"></div>
      </div>
      <div class="field-hint">Leave a hold at 0 to skip that phase entirely.</div>
    </div>
    <div class="field"><label>Suggested cycles</label><input type="number" min="1" id="brwCyclesInput" value="6"></div>
    <label class="fav-field"><input type="checkbox" id="brwFavInput"> Mark as favorite</label>
    <div class="modal-actions">
      <button class="btn-secondary" type="button" id="brwModalCancel">Cancel</button>
      <button class="btn-primary" type="button" id="brwModalSave">Save</button>
    </div>
    <span class="delete-link" id="brwModalDelete" style="display:none">Delete this technique</span>
  </div>
</div>

<!-- ===== BREATHWORK — pacer ===== -->
<div class="modal-bg" id="pacerModalBg">
  <div class="modal pacer-modal" id="pacerModal">
    <div class="pacer-technique-name" id="pacerTechniqueName"></div>
    <div class="pacer-cycle-label" id="pacerCycleLabel"></div>
    <div class="pacer-ring-wrap">
      <div class="pacer-ring-static"></div>
      <div class="pacer-circle" id="pacerCircle"></div>
      <div class="pacer-center">
        <div class="pacer-phase-label" id="pacerPhaseLabel">Ready</div>
        <div class="pacer-countdown" id="pacerCountdown">—</div>
      </div>
    </div>
    <div class="pacer-done" id="pacerDoneMsg" style="display:none">✓ Nice work — cycle complete.</div>
    <div class="pacer-actions">
      <button type="button" class="sc-btn-ghost" id="pacerCloseBtn">Close</button>
      <button type="button" class="btn-primary" id="pacerStartStopBtn">Start</button>
    </div>
  </div>
</div>

<!-- ===== TIP — add / edit ===== -->
<div class="modal-bg" id="tipModalBg">
  <div class="modal" id="tipModal">
    <h3 id="tipModalTitle">New Tip</h3>
    <div class="field"><label>Title</label><input type="text" id="tipTitleInput" placeholder="e.g. 5-4-3-2-1 Grounding"></div>
    <div class="field"><label>Category</label><select id="tipCategorySelect"></select></div>
    <div class="field"><label>Details</label><textarea id="tipBodyInput" placeholder="What it is, how to do it…" style="min-height:120px"></textarea></div>
    <label class="fav-field"><input type="checkbox" id="tipFavInput"> Mark as favorite</label>
    <div class="modal-actions">
      <button class="btn-secondary" type="button" id="tipModalCancel">Cancel</button>
      <button class="btn-primary" type="button" id="tipModalSave">Save</button>
    </div>
    <span class="delete-link" id="tipModalDelete" style="display:none">Delete this tip</span>
  </div>
</div>

<script>
(function () {
  'use strict';

  function $(id) { return document.getElementById(id); }
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; });
  }
  function storeGet(key) { try { const raw = localStorage.getItem(key); return raw == null ? null : JSON.parse(raw); } catch (e) { return null; } }
  function storeSet(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {} }

  const TAB_KEY = 'anxiety:active_tab';
  const VALID_TABS = ['breathwork', 'tips'];
  const tabs = document.querySelectorAll('.anx-tab');
  const sections = document.querySelectorAll('.section[data-section]');

  function setActiveTab(name, opts) {
    if (VALID_TABS.indexOf(name) === -1) name = 'breathwork';
    tabs.forEach(function (b) { b.classList.toggle('active', b.dataset.tab === name); });
    sections.forEach(function (s) { if (s.dataset.section === name) s.removeAttribute('hidden'); else s.setAttribute('hidden', ''); });
    storeSet(TAB_KEY, name);
    if (!opts || !opts.skipHash) history.replaceState(null, '', '#' + name);
    if (!opts || !opts.skipScroll) window.scrollTo({ top: 0, behavior: 'instant' });
    if (name === 'breathwork') renderBreathworkSection();
    if (name === 'tips') renderTipsSection();
  }
  tabs.forEach(function (b) { b.addEventListener('click', function () { setActiveTab(b.dataset.tab); }); });
  function tabFromHash() {
    const h = (location.hash || '').replace('#', '');
    return VALID_TABS.indexOf(h) !== -1 ? h : null;
  }
  window.addEventListener('hashchange', function () { const h = tabFromHash(); if (h) setActiveTab(h, { skipHash: true }); });
  $('anxCoverCtaBtn').addEventListener('click', function () { setActiveTab('breathwork'); });

  var AD = null;

  // ============================================================
  // BREATHWORK
  // ============================================================
  var brwGoalFilter = '';
  var brwSearchQuery = '';
  var brwEditingId = null;

  function patternSummary(t) {
    var parts = [];
    parts.push(t.inhaleSec + 's in');
    if (t.holdInSec) parts.push(t.holdInSec + 's hold');
    parts.push(t.exhaleSec + 's out');
    if (t.holdOutSec) parts.push(t.holdOutSec + 's hold');
    return parts.join(' · ');
  }

  function renderBrwGoalChips() {
    var row = $('brwGoalChips');
    var goals = [''].concat(AD.BREATHWORK_GOALS);
    row.innerHTML = goals.map(function (g) {
      var label = g ? AD.BREATHWORK_GOAL_LABELS[g] : 'All';
      var active = g === brwGoalFilter ? ' active' : '';
      return '<button type="button" class="chip' + active + '" data-goal="' + g + '">' + escapeHtml(label) + '</button>';
    }).join('');
    Array.prototype.forEach.call(row.querySelectorAll('.chip'), function (btn) {
      btn.addEventListener('click', function () { brwGoalFilter = btn.dataset.goal; renderBrwGrid(); });
    });
  }
  function brwCardHtml(t) {
    var goalLabel = AD.BREATHWORK_GOAL_LABELS[t.goal] || t.goal;
    return '' +
      '<div class="brw-card" data-id="' + t.id + '">' +
        '<button type="button" class="brw-fav-btn' + (t.isFavorite ? ' active' : '') + '" data-id="' + t.id + '" aria-label="Toggle favorite">' + (t.isFavorite ? '★' : '☆') + '</button>' +
        '<div class="brw-card-title">' + escapeHtml(t.name || '(Untitled)') + '</div>' +
        '<div class="brw-card-meta"><span class="tag">' + escapeHtml(goalLabel) + '</span><span class="tag">' + t.cycles + ' cycles</span></div>' +
        '<div class="brw-pattern">' + escapeHtml(patternSummary(t)) + '</div>' +
        (t.description ? '<div class="brw-card-desc">' + escapeHtml(t.description) + '</div>' : '') +
        '<div class="brw-card-actions">' +
          '<button type="button" class="btn-primary brw-start-btn" data-id="' + t.id + '">▶ Start</button>' +
          '<button type="button" class="btn-secondary brw-edit-btn" data-id="' + t.id + '">Edit</button>' +
          '<button type="button" class="brw-del-btn" data-id="' + t.id + '" aria-label="Delete">✕</button>' +
        '</div>' +
      '</div>';
  }
  function renderBrwGrid() {
    var list = AD.breathworkSorted();
    if (brwGoalFilter) list = list.filter(function (t) { return t.goal === brwGoalFilter; });
    var q = brwSearchQuery.trim().toLowerCase();
    if (q) list = list.filter(function (t) { return (t.name || '').toLowerCase().indexOf(q) !== -1; });
    var grid = $('brwGrid');
    if (!list.length) {
      var hasFilters = !!(q || brwGoalFilter);
      var emptyText = hasFilters ? 'Nothing matches — try a different search or filter.' : 'Add your first breathing technique with the button above.';
      grid.innerHTML = '<div class="anx-empty"><div class="anx-empty-icon">🫁</div><div class="anx-empty-title">No techniques yet</div><div class="anx-empty-text">' + emptyText + '</div></div>';
      return;
    }
    grid.innerHTML = list.map(brwCardHtml).join('');
    Array.prototype.forEach.call(grid.querySelectorAll('.brw-fav-btn'), function (btn) { btn.addEventListener('click', function () { toggleBrwFavorite(btn.dataset.id); }); });
    Array.prototype.forEach.call(grid.querySelectorAll('.brw-start-btn'), function (btn) { btn.addEventListener('click', function () { openPacer(btn.dataset.id); }); });
    Array.prototype.forEach.call(grid.querySelectorAll('.brw-edit-btn'), function (btn) { btn.addEventListener('click', function () { openBrwModal(AD.Breathwork.get(btn.dataset.id)); }); });
    Array.prototype.forEach.call(grid.querySelectorAll('.brw-del-btn'), function (btn) { btn.addEventListener('click', function () { deleteBrw(btn.dataset.id); }); });
  }
  function renderBreathworkSection() { renderBrwGoalChips(); renderBrwGrid(); }
  function toggleBrwFavorite(id) {
    var t = AD.Breathwork.get(id);
    if (!t) return;
    AD.Breathwork.update(id, { isFavorite: !t.isFavorite });
    renderBrwGrid();
  }
  function deleteBrw(id) {
    var t = AD.Breathwork.get(id);
    if (!t) return;
    if (!confirm('Delete "' + (t.name || 'this technique') + '"? This cannot be undone.')) return;
    AD.Breathwork.remove(id);
    renderBrwGrid();
  }
  $('brwSearchInput').addEventListener('input', function () { brwSearchQuery = this.value; renderBrwGrid(); });

  function populateBrwGoalSelect() {
    var sel = $('brwGoalSelect');
    sel.innerHTML = AD.BREATHWORK_GOALS.map(function (g) { return '<option value="' + g + '">' + escapeHtml(AD.BREATHWORK_GOAL_LABELS[g]) + '</option>'; }).join('');
  }
  function openBrwModal(t) {
    brwEditingId = t ? t.id : null;
    $('brwModalTitle').textContent = t ? 'Edit Technique' : 'New Breathing Technique';
    populateBrwGoalSelect();
    $('brwNameInput').value = t ? t.name : '';
    $('brwDescInput').value = t ? t.description : '';
    $('brwGoalSelect').value = t ? t.goal : AD.BREATHWORK_GOALS[0];
    $('brwInhaleInput').value = t ? t.inhaleSec : 4;
    $('brwHoldInInput').value = t ? t.holdInSec : 0;
    $('brwExhaleInput').value = t ? t.exhaleSec : 4;
    $('brwHoldOutInput').value = t ? t.holdOutSec : 0;
    $('brwCyclesInput').value = t ? t.cycles : 6;
    $('brwFavInput').checked = !!(t && t.isFavorite);
    $('brwModalDelete').style.display = t ? 'block' : 'none';
    $('brwModalBg').classList.add('show');
  }
  function closeBrwModal() { $('brwModalBg').classList.remove('show'); brwEditingId = null; }
  $('brwAddBtn').addEventListener('click', function () { openBrwModal(null); });
  $('brwModalCancel').addEventListener('click', closeBrwModal);
  $('brwModalBg').addEventListener('click', function (e) { if (e.target.id === 'brwModalBg') closeBrwModal(); });
  $('brwModalSave').addEventListener('click', function () {
    var name = $('brwNameInput').value.trim();
    if (!name) { alert('Give this technique a name first.'); return; }
    var patch = {
      name: name,
      description: $('brwDescInput').value.trim(),
      goal: $('brwGoalSelect').value,
      inhaleSec: Number($('brwInhaleInput').value) || 4,
      holdInSec: Number($('brwHoldInInput').value) || 0,
      exhaleSec: Number($('brwExhaleInput').value) || 4,
      holdOutSec: Number($('brwHoldOutInput').value) || 0,
      cycles: Number($('brwCyclesInput').value) || 6,
      isFavorite: $('brwFavInput').checked
    };
    if (brwEditingId) AD.Breathwork.update(brwEditingId, patch);
    else AD.Breathwork.add(patch);
    closeBrwModal();
    renderBrwGrid();
  });
  $('brwModalDelete').addEventListener('click', function () {
    if (!brwEditingId) return;
    var t = AD.Breathwork.get(brwEditingId);
    if (!confirm('Delete "' + (t && t.name || 'this technique') + '"? This cannot be undone.')) return;
    AD.Breathwork.remove(brwEditingId);
    closeBrwModal();
    renderBrwGrid();
  });

  // ============================================================
  // BREATHING PACER — a full-screen-ish animated breathing guide.
  // Phase advancement/countdown is timestamp-based (Date.now() diffs,
  // not a naive setInterval tick counter), matching this app's existing
  // gym.html workout-timer precedent, so a paused tab or slow tick can't
  // let it drift. The visual grow/shrink itself is delegated to a CSS
  // transition set once per phase change (transform scale + matching
  // transition-duration) rather than animated frame-by-frame in JS.
  // ============================================================
  var pacerTechnique = null;
  var pacerPhases = [];
  var pacerPhaseIndex = 0;
  var pacerCycleIndex = 1;
  var pacerPhaseStartMs = 0;
  var pacerRunning = false;
  var pacerTickId = null;

  function buildPacerPhases(t) {
    var phases = [];
    if (t.inhaleSec > 0) phases.push({ name: 'Inhale', seconds: t.inhaleSec, scale: 1 });
    if (t.holdInSec > 0) phases.push({ name: 'Hold', seconds: t.holdInSec, scale: 1 });
    if (t.exhaleSec > 0) phases.push({ name: 'Exhale', seconds: t.exhaleSec, scale: 0.55 });
    if (t.holdOutSec > 0) phases.push({ name: 'Hold', seconds: t.holdOutSec, scale: 0.55 });
    return phases.length ? phases : [{ name: 'Inhale', seconds: 4, scale: 1 }, { name: 'Exhale', seconds: 4, scale: 0.55 }];
  }
  function applyPacerPhaseVisual(phase) {
    var circle = $('pacerCircle');
    circle.style.transition = 'transform ' + phase.seconds + 's linear';
    // Force a reflow so the new transition-duration is picked up before
    // the transform change, even when the target scale is unchanged from
    // the previous phase (e.g. Inhale -> Hold both target scale 1).
    void circle.offsetWidth;
    circle.style.transform = 'scale(' + phase.scale + ')';
    $('pacerPhaseLabel').textContent = phase.name;
  }
  function pacerTick() {
    if (!pacerRunning) return;
    var phase = pacerPhases[pacerPhaseIndex];
    var elapsedMs = Date.now() - pacerPhaseStartMs;
    var remaining = phase.seconds - elapsedMs / 1000;
    if (remaining <= 0) {
      pacerPhaseIndex++;
      if (pacerPhaseIndex >= pacerPhases.length) {
        pacerPhaseIndex = 0;
        pacerCycleIndex++;
        if (pacerCycleIndex > pacerTechnique.cycles) { pacerFinish(); return; }
      }
      // Carry the overshoot into the next phase's start time so repeated
      // 200ms ticks can't accumulate drift across many phase changes.
      pacerPhaseStartMs = Date.now() + remaining * 1000;
      applyPacerPhaseVisual(pacerPhases[pacerPhaseIndex]);
      $('pacerCycleLabel').textContent = 'Cycle ' + pacerCycleIndex + ' of ' + pacerTechnique.cycles;
      remaining = pacerPhases[pacerPhaseIndex].seconds - (Date.now() - pacerPhaseStartMs) / 1000;
    }
    $('pacerCountdown').textContent = String(Math.max(1, Math.ceil(remaining)));
  }
  function pacerFinish() {
    pacerRunning = false;
    clearInterval(pacerTickId);
    $('pacerPhaseLabel').textContent = 'Done';
    $('pacerCountdown').textContent = '✓';
    $('pacerDoneMsg').style.display = 'block';
    $('pacerStartStopBtn').textContent = 'Start Again';
    $('pacerCircle').style.transition = 'transform 0.6s ease';
    $('pacerCircle').style.transform = 'scale(0.8)';
  }
  function pacerStart() {
    pacerPhases = buildPacerPhases(pacerTechnique);
    pacerPhaseIndex = 0;
    pacerCycleIndex = 1;
    pacerRunning = true;
    $('pacerDoneMsg').style.display = 'none';
    $('pacerStartStopBtn').textContent = 'Stop';
    $('pacerCycleLabel').textContent = 'Cycle 1 of ' + pacerTechnique.cycles;
    var circle = $('pacerCircle');
    circle.style.transition = 'none';
    circle.style.transform = 'scale(0.55)';
    void circle.offsetWidth;
    pacerPhaseStartMs = Date.now();
    applyPacerPhaseVisual(pacerPhases[0]);
    clearInterval(pacerTickId);
    pacerTickId = setInterval(pacerTick, 200);
    pacerTick();
  }
  function pacerStop() {
    pacerRunning = false;
    clearInterval(pacerTickId);
    $('pacerPhaseLabel').textContent = 'Ready';
    $('pacerCountdown').textContent = '—';
    $('pacerCycleLabel').textContent = '';
    $('pacerDoneMsg').style.display = 'none';
    $('pacerStartStopBtn').textContent = 'Start';
    var circle = $('pacerCircle');
    circle.style.transition = 'transform 0.4s ease';
    circle.style.transform = 'scale(0.55)';
  }
  function openPacer(id) {
    var t = AD.Breathwork.get(id);
    if (!t) return;
    pacerTechnique = t;
    $('pacerTechniqueName').textContent = t.name || 'Breathing';
    pacerStop();
    $('pacerModalBg').classList.add('show');
  }
  function closePacer() {
    pacerRunning = false;
    clearInterval(pacerTickId);
    $('pacerModalBg').classList.remove('show');
  }
  $('pacerStartStopBtn').addEventListener('click', function () { if (pacerRunning) pacerStop(); else pacerStart(); });
  $('pacerCloseBtn').addEventListener('click', closePacer);
  $('pacerModalBg').addEventListener('click', function (e) { if (e.target.id === 'pacerModalBg') closePacer(); });

  // ============================================================
  // TIPS & TECHNIQUES
  // ============================================================
  var tipCategoryFilter = '';
  var tipFavOnly = false;
  var tipSearchQuery = '';
  var tipEditingId = null;

  function renderTipCategoryChips() {
    var row = $('tipCategoryChips');
    var cats = [''].concat(AD.TIP_CATEGORIES);
    var html = cats.map(function (c) {
      var label = c ? AD.TIP_CATEGORY_LABELS[c] : 'All';
      var active = c === tipCategoryFilter ? ' active' : '';
      return '<button type="button" class="chip' + active + '" data-cat="' + c + '">' + escapeHtml(label) + '</button>';
    }).join('');
    html += '<button type="button" class="chip fav-chip' + (tipFavOnly ? ' active' : '') + '" id="tipFavToggleChip">★ Favorites only</button>';
    row.innerHTML = html;
    Array.prototype.forEach.call(row.querySelectorAll('[data-cat]'), function (btn) {
      btn.addEventListener('click', function () { tipCategoryFilter = btn.dataset.cat; renderTipGrid(); });
    });
    $('tipFavToggleChip').addEventListener('click', function () { tipFavOnly = !tipFavOnly; renderTipGrid(); });
  }
  function tipCardHtml(t) {
    var catLabel = AD.TIP_CATEGORY_LABELS[t.category] || t.category;
    return '' +
      '<div class="tip-card" data-id="' + t.id + '">' +
        '<button type="button" class="tip-fav-btn' + (t.isFavorite ? ' active' : '') + '" data-id="' + t.id + '" aria-label="Toggle favorite">' + (t.isFavorite ? '★' : '☆') + '</button>' +
        '<div class="tip-card-title">' + escapeHtml(t.title || '(Untitled)') + '</div>' +
        '<div class="tip-card-meta"><span class="tag">' + escapeHtml(catLabel) + '</span></div>' +
        '<div class="tip-card-body">' + escapeHtml(t.body) + '</div>' +
        '<div class="tip-card-actions">' +
          '<button type="button" class="btn-secondary tip-edit-btn" data-id="' + t.id + '">Edit</button>' +
          '<button type="button" class="tip-del-btn" data-id="' + t.id + '" aria-label="Delete">✕</button>' +
        '</div>' +
      '</div>';
  }
  function renderTipGrid() {
    var list = AD.tipsSorted();
    if (tipCategoryFilter) list = list.filter(function (t) { return t.category === tipCategoryFilter; });
    if (tipFavOnly) list = list.filter(function (t) { return t.isFavorite; });
    var q = tipSearchQuery.trim().toLowerCase();
    if (q) list = list.filter(function (t) { return (t.title || '').toLowerCase().indexOf(q) !== -1 || (t.body || '').toLowerCase().indexOf(q) !== -1; });
    var grid = $('tipGrid');
    if (!list.length) {
      var hasFilters = !!(q || tipCategoryFilter || tipFavOnly);
      var emptyText = hasFilters ? 'Nothing matches — try different filters or search.' : 'Add your first tip with the button above.';
      grid.innerHTML = '<div class="anx-empty"><div class="anx-empty-icon">💡</div><div class="anx-empty-title">No tips yet</div><div class="anx-empty-text">' + emptyText + '</div></div>';
      return;
    }
    grid.innerHTML = list.map(tipCardHtml).join('');
    Array.prototype.forEach.call(grid.querySelectorAll('.tip-fav-btn'), function (btn) { btn.addEventListener('click', function () { toggleTipFavorite(btn.dataset.id); }); });
    Array.prototype.forEach.call(grid.querySelectorAll('.tip-edit-btn'), function (btn) { btn.addEventListener('click', function () { openTipModal(AD.Tips.get(btn.dataset.id)); }); });
    Array.prototype.forEach.call(grid.querySelectorAll('.tip-del-btn'), function (btn) { btn.addEventListener('click', function () { deleteTip(btn.dataset.id); }); });
  }
  function renderTipsSection() { renderTipCategoryChips(); renderTipGrid(); }
  function toggleTipFavorite(id) {
    var t = AD.Tips.get(id);
    if (!t) return;
    AD.Tips.update(id, { isFavorite: !t.isFavorite });
    renderTipGrid();
  }
  function deleteTip(id) {
    var t = AD.Tips.get(id);
    if (!t) return;
    if (!confirm('Delete "' + (t.title || 'this tip') + '"? This cannot be undone.')) return;
    AD.Tips.remove(id);
    renderTipGrid();
  }
  $('tipSearchInput').addEventListener('input', function () { tipSearchQuery = this.value; renderTipGrid(); });

  function populateTipCategorySelect() {
    var sel = $('tipCategorySelect');
    sel.innerHTML = AD.TIP_CATEGORIES.map(function (c) { return '<option value="' + c + '">' + escapeHtml(AD.TIP_CATEGORY_LABELS[c]) + '</option>'; }).join('');
  }
  function openTipModal(t) {
    tipEditingId = t ? t.id : null;
    $('tipModalTitle').textContent = t ? 'Edit Tip' : 'New Tip';
    populateTipCategorySelect();
    $('tipTitleInput').value = t ? t.title : '';
    $('tipCategorySelect').value = t ? t.category : AD.TIP_CATEGORIES[0];
    $('tipBodyInput').value = t ? t.body : '';
    $('tipFavInput').checked = !!(t && t.isFavorite);
    $('tipModalDelete').style.display = t ? 'block' : 'none';
    $('tipModalBg').classList.add('show');
  }
  function closeTipModal() { $('tipModalBg').classList.remove('show'); tipEditingId = null; }
  $('tipAddBtn').addEventListener('click', function () { openTipModal(null); });
  $('tipModalCancel').addEventListener('click', closeTipModal);
  $('tipModalBg').addEventListener('click', function (e) { if (e.target.id === 'tipModalBg') closeTipModal(); });
  $('tipModalSave').addEventListener('click', function () {
    var title = $('tipTitleInput').value.trim();
    var body = $('tipBodyInput').value.trim();
    if (!title) { alert('Give this tip a title first.'); return; }
    var patch = { title: title, category: $('tipCategorySelect').value, body: body, isFavorite: $('tipFavInput').checked };
    if (tipEditingId) AD.Tips.update(tipEditingId, patch);
    else AD.Tips.add(patch);
    closeTipModal();
    renderTipGrid();
  });
  $('tipModalDelete').addEventListener('click', function () {
    if (!tipEditingId) return;
    var t = AD.Tips.get(tipEditingId);
    if (!confirm('Delete "' + (t && t.title || 'this tip') + '"? This cannot be undone.')) return;
    AD.Tips.remove(tipEditingId);
    closeTipModal();
    renderTipGrid();
  });

  // ============================================================
  // BOOT
  // ============================================================
  function init() {
    AD = window.AnxietyData;
    if (!AD) return;

    var startTab = tabFromHash() || storeGet(TAB_KEY) || 'breathwork';
    setActiveTab(startTab, { skipHash: true, skipScroll: true });

    // Same seed-race-safety pattern this app now uses everywhere sync is
    // involved (see dreamboard.html/selfcare.html): don't write seed
    // content before the cloud pull has a real chance to answer, so a
    // fresh device can't push fabricated "default" content over another
    // device's real data. AnxietyData.seedIfEmpty() itself already
    // refuses to run if either collection already has real content.
    function trySeed() {
      AD.seedIfEmpty();
      renderBreathworkSection();
      renderTipsSection();
    }
    if (typeof initCloudSync === 'function') {
      initCloudSync({
        appKey: 'anxiety',
        syncedPrefixes: ['anxiety:'],
        onApplied: function () {
          renderBreathworkSection();
          renderTipsSection();
        }
      });
      if (!AD.Breathwork.list().length && !AD.Tips.list().length) setTimeout(trySeed, 5000);
    } else if (!AD.Breathwork.list().length && !AD.Tips.list().length) {
      trySeed();
    }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
