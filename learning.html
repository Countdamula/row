<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0a08">
<title>Learning &amp; Knowledge Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js" defer></script>
<script src="sync.js" defer></script>
<script src="photo-store.js" defer></script>
<script src="topbar.js" defer></script>
<script src="learning-data.js" defer></script>
<style>
/* =============================================================
   Learning & Knowledge Hub — matches Dream Board / Business Hub / AI & Tech's
   dark cinematic near-black + champagne-gold aesthetic (CLAUDE.md §6/DO NOT
   MODIFY rule 2: reuse existing design tokens, no new hard-coded colors).
   Same frosted-glass card technique, same Cormorant Garamond + Inter font
   pairing, same editable hero, same sync-status indicator.

   Two genuinely separate databases (never merged into one list, same
   precedent as aitech.html's Models/Prompts split, business.html's
   Platform/Content Plan/Useful Resources split):
     - Topics    — a large gallery of research subjects (top database).
     - Resources — Articles / Books / YouTube Videos (with transcripts) /
       Social Media Posts / Additional Notes, tied to a topic via topicId
       (nullable) — this is the "filtered/structured by" bottom database.
   ============================================================= */
:root {
  --lh-bg: #0b0a08;
  --lh-bg-deep: #050403;
  --lh-paper: rgba(255, 255, 255, 0.045);
  --lh-paper-solid: #16130f;
  --lh-gold: #c9a876;
  --lh-gold-bright: #e8cf9f;
  --lh-text: #f5f1e9;
  --lh-text-dim: rgba(245, 241, 233, 0.68);
  --lh-text-mute: rgba(245, 241, 233, 0.44);
  --lh-hairline: rgba(201, 168, 118, 0.22);
  --lh-accent-tint: rgba(201, 168, 118, 0.14);
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --info: #7DD3FC;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --font-serif: "Cormorant Garamond", Georgia, "Iowan Old Style", serif;
  --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  color-scheme: dark;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--lh-bg-deep); color: var(--lh-text); font-family: var(--font); min-height: 100%; -webkit-font-smoothing: antialiased; }
html, body { scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { width: 0 !important; height: 0 !important; display: none !important; }
img, video { max-width: 100%; display: block; }
button, input, textarea, select { font-family: inherit; color: inherit; }
:focus-visible { outline: 2px solid var(--lh-gold-bright); outline-offset: 2px; border-radius: 4px; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important; animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important; scroll-behavior: auto !important;
  }
}

body::before {
  content: '';
  position: fixed; inset: -10%; z-index: -2;
  background:
    radial-gradient(55% 42% at 82% 10%, rgba(201, 168, 118, 0.20) 0%, transparent 55%),
    radial-gradient(50% 40% at 14% 92%, rgba(120, 90, 50, 0.16) 0%, transparent 55%),
    linear-gradient(180deg, rgba(11,10,8,0.78) 0%, rgba(5,4,3,0.88) 100%);
  filter: blur(40px) saturate(1.05);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.6;
  pointer-events: none;
}

.shell { max-width: 1100px; margin: 0 auto; padding: 0 0 60px; }
.shell-inner { padding: 0 16px; }

.lh-back-btn {
  position: absolute; top: max(14px, env(safe-area-inset-top)); left: max(14px, env(safe-area-inset-left)); z-index: 5;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px 8px 10px;
  background: rgba(11, 10, 8, 0.55); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.14); border-radius: 999px;
  color: var(--lh-text-dim); text-decoration: none; font-size: 12.5px; font-weight: 600;
}
.lh-back-btn:hover { background: rgba(11, 10, 8, 0.8); color: var(--lh-text); }

.lh-hero {
  position: relative; min-height: 78vh; display: flex; flex-direction: column;
  justify-content: flex-end; overflow: hidden; padding: 90px 20px 46px;
}
@media (max-width: 620px) { .lh-hero { min-height: 84vh; padding: 84px 16px 34px; } }
.lh-hero-media { position: absolute; inset: 0; z-index: 0; background: var(--lh-paper-solid); }
.lh-hero-media img { width: 100%; height: 100%; object-fit: cover; }
.lh-hero-photo-choice {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1;
}
.lh-hero-photo-choice-btn {
  background: rgba(11,10,8,0.5); border: 1px dashed var(--lh-hairline); color: var(--lh-text-mute);
  border-radius: 999px; padding: 9px 16px; font-size: 12px; font-weight: 600; cursor: pointer;
}
.lh-hero-photo-choice-btn:hover { color: var(--lh-gold-bright); border-color: var(--lh-gold); }
.lh-hero-overlay {
  position: absolute; inset: 0; z-index: 1; pointer-events: none;
  background: linear-gradient(180deg, rgba(11,10,8,0.15) 0%, rgba(11,10,8,0.55) 60%, rgba(5,4,3,0.92) 100%);
}
.lh-hero-photo-tools {
  position: absolute; top: max(14px, env(safe-area-inset-top)); right: max(14px, env(safe-area-inset-right)); z-index: 5; display: flex; gap: 6px;
}
.lh-hero-photo-tools button {
  background: rgba(11, 10, 8, 0.55); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.14); border-radius: 999px; color: var(--lh-text-dim);
  font-size: 11.5px; font-weight: 600; padding: 6px 12px; cursor: pointer;
}
.lh-hero-photo-tools button:hover { color: var(--lh-gold-bright); border-color: var(--lh-gold); }
.lh-hero-content { position: relative; z-index: 2; max-width: 640px; }
.lh-hero-eyebrow {
  font-family: var(--font-mono); font-size: 11.5px; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--lh-gold); margin-bottom: 12px; outline-offset: 3px;
}
.lh-hero-eyebrow::before { content: ''; display: inline-block; width: 22px; height: 1px; background: var(--lh-gold); margin-right: 10px; vertical-align: middle; }
.lh-hero-title {
  display: block; width: 100%; background: transparent; border: none; resize: none; overflow: hidden;
  font-family: var(--font-serif); font-style: italic; font-weight: 600; font-size: clamp(30px, 6vw, 48px);
  line-height: 1.08; color: var(--lh-text); outline-offset: 4px; margin-bottom: 12px;
}
.lh-hero-title::placeholder { color: rgba(245,241,233,0.35); }
.lh-hero-subtext {
  font-size: 14.5px; line-height: 1.55; color: var(--lh-text-dim); max-width: 480px; margin-bottom: 20px; outline-offset: 3px;
}
.lh-hero-cta {
  display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.06);
  border: 1px solid var(--lh-hairline); border-radius: 999px; padding: 10px 18px; cursor: pointer;
}
.lh-hero-cta:hover { border-color: var(--lh-gold); background: rgba(201,168,118,0.10); }
.lh-hero-cta-label { font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--lh-text); }
.lh-hero-cta-arrow { color: var(--lh-gold-bright); font-size: 13px; }

.lh-toolbar-row {
  display: flex; align-items: center; justify-content: flex-end; gap: 10px; flex-wrap: wrap;
  padding: 18px 0 26px;
}
.lh-sync-status { font-size: 11px; font-weight: 600; letter-spacing: 0.02em; color: var(--lh-text-mute); display: flex; align-items: center; gap: 5px; margin-right: auto; }
.lh-sync-status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--lh-text-mute); flex-shrink: 0; }
.lh-sync-status.is-saved .lh-sync-status-dot { background: var(--success); }
.lh-sync-status.is-saved { color: var(--lh-text-dim); }
.lh-sync-status.is-error, .lh-sync-status.is-offline { color: var(--danger); }
.lh-sync-status.is-error .lh-sync-status-dot, .lh-sync-status.is-offline .lh-sync-status-dot { background: var(--danger); animation: lh-sync-pulse 1.4s ease-in-out infinite; }
@keyframes lh-sync-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

.lh-btn-primary, .lh-btn-secondary, .lh-btn-ghost {
  border-radius: 999px; padding: 9px 16px; font-size: 12.5px; font-weight: 700; letter-spacing: 0.02em; cursor: pointer;
}
.lh-btn-primary { background: linear-gradient(180deg, var(--lh-gold-bright) 0%, var(--lh-gold) 100%); color: #241d10; border: 1px solid var(--lh-gold); }
.lh-btn-primary:hover { opacity: 0.9; }
.lh-btn-secondary { background: var(--lh-paper); color: var(--lh-text-dim); border: 1px solid var(--lh-hairline); }
.lh-btn-secondary:hover { color: var(--lh-gold-bright); border-color: var(--lh-gold); }
.lh-btn-ghost { background: transparent; color: var(--lh-text-mute); border: 1px solid var(--lh-hairline); }
.lh-btn-ghost:hover { color: var(--lh-text); border-color: var(--lh-text-mute); }

/* ===== Section chassis (each "database") ===== */
.lh-section { margin-bottom: 40px; }
.lh-section + .lh-section { padding-top: 32px; border-top: 1px solid var(--lh-hairline); }
.lh-section-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; flex-wrap: wrap; margin-bottom: 6px; }
.lh-section-title-wrap { display: flex; flex-direction: column; gap: 3px; }
.lh-section-title { font-family: var(--font-serif); font-size: 28px; font-weight: 600; color: var(--lh-text); }
.lh-section-sub { font-size: 12px; color: var(--lh-text-mute); }
.lh-section-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.lh-filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 16px 0 18px; }
.lh-chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
.lh-chip { background: var(--lh-paper); border: 1px solid var(--lh-hairline); border-radius: 999px; padding: 6px 14px; font-size: 12px; font-weight: 700; letter-spacing: 0.02em; color: var(--lh-text-mute); cursor: pointer; }
.lh-chip:hover { color: var(--lh-text); }
.lh-chip.active { background: var(--lh-accent-tint); color: var(--lh-gold-bright); border-color: var(--lh-gold); }
.lh-search-input {
  flex: 1; min-width: 160px; max-width: 260px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--lh-hairline); border-radius: 999px;
  padding: 7px 14px; font-size: 12.5px; color: var(--lh-text);
}
.lh-grid-empty { grid-column: 1 / -1; font-size: 12px; color: var(--lh-text-mute); font-style: italic; padding: 10px 2px; }

/* ===== Card chassis — identical frosted-glass technique to Business
   Hub's .bw-card / Dream Board's .dw-card / AI & Tech's .at-card. ===== */
.lh-card {
  position: relative; overflow: hidden;
  background: rgba(255, 255, 255, 0.08);
  -webkit-backdrop-filter: blur(22px) saturate(1.6);
  backdrop-filter: blur(22px) saturate(1.6);
  border: 1px solid rgba(255, 255, 255, 0.22);
  border-radius: var(--radius-lg);
  padding: 14px 14px 16px;
  box-shadow: 0 1px 0 rgba(255,255,255,0.14) inset, 0 14px 36px rgba(0,0,0,0.35);
  display: flex; flex-direction: column;
  /* Let a touch anywhere on the card pan/scroll the page vertically by
     default — only the drag handle below opts out of that, via
     touch-action: none, so a scroll swipe never gets mistaken for
     picking the card up (paired with Sortable's delayOnTouchOnly so a
     deliberate press-and-hold on the handle is what starts a drag). */
  touch-action: pan-y;
}
.lh-card-ghost { opacity: 0.4; border: 1px dashed var(--lh-gold); background: rgba(201,168,118,0.12); }
.sortable-chosen { box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.lh-card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.lh-card-index { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 0.06em; color: var(--lh-gold); }
.lh-card-hover-actions { display: flex; align-items: center; gap: 2px; opacity: 0.55; transition: opacity 0.15s; }
.lh-card:hover .lh-card-hover-actions, .lh-card:focus-within .lh-card-hover-actions { opacity: 1; }
.lh-drag-handle { flex-shrink: 0; cursor: grab; color: var(--lh-text-mute); font-size: 13px; line-height: 1; letter-spacing: -1px; padding: 4px; -webkit-tap-highlight-color: transparent; touch-action: none; }
.lh-drag-handle:active { cursor: grabbing; }
.lh-card-edit, .lh-card-del, .lh-card-fav { background: transparent; border: none; color: var(--lh-text-mute); font-size: 13px; line-height: 1; cursor: pointer; padding: 4px 6px; border-radius: 6px; }
.lh-card-edit:hover { color: var(--lh-gold-bright); background: var(--lh-accent-tint); }
.lh-card-del:hover { color: var(--danger); background: rgba(255,107,107,0.10); }
.lh-card-fav.is-fav { color: var(--warning); }
.lh-card-fav:hover { color: var(--warning); }

/* ===== Topic gallery card — deliberately large, per "large gallery view" ===== */
.lh-topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
.lh-topic-cover { position: relative; aspect-ratio: 16 / 9; border-radius: var(--radius-md); overflow: hidden; margin-bottom: 12px; background: linear-gradient(135deg, var(--lh-gold) 0%, var(--lh-gold-bright) 100%); display: flex; align-items: center; justify-content: center; font-size: 52px; color: #241d10; }
.lh-topic-cover img { width: 100%; height: 100%; object-fit: cover; }
.lh-topic-name { font-family: var(--font-serif); font-weight: 600; font-size: 22px; line-height: 1.15; color: var(--lh-text); margin-bottom: 8px; word-break: break-word; }
.lh-topic-desc { font-size: 13px; line-height: 1.55; color: var(--lh-text-dim); margin-bottom: 12px; flex: 1; }
.lh-topic-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
.lh-topic-tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px; background: rgba(255,255,255,0.06); color: var(--lh-text-dim); border: 1px solid var(--lh-hairline); }
.lh-topic-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: auto; }
.lh-topic-resource-link { background: var(--lh-accent-tint); border: 1px solid var(--lh-hairline); color: var(--lh-gold-bright); border-radius: 999px; padding: 6px 14px; font-size: 11.5px; font-weight: 700; cursor: pointer; }
.lh-topic-resource-link:hover { border-color: var(--lh-gold); }

/* ===== Resource groups — the bottom database is "structured by" type:
   one named subsection per RESOURCE_TYPE, each its own card grid. ===== */
.lh-resource-group { margin-bottom: 28px; }
.lh-resource-group-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; }
.lh-resource-group-title { font-family: var(--font-serif); font-size: 19px; font-weight: 600; color: var(--lh-text); }
.lh-resource-group-count { font-family: var(--font-mono); font-size: 11px; color: var(--lh-text-mute); }
.lh-resource-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 14px; }
.lh-resource-group-empty { font-size: 12px; color: var(--lh-text-mute); font-style: italic; padding: 4px 2px 2px; }

.lh-type-badge { display: inline-flex; align-items: center; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 3px 9px; border-radius: 999px; margin-bottom: 8px; align-self: flex-start; }
.lh-type-badge.is-article { color: var(--info); background: rgba(125,211,252,0.14); }
.lh-type-badge.is-book { color: var(--success); background: rgba(107,227,164,0.14); }
.lh-type-badge.is-video { color: var(--danger); background: rgba(255,107,107,0.14); }
.lh-type-badge.is-social { color: var(--warning); background: rgba(242,192,99,0.16); }
.lh-type-badge.is-note { color: var(--lh-gold-bright); background: var(--lh-accent-tint); }
.lh-resource-title { font-family: var(--font-serif); font-weight: 600; font-size: 16.5px; color: var(--lh-text); margin-bottom: 4px; word-break: break-word; }
.lh-resource-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.lh-resource-topic-tag { font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; }
.lh-resource-topic-tag.is-unlinked { background: rgba(245,241,233,0.08); color: var(--lh-text-mute); border: 1px dashed var(--lh-hairline); }
.lh-resource-author { font-size: 11.5px; color: var(--lh-text-mute); }
.lh-resource-notes { font-size: 12.5px; line-height: 1.5; color: var(--lh-text-dim); margin-bottom: 8px; max-height: 84px; overflow: hidden; position: relative; }
.lh-resource-notes.is-expanded { max-height: none; }
.lh-resource-transcript-label { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--lh-text-mute); margin-bottom: 4px; }
.lh-resource-transcript { font-family: var(--font-mono); font-size: 11.5px; line-height: 1.6; color: var(--lh-text-dim); background: rgba(0,0,0,0.22); border: 1px solid var(--lh-hairline); border-radius: var(--radius-sm); padding: 10px 12px; white-space: pre-wrap; word-break: break-word; margin-bottom: 8px; max-height: 84px; overflow: hidden; position: relative; }
.lh-resource-transcript.is-expanded { max-height: none; }
.lh-resource-expand-btn { background: none; border: none; color: var(--lh-gold-bright); font-size: 11px; font-weight: 700; cursor: pointer; padding: 0; margin-bottom: 8px; align-self: flex-start; }
.lh-resource-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: auto; flex-wrap: wrap; }
.lh-resource-open-btn { background: transparent; border: 1px solid var(--lh-hairline); color: var(--lh-gold-bright); border-radius: 999px; padding: 5px 12px; font-size: 10.5px; font-weight: 700; cursor: pointer; text-decoration: none; }
.lh-resource-open-btn:hover { border-color: var(--lh-gold); background: var(--lh-accent-tint); }
.lh-resource-open-btn[aria-disabled="true"] { opacity: 0.35; pointer-events: none; }
.lh-resource-copy-btn { background: var(--lh-accent-tint); border: 1px solid var(--lh-hairline); color: var(--lh-gold-bright); border-radius: 999px; padding: 5px 12px; font-size: 10.5px; font-weight: 700; cursor: pointer; }
.lh-resource-copy-btn:hover { border-color: var(--lh-gold); }
.lh-resource-copy-btn.is-copied { color: var(--success); border-color: var(--success); background: rgba(107,227,164,0.12); }

/* ===== Modals ===== */
.modal-bg { display: none; position: fixed; inset: 0; z-index: 60; background: rgba(5,4,3,0.65); align-items: center; justify-content: center; padding: 20px; }
.modal-bg.show { display: flex; }
.modal { background: rgba(22, 19, 15, 0.72); -webkit-backdrop-filter: blur(24px) saturate(1.4); backdrop-filter: blur(24px) saturate(1.4); border: 1px solid rgba(255,255,255,0.18); border-radius: var(--radius-lg); padding: 22px; width: 100%; max-width: 460px; max-height: 86vh; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
.modal.lh-modal-wide { max-width: 620px; }
.lh-modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.lh-modal-head h3 { font-family: var(--font-serif); font-size: 20px; font-weight: 600; color: var(--lh-text); }
.lh-modal-close { background: transparent; border: none; font-size: 18px; color: var(--lh-text-mute); cursor: pointer; }
.lh-modal-close:hover { color: var(--lh-text); }
.lh-modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; align-items: center; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; font-weight: 700; color: var(--lh-text-mute); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
.field input, .field select, .field textarea { width: 100%; border: 1px solid var(--lh-hairline); background: rgba(255,255,255,0.04); border-radius: var(--radius-sm); padding: 9px 10px; font-size: 13.5px; color: var(--lh-text); }
.field textarea { resize: vertical; min-height: 78px; font-family: var(--font); font-size: 13px; line-height: 1.5; }
.field textarea.lh-mono-textarea { font-family: var(--font-mono); font-size: 12.5px; line-height: 1.55; min-height: 90px; }
.field-inline { display: flex; align-items: center; gap: 8px; }
.field-inline input[type="checkbox"] { width: auto; }
.lh-cover-preview { aspect-ratio: 16 / 9; border-radius: var(--radius-md); overflow: hidden; background: rgba(255,255,255,0.03); border: 1px solid var(--lh-hairline); margin-bottom: 8px; display: flex; align-items: center; justify-content: center; color: var(--lh-text-mute); font-size: 12px; }
.lh-cover-preview img { width: 100%; height: 100%; object-fit: cover; }
.lh-tag-input-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
.lh-tag-input-row .lh-topic-tag button { background: none; border: none; color: inherit; opacity: 0.65; cursor: pointer; font-size: 10px; padding: 0 0 0 4px; }
.delete-link { display: block; text-align: center; margin-top: 14px; font-size: 12px; color: var(--danger); cursor: pointer; }
.delete-link:hover { text-decoration: underline; }

/* ===== Resource "page" — freeform, generated-on-demand text/link
   sections (e.g. "Full Text", "Links, Notes & Favorite Parts"). Same
   pattern/CSS recipe as business.html's Platform Detail page
   (.bh-pf-section etc.), just lh-/"rsec"-prefixed. ===== */
.lh-resource-detail-meta { font-size: 12px; color: var(--lh-text-mute); margin-bottom: 10px; }
.lh-pfd-sections-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 16px 0 10px; }
.lh-roster-heading { font-family: var(--font-serif); font-size: 16px; font-weight: 600; color: var(--lh-text); }
.lh-rsec { border: 1px solid var(--lh-hairline); background: rgba(255,255,255,0.04); border-radius: var(--radius-md); padding: 10px 12px; margin-bottom: 10px; }
.lh-rsec-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.lh-rsec-reorder { display: flex; gap: 2px; flex-shrink: 0; }
.lh-rsec-reorder button { background: transparent; border: none; color: var(--lh-text-mute); font-size: 11px; cursor: pointer; padding: 2px 4px; }
.lh-rsec-reorder button:hover:not(:disabled) { color: var(--lh-gold-bright); }
.lh-rsec-reorder button:disabled { opacity: 0.25; cursor: default; }
.lh-rsec-title-input { flex: 1; min-width: 0; background: transparent; border: none; font-family: var(--font-serif); font-size: 15px; font-weight: 600; color: var(--lh-text); outline-offset: 3px; }
.lh-rsec-del { background: transparent; border: none; color: var(--lh-text-mute); font-size: 13px; cursor: pointer; padding: 2px 6px; flex-shrink: 0; }
.lh-rsec-del:hover { color: var(--danger); }
.lh-rsec-body { width: 100%; min-height: 90px; resize: vertical; border: 1px solid var(--lh-hairline); background: rgba(255,255,255,0.03); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 13px; line-height: 1.5; color: var(--lh-text); }
.lh-rsec-empty { font-size: 11.5px; color: var(--lh-text-mute); font-style: italic; padding: 6px 0 2px; }
.lh-resource-section-hint { font-size: 10.5px; color: var(--lh-text-mute); }

/* ===== Resource grid card — cover thumbnail ===== */
.lh-resource-cover { position: relative; aspect-ratio: 16 / 9; border-radius: var(--radius-md); overflow: hidden; margin-bottom: 10px; background: rgba(255,255,255,0.03); border: 1px solid var(--lh-hairline); }
.lh-resource-cover img { width: 100%; height: 100%; object-fit: cover; }

/* =============================================================
   ARTICLE PAGE — the "read a resource" full-page view, styled as a
   professional article/publication page per an explicit reference photo:
   small eyebrow label, large bold headline, a one-line subtitle/dek, a
   byline row (avatar + author + date) between two hairline dividers, a
   full-width cover photo, then the body (text sections, dividers, and any
   pasted-in photos). Same full-page-overlay convention as this app's other
   "open a record's own page" views (e.g. business.html's Manuscript
   Detail `.wr-page-bg`/`.wr-page`), not a small popup modal — a real
   article needs the room.
   ============================================================= */
.lh-article-page-bg {
  display: none; position: fixed; inset: 0; z-index: 70;
  background: var(--lh-bg-deep); overflow-y: auto; -webkit-overflow-scrolling: touch;
}
.lh-article-page-bg.show { display: block; }
.lh-article-topbar {
  position: sticky; top: 0; z-index: 3; display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding: max(14px, env(safe-area-inset-top)) 20px 14px; background: linear-gradient(180deg, rgba(5,4,3,0.92) 0%, rgba(5,4,3,0.72) 70%, transparent 100%);
}
.lh-article-back {
  display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.06); border: 1px solid var(--lh-hairline);
  border-radius: 999px; padding: 8px 14px; font-size: 12.5px; font-weight: 600; color: var(--lh-text-dim); cursor: pointer;
}
.lh-article-back:hover { color: var(--lh-gold-bright); border-color: var(--lh-gold); }
.lh-article-topbar-actions { display: flex; gap: 8px; }
.lh-article { max-width: 700px; margin: 0 auto; padding: 8px 24px 90px; }
@media (max-width: 620px) { .lh-article { padding: 4px 18px 70px; } }
.lh-article-eyebrow { font-family: var(--font-mono); font-size: 11.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--lh-gold); margin-bottom: 14px; }
.lh-article-title {
  font-family: var(--font-serif); font-weight: 700; font-style: normal; font-size: clamp(30px, 5.2vw, 46px);
  line-height: 1.1; color: var(--lh-text); margin-bottom: 14px; word-break: break-word;
}
.lh-article-subtitle { font-size: 16px; line-height: 1.55; color: var(--lh-text-dim); margin-bottom: 22px; }
.lh-article-hr { border: none; border-top: 1px solid var(--lh-hairline); margin: 0; }
.lh-article-byline-row { display: flex; align-items: center; }
.lh-article-byline { display: flex; align-items: center; gap: 12px; padding: 16px 0; }
.lh-article-avatar {
  flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%; overflow: hidden;
  background: linear-gradient(135deg, var(--lh-gold) 0%, var(--lh-gold-bright) 100%);
  display: flex; align-items: center; justify-content: center; font-family: var(--font-serif); font-weight: 700; font-size: 16px; color: #241d10;
}
.lh-article-avatar img { width: 100%; height: 100%; object-fit: cover; }
.lh-article-byline-name { font-family: var(--font-mono); font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--lh-text); }
.lh-article-byline-date { font-size: 12px; color: var(--lh-text-mute); margin-top: 2px; }

.lh-article-cover {
  position: relative; width: 100%; aspect-ratio: 16 / 10; border-radius: var(--radius-md); overflow: hidden;
  background: var(--lh-paper-solid); margin: 22px 0 30px;
}
.lh-article-cover img { width: 100%; height: 100%; object-fit: cover; }
.lh-article-cover-choice { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
.lh-article-cover-choice-btn { background: rgba(11,10,8,0.5); border: 1px dashed var(--lh-hairline); color: var(--lh-text-mute); border-radius: 999px; padding: 9px 16px; font-size: 12px; font-weight: 600; cursor: pointer; }
.lh-article-cover-choice-btn:hover { color: var(--lh-gold-bright); border-color: var(--lh-gold); }
.lh-article-cover-tools { position: absolute; top: 10px; right: 10px; display: flex; gap: 6px; }
.lh-article-cover-tools button {
  background: rgba(11, 10, 8, 0.55); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.14); border-radius: 999px; color: var(--lh-text-dim);
  font-size: 11.5px; font-weight: 600; padding: 6px 12px; cursor: pointer;
}
.lh-article-cover-tools button:hover { color: var(--lh-gold-bright); border-color: var(--lh-gold); }

.lh-article-body { display: flex; flex-direction: column; gap: 4px; }
.lh-article-add-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--lh-hairline); }

/* Text section — de-chromed to read like an article block: title is a
   small editable subheading, body is a borderless autosizing textarea
   styled as reading copy, only gaining a visible outline on focus (so it
   still reads as editable without looking like form UI while at rest). */
.lh-rsec { margin-bottom: 22px; }
.lh-rsec-head { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.lh-rsec-reorder { display: flex; gap: 2px; flex-shrink: 0; opacity: 0.5; transition: opacity 0.15s; }
.lh-rsec:hover .lh-rsec-reorder, .lh-rsec:focus-within .lh-rsec-reorder { opacity: 1; }
.lh-rsec-reorder button { background: transparent; border: none; color: var(--lh-text-mute); font-size: 11px; cursor: pointer; padding: 2px 4px; }
.lh-rsec-reorder button:hover:not(:disabled) { color: var(--lh-gold-bright); }
.lh-rsec-reorder button:disabled { opacity: 0.25; cursor: default; }
.lh-rsec-title-input {
  flex: 1; min-width: 0; background: transparent; border: none; font-family: var(--font-mono); font-size: 11.5px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--lh-gold); outline-offset: 3px; padding: 3px 0;
}
.lh-rsec-del { background: transparent; border: none; color: var(--lh-text-mute); font-size: 13px; cursor: pointer; padding: 2px 6px; flex-shrink: 0; opacity: 0.5; }
.lh-rsec:hover .lh-rsec-del, .lh-rsec:focus-within .lh-rsec-del { opacity: 1; }
.lh-rsec-del:hover { color: var(--danger); }
.lh-rsec-body {
  width: 100%; resize: none; overflow: hidden; border: 1px solid transparent; background: transparent;
  border-radius: var(--radius-sm); padding: 4px 0; font-family: Georgia, "Iowan Old Style", "Times New Roman", serif;
  font-size: 17px; line-height: 1.75; color: var(--lh-text);
}
.lh-rsec-body:focus { border-color: var(--lh-hairline); background: rgba(255,255,255,0.03); padding: 8px 10px; }
.lh-rsec-body::placeholder { color: var(--lh-text-mute); font-family: var(--font); font-size: 14px; }
.lh-rsec-empty { font-size: 12.5px; color: var(--lh-text-mute); font-style: italic; padding: 6px 0 2px; }

/* Divider section — a plain rule the user can drop between blocks. */
.lh-rsec-divider { display: flex; align-items: center; gap: 8px; }
.lh-rsec-divider-rule { flex: 1; border: none; border-top: 1px solid var(--lh-hairline); }
.lh-rsec-divider-actions { display: flex; align-items: center; gap: 2px; opacity: 0.4; transition: opacity 0.15s; }
.lh-rsec-divider:hover .lh-rsec-divider-actions, .lh-rsec-divider:focus-within .lh-rsec-divider-actions { opacity: 1; }

/* Pasted/uploaded images embedded inline within a text section. */
.lh-rsec-images { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0 4px; }
.lh-rsec-image-thumb { position: relative; width: 140px; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--lh-hairline); background: rgba(255,255,255,0.03); }
.lh-rsec-image-thumb img { width: 100%; aspect-ratio: 4 / 3; object-fit: cover; cursor: pointer; }
.lh-rsec-image-thumb-del {
  position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; border-radius: 50%;
  background: rgba(5,4,3,0.75); border: 1px solid rgba(255,255,255,0.18); color: var(--lh-text); font-size: 12px;
  line-height: 1; display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.lh-rsec-image-thumb-del:hover { color: var(--danger); border-color: var(--danger); }
.lh-rsec-paste-hint { font-size: 10.5px; color: var(--lh-text-mute); margin-top: 4px; }
</style>
</head>
<body>
<div class="shell">
  <div class="lh-hero" id="lhHero">
    <div class="lh-hero-media" id="lhHeroMedia">
      <img id="lhHeroPhotoImg" style="display:none;" alt="">
      <div class="lh-hero-photo-choice" id="lhHeroPhotoChoice">
        <button type="button" class="lh-hero-photo-choice-btn" id="lhHeroAddPhotoBtn">+ Add a cover photo</button>
      </div>
    </div>
    <div class="lh-hero-overlay"></div>
    <a href="index.html" class="lh-back-btn" aria-label="Back to dashboard">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      <span>Back</span>
    </a>
    <div class="lh-hero-photo-tools" id="lhHeroPhotoTools" style="display:none;">
      <button type="button" id="lhHeroPhotoChangeBtn">Change</button>
      <button type="button" id="lhHeroPhotoRemoveBtn">Remove</button>
    </div>
    <input type="file" id="lhHeroPhotoInput" accept="image/*" style="display:none;">
    <div class="lh-hero-content">
      <div class="lh-hero-eyebrow" id="lhHeroEyebrow" contenteditable="true"></div>
      <textarea class="lh-hero-title" id="lhHeroTitle" rows="1" placeholder="Your headline here…"></textarea>
      <div class="lh-hero-subtext" id="lhHeroSubtext" contenteditable="true"></div>
      <button type="button" class="lh-hero-cta" id="lhHeroCta">
        <span class="lh-hero-cta-label" id="lhHeroCtaLabel" contenteditable="true"></span>
        <span class="lh-hero-cta-arrow" aria-hidden="true">↗</span>
      </button>
    </div>
  </div>

  <div class="shell-inner">
    <div class="lh-toolbar-row">
      <span class="lh-sync-status" id="lhSyncStatus"></span>
      <button type="button" class="lh-btn-ghost" id="lhResetBtn">Reset to Default</button>
    </div>

    <div class="lh-section" id="lhTopicsSection">
      <div class="lh-section-head">
        <div class="lh-section-title-wrap">
          <div class="lh-section-title">Topics</div>
          <div class="lh-section-sub">Every subject currently being researched.</div>
        </div>
        <div class="lh-section-actions">
          <button type="button" class="lh-btn-primary" id="lhAddTopicBtn">+ Add Topic</button>
        </div>
      </div>
      <div class="lh-filter-row">
        <input type="text" class="lh-search-input" id="lhTopicSearchInput" placeholder="Search topics…">
      </div>
      <div class="lh-topic-grid" id="lhTopicGrid"></div>
    </div>

    <div class="lh-section" id="lhResourcesSection">
      <div class="lh-section-head">
        <div class="lh-section-title-wrap">
          <div class="lh-section-title">Resources</div>
          <div class="lh-section-sub">Articles, books, videos, posts, and notes — per topic.</div>
        </div>
        <div class="lh-section-actions">
          <button type="button" class="lh-btn-primary" id="lhAddResourceBtn">+ Add Resource</button>
        </div>
      </div>
      <div class="lh-filter-row">
        <div class="lh-chip-row" id="lhResourceTopicChips"></div>
      </div>
      <div class="lh-filter-row">
        <div class="lh-chip-row" id="lhResourceTypeChips"></div>
        <input type="text" class="lh-search-input" id="lhResourceSearchInput" placeholder="Search resources…">
      </div>
      <div id="lhResourceGroups"></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="lhTopicModalBg">
  <div class="modal">
    <div class="lh-modal-head"><h3 id="lhTopicModalTitle">Add Topic</h3><button type="button" class="lh-modal-close" id="lhTopicModalCloseBtn" aria-label="Close">&times;</button></div>
    <div class="lh-cover-preview" id="lhTopicCoverPreview">No cover</div>
    <div class="field"><label>Cover photo — upload</label><input type="file" id="lhTopicCoverFileInput" accept="image/*"></div>
    <div class="field"><label>— or paste a URL</label><input type="text" id="lhTopicCoverUrlInput" placeholder="https://…"></div>
    <div class="field"><label>Icon (emoji, shown if no cover)</label><input type="text" id="lhTopicIconInput" maxlength="4" placeholder="📚"></div>
    <div class="field"><label>Title</label><input type="text" id="lhTopicTitleInput" placeholder="e.g. Human Psychology &amp; Neuroscience"></div>
    <div class="field"><label>Description</label><textarea id="lhTopicDescInput" placeholder="What this topic covers…"></textarea></div>
    <div class="field"><label>Tags</label>
      <div class="lh-tag-input-row" id="lhTopicTagRow"></div>
      <input type="text" id="lhTopicTagInput" placeholder="Type a tag and press Enter…">
    </div>
    <div class="lh-modal-actions">
      <button type="button" class="lh-btn-ghost" id="lhTopicModalCancel">Cancel</button>
      <button type="button" class="lh-btn-primary" id="lhTopicModalSave">Save</button>
    </div>
    <span class="delete-link" id="lhTopicModalDelete" style="display:none;">Delete this topic</span>
  </div>
</div>

<div class="modal-bg" id="lhResourceModalBg">
  <div class="modal">
    <div class="lh-modal-head"><h3 id="lhResourceModalTitle">Add Resource</h3><button type="button" class="lh-modal-close" id="lhResourceModalCloseBtn" aria-label="Close">&times;</button></div>
    <div class="lh-cover-preview" id="lhResourceCoverPreview">No cover</div>
    <div class="field"><label>Cover photo — upload</label><input type="file" id="lhResourceCoverFileInput" accept="image/*"></div>
    <div class="field"><label>— or paste a URL</label><input type="text" id="lhResourceCoverUrlInput" placeholder="https://…"></div>
    <div class="field"><label>Title</label><input type="text" id="lhResourceTitleInput" placeholder="e.g. Atomic Habits"></div>
    <div class="field"><label>Subtitle (shown under the headline on the article page)</label><input type="text" id="lhResourceSubtitleInput" placeholder="A one-line summary…"></div>
    <div class="field"><label>Type</label><select id="lhResourceTypeInput"></select></div>
    <div class="field"><label>Topic</label><select id="lhResourceTopicInput"></select></div>
    <div class="field"><label>URL</label><input type="text" id="lhResourceUrlInput" placeholder="https://…"></div>
    <div class="field" id="lhResourceAuthorField"><label id="lhResourceAuthorLabel">Author</label><input type="text" id="lhResourceAuthorInput" placeholder="Who made/wrote it…"></div>
    <div class="field" id="lhResourceTranscriptField" style="display:none;"><label>Transcript</label><textarea id="lhResourceTranscriptInput" class="lh-mono-textarea" placeholder="Paste the video transcript…"></textarea></div>
    <div class="field"><label id="lhResourceNotesLabel">Notes</label><textarea id="lhResourceNotesInput" placeholder="Key takeaways, quotes, thoughts…"></textarea></div>
    <div class="field field-inline"><input type="checkbox" id="lhResourceFavoriteInput"><label style="margin:0;">Favorite</label></div>
    <div class="lh-modal-actions">
      <button type="button" class="lh-btn-ghost" id="lhResourceModalCancel">Cancel</button>
      <button type="button" class="lh-btn-primary" id="lhResourceModalSave">Save</button>
    </div>
    <span class="delete-link" id="lhResourceModalDelete" style="display:none;">Delete this resource</span>
  </div>
</div>

<div class="lh-article-page-bg" id="lhResourceDetailModalBg">
  <div class="lh-article-topbar">
    <button type="button" class="lh-article-back" id="lhResourceDetailCloseBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      <span>Back</span>
    </button>
    <div class="lh-article-topbar-actions">
      <button type="button" class="lh-btn-secondary" id="lhResourceDetailEditBtn">✎ Edit Details</button>
    </div>
  </div>
  <article class="lh-article">
    <div class="lh-article-eyebrow" id="lhArticleEyebrow"></div>
    <h1 class="lh-article-title" id="lhArticleTitle"></h1>
    <p class="lh-article-subtitle" id="lhArticleSubtitle" style="display:none;"></p>

    <hr class="lh-article-hr">
    <div class="lh-article-byline-row">
      <div class="lh-article-byline">
        <div class="lh-article-avatar" id="lhArticleAvatar"></div>
        <div>
          <div class="lh-article-byline-name" id="lhArticleAuthor"></div>
          <div class="lh-article-byline-date" id="lhArticleDate"></div>
        </div>
      </div>
    </div>
    <hr class="lh-article-hr">

    <div class="lh-article-cover" id="lhArticleCover">
      <img id="lhArticleCoverImg" style="display:none;" alt="">
      <div class="lh-article-cover-choice" id="lhArticleCoverChoice">
        <button type="button" class="lh-article-cover-choice-btn" id="lhArticleCoverAddBtn">+ Add a cover photo</button>
      </div>
      <div class="lh-article-cover-tools" id="lhArticleCoverTools" style="display:none;">
        <button type="button" id="lhArticleCoverChangeBtn">Change</button>
        <button type="button" id="lhArticleCoverRemoveBtn">Remove</button>
      </div>
      <input type="file" id="lhArticleCoverFileInput" accept="image/*" style="display:none;">
    </div>

    <div class="lh-article-body" id="lhResourceDetailSections"></div>

    <div class="lh-article-add-row">
      <button type="button" class="lh-btn-secondary" id="lhResourceDetailAddSectionBtn">+ Add Text Section</button>
      <button type="button" class="lh-btn-ghost" id="lhResourceDetailAddDividerBtn">─ Add Divider</button>
    </div>
  </article>
</div>

<script>
(function () {
  'use strict';

  function $(id) { return document.getElementById(id); }

  let DB = null;
  let topicSortable = null;
  let resourceSortables = [];
  let editingTopicId = null;
  let editingTopicTags = [];
  let editingResourceId = null;
  let expandedResourceIds = {};
  let resourceDetailId = null;
  let returnToArticleId = null;

  // Transient, in-memory-only filter state — same precedent as this app's
  // other in-memory view filters (e.g. aitech.html's model/prompt chips).
  let topicSearch = '';
  let resourceTopicFilter = 'all';
  let resourceTypeFilter = 'all';
  let resourceFavoritesOnly = false;
  let resourceSearch = '';

  function openModal(el) { el.classList.add('show'); }
  function closeModal(el) { el.classList.remove('show'); }
  function autosize(ta) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }

  function wireInlineEdit(el, onCommit, opts) {
    opts = opts || {};
    let original = el.textContent;
    el.addEventListener('focus', function () { original = el.textContent; });
    el.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !opts.multiline) { e.preventDefault(); el.blur(); }
      else if (e.key === 'Escape') { e.preventDefault(); el.textContent = original; el.blur(); }
    });
    el.addEventListener('blur', function () {
      const val = el.textContent.trim();
      if (!val && opts.allowEmpty === false) { el.textContent = original; return; }
      if (val === original) return;
      onCommit(val);
    });
  }

  // ============================================================
  // SYNC STATUS — same pattern as aitech.html's handleSaveEvent.

  let syncStatusTimer = null;
  function setSyncStatus(mode, text) {
    const el = $('lhSyncStatus');
    if (!el) return;
    el.className = 'lh-sync-status' + (mode ? ' is-' + mode : '');
    el.textContent = '';
    const dot = document.createElement('span'); dot.className = 'lh-sync-status-dot';
    const label = document.createElement('span'); label.textContent = text;
    el.appendChild(dot); el.appendChild(label);
  }
  function handleSaveEvent(e) {
    if (!navigator.onLine) { setSyncStatus('offline', 'Offline — will sync when reconnected'); return; }
    if (e.detail && e.detail.ok === false) { setSyncStatus('error', "Couldn't save — your browser's storage may be full."); return; }
    setSyncStatus('saved', 'Saved — syncing…');
    clearTimeout(syncStatusTimer);
    syncStatusTimer = setTimeout(function () { if (navigator.onLine) setSyncStatus('saved', 'Synced'); }, 1800);
  }

  // ============================================================

    else { img.style.display = 'none'; img.src = ''; choice.style.display = 'flex'; tools.style.display = 'none'; }

  function openHeroFilePicker() { $('lhHeroPhotoInput').click(); }
  function handleHeroPhotoFile(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!file || file.type.indexOf('image/') !== 0) return;
    const reader = new FileReader();
    reader.onload = function () {
      DB.compressImageDataUrl(reader.result, 1100, 0.78).then(function (compressed) {
        DB.saveHero({ photo: compressed });
        renderHero();
        if (window.PhotoStore) {
          window.PhotoStore.upload(compressed, function (url) {
            if (DB.getHero().photo !== compressed) return;
            DB.saveHero({ photo: url });
            renderHero();
          });
        }
      });
    };
    reader.readAsDataURL(file);
  }

  // ============================================================
  // TAG/TOPIC COLOR — hashed, consistent color per name, same technique as
  // aitech.html's modelTagColor().
  // ============================================================
  function hashToIndex(str, mod) {
    let h = 0;
    for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) >>> 0;
    return h % mod;
  }
  function topicTagColor(name) {
    const palette = [
      { bg: 'rgba(107,227,164,0.14)', fg: '#6BE3A4' }, { bg: 'rgba(255,107,107,0.14)', fg: '#FF9B9B' },
      { bg: 'rgba(125,211,252,0.14)', fg: '#7DD3FC' }, { bg: 'rgba(201,168,118,0.18)', fg: 'var(--lh-gold-bright)' },
      { bg: 'rgba(242,192,99,0.16)', fg: '#F2C063' }, { bg: 'rgba(245,241,233,0.10)', fg: 'var(--lh-text-dim)' }
    ];
    return palette[hashToIndex(name || '', palette.length)];
  }

  function handleTopicCoverFile(e) {

  // ============================================================

  function baseFilteredResources() {

    if (resourceTopicFilter === 'unlinked') list = list.filter(function (r) { return !r.topicId; });

    if (resourceFavoritesOnly) list = list.filter(function (r) { return !!r.favorite; });
    if (resourceSearch) {
      const q = resourceSearch.toLowerCase();
      list = list.filter(function (r) {
        return (r.title || '').toLowerCase().indexOf(q) !== -1 ||
          (r.notes || '').toLowerCase().indexOf(q) !== -1 ||
          (r.author || '').toLowerCase().indexOf(q) !== -1;

    }
    return list;
  }

    el.innerHTML = '';
    if (url) { const img = document.createElement('img'); img.src = url; el.appendChild(img); }
    else { el.textContent = 'No cover'; }
  }
  function openResourceModal(id, presetTopicId) {
    editingResourceId = id || null;
    const r = id ? DB.Resources.get(id) : null;
    $('lhResourceModalTitle').textContent = id ? 'Edit Resource' : 'Add Resource';
    $('lhResourceTitleInput').value = r ? r.title : '';
    $('lhResourceSubtitleInput').value = r ? (r.subtitle || '') : '';
    $('lhResourceCoverUrlInput').value = (r && DB.isValidMediaUrl(r.cover)) ? r.cover : '';
    renderResourceCoverPreview(r ? r.cover : '');
    renderResourceTypeSelect();
    $('lhResourceTypeInput').value = r ? r.type : 'article';
    renderResourceTopicSelect();
    $('lhResourceTopicInput').value = r ? (r.topicId || '') : (presetTopicId || '');
    $('lhResourceUrlInput').value = r ? r.url : '';
    $('lhResourceAuthorInput').value = r ? r.author : '';
    $('lhResourceTranscriptInput').value = r ? r.transcript : '';
    $('lhResourceNotesInput').value = r ? r.notes : '';
    $('lhResourceFavoriteInput').checked = r ? r.favorite : false;
    updateResourceModalFieldsForType($('lhResourceTypeInput').value);
    $('lhResourceModalDelete').style.display = id ? 'block' : 'none';
    openModal($('lhResourceModalBg'));
  }
  function closeResourceModal() {
    closeModal($('lhResourceModalBg'));
    editingResourceId = null;
    if (returnToArticleId) {
      const id = returnToArticleId;
      returnToArticleId = null;
      if (DB.Resources.get(id)) openResourceDetailModal(id);
    }
  }
  function saveResourceModal() {
    const title = $('lhResourceTitleInput').value.trim();
    if (!title) { alert('Give this resource a title first.'); return; }
    const coverUrl = $('lhResourceCoverUrlInput').value.trim();
    const patch = {
      title: title,
      subtitle: $('lhResourceSubtitleInput').value.trim(),
      type: $('lhResourceTypeInput').value,
      topicId: $('lhResourceTopicInput').value || null,
      url: $('lhResourceUrlInput').value.trim(),
      author: $('lhResourceAuthorInput').value.trim(),
      transcript: $('lhResourceTranscriptInput').value,
      notes: $('lhResourceNotesInput').value,
      favorite: $('lhResourceFavoriteInput').checked
    };
    if (coverUrl) {
      if (!DB.isValidMediaUrl(coverUrl)) { alert('That cover URL doesn\'t look valid — use a full http(s) link, or leave it blank.'); return; }
      patch.cover = coverUrl;
    } else {
      const preview = $('lhResourceCoverPreview').querySelector('img');
      patch.cover = preview ? preview.src : '';
    }
    if (editingResourceId) DB.Resources.update(editingResourceId, patch);
    else DB.Resources.add(Object.assign({}, patch, { order: DB.nextOrder(DB.resourcesSorted()) }));
    closeResourceModal(); renderResources(); renderResourceTopicChips(); renderTopics();
  }
  function deleteResourceModal() {
    if (!editingResourceId) return;
    if (!confirm('Delete this resource?')) return;
    DB.Resources.remove(editingResourceId);
    closeResourceModal(); renderResources(); renderTopics();
  }
  function handleResourceCoverFile(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!file || file.type.indexOf('image/') !== 0) return;
    const reader = new FileReader();
    reader.onload = function () {
      DB.compressImageDataUrl(reader.result, 900, 0.82).then(function (compressed) {
        renderResourceCoverPreview(compressed);
        $('lhResourceCoverUrlInput').value = '';
        if (window.PhotoStore) {
          window.PhotoStore.upload(compressed, function (url) {
            const img = $('lhResourceCoverPreview').querySelector('img');
            if (img && img.src === compressed) renderResourceCoverPreview(url);
          });
        }
      });
    };
    reader.readAsDataURL(file);
  }

  // ============================================================
  // RESOURCE "PAGE" — the article view. A big, freeform area per resource
  // for pasting full text/links/notes (plus any photos pasted directly
  // into a section), generated on demand and reorderable — styled as a
  // professional article page per an explicit reference photo: eyebrow,
  // headline, subtitle, a byline row between two hairline dividers, a
  // full-width cover photo, then the body. Sections are the same
  // generated-on-demand-and-reorderable idea as business.html's Platform
  // Detail page (addPlatformSection() etc.), just with two kinds — 'text'
  // (a title + body + any pasted images) and 'divider' (a plain rule).
  // ============================================================
  function avatarInitial(resource) {
    const src = (resource.author || resource.title || '?').trim();
    return src ? src.charAt(0).toUpperCase() : '?';
  }
  function formatArticleDate(ts) {
    const d = new Date(ts || Date.now());
    return d.toLocaleDateString(undefined, { month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase();
  }
  function renderArticleCover(resource) {
    const img = $('lhArticleCoverImg'), choice = $('lhArticleCoverChoice'), tools = $('lhArticleCoverTools');
    if (resource && resource.cover) { img.src = resource.cover; img.style.display = 'block'; choice.style.display = 'none'; tools.style.display = 'flex'; }
    else { img.style.display = 'none'; img.src = ''; choice.style.display = 'flex'; tools.style.display = 'none'; }
  }
  function renderArticleHeader(resource) {
    const topicName = resource.topicId ? DB.topicName(resource.topicId) : null;
    $('lhArticleEyebrow').textContent = (topicName || DB.RESOURCE_TYPE_LABELS[resource.type] || 'Resource').toUpperCase();
    $('lhArticleTitle').textContent = resource.title || 'Untitled';
    const sub = $('lhArticleSubtitle');
    if (resource.subtitle) { sub.textContent = resource.subtitle; sub.style.display = 'block'; }
    else { sub.style.display = 'none'; }
    $('lhArticleAuthor').textContent = resource.author || 'Unknown Author';
    $('lhArticleDate').textContent = formatArticleDate(resource.createdAt);
    $('lhArticleAvatar').textContent = avatarInitial(resource);
    renderArticleCover(resource);
  }
  function openArticleCoverFilePicker() { $('lhArticleCoverFileInput').click(); }
  function handleArticleCoverFile(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!file || !resourceDetailId || file.type.indexOf('image/') !== 0) return;
    const id = resourceDetailId;
    const reader = new FileReader();
    reader.onload = function () {
      DB.compressImageDataUrl(reader.result, 1200, 0.8).then(function (compressed) {
        DB.Resources.update(id, { cover: compressed });
        if (resourceDetailId === id) renderArticleCover(DB.Resources.get(id));
        if (window.PhotoStore) {
          window.PhotoStore.upload(compressed, function (url) {
            if (!url) return;
            const fresh = DB.Resources.get(id);
            if (fresh && fresh.cover === compressed) {
              DB.Resources.update(id, { cover: url });
              if (resourceDetailId === id) renderArticleCover(DB.Resources.get(id));
            }
          });
        }
      });
    };
    reader.readAsDataURL(file);
  }

  // ------- pasted/uploaded images embedded inline within a text section -------
  function buildResourceImageThumb(resourceId, sectionId, image) {
    const thumb = document.createElement('div'); thumb.className = 'lh-rsec-image-thumb';
    const img = document.createElement('img'); img.src = image.url; img.alt = image.name || '';
    img.addEventListener('click', function () { window.open(image.url, '_blank', 'noopener'); });
    thumb.appendChild(img);
    const del = document.createElement('button'); del.type = 'button'; del.className = 'lh-rsec-image-thumb-del'; del.setAttribute('aria-label', 'Remove image'); del.textContent = '×';
    del.addEventListener('click', function (e) {
      e.stopPropagation();
      DB.removeResourceSectionImage(resourceId, sectionId, image.id);
      renderResourceDetailSections(resourceId);
    });
    thumb.appendChild(del);
    return thumb;
  }
  // Processes any photos pasted directly into a section's text box: pulls
  // every image item off the clipboard, compresses it the same way every
  // other photo in this app is compressed, and appends it to that
  // section's own inline gallery — then swaps in the PhotoStore-hosted URL
  // once upload settles, same "compress locally first, upload after"
  // pattern every cover-photo field on this page already uses. Plain text
  // pastes are left completely alone (nothing here calls preventDefault()
  // unless a real image was actually found).
  function handleSectionPaste(resourceId, sectionId, e) {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    const imageItems = Array.prototype.filter.call(items, function (it) { return it.kind === 'file' && it.type.indexOf('image/') === 0; });
    if (!imageItems.length) return;
    e.preventDefault();
    imageItems.forEach(function (item) {
      const file = item.getAsFile();
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function () {
        DB.compressImageDataUrl(reader.result, 900, 0.8).then(function (compressed) {
          const image = { id: DB.uid('img'), url: compressed, name: 'Pasted image' };
          DB.addResourceSectionImage(resourceId, sectionId, image);
          renderResourceDetailSections(resourceId);
          if (window.PhotoStore) {
            window.PhotoStore.upload(compressed, function (url) {
              if (!url) return;
              DB.updateResourceSectionImageUrl(resourceId, sectionId, image.id, url);
              if (resourceDetailId === resourceId) renderResourceDetailSections(resourceId);
            });
          }
        });
      };
      reader.readAsDataURL(file);
    });
  }

  function buildResourceDividerCard(resourceId, section, index, total) {
    const wrap = document.createElement('div'); wrap.className = 'lh-rsec-divider';
    const rule = document.createElement('hr'); rule.className = 'lh-rsec-divider-rule';
    wrap.appendChild(rule);
    const actions = document.createElement('div'); actions.className = 'lh-rsec-divider-actions';
    const reorder = document.createElement('div'); reorder.className = 'lh-rsec-reorder';
    const up = document.createElement('button'); up.type = 'button'; up.textContent = '▲'; up.disabled = index <= 0; up.setAttribute('aria-label', 'Move divider up');
    up.addEventListener('click', function () { DB.moveResourceSection(resourceId, section.id, -1); renderResourceDetailSections(resourceId); });
    const down = document.createElement('button'); down.type = 'button'; down.textContent = '▼'; down.disabled = index >= total - 1; down.setAttribute('aria-label', 'Move divider down');
    down.addEventListener('click', function () { DB.moveResourceSection(resourceId, section.id, 1); renderResourceDetailSections(resourceId); });
    reorder.appendChild(up); reorder.appendChild(down);
    actions.appendChild(reorder);
    const del = document.createElement('button'); del.type = 'button'; del.className = 'lh-rsec-del'; del.title = 'Delete divider'; del.textContent = '✕';
    del.addEventListener('click', function () {
      if (!confirm('Delete this divider?')) return;
      DB.removeResourceSection(resourceId, section.id); renderResourceDetailSections(resourceId);
    });
    actions.appendChild(del);
    wrap.appendChild(actions);
    return wrap;
  }
  function buildResourceSectionCard(resourceId, section, index, total) {
    if (section.type === 'divider') return buildResourceDividerCard(resourceId, section, index, total);
    const wrap = document.createElement('div'); wrap.className = 'lh-rsec';
    const head = document.createElement('div'); head.className = 'lh-rsec-head';
    const reorder = document.createElement('div'); reorder.className = 'lh-rsec-reorder';
    const up = document.createElement('button'); up.type = 'button'; up.textContent = '▲'; up.disabled = index <= 0; up.setAttribute('aria-label', 'Move section up');
    up.addEventListener('click', function () { DB.moveResourceSection(resourceId, section.id, -1); renderResourceDetailSections(resourceId); });
    const down = document.createElement('button'); down.type = 'button'; down.textContent = '▼'; down.disabled = index >= total - 1; down.setAttribute('aria-label', 'Move section down');
    down.addEventListener('click', function () { DB.moveResourceSection(resourceId, section.id, 1); renderResourceDetailSections(resourceId); });
    reorder.appendChild(up); reorder.appendChild(down); head.appendChild(reorder);
    const title = document.createElement('input'); title.type = 'text'; title.className = 'lh-rsec-title-input'; title.value = section.title; title.placeholder = 'SECTION TITLE…';
    title.addEventListener('blur', function () { if (title.value !== section.title) DB.updateResourceSection(resourceId, section.id, { title: title.value }); });
    title.addEventListener('keydown', function (e) { if (e.key === 'Enter') title.blur(); });
    head.appendChild(title);
    const del = document.createElement('button'); del.type = 'button'; del.className = 'lh-rsec-del'; del.title = 'Delete section'; del.textContent = '✕';
    del.addEventListener('click', function () {
      if (!confirm('Delete this section?')) return;
      DB.removeResourceSection(resourceId, section.id); renderResourceDetailSections(resourceId);
    });
    head.appendChild(del);
    wrap.appendChild(head);
    const body = document.createElement('textarea'); body.className = 'lh-rsec-body'; body.value = section.body || ''; body.placeholder = 'Paste or write freely — the full text, a link list, favorite quotes…';
    body.addEventListener('input', function () { autosize(body); });
    body.addEventListener('blur', function () { DB.updateResourceSection(resourceId, section.id, { body: body.value }); });
    body.addEventListener('paste', function (e) { handleSectionPaste(resourceId, section.id, e); });
    wrap.appendChild(body);
    setTimeout(function () { autosize(body); }, 0);
    const images = section.images || [];
    if (images.length) {
      const gallery = document.createElement('div'); gallery.className = 'lh-rsec-images';
      images.forEach(function (im) { gallery.appendChild(buildResourceImageThumb(resourceId, section.id, im)); });
      wrap.appendChild(gallery);
    }
    const hint = document.createElement('div'); hint.className = 'lh-rsec-paste-hint'; hint.textContent = 'Tip: paste a copied photo directly into this box to embed it here.';
    wrap.appendChild(hint);
    return wrap;
  }
  function renderResourceDetailSections(resourceId) {
    const wrap = $('lhResourceDetailSections');
    wrap.innerHTML = '';
    const sections = DB.sectionsForResource(resourceId);
    if (!sections.length) {
      const empty = document.createElement('div'); empty.className = 'lh-rsec-empty'; empty.textContent = 'No sections yet — add a text section or a divider below.';
      wrap.appendChild(empty);
      return;
    }
    sections.forEach(function (s, i) { wrap.appendChild(buildResourceSectionCard(resourceId, s, i, sections.length)); });
  }
  function openResourceDetailModal(id) {
    const r = DB.Resources.get(id);
    if (!r) return;
    resourceDetailId = id;
    // Every resource's page starts with the same two sections the first
    // time it's opened — "paste the full text" + "links, notes & favorite
    // parts" — per the request, applied uniformly to every resource type;
    // still fully renameable/deletable/addable afterward.
    if (!r.sections || !r.sections.length) {
      DB.addResourceSection(id, 'Full Text / Content');
      DB.addResourceSection(id, 'Links, Notes & Favorite Parts');
    }
    renderArticleHeader(DB.Resources.get(id));
    renderResourceDetailSections(id);
    openModal($('lhResourceDetailModalBg'));
  }
  function closeResourceDetailModal() {
    closeModal($('lhResourceDetailModalBg'));
    resourceDetailId = null;
    renderResources();
  }
  // "Edit Details" inside the article page hands off to the ordinary
  // Add/Edit Resource modal (title/type/topic/url/etc.) rather than
  // duplicating those fields here — closes the article page first (both
  // overlays stacking at once would fight for the same z-index) and
  // reopens it once that modal closes, on every exit path (Save, Delete,
  // Cancel, backdrop click), the same modal-stacking precedent
  // business.html's Platform Detail → cover-photo-picker handoff already
  // established.
  function openEditFromArticle() {
    if (!resourceDetailId) return;
    returnToArticleId = resourceDetailId;
    closeModal($('lhResourceDetailModalBg'));
    openResourceModal(resourceDetailId);
  }

  function resetAll() {
    if (!confirm('Reset Learning & Knowledge Hub to its default topics and resources? This deletes everything currently here.')) return;
    DB.seedDefaultData();
    renderHero(); renderTopics(); renderResourceTopicChips(); renderResourceTypeChips(); renderResources();
  }

  // ============================================================
  // INIT
  // ============================================================
  // One-time backfill: uploads every already-stored base64 hero/topic
  // cover photo to Supabase Storage and replaces it with a tiny hosted
  // URL, so this page's localStorage footprint actually shrinks instead
  // of just staying flat from here on. Only marks itself done once every
  // upload it kicked off has settled.
  function migratePhotosToStorage() {
    if (!window.PhotoStore) return;
    var already = false;
    try { already = localStorage.getItem('learning:photosMigratedV1') === 'true'; } catch (e) {}
    if (already) return;
    var jobs = [];
    var heroPhoto = DB.getHero().photo;
    if (typeof heroPhoto === 'string' && heroPhoto.indexOf('data:') === 0) {
      jobs.push(window.PhotoStore.upload(heroPhoto).then(function (url) {
        if (!url) return false;
        if (DB.getHero().photo === heroPhoto) DB.saveHero({ photo: url });
        return true;
      }));
    }
    DB.Topics.list().forEach(function (t) {
      if (typeof t.cover === 'string' && t.cover.indexOf('data:') === 0) {
        var orig = t.cover;
        jobs.push(window.PhotoStore.upload(orig).then(function (url) {
          if (!url) return false;
          var fresh = DB.Topics.get(t.id);
          if (fresh && fresh.cover === orig) DB.Topics.update(t.id, { cover: url });
          return true;
        }));
      }
    });
    DB.Resources.list().forEach(function (r) {
      if (typeof r.cover === 'string' && r.cover.indexOf('data:') === 0) {
        var origCover = r.cover;
        jobs.push(window.PhotoStore.upload(origCover).then(function (url) {
          if (!url) return false;
          var fresh = DB.Resources.get(r.id);
          if (fresh && fresh.cover === origCover) DB.Resources.update(r.id, { cover: url });
          return true;
        }));
      }
      (r.sections || []).forEach(function (sec) {
        (sec.images || []).forEach(function (im) {
          if (typeof im.url === 'string' && im.url.indexOf('data:') === 0) {
            var origImg = im.url;
            jobs.push(window.PhotoStore.upload(origImg).then(function (url) {
              if (!url) return false;
              DB.updateResourceSectionImageUrl(r.id, sec.id, im.id, url);
              return true;
            }));
          }
        });
      });
    });
    if (!jobs.length) { try { localStorage.setItem('learning:photosMigratedV1', 'true'); } catch (e) {} return; }
    // Only mark this page "done" if every upload this pass kicked off
    // actually succeeded — upload() never rejects (it resolves to null on
    // any failure, e.g. the bucket not existing yet), so Promise.all alone
    // would resolve even on total failure and permanently skip retrying.
    Promise.all(jobs).then(function (results) {
      if (results.every(function (ok) { return ok; })) { try { localStorage.setItem('learning:photosMigratedV1', 'true'); } catch (e) {} }
      renderHero();
      renderTopics();
      renderResources();
    });
  }

  function init() {
    DB = window.LearningData;
    if (!DB) return;

    renderHero();
    renderTopics();
    renderResourceTopicChips();
    renderResourceTypeChips();
    renderResources();
    setTimeout(migratePhotosToStorage, 3000);

    setSyncStatus(navigator.onLine ? null : 'offline', navigator.onLine ? 'Changes save automatically' : 'Offline — will sync when reconnected');
    window.addEventListener('learning:save', handleSaveEvent);
    window.addEventListener('online', function () { setSyncStatus('saved', 'Back online — syncing…'); });
    window.addEventListener('offline', function () { setSyncStatus('offline', 'Offline — will sync when reconnected'); });

    wireInlineEdit($('lhHeroEyebrow'), function (v) { DB.saveHero({ eyebrow: v }); }, { allowEmpty: true });
    wireInlineEdit($('lhHeroSubtext'), function (v) { DB.saveHero({ subtext: v }); }, { allowEmpty: true });
    wireInlineEdit($('lhHeroCtaLabel'), function (v) { DB.saveHero({ ctaLabel: v }); }, { allowEmpty: false });
    $('lhHeroTitle').addEventListener('input', function () { autosize($('lhHeroTitle')); });
    $('lhHeroTitle').addEventListener('blur', function () { DB.saveHero({ title: $('lhHeroTitle').value }); });
    $('lhHeroAddPhotoBtn').addEventListener('click', openHeroFilePicker);
    $('lhHeroPhotoChangeBtn').addEventListener('click', function (e) { e.stopPropagation(); openHeroFilePicker(); });
    $('lhHeroPhotoRemoveBtn').addEventListener('click', function (e) { e.stopPropagation(); DB.saveHero({ photo: '', photoColor: '' }); renderHero(); });
    $('lhHeroPhotoInput').addEventListener('change', handleHeroPhotoFile);
    $('lhHeroCta').addEventListener('click', function () {
      $('lhTopicsSection').scrollIntoView({ behavior: window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 'auto' : 'smooth', block: 'start' });
    });

    $('lhResetBtn').addEventListener('click', resetAll);

    // Topics search wiring
    $('lhTopicSearchInput').addEventListener('input', function () { topicSearch = this.value.trim(); renderTopics(); });

    // Topics modal wiring
    $('lhAddTopicBtn').addEventListener('click', function () { openTopicModal(null); });
    $('lhTopicModalCloseBtn').addEventListener('click', closeTopicModal);
    $('lhTopicModalCancel').addEventListener('click', closeTopicModal);
    $('lhTopicModalBg').addEventListener('click', function (e) { if (e.target === this) closeTopicModal(); });
    $('lhTopicModalSave').addEventListener('click', saveTopicModal);
    $('lhTopicModalDelete').addEventListener('click', deleteTopicModal);
    $('lhTopicCoverFileInput').addEventListener('change', handleTopicCoverFile);
    $('lhTopicCoverUrlInput').addEventListener('input', function () {
      const v = this.value.trim();
      if (v && DB.isValidMediaUrl(v)) renderTopicCoverPreview(v);
      else if (!v) renderTopicCoverPreview('');
    });
    wireTagInput($('lhTopicTagInput'), function () { return editingTopicTags; }, function (t) { editingTopicTags = t; }, renderTopicTagRow);

    // Resources search wiring
    $('lhResourceSearchInput').addEventListener('input', function () { resourceSearch = this.value.trim(); renderResources(); });

    // Resources modal wiring
    $('lhAddResourceBtn').addEventListener('click', function () { openResourceModal(null, resourceTopicFilter !== 'all' && resourceTopicFilter !== 'unlinked' ? resourceTopicFilter : null); });
    $('lhResourceModalCloseBtn').addEventListener('click', closeResourceModal);
    $('lhResourceModalCancel').addEventListener('click', closeResourceModal);
    $('lhResourceModalBg').addEventListener('click', function (e) { if (e.target === this) closeResourceModal(); });
    $('lhResourceModalSave').addEventListener('click', saveResourceModal);
    $('lhResourceModalDelete').addEventListener('click', deleteResourceModal);
    $('lhResourceTypeInput').addEventListener('change', function () { updateResourceModalFieldsForType(this.value); });
    $('lhResourceCoverFileInput').addEventListener('change', handleResourceCoverFile);
    $('lhResourceCoverUrlInput').addEventListener('input', function () {
      const v = this.value.trim();
      if (v && DB.isValidMediaUrl(v)) renderResourceCoverPreview(v);
      else if (!v) renderResourceCoverPreview('');
    });

    // Resource "page" (the article view) wiring
    $('lhResourceDetailCloseBtn').addEventListener('click', closeResourceDetailModal);
    $('lhResourceDetailModalBg').addEventListener('click', function (e) { if (e.target === this) closeResourceDetailModal(); });
    $('lhResourceDetailEditBtn').addEventListener('click', openEditFromArticle);
    $('lhResourceDetailAddSectionBtn').addEventListener('click', function () {
      if (!resourceDetailId) return;
      DB.addResourceSection(resourceDetailId, 'New Section');
      renderResourceDetailSections(resourceDetailId);
    });
    $('lhResourceDetailAddDividerBtn').addEventListener('click', function () {
      if (!resourceDetailId) return;
      DB.addResourceSection(resourceDetailId, '', 'divider');
      renderResourceDetailSections(resourceDetailId);
    });
    $('lhArticleCoverAddBtn').addEventListener('click', openArticleCoverFilePicker);
    $('lhArticleCoverChangeBtn').addEventListener('click', function (e) { e.stopPropagation(); openArticleCoverFilePicker(); });
    $('lhArticleCoverRemoveBtn').addEventListener('click', function (e) {
      e.stopPropagation();
      if (!resourceDetailId) return;
      DB.Resources.update(resourceDetailId, { cover: '' });
      renderArticleCover(DB.Resources.get(resourceDetailId));
    });
    $('lhArticleCoverFileInput').addEventListener('change', handleArticleCoverFile);

    // Empty-storage seed-race safety window — same reasoning as
    // aitech.html/dreamboard.html/business.html's maybeSeedAfterSyncAttempt().
    let remoteAppliedOnce = false;
    function maybeSeedAfterSyncAttempt() {
      if (remoteAppliedOnce) return;
      if (DB.Topics.list().length > 0 || DB.Resources.list().length > 0) return;
      DB.seedIfEmpty();
      renderHero(); renderTopics(); renderResourceTopicChips(); renderResourceTypeChips(); renderResources();
    }

    const startedEmpty = DB.Topics.list().length === 0 && DB.Resources.list().length === 0;
    if (typeof initCloudSync === 'function') {
      initCloudSync({
        appKey: 'learning',
        syncedPrefixes: ['learning:'],
        onApplied: function () {
          remoteAppliedOnce = true;
          renderHero(); renderTopics(); renderResourceTopicChips(); renderResourceTypeChips(); renderResources();
        }
      });
      if (startedEmpty) { setTimeout(maybeSeedAfterSyncAttempt, 5000); }
    } else if (startedEmpty) {
      maybeSeedAfterSyncAttempt();
    }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
