<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0a08">
<title>Dream Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js" defer></script>
<script src="sync.js" defer></script>
<script src="photo-store.js" defer></script>
<script src="topbar.js" defer></script>
<script src="dreamboard-data.js" defer></script>
<style>
/* =============================================================
   Dream Board — re-themed to a dark, cinematic "destination wedding
   photographer" reference (near-black + warm champagne/gold, italic
   serif display type, frosted-glass pill buttons). A deliberate one-off
   palette exception, same category as braindump.html's forest theme or
   gym.html's crimson grading (see CLAUDE.md §6/DO NOT MODIFY rule 2) —
   the light cream/blush look this page launched with is retired in
   favor of this reference photo, per an explicit follow-up request. No
   other page's tokens are touched.
   ============================================================= */
:root {
  --db-bg: #0b0a08;
  --db-bg-deep: #050403;
  --db-paper: rgba(255, 255, 255, 0.045);
  --db-paper-solid: #16130f;
  --db-gold: #c9a876;
  --db-gold-bright: #e8cf9f;
  --db-text: #f5f1e9;
  --db-text-dim: rgba(245, 241, 233, 0.68);
  --db-text-mute: rgba(245, 241, 233, 0.44);
  --db-hairline: rgba(201, 168, 118, 0.22);
  --db-accent-tint: rgba(201, 168, 118, 0.14);
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --font-serif: "Cormorant Garamond", Georgia, "Iowan Old Style", serif;
  --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  color-scheme: dark;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--db-bg-deep); color: var(--db-text); font-family: var(--font); min-height: 100%; -webkit-font-smoothing: antialiased; }
html, body { scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { width: 0 !important; height: 0 !important; display: none !important; }
img, video { max-width: 100%; display: block; }
button, input, textarea, select { font-family: inherit; color: inherit; }

body::before {
  content: '';
  position: fixed; inset: -10%; z-index: -2;
  background:
    radial-gradient(55% 42% at 82% 10%, rgba(201, 168, 118, 0.20) 0%, transparent 55%),
    radial-gradient(50% 40% at 14% 92%, rgba(120, 90, 50, 0.16) 0%, transparent 55%),
    linear-gradient(180deg, rgba(11,10,8,0.78) 0%, rgba(5,4,3,0.88) 100%);
  filter: blur(40px) saturate(1.05);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.6;
  pointer-events: none;
}
/* ===== Page-wide cover-photo backdrop — the active tab's hero photo,
   blurred and dimmed, shown behind the ENTIRE page (not just the hero),
   so every glass widget card below actually has something colorful to
   blur/reveal (see the reference photo: a frosted card over a full sky
   photo, not over a flat color). body::before/after (above) sit on top
   of this at reduced opacity for legibility; when a tab has no cover
   photo, this layer is simply empty and the plain dark gradient shows
   through unchanged. Updated by renderPageBg() whenever the active tab
   or its photo changes. ===== */
#dbPageBg {
  position: fixed; inset: 0; z-index: -3;
  background-size: cover; background-position: center; background-repeat: no-repeat;
  transform: scale(1.15);
  filter: blur(60px) saturate(1.35) brightness(0.55);
  transition: background-image 0.3s ease;
  pointer-events: none;
}

:focus-visible { outline: 2px solid var(--db-gold-bright); outline-offset: 2px; border-radius: 4px; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important; animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important; scroll-behavior: auto !important;
  }
}

.shell { max-width: 1100px; margin: 0 auto; padding: 0 0 60px; }
.shell-inner { padding: 0 16px; }

/* ===== Back button — floats over the hero ===== */
.db-back-btn {
  position: absolute; top: max(14px, env(safe-area-inset-top)); left: max(14px, env(safe-area-inset-left)); z-index: 5;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px 8px 10px;
  background: rgba(11, 10, 8, 0.55); backdrop-filter: blur(10px);
  border: 1px solid var(--db-hairline);
  border-radius: 999px; color: var(--db-text-dim);
  font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
  text-decoration: none; -webkit-tap-highlight-color: transparent;
  transition: background 0.15s ease, color 0.15s ease;
}
.db-back-btn:hover { background: rgba(11, 10, 8, 0.8); color: var(--db-text); }
.db-back-btn svg { display: block; }

/* ===== Hero — one per tab, styled after the reference: full-bleed cover
   photo, dark gradient scrim, tracked-caps eyebrow, large serif headline,
   subtext, frosted-glass pill CTA, "scroll to explore" flourish. ===== */
.db-hero {
  position: relative; min-height: 78vh; display: flex; flex-direction: column;
  justify-content: flex-end; overflow: hidden; padding: 90px 20px 46px;
}
.db-hero-media { position: absolute; inset: 0; z-index: 0; background: var(--db-paper-solid); }
.db-hero-media img, .db-hero-media video { width: 100%; height: 100%; object-fit: cover; }
.db-hero-photo-choice {
  position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 10px; padding: 20px;
}
.db-hero-photo-choice-btn {
  background: rgba(11,10,8,0.4); border: 1px solid var(--db-hairline); border-radius: 999px;
  color: var(--db-text-mute); font-size: 12.5px; font-weight: 600; letter-spacing: 0.03em;
  cursor: pointer; padding: 9px 18px;
}
.db-hero-photo-choice-btn:hover { color: var(--db-gold-bright); border-color: var(--db-gold); }
.db-hero-reattach {
  position: absolute; inset: 0; z-index: 1; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; color: var(--db-text-mute); background: rgba(0,0,0,0.3); text-align: center; padding: 20px;
}
.db-hero-reattach-icon { font-size: 30px; }
.db-hero-reattach-label { font-size: 12.5px; font-weight: 600; }
.db-hero-reattach-btn {
  background: rgba(11,10,8,0.6); border: 1px solid var(--db-hairline); color: var(--db-text);
  border-radius: 999px; padding: 7px 16px; font-size: 11.5px; font-weight: 700; cursor: pointer;
}
.db-hero-reattach-btn:hover { border-color: var(--db-gold); color: var(--db-gold-bright); }
#dbPageBgVideo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.db-hero-overlay {
  position: absolute; inset: 0; z-index: 1; pointer-events: none;
  background:
    linear-gradient(180deg, rgba(5,4,3,0.55) 0%, rgba(5,4,3,0.15) 32%, rgba(5,4,3,0.35) 62%, rgba(5,4,3,0.92) 100%);
}
.db-hero-photo-tools {
  position: absolute; top: max(14px, env(safe-area-inset-top)); right: max(14px, env(safe-area-inset-right)); z-index: 5;
  display: flex; gap: 6px;
}
.db-hero-photo-tools button {
  background: rgba(11, 10, 8, 0.55); backdrop-filter: blur(10px); border: 1px solid var(--db-hairline);
  color: var(--db-text-dim); border-radius: 999px; padding: 7px 12px; font-size: 11px; font-weight: 700;
  letter-spacing: 0.04em; cursor: pointer;
}
.db-hero-photo-tools button:hover { color: var(--db-gold-bright); border-color: var(--db-gold); }

.db-hero-content { position: relative; z-index: 2; max-width: 640px; }
.db-hero-eyebrow {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--db-gold-bright); margin-bottom: 14px; outline-offset: 4px;
}
.db-hero-eyebrow::before { content: ''; display: inline-block; width: 22px; height: 1px; background: var(--db-gold); margin-right: 10px; vertical-align: middle; }
.db-hero-title {
  display: block; width: 100%; background: transparent; border: none; resize: none; overflow: hidden;
  font-family: var(--font-serif); font-weight: 500; color: var(--db-text);
  font-size: clamp(34px, 8vw, 58px); line-height: 1.06; letter-spacing: -0.01em;
  padding: 0; margin-bottom: 16px; text-shadow: 0 4px 30px rgba(0,0,0,0.5);
}
.db-hero-title::placeholder { color: rgba(245,241,233,0.35); }
.db-hero-subtext {
  font-size: 14px; line-height: 1.6; color: var(--db-text-dim); max-width: 440px; margin-bottom: 26px;
  outline-offset: 4px;
}
.db-hero-cta {
  display: inline-flex; align-items: center; gap: 10px;
  background: linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.03) 100%);
  backdrop-filter: blur(8px);
  border: 1px solid var(--db-hairline); border-radius: 999px;
  padding: 13px 24px; cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: border-color 0.15s, background 0.15s;
}
.db-hero-cta:hover { border-color: var(--db-gold); background: rgba(201,168,118,0.10); }
.db-hero-cta-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--db-text);
}
.db-hero-cta-arrow { color: var(--db-gold-bright); font-size: 13px; }
.db-hero-scroll-hint {
  position: absolute; right: 20px; bottom: 26px; z-index: 2;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--db-text-mute);
}
.db-hero-scroll-hint span:first-child { writing-mode: vertical-rl; }
.db-hero-scroll-arrow {
  width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--db-hairline);
  display: flex; align-items: center; justify-content: center; color: var(--db-gold);
  animation: db-scroll-bounce 2.2s ease-in-out infinite;
}
@keyframes db-scroll-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(4px); } }
@media (max-width: 620px) {
  .db-hero { min-height: 84vh; padding: 84px 16px 34px; }
  .db-hero-scroll-hint { display: none; }
}

/* ===== Tab row ===== */
.db-tabs-row {
  display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap;
  padding: 20px 0 14px; margin-bottom: 20px; border-bottom: 1px solid var(--db-hairline);
}
.db-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
.db-tab {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--db-paper); border: 1px solid var(--db-hairline); border-radius: 999px;
  padding: 8px 14px; font-size: 12.5px; font-weight: 600; letter-spacing: 0.02em; color: var(--db-text-mute); cursor: pointer;
  -webkit-tap-highlight-color: transparent; transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.db-tab:hover { color: var(--db-text); }
.db-tab.active { background: var(--db-accent-tint); color: var(--db-gold-bright); border-color: var(--db-gold); }
.db-tab-edit { font-size: 11px; opacity: 0.65; cursor: pointer; }
.db-tab-edit:hover { opacity: 1; }
.db-tab-rename-input {
  background: var(--db-paper-solid); border: 1px solid var(--db-gold); border-radius: 999px;
  padding: 6px 10px; font-size: 12.5px; font-weight: 600; color: var(--db-text); width: 140px;
}
.db-tab-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.db-sync-status {
  font-size: 11px; font-weight: 600; letter-spacing: 0.02em; color: var(--db-text-mute);
  display: flex; align-items: center; gap: 5px;
}
.db-sync-status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--db-text-mute); flex-shrink: 0; }
.db-sync-status.is-saved .db-sync-status-dot { background: var(--success); }
.db-sync-status.is-saved { color: var(--db-text-dim); }
.db-sync-status.is-error, .db-sync-status.is-offline { color: var(--danger); }
.db-sync-status.is-error .db-sync-status-dot, .db-sync-status.is-offline .db-sync-status-dot {
  background: var(--danger); animation: db-sync-pulse 1.4s ease-in-out infinite;
}
@keyframes db-sync-pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,107,0.5); } 50% { box-shadow: 0 0 0 4px rgba(255,107,107,0); } }
@media (max-width: 480px) { .db-tab-actions { width: 100%; justify-content: space-between; } }

.db-btn-primary, .db-btn-secondary, .db-btn-ghost {
  border-radius: 999px; padding: 9px 16px; font-size: 12px; font-weight: 700;
  cursor: pointer; -webkit-tap-highlight-color: transparent; letter-spacing: 0.03em;
  transition: background 0.15s, border-color 0.15s, opacity 0.15s;
}
.db-btn-primary { background: linear-gradient(180deg, var(--db-gold-bright) 0%, var(--db-gold) 100%); color: #24190c; border: 1px solid var(--db-gold); }
.db-btn-primary:hover { opacity: 0.9; }
.db-btn-secondary { background: var(--db-paper); color: var(--db-text-dim); border: 1px solid var(--db-hairline); }
.db-btn-secondary:hover { color: var(--db-gold-bright); border-color: var(--db-gold); }
.db-btn-ghost { background: transparent; color: var(--db-text-mute); border: 1px solid var(--db-hairline); }
.db-btn-ghost:hover { color: var(--db-text); border-color: var(--db-text-mute); }

/* ===== Board ===== */
.db-board { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; align-items: start; }
@media (max-width: 900px) { .db-board { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
@media (max-width: 620px) { .db-board { grid-template-columns: 1fr; } }
.db-col { display: flex; flex-direction: column; gap: 16px; min-width: 0; min-height: 40px; }

/* ===== Widget card chassis — real frosted glass over the page's cover-
   photo backdrop (#dbPageBg), gold hairline, numbered index + decorative
   arrow (top row) echoing the reference's "01 / ↗" card corners, with
   drag/wide/delete tucked into a subtle hover-reveal row so the numbered-
   card look stays clean. Each card can carry its own color-grading tint
   (a widget's `tint` field, resolved via effectiveTint() in the script
   below) painted by the ::before layer using the --tint custom property
   set inline per-card — a real DOM overlay would also work but a
   pseudo-element keeps the glass blur/border on the card itself
   untouched by the tint. ===== */
.dw-card {
  position: relative; overflow: hidden;
  background: rgba(255, 255, 255, 0.08);
  -webkit-backdrop-filter: blur(22px) saturate(1.6);
  backdrop-filter: blur(22px) saturate(1.6);
  border: 1px solid rgba(255, 255, 255, 0.22);
  border-radius: var(--radius-lg);
  padding: 16px 16px 18px;
  box-shadow: 0 1px 0 rgba(255,255,255,0.14) inset, 0 14px 36px rgba(0,0,0,0.35);
  --tint: transparent;
}
.dw-card::before {
  content: ''; position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background: var(--tint); opacity: 0.32;
}
.dw-card-head, .dw-card-title-row, .dw-card-body { position: relative; z-index: 1; }
.dw-card-ghost { opacity: 0.4; border: 1px dashed var(--db-gold); background: rgba(201,168,118,0.12); }
.sortable-chosen { box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

.dw-card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.dw-card-index {
  font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 0.06em; color: var(--db-gold);
}
.dw-card-hover-actions { display: flex; align-items: center; gap: 2px; opacity: 0.55; transition: opacity 0.15s; }
.dw-card:hover .dw-card-hover-actions, .dw-card:focus-within .dw-card-hover-actions { opacity: 1; }
.dw-drag-handle {
  flex-shrink: 0; cursor: grab; color: var(--db-text-mute); font-size: 13px; line-height: 1;
  letter-spacing: -1px; padding: 4px; -webkit-tap-highlight-color: transparent;
}
.dw-drag-handle:active { cursor: grabbing; }
.dw-card-del, .dw-wide-toggle {
  background: transparent; border: none; color: var(--db-text-mute); font-size: 14px; line-height: 1;
  cursor: pointer; padding: 4px 6px; border-radius: 6px;
}
.dw-card-del:hover { color: var(--danger); background: rgba(255,107,107,0.10); }
.dw-wide-toggle { font-size: 9.5px; letter-spacing: 0.05em; }
.dw-wide-toggle:hover { background: var(--db-accent-tint); color: var(--db-gold-bright); }

/* ===== Color-grading control — a small swatch button that opens an
   inline (not floating) popover, so it never clips off-screen on a
   narrow phone the way an absolutely-positioned popover could. ===== */
.dw-tint-btn {
  flex-shrink: 0; width: 18px; height: 18px; border-radius: 50%; padding: 0; cursor: pointer;
  border: 1.5px solid rgba(255,255,255,0.5); background: transparent;
}
.dw-tint-btn-empty {
  background: repeating-conic-gradient(rgba(255,255,255,0.25) 0% 25%, transparent 0% 50%) 0 0/8px 8px;
}
.dw-tint-popover {
  margin: 8px 0 4px; padding: 10px; border-radius: var(--radius-md);
  background: rgba(0,0,0,0.28); border: 1px solid rgba(255,255,255,0.16);
}
.dw-tint-label {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--db-text-mute); margin-bottom: 6px;
}
.dw-tint-swatches { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
.dw-tint-swatch {
  width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.4); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 11px;
}
.dw-tint-swatch:hover { border-color: var(--db-gold-bright); }
.dw-tint-swatch-photo:disabled { opacity: 0.3; cursor: not-allowed; }
.dw-tint-custom-row { display: flex; align-items: center; gap: 10px; }
.dw-tint-custom-row input[type="color"] {
  width: 44px; height: 34px; border: 1px solid rgba(255,255,255,0.35); border-radius: 8px; padding: 0;
  background: none; cursor: pointer; flex-shrink: 0;
}
.dw-tint-custom-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
.dw-tint-custom-row input[type="color"]::-webkit-color-swatch { border: none; border-radius: 6px; }
.dw-tint-hex {
  flex: 1; font-family: var(--font-mono); font-size: 11.5px; font-weight: 600;
  color: var(--db-text-dim); letter-spacing: 0.03em;
}
.dw-tint-clear {
  background: transparent; border: 1px solid rgba(255,255,255,0.22); color: var(--db-text-dim);
  border-radius: 999px; padding: 5px 12px; font-size: 11px; font-weight: 700; cursor: pointer;
}
.dw-tint-clear:hover { color: var(--db-text); border-color: var(--db-text-mute); }

.dw-card-title-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 12px; }
.dw-card-title {
  flex: 1; min-width: 0; font-family: var(--font-serif); font-weight: 600; font-size: 19px;
  color: var(--db-text); outline-offset: 3px; word-break: break-word;
}

/* ===== Checklist / plain list ===== */
.dw-plain-list, .dw-affirm-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.dw-plain-row {
  display: flex; align-items: flex-start; gap: 10px; padding: 8px 8px; border-radius: var(--radius-sm);
  transition: background 0.15s;
}
.dw-plain-row:hover { background: rgba(255,255,255,0.03); }
.dw-plain-row .dw-check-cb { margin-top: 3px; flex-shrink: 0; width: 16px; height: 16px; accent-color: var(--db-gold); cursor: pointer; }
.dw-item-text { flex: 1; min-width: 0; font-size: 13.5px; line-height: 1.5; outline-offset: 3px; word-break: break-word; }
.dw-item-done .dw-item-text { text-decoration: line-through; color: var(--db-text-mute); }
.dw-item-del {
  flex-shrink: 0; background: transparent; border: none; color: var(--db-text-mute); opacity: 0;
  font-size: 14px; cursor: pointer; padding: 0 4px; transition: opacity 0.15s;
}
.dw-plain-row:hover .dw-item-del, .dw-affirm-row:hover .dw-item-del { opacity: 1; }
.dw-item-del:hover { color: var(--danger); }

.dw-affirm-row {
  position: relative; background: rgba(255,255,255,0.03); border: 1px solid var(--db-hairline); border-radius: var(--radius-md);
  padding: 12px 30px 12px 14px;
}
.dw-affirm-text { font-family: var(--font-serif); font-style: italic; font-size: 15px; line-height: 1.4; color: var(--db-text); outline-offset: 3px; display: block; }
.dw-affirm-row .dw-item-del { position: absolute; top: 6px; right: 6px; }

.dw-additem-row { display: flex; gap: 6px; }
.dw-additem-row input {
  flex: 1; min-width: 0; background: rgba(255,255,255,0.04); border: 1px solid var(--db-hairline); border-radius: var(--radius-sm);
  padding: 8px 10px; font-size: 13px; color: var(--db-text);
}
.dw-additem-btn {
  flex-shrink: 0; background: var(--db-gold); color: #24190c; border: none; border-radius: var(--radius-sm);
  width: 32px; font-size: 15px; font-weight: 700; cursor: pointer;
}

/* ===== Note ===== */
.dw-note-textarea {
  width: 100%; min-height: 90px; resize: vertical; border: 1px solid var(--db-hairline); background: rgba(255,255,255,0.03);
  border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13.5px; line-height: 1.55; color: var(--db-text);
}

/* ===== Quote — a large decorative mark echoing the reference's testimonial
   block. ===== */
.dw-quote-body { padding: 6px 4px 2px; position: relative; }
.dw-quote-body::before {
  content: '\201C'; position: absolute; top: -22px; left: -4px; font-family: var(--font-serif);
  font-size: 64px; color: var(--db-gold); opacity: 0.4; line-height: 1;
}
.dw-quote-text {
  position: relative; font-family: var(--font-serif); font-style: italic; font-size: 19px; line-height: 1.4; color: var(--db-text);
  outline-offset: 4px; padding-top: 6px;
}
.dw-quote-author { margin-top: 10px; font-size: 11.5px; font-weight: 700; letter-spacing: 0.04em; color: var(--db-gold-bright); text-transform: uppercase; outline-offset: 3px; }
.dw-quote-author::before { content: '\2014\00A0'; }

/* ===== Steps tracker ===== */
.dw-steps-body { display: flex; flex-direction: column; gap: 8px; }
.dw-steps-row, .dw-steps-goal-row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--db-text-mute); }
.dw-steps-input {
  width: 90px; font-family: var(--font-mono); font-size: 20px; font-weight: 700; color: var(--db-text);
  background: rgba(255,255,255,0.04); border: 1px solid var(--db-hairline); border-radius: var(--radius-sm); padding: 6px 8px;
}
.dw-steps-goal-input {
  width: 70px; font-family: var(--font-mono); font-size: 12.5px; color: var(--db-text);
  background: rgba(255,255,255,0.04); border: 1px solid var(--db-hairline); border-radius: var(--radius-sm); padding: 4px 6px;
}
.dw-progress-bar { height: 8px; border-radius: 999px; background: rgba(255,255,255,0.06); overflow: hidden; border: 1px solid var(--db-hairline); }
.dw-progress-fill { height: 100%; background: linear-gradient(90deg, var(--db-gold) 0%, var(--db-gold-bright) 100%); border-radius: 999px; transition: width 0.3s ease; }
.dw-steps-pct { font-size: 11px; color: var(--db-text-mute); font-weight: 600; }

/* ===== Photo / video grid ===== */
.dw-photo-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
.dw-photo-grid-2 { grid-template-columns: 1fr 1fr; }
.dw-photo-slot {
  position: relative; border-radius: var(--radius-md); overflow: hidden; background: rgba(255,255,255,0.03);
  border: 1px solid var(--db-hairline); aspect-ratio: 4 / 3;
}
.dw-photo-slot img, .dw-photo-slot video { width: 100%; height: 100%; object-fit: cover; }
.dw-photo-slot-empty, .dw-photo-slot-broken {
  height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; color: var(--db-text-mute); font-size: 11px; text-align: center; padding: 8px;
}
.dw-photo-broken-icon { font-size: 22px; }
.dw-photo-reattach-btn {
  background: var(--db-paper-solid); border: 1px solid var(--db-hairline); border-radius: 999px; padding: 4px 10px;
  font-size: 11px; font-weight: 700; cursor: pointer; color: var(--db-text);
}
.dw-slot-del {
  position: absolute; top: 5px; right: 5px; width: 22px; height: 22px; border-radius: 50%;
  background: rgba(5,4,3,0.65); color: #fff; border: none; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.dw-photo-addslot {
  aspect-ratio: 4 / 3; border: 1px dashed var(--db-text-mute); border-radius: var(--radius-md);
  background: transparent; color: var(--db-text-mute); font-size: 12px; font-weight: 600; cursor: pointer;
}
.dw-photo-addslot:hover { background: rgba(255,255,255,0.03); color: var(--db-gold-bright); border-color: var(--db-gold); }
.dw-photo-caption { margin-top: 10px; font-size: 10.5px; color: var(--db-text-mute); line-height: 1.5; }

/* ===== Feature card — a single numbered photo card with an overlay title
   + caption, mirroring the reference's "01 The Films / 02 The Moments /
   03 The Experience" row. ===== */
.dw-feature-photo {
  position: relative; border-radius: var(--radius-md); overflow: hidden; background: var(--db-paper-solid);
  border: 1px solid var(--db-hairline); aspect-ratio: 3 / 4;
}
.dw-feature-photo img { width: 100%; height: 100%; object-fit: cover; }
.dw-feature-photo-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 45%, rgba(5,4,3,0.85) 100%);
  display: flex; flex-direction: column; justify-content: flex-end; padding: 14px;
}
.dw-feature-title {
  font-family: var(--font-serif); font-weight: 600; font-size: 18px; color: var(--db-text);
  outline-offset: 3px; text-shadow: 0 2px 12px rgba(0,0,0,0.6);
}
.dw-feature-caption { margin-top: 4px; font-size: 11px; color: var(--db-text-dim); outline-offset: 3px; text-shadow: 0 2px 8px rgba(0,0,0,0.6); }
.dw-feature-addphoto {
  position: absolute; inset: 0; width: 100%; height: 100%; background: transparent; border: none;
  color: var(--db-text-mute); font-size: 12px; font-weight: 600; cursor: pointer;
}
.dw-feature-addphoto:hover { color: var(--db-gold-bright); }
.dw-feature-photo-change {
  position: absolute; top: 8px; right: 8px; z-index: 2; background: rgba(5,4,3,0.6); border: 1px solid var(--db-hairline);
  color: var(--db-text-dim); border-radius: 999px; padding: 4px 10px; font-size: 10.5px; font-weight: 700; cursor: pointer;
}
.dw-feature-photo-change:hover { color: var(--db-gold-bright); border-color: var(--db-gold); }

/* ===== Info card — small centered icon/title/subtitle tile, mirroring the
   reference's "Traveling Worldwide" / "Follow Along" cards. ===== */
.dw-infocard-body { text-align: center; padding: 10px 4px 4px; }
.dw-infocard-icon { font-size: 26px; margin-bottom: 10px; outline-offset: 3px; }
.dw-infocard-title { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--db-gold-bright); outline-offset: 3px; }
.dw-infocard-subtitle { margin-top: 6px; font-size: 12.5px; color: var(--db-text-dim); outline-offset: 3px; }

/* ===== Calendar ===== */
.dw-cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.dw-cal-nav {
  background: rgba(255,255,255,0.04); border: 1px solid var(--db-hairline); border-radius: 50%; width: 26px; height: 26px;
  font-size: 14px; cursor: pointer; color: var(--db-text);
}
.dw-cal-label { font-size: 12.5px; font-weight: 700; letter-spacing: 0.04em; color: var(--db-text); }
.dw-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.dw-cal-dow { font-size: 9.5px; font-weight: 700; color: var(--db-text-mute); text-align: center; padding-bottom: 4px; }
.dw-cal-day {
  position: relative; aspect-ratio: 1; border: 1px solid transparent; border-radius: 7px; background: rgba(255,255,255,0.03);
  font-size: 11px; color: var(--db-text); cursor: pointer; display: flex; align-items: flex-start; justify-content: flex-start;
  padding: 3px 4px;
}
.dw-cal-day:hover { border-color: var(--db-hairline); background: var(--db-accent-tint); }
.dw-cal-day-empty { background: transparent; cursor: default; pointer-events: none; }
.dw-cal-day-today { border-color: var(--db-gold); font-weight: 700; }
.dw-cal-note-dot { position: absolute; bottom: 4px; right: 4px; width: 5px; height: 5px; border-radius: 50%; background: var(--db-gold-bright); }

/* ===== Modals — plain .modal-bg/.modal so topbar.js's existing
   MODAL_SELECTORS/mobile full-screen handling covers this page with
   zero topbar.js edits (see CLAUDE.md DO NOT MODIFY §2). ===== */
.modal-bg {
  display: none; position: fixed; inset: 0; z-index: 60; background: rgba(5,4,3,0.65);
  align-items: center; justify-content: center; padding: 20px;
}
.modal-bg.show { display: flex; }
.modal {
  background: rgba(20, 17, 13, 0.72);
  -webkit-backdrop-filter: blur(24px) saturate(1.4); backdrop-filter: blur(24px) saturate(1.4);
  border: 1px solid rgba(255,255,255,0.18); border-radius: var(--radius-lg);
  padding: 22px; width: 100%; max-width: 440px; max-height: 86vh; overflow-y: auto;
}
.db-modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.db-modal-head h3 { font-family: var(--font-serif); font-size: 20px; font-weight: 600; color: var(--db-text); }
.db-modal-close { background: transparent; border: none; font-size: 18px; color: var(--db-text-mute); cursor: pointer; }
.db-modal-close:hover { color: var(--db-text); }
.db-modal-or { text-align: center; font-size: 11px; color: var(--db-text-mute); margin: 10px 0; }
.db-modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
.db-modal-textarea {
  width: 100%; min-height: 120px; border: 1px solid var(--db-hairline); background: rgba(255,255,255,0.04);
  border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13.5px; resize: vertical; color: var(--db-text);
}
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; font-weight: 700; color: var(--db-text-mute); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
.field input, .field select {
  width: 100%; border: 1px solid var(--db-hairline); background: rgba(255,255,255,0.04); border-radius: var(--radius-sm);
  padding: 9px 10px; font-size: 13.5px; color: var(--db-text);
}
.db-widget-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media (max-width: 420px) { .db-widget-menu { grid-template-columns: 1fr; } }
.db-widget-menu-item {
  text-align: left; background: rgba(255,255,255,0.03); border: 1px solid var(--db-hairline); border-radius: var(--radius-md);
  padding: 10px 12px; cursor: pointer; display: flex; flex-direction: column; gap: 3px; color: var(--db-text);
}
.db-widget-menu-item:hover { background: var(--db-accent-tint); border-color: var(--db-gold); }
.db-widget-menu-item strong { font-size: 13px; }
.db-widget-menu-item span { font-size: 10.5px; color: var(--db-text-mute); line-height: 1.35; }
</style>
</head>
<body>

<div class="shell">
  <div class="db-hero" id="dbHero">
    <div class="db-hero-media" id="dbHeroMedia">

<div class="modal-bg" id="dbAddWidgetModalBg">

<div class="modal-bg" id="dbPhotoModalBg">
  <div class="modal db-modal">
    <div class="db-modal-head"><h3 id="dbPhotoModalTitle">Add photo or video</h3><button type="button" class="db-modal-close" id="dbPhotoModalCloseBtn" aria-label="Close">&times;</button></div>
    <div class="field" id="dbSlotTypeField">

    </div>

<script>
(function () {
  'use strict';

  function $(id) { return document.getElementById(id); }
  function storeGet(key) { try { const raw = localStorage.getItem(key); return raw == null ? null : JSON.parse(raw); } catch (e) { return null; } }
  function storeSet(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {} }

  // One-time backfill: uploads every already-stored base64 hero/widget
  // photo to Supabase Storage and replaces it with a tiny hosted URL, so
  // this page's localStorage footprint (up to 4 hero photos plus every
  // widget cover/photo/slot) actually shrinks instead of just staying flat
  // from here on. Only marks itself done once every upload it kicked off
  // has settled — offline or a not-yet-created bucket just means it tries
  // again next load.
  function migratePhotosToStorage() {
    if (!window.PhotoStore || storeGet('dreamboard:photosMigratedV1')) return;
    const jobs = [];
    DB.tabsSorted().forEach(function (t) {
      const photo = t.hero && t.hero.photo;
      if (typeof photo === 'string' && photo.indexOf('data:') === 0) {
        jobs.push(window.PhotoStore.upload(photo).then(function (url) {
          if (!url) return;
          const fresh = DB.Tabs.get(t.id);
          if (fresh && fresh.hero && fresh.hero.photo === photo) DB.Tabs.update(t.id, { hero: Object.assign({}, fresh.hero, { photo: url }) });
        }));
      }
    });
    DB.Widgets.list().forEach(function (w) {
      ['cover', 'photo'].forEach(function (field) {
        const val = w.data && w.data[field];
        if (typeof val === 'string' && val.indexOf('data:') === 0) {
          jobs.push(window.PhotoStore.upload(val).then(function (url) {
            if (!url) return;
            const fresh = DB.Widgets.get(w.id);
            if (fresh && fresh.data[field] === val) DB.Widgets.update(w.id, { data: Object.assign({}, fresh.data, { [field]: url }) });
          }));
        }
      });
      (w.data && w.data.slots || []).forEach(function (slot) {
        if (typeof slot.url === 'string' && slot.url.indexOf('data:') === 0) {
          const slotId = slot.id, orig = slot.url;
          jobs.push(window.PhotoStore.upload(orig).then(function (url) {
            if (!url) return;
            const fresh = DB.Widgets.get(w.id);
            if (!fresh) return;
            const slots = (fresh.data.slots || []).map(function (s) { return s.id === slotId && s.url === orig ? Object.assign({}, s, { url: url }) : s; });
            DB.Widgets.update(w.id, { data: Object.assign({}, fresh.data, { slots: slots }) });
          }));
        }
      });
    });
    if (!jobs.length) { storeSet('dreamboard:photosMigratedV1', true); return; }
    Promise.all(jobs).then(function () {
      storeSet('dreamboard:photosMigratedV1', true);
      renderBoard();
    });
  }

  const ACTIVE_TAB_KEY = 'dreamboard:active_tab';
  const LEGACY_BANNER_KEY = 'dreamboard:banner';
  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  const WIDGET_TYPE_LABELS = {
    checklist: 'New Checklist', list: 'New List', note: 'New Note', quote: 'New Quote',
    affirmation: 'New Affirmation', steps: 'Daily Steps', photos: 'Photo / Video Grid', calendar: 'Calendar',
    feature: 'New Feature Card', infocard: 'New Info Card'
  };

  let DB = null;
  let activeTabId = null;
  let renamingTabId = null;
  let sortableInstances = [];
  let addSlotTargetWidgetId = null;
  let addSlotSingleTarget = false; // true when the photo modal is filling a 'feature' widget's single photo, not a 'photos' widget's slots array
  let dayNoteTarget = null;
  let tintPopoverWidgetId = null; // which widget's color-grading popover is open, if any
  const TINT_PRESETS = ['#e8927a', '#e3a8b0', '#7ea8c4', '#a89bd4', '#c9a876', '#9ab89a'];
  // Uploaded video files never touch localStorage/Supabase (no backend to
  // store them — see CLAUDE.md §2/§4) — object URLs live only in this map
  // for the current tab lifetime. A slot with sessionOnly:true and no
  // entry here (e.g. right after a reload) renders as a "re-attach" prompt.
  let sessionVideoBlobs = {};
  // Same idea, for hero cover videos — keyed by tabId (a hero has no
  // per-slot id like a Photos widget does, just one media field per tab).
  let heroVideoBlobs = {};

  function openModal(el) { el.classList.add('show'); }
  function closeModal(el) { el.classList.remove('show'); }
  function autosize(ta) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }

  // ============================================================
  // SYNC STATUS — honest, local-only feedback. This confirms a write to
  // *this device's* localStorage succeeded or failed (via the
  // 'dreamboard:save' event dreamboard-data.js's storeSet() now dispatches
  // every time); it can't confirm the actual cross-device Supabase push
  // completed, since that lives entirely in sync.js, which this page
  // (like every other page in this app) doesn't modify. What it CAN catch
  // honestly: a failed local write (e.g. localStorage quota exceeded —
  // the most likely way a cover-photo-heavy board silently stops saving)
  // and whether the browser is currently offline (sync.js can't push
  // anywhere without a connection either way).
  let syncStatusTimer = null;
  function setSyncStatus(mode, text) {
    const el = $('dbSyncStatus');
    if (!el) return;
    el.className = 'db-sync-status' + (mode ? ' is-' + mode : '');
    el.textContent = '';
    const dot = document.createElement('span'); dot.className = 'db-sync-status-dot';
    const label = document.createElement('span'); label.className = 'db-sync-status-text'; label.textContent = text;
    el.appendChild(dot); el.appendChild(label);
  }
  function handleSaveEvent(e) {
    if (!navigator.onLine) { setSyncStatus('offline', 'Offline — will sync when reconnected'); return; }
    if (e.detail && e.detail.ok === false) {
      setSyncStatus('error', "Couldn't save — your browser's storage may be full. Try removing a photo.");
      return;
    }
    setSyncStatus('saved', 'Saved — syncing…');
    clearTimeout(syncStatusTimer);
    syncStatusTimer = setTimeout(function () {
      if (navigator.onLine) setSyncStatus('saved', 'Synced');
    }, 1800);
  }

  function wireInlineEdit(el, onCommit, opts) {
    opts = opts || {};
    let original = el.textContent;
    el.addEventListener('focus', function () { original = el.textContent; });
    el.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !opts.multiline) { e.preventDefault(); el.blur(); }
      else if (e.key === 'Escape') { e.preventDefault(); el.textContent = original; el.blur(); }
    });
    el.addEventListener('blur', function () {
      const val = el.textContent.trim();
      if (!val && opts.allowEmpty === false) { el.textContent = original; return; }
      if (val === original) return;
      onCommit(val);
    });
  }

  // ============================================================
  // HERO — one per tab (each tab reads as its own "page"). Editing any
  // field patches that tab's `hero` object directly.
  // ============================================================
  function currentHero() {
    const t = DB.Tabs.get(activeTabId);
    // Belt-and-suspenders: dreamboard-data.js's normalizeTabs() should
    // already guarantee every tab has a hero object by the time this runs,
    // but never trust a possibly-legacy record enough to let a missing
    // `hero` throw here and take down the rest of init() with it.
    return (t && t.hero) ? t.hero : { eyebrow: '', title: '', subtext: '', ctaLabel: '', photo: '', photoColor: '', mediaType: 'image' };
  }
  function patchHero(patch) {
    if (!activeTabId) return;
    const t = DB.Tabs.get(activeTabId);
    if (!t) return;
    DB.Tabs.update(activeTabId, { hero: Object.assign({}, t.hero, patch) });
  }
  function revokeHeroVideoBlob(tabId) {
    if (heroVideoBlobs[tabId]) { try { URL.revokeObjectURL(heroVideoBlobs[tabId]); } catch (e) {} delete heroVideoBlobs[tabId]; }
  }
  // Keeps #dbPageBg (the full-page blurred backdrop every glass card reads
  // through) in sync with whichever tab is active — called from anywhere
  // the active tab or its cover media can change (renderHero()'s own
  // callers). A CSS background-image can't reference a <video>, so a
  // video hero swaps in the actual #dbPageBgVideo element instead (the
  // same blur/darken filter on the #dbPageBg container applies to
  // whatever's rendered inside it, image or video, since `filter`
  // rasterizes the whole subtree).
  function renderPageBg() {
    const hero = currentHero();
    const bg = $('dbPageBg'), video = $('dbPageBgVideo');
    if (hero.mediaType === 'video' && heroVideoBlobs[activeTabId]) {
      bg.style.backgroundImage = 'none';
      video.src = heroVideoBlobs[activeTabId];
      video.style.display = 'block';
      video.play().catch(function () {});
    } else {
      video.pause(); video.removeAttribute('src'); video.style.display = 'none';
      bg.style.backgroundImage = hero.photo ? 'url("' + hero.photo + '")' : 'none';
    }
  }
  function renderHero() {
    const hero = currentHero();
    $('dbHeroEyebrow').textContent = hero.eyebrow;
    $('dbHeroTitle').value = hero.title;
    $('dbHeroSubtext').textContent = hero.subtext;
    $('dbHeroCtaLabel').textContent = hero.ctaLabel || 'EXPLORE';
    autosize($('dbHeroTitle'));

    const img = $('dbHeroPhotoImg'), video = $('dbHeroVideoEl'), reattach = $('dbHeroReattach'),
      choice = $('dbHeroPhotoChoice'), tools = $('dbHeroPhotoTools');
    img.style.display = 'none'; img.src = '';
    video.pause(); video.style.display = 'none';
    reattach.style.display = 'none';
    choice.style.display = 'none';
    tools.style.display = 'none';

    if (hero.mediaType === 'video') {
      const blobUrl = heroVideoBlobs[activeTabId];
      if (blobUrl) {
        video.src = blobUrl; video.style.display = 'block'; video.play().catch(function () {});
      } else {
        // Missing its session-only blob (e.g. after a reload) — this used
        // to show ONLY the re-attach prompt, a dead end if you don't have
        // that exact file handy again: no way to remove it or switch to a
        // photo instead. Tools (Change/Remove) now show here too, so
        // Remove clears back to the "+ Add" choice and Change opens a
        // picker for a *new* video, alongside Re-attach for the original.
        reattach.style.display = 'flex';
      }
      tools.style.display = 'flex';
    } else if (hero.photo) {
      img.src = hero.photo; img.style.display = 'block'; tools.style.display = 'flex';
    } else {
      choice.style.display = 'flex';
    }
    renderPageBg();
  }
  // Takes an explicit 'image'|'video' rather than a single input with
  // accept="image/*,video/*" — combined-type accept values are known to
  // behave unpredictably in some mobile photo/video pickers (some OS
  // pickers get confused about which media type to actually offer).
  // Forcing a single, unambiguous accept value per pick sidesteps that
  // entirely, and still supports both — the user just says which one
  // first (see the two "+ Add a cover photo" / "+ Add a cover video"
  // buttons, or "Change," which reuses whichever kind is already set).
  function openHeroFilePicker(mediaKind) {
    const input = $('dbHeroPhotoInput');
    input.accept = mediaKind === 'video' ? 'video/*' : 'image/*';
    input.value = '';
    input.click();
  }
  function reattachHeroVideo() {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = 'video/*'; input.style.display = 'none';
    document.body.appendChild(input);
    const tabIdAtOpen = activeTabId;
    input.addEventListener('change', function () {
      const file = input.files[0];
      document.body.removeChild(input);
      if (!file) return;
      if (file.size > 8 * 1024 * 1024) { alert('Video files are capped at 8MB for this session-only feature.'); return; }
      revokeHeroVideoBlob(tabIdAtOpen);
      heroVideoBlobs[tabIdAtOpen] = URL.createObjectURL(file);
      if (tabIdAtOpen === activeTabId) renderHero();
    });
    input.click();
  }
  // Cheap average-RGB color sample from a downscaled copy of the image —
  // not a "true" dominant-color algorithm, just a fast, dependency-free
  // approximation (this repo has no build step to pull in a color-
  // quantization library) good enough to give a widget's "match tab photo"
  // tint option something reasonably representative of the photo's tone.
  // Only ever called for image covers — there's no equivalent cheap frame
  // sample wired up for video, so a video hero simply leaves photoColor
  // empty (the "match tab photo" tint swatch disables itself accordingly).
  function extractDominantColor(dataUrl) {
    return new Promise(function (resolve) {
      const img = new Image();
      img.onload = function () {
        try {
          const size = 32;
          const c = document.createElement('canvas');
          c.width = size; c.height = size;
          const ctx = c.getContext('2d');
          ctx.drawImage(img, 0, 0, size, size);
          const data = ctx.getImageData(0, 0, size, size).data;
          let r = 0, g = 0, b = 0, count = 0;
          for (let i = 0; i < data.length; i += 4) { r += data[i]; g += data[i + 1]; b += data[i + 2]; count++; }
          if (!count) { resolve(''); return; }
          const toHex = function (v) { return Math.round(v / count).toString(16).padStart(2, '0'); };
          resolve('#' + toHex(r) + toHex(g) + toHex(b));
        } catch (e) { resolve(''); }
      };
      img.onerror = function () { resolve(''); };
      img.src = dataUrl;
    });
  }
  function handleHeroMediaFile() {
    const file = $('dbHeroPhotoInput').files[0];
    if (!file) return;
    const tabIdAtUpload = activeTabId;
    const isVideo = file.type.indexOf('video') === 0;
    if (isVideo) {
      if (file.size > 8 * 1024 * 1024) { alert('Video files are capped at 8MB for this session-only feature.'); return; }
      revokeHeroVideoBlob(tabIdAtUpload);
      heroVideoBlobs[tabIdAtUpload] = URL.createObjectURL(file);
      patchHero({ mediaType: 'video', photo: '', photoColor: '' });
      renderHero();
      renderBoard(); // any widget with tint:'photo' needs its swatch/overlay refreshed
      return;
    }
    const reader = new FileReader();
    reader.onload = async function () {
      // Trimmed from 1400/0.82 — a hero photo is the single largest payload
      // on this page (up to 4 of them, one per tab), and localStorage has a
      // hard per-origin quota; a smaller, still-plenty-sharp-as-a-blurred-
      // backdrop size meaningfully lowers the odds of a quota failure (now
      // surfaced, see dreamboard-data.js's storeSet(), but better avoided).
      const compressed = await DB.compressImageDataUrl(String(reader.result), 1100, 0.78);
      const color = await extractDominantColor(compressed);
      revokeHeroVideoBlob(tabIdAtUpload);
      patchHero({ mediaType: 'image', photo: compressed, photoColor: color });
      renderHero();
      renderBoard();
      // Swap the base64 string for a tiny hosted URL once uploaded, so this
      // hero photo (one of up to 4 on this page) stops eating into the
      // shared localStorage quota. No-ops silently (leaving the base64
      // value above in place) if offline or the bucket isn't set up yet.
      if (window.PhotoStore) {
        window.PhotoStore.upload(compressed, function (url) {
          if (tabIdAtUpload !== activeTabId) return;
          patchHero({ mediaType: 'image', photo: url });
          renderHero();
          renderBoard();
        });
      }
    };
    reader.readAsDataURL(file);
  }

  // ============================================================
  // TABS
  // ============================================================
  function renderTabs() {
    const tabs = DB.tabsSorted();
    const wrap = $('dbTabs');
    wrap.innerHTML = '';
    tabs.forEach(function (t) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'db-tab' + (t.id === activeTabId ? ' active' : '');
      btn.dataset.tabId = t.id;

      if (renamingTabId === t.id) {
        const input = document.createElement('input');
        input.type = 'text'; input.className = 'db-tab-rename-input'; input.value = t.title;
        input.addEventListener('click', function (e) { e.stopPropagation(); });
        input.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') { e.preventDefault(); commitTabRename(t.id, input.value); }
          else if (e.key === 'Escape') { renamingTabId = null; renderTabs(); }
        });
        input.addEventListener('blur', function () { commitTabRename(t.id, input.value); });
        btn.appendChild(input);
        wrap.appendChild(btn);
        setTimeout(function () { input.focus(); input.select(); }, 0);
        return;
      }

      const label = document.createElement('span');
      label.textContent = t.title;
      btn.appendChild(label);
      if (t.id === activeTabId) {
        const editBtn = document.createElement('span');
        editBtn.className = 'db-tab-edit'; editBtn.textContent = '✎';
        editBtn.setAttribute('role', 'button'); editBtn.tabIndex = 0;
        editBtn.title = 'Rename tab';
        editBtn.addEventListener('click', function (e) { e.stopPropagation(); renamingTabId = t.id; renderTabs(); });
        editBtn.addEventListener('keydown', function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.stopPropagation(); renamingTabId = t.id; renderTabs(); } });
        btn.appendChild(editBtn);
      }
      btn.addEventListener('click', function () { if (t.id !== activeTabId) switchTab(t.id); });
      wrap.appendChild(btn);
    });
  }
  function commitTabRename(id, value) {
    const val = value.trim();
    renamingTabId = null;
    if (val) DB.Tabs.update(id, { title: val });
    renderTabs();
  }
  function switchTab(tabId) {
    activeTabId = tabId;
    storeSet(ACTIVE_TAB_KEY, tabId);
    renderHero();
    renderTabs();
    renderBoard();
  }

  // ============================================================
  // WIDGET BODIES

  function mutateWidget(widget, dataPatch) {
    DB.Widgets.update(widget.id, { data: Object.assign({}, widget.data, dataPatch) });
  }

  function buildItemRow(widget, item, opts) {
    const row = document.createElement('div');
    row.className = opts.cardStyle ? 'dw-affirm-row' : 'dw-plain-row';
    if (item.done) row.classList.add('dw-item-done');

    if (opts.checkable) {
      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.className = 'dw-check-cb'; cb.checked = !!item.done;
      cb.setAttribute('aria-label', 'Mark done');
      cb.addEventListener('change', function () {
        const items = (widget.data.items || []).map(function (x) { return x.id === item.id ? Object.assign({}, x, { done: cb.checked }) : x; });
        mutateWidget(widget, { items: items });
        renderBoard();
      });
      row.appendChild(cb);
    }

    const text = document.createElement('span');
    text.className = opts.cardStyle ? 'dw-affirm-text' : 'dw-item-text';
    text.contentEditable = 'true';
    text.textContent = item.text;
    wireInlineEdit(text, function (newVal) {
      if (!newVal) {
        const items = (widget.data.items || []).filter(function (x) { return x.id !== item.id; });
        mutateWidget(widget, { items: items });
        renderBoard();
        return;
      }
      const items = (widget.data.items || []).map(function (x) { return x.id === item.id ? Object.assign({}, x, { text: newVal }) : x; });
      mutateWidget(widget, { items: items });
    }, { allowEmpty: true });
    row.appendChild(text);

    const del = document.createElement('button');
    del.type = 'button'; del.className = 'dw-item-del'; del.setAttribute('aria-label', 'Delete item'); del.textContent = '×';
    del.addEventListener('click', function () {
      const items = (widget.data.items || []).filter(function (x) { return x.id !== item.id; });
      mutateWidget(widget, { items: items });
      renderBoard();
    });
    row.appendChild(del);
    return row;
  }

  function buildItemListBody(widget, opts) {
    const wrap = document.createElement('div');
    const list = document.createElement('div');
    list.className = opts.cardStyle ? 'dw-affirm-list' : 'dw-plain-list';
    (widget.data.items || []).forEach(function (item) { list.appendChild(buildItemRow(widget, item, opts)); });

  function buildStepsBody(widget) {
    const wrap = document.createElement('div'); wrap.className = 'dw-steps-body';
    const today = DB.todayISO();
    const count = Number((widget.data.log || {})[today]) || 0;

    const row = document.createElement('div'); row.className = 'dw-steps-row';

    countInput.setAttribute('aria-label', 'Steps today');

  function revokeSessionBlob(slotId) {
    if (sessionVideoBlobs[slotId]) { try { URL.revokeObjectURL(sessionVideoBlobs[slotId]); } catch (e) {} delete sessionVideoBlobs[slotId]; }
  }

  function buildPhotoSlotEl(widget, slot) {
    const el = document.createElement('div');
    el.className = 'dw-photo-slot';
    el.dataset.slotId = slot.id;

    const liveUrl = (slot.type === 'video' && slot.sessionOnly) ? sessionVideoBlobs[slot.id] : slot.url;
    if (liveUrl) {
      let media;
      if (slot.type === 'video') { media = document.createElement('video'); media.src = liveUrl; media.controls = true; media.playsInline = true; }
      else { media = document.createElement('img'); media.src = liveUrl; media.alt = slot.name || ''; }
      el.appendChild(media);
    } else if (slot.type === 'video' && slot.sessionOnly) {
      const ph = document.createElement('div'); ph.className = 'dw-photo-slot-broken';
      const icon = document.createElement('div'); icon.className = 'dw-photo-broken-icon'; icon.textContent = '🎬';
      const label = document.createElement('div'); label.textContent = 'Video needs to be re-attached';
      const reBtn = document.createElement('button'); reBtn.type = 'button'; reBtn.className = 'dw-photo-reattach-btn'; reBtn.textContent = 'Re-attach';
      reBtn.addEventListener('click', function () { reattachVideoSlot(widget.id, slot.id); });
      ph.appendChild(icon); ph.appendChild(label); ph.appendChild(reBtn);
      el.appendChild(ph);
    } else {
      const ph = document.createElement('div'); ph.className = 'dw-photo-slot-empty'; ph.textContent = 'No media';
      el.appendChild(ph);

    del.type = 'button'; del.className = 'dw-slot-del'; del.setAttribute('aria-label', 'Remove'); del.textContent = '×';

    return el;
  }

  function reattachVideoSlot(widgetId, slotId) {

    input.type = 'file'; input.accept = 'video/*'; input.style.display = 'none';

      const file = input.files[0];
      document.body.removeChild(input);
      if (!file) return;
      if (file.size > 8 * 1024 * 1024) { alert('Video files are capped at 8MB for this session-only feature.'); return; }
      sessionVideoBlobs[slotId] = URL.createObjectURL(file);
      renderBoard();
    });
    input.click();
  }

  function shiftCalMonth(widgetId, year, month, delta) {
    let m = month + delta, y = year;
    if (m < 0) { m = 11; y -= 1; } else if (m > 11) { m = 0; y += 1; }
    const w = DB.Widgets.get(widgetId);
    if (!w) return;
    DB.Widgets.update(widgetId, { data: Object.assign({}, w.data, { viewYear: y, viewMonth: m }) });
    renderBoard();
  }

  function buildCalendarBody(widget) {
    const wrap = document.createElement('div');
    const now = new Date();
    const year = widget.data.viewYear != null ? widget.data.viewYear : now.getFullYear();
    const month = widget.data.viewMonth != null ? widget.data.viewMonth : now.getMonth();

    const head = document.createElement('div'); head.className = 'dw-cal-head';
    const prevBtn = document.createElement('button'); prevBtn.type = 'button'; prevBtn.className = 'dw-cal-nav'; prevBtn.textContent = '‹'; prevBtn.setAttribute('aria-label', 'Previous month');
    const label = document.createElement('span'); label.className = 'dw-cal-label'; label.textContent = MONTH_NAMES[month] + ' ' + year;
    const nextBtn = document.createElement('button'); nextBtn.type = 'button'; nextBtn.className = 'dw-cal-nav'; nextBtn.textContent = '›'; nextBtn.setAttribute('aria-label', 'Next month');
    prevBtn.addEventListener('click', function () { shiftCalMonth(widget.id, year, month, -1); });
    nextBtn.addEventListener('click', function () { shiftCalMonth(widget.id, year, month, 1); });
    head.appendChild(prevBtn); head.appendChild(label); head.appendChild(nextBtn);
    wrap.appendChild(head);

    const grid = document.createElement('div'); grid.className = 'dw-cal-grid';
    ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'].forEach(function (d) {
      const dow = document.createElement('div'); dow.className = 'dw-cal-dow'; dow.textContent = d; grid.appendChild(dow);
    });
    const firstDow = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    for (let i = 0; i < firstDow; i++) { const blank = document.createElement('div'); blank.className = 'dw-cal-day dw-cal-day-empty'; grid.appendChild(blank); }
    const todayStr = DB.todayISO();
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
      const cell = document.createElement('button');
      cell.type = 'button'; cell.className = 'dw-cal-day' + (dateStr === todayStr ? ' dw-cal-day-today' : '');
      const num = document.createElement('span'); num.textContent = String(d);
      cell.appendChild(num);
      if (widget.data.notes && widget.data.notes[dateStr]) { const dot = document.createElement('span'); dot.className = 'dw-cal-note-dot'; cell.appendChild(dot); }
      cell.addEventListener('click', function () { openDayNoteModal(widget.id, dateStr); });
      grid.appendChild(cell);
    }
    wrap.appendChild(grid);
    return wrap;
  }

  // CARD SHELL + BOARD RENDER
  // ============================================================
  function toggleWidgetWide(widgetId) {
    const w = DB.Widgets.get(widgetId);
    if (!w) return;
    DB.Widgets.update(widgetId, { data: Object.assign({}, w.data, { wide: !w.data.wide }) });

  function deleteWidget(id) {
    if (!confirm('Delete this widget?')) return;
    const w = DB.Widgets.get(id);
    if (w && w.type === 'photos') { (w.data.slots || []).forEach(function (s) { revokeSessionBlob(s.id); }); }
    DB.Widgets.remove(id);
    renderBoard();
