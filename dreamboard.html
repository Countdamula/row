  // ============================================================
  // COLOR GRADING (per-widget glass tint)
  // ============================================================
  // Resolves a widget's effective tint color: an explicit hex wins, then
  // 'photo' looks up its own tab's sampled cover-photo color (never the
  // globally-active tab, since a widget always belongs to one specific
  // tab), then the legacy 'blush' accent falls back to gold, else none.
  // Always returns either a '#rrggbb' string or null — never throws on a
  // widget missing the field entirely (undefined fails every check below
  // and falls through to null), same defensive shape as every other new
  // field added to this page since the hero crash.
  function effectiveTint(widget) {
    if (widget.tint === 'photo') {
      const t = DB.Tabs.get(widget.tabId);
      const color = t && t.hero && t.hero.photoColor;
      return color || null;
    }
    if (widget.tint) return widget.tint;
    if (widget.accent === 'blush') return '#c9a876';
    return null;
  }
  function setWidgetTint(widgetId, tint) {
    DB.Widgets.update(widgetId, { tint: tint });
    renderBoard();
  }
  // Live-preview while dragging the native color wheel: mutate the DOM
  // directly instead of going through renderBoard() on every 'input' tick.
  // Rebuilding the whole board mid-drag would destroy and recreate the
  // <input type="color"> element itself, which closes the browser's native
  // color-picker popup after the very first movement — persistence (and
  // the full re-render) only happens on 'change', once the user commits.
  function previewWidgetTint(widgetId, hex) {
    const card = document.querySelector('.dw-card[data-widget-id="' + widgetId + '"]');
    if (!card) return;
    card.style.setProperty('--tint', hex);
    const btn = card.querySelector('.dw-tint-btn');
    if (btn) { btn.style.background = hex; btn.classList.remove('dw-tint-btn-empty'); }
  }
  function buildTintControls(widget) {
    const wrap = document.createElement('div');
    const eff = effectiveTint(widget);
    const btn = document.createElement('button');
    btn.type = 'button'; btn.className = 'dw-tint-btn' + (eff ? '' : ' dw-tint-btn-empty');
    btn.title = 'Color grading'; btn.setAttribute('aria-label', 'Adjust color grading');
    if (eff) btn.style.background = eff;
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      tintPopoverWidgetId = (tintPopoverWidgetId === widget.id) ? null : widget.id;
      renderBoard();
    });
    wrap.appendChild(btn);
    return wrap;
  }
  function buildTintPopover(widget) {
    const pop = document.createElement('div'); pop.className = 'dw-tint-popover';

    const presetsLabel = document.createElement('div'); presetsLabel.className = 'dw-tint-label'; presetsLabel.textContent = 'Quick colors';
    pop.appendChild(presetsLabel);

    const swatchRow = document.createElement('div'); swatchRow.className = 'dw-tint-swatches';
    TINT_PRESETS.forEach(function (hex) {
      const sw = document.createElement('button');
      sw.type = 'button'; sw.className = 'dw-tint-swatch'; sw.style.background = hex;
      sw.setAttribute('aria-label', 'Use this color');
      sw.addEventListener('click', function () { setWidgetTint(widget.id, hex); });
      swatchRow.appendChild(sw);
    });
    const tab = DB.Tabs.get(widget.tabId);
    const photoColor = tab && tab.hero && tab.hero.photoColor;
    const photoSw = document.createElement('button');
    photoSw.type = 'button'; photoSw.className = 'dw-tint-swatch dw-tint-swatch-photo';
    photoSw.textContent = '📷'; photoSw.disabled = !photoColor;
    photoSw.title = photoColor ? "Match this tab's cover photo" : 'Add a cover photo (not video) to this tab first';
    if (photoColor) photoSw.style.background = photoColor;
    photoSw.addEventListener('click', function () { if (photoColor) setWidgetTint(widget.id, 'photo'); });
    swatchRow.appendChild(photoSw);
    pop.appendChild(swatchRow);

    // Custom color picker — a real, fully-labeled <input type="color">
    // (native OS/browser color wheel), not just the small unlabeled swatch
    // box this had before. A live hex readout next to it makes it obvious
    // this is an interactive picker, not decoration, and confirms exactly
    // what's selected while dragging inside the picker.
    const customLabel = document.createElement('div'); customLabel.className = 'dw-tint-label'; customLabel.textContent = 'Custom color';
    pop.appendChild(customLabel);

    const customRow = document.createElement('div'); customRow.className = 'dw-tint-custom-row';
    const colorInput = document.createElement('input');
    colorInput.type = 'color';
    const eff = effectiveTint(widget);
    const startHex = (eff && /^#[0-9a-f]{6}$/i.test(eff)) ? eff : '#c9a876';
    colorInput.value = startHex;
    colorInput.setAttribute('aria-label', 'Pick a custom color');
    const hexReadout = document.createElement('span'); hexReadout.className = 'dw-tint-hex'; hexReadout.textContent = startHex.toUpperCase();
    colorInput.addEventListener('input', function () {
      previewWidgetTint(widget.id, colorInput.value);
      hexReadout.textContent = colorInput.value.toUpperCase();
    });
    colorInput.addEventListener('change', function () { setWidgetTint(widget.id, colorInput.value); });
    const clearBtn = document.createElement('button');
    clearBtn.type = 'button'; clearBtn.className = 'dw-tint-clear'; clearBtn.textContent = 'Clear';
    clearBtn.addEventListener('click', function () { setWidgetTint(widget.id, null); });
    customRow.appendChild(colorInput); customRow.appendChild(hexReadout); customRow.appendChild(clearBtn);
    pop.appendChild(customRow);
    return pop;
  }

  function buildWidgetCard(widget, displayIndex) {
    const card = document.createElement('div');
    card.className = 'dw-card';
    card.dataset.widgetId = widget.id;
    card.dataset.widgetType = widget.type;
    card.style.setProperty('--tint', effectiveTint(widget) || 'transparent');

    const head = document.createElement('div'); head.className = 'dw-card-head';
    const index = document.createElement('span'); index.className = 'dw-card-index'; index.textContent = String(displayIndex).padStart(2, '0');
    const hoverActions = document.createElement('div'); hoverActions.className = 'dw-card-hover-actions';
    hoverActions.appendChild(buildTintControls(widget));
    const handle = document.createElement('span'); handle.className = 'dw-drag-handle'; handle.setAttribute('aria-hidden', 'true'); handle.title = 'Drag to reorder'; handle.textContent = '⋮⋮';
    hoverActions.appendChild(handle);
    if (widget.type === 'photos') {
      const wideBtn = document.createElement('button');
      wideBtn.type = 'button'; wideBtn.className = 'dw-wide-toggle'; wideBtn.title = 'Toggle 1 / 2 column grid';
      wideBtn.textContent = widget.data.wide ? '2 COL' : '1 COL';
      wideBtn.addEventListener('click', function () { toggleWidgetWide(widget.id); });
      hoverActions.appendChild(wideBtn);
    }
    const delBtn = document.createElement('button');
    delBtn.type = 'button'; delBtn.className = 'dw-card-del'; delBtn.setAttribute('aria-label', 'Delete widget'); delBtn.textContent = '×';
    delBtn.addEventListener('click', function () { deleteWidget(widget.id); });
    hoverActions.appendChild(delBtn);
    head.appendChild(index); head.appendChild(hoverActions);
    card.appendChild(head);

    if (tintPopoverWidgetId === widget.id) { card.appendChild(buildTintPopover(widget)); }

    const titleRow = document.createElement('div'); titleRow.className = 'dw-card-title-row';
    const title = document.createElement('span'); title.className = 'dw-card-title'; title.contentEditable = 'true'; title.textContent = widget.title || '';
    wireInlineEdit(title, function (v) { DB.Widgets.update(widget.id, { title: v }); }, { allowEmpty: false });
    titleRow.appendChild(title);
    card.appendChild(titleRow);

    const body = document.createElement('div'); body.className = 'dw-card-body';
    switch (widget.type) {
      case 'checklist': body.appendChild(buildItemListBody(widget, { checkable: true, cardStyle: false })); break;
      case 'list': body.appendChild(buildItemListBody(widget, { checkable: false, cardStyle: false })); break;
      case 'affirmation': body.appendChild(buildItemListBody(widget, { checkable: false, cardStyle: true })); break;
      case 'note': body.appendChild(buildNoteBody(widget)); break;
      case 'quote': body.appendChild(buildQuoteBody(widget)); break;
      case 'steps': body.appendChild(buildStepsBody(widget)); break;
      case 'photos': body.appendChild(buildPhotosBody(widget)); break;
      case 'calendar': body.appendChild(buildCalendarBody(widget)); break;
      case 'feature': body.appendChild(buildFeatureBody(widget)); break;
      case 'infocard': body.appendChild(buildInfoCardBody(widget)); break;
    }
    card.appendChild(body);
    return card;
  }

  function destroySortables() {
    sortableInstances.forEach(function (s) { try { s.destroy(); } catch (e) {} });
    sortableInstances = [];
  }

  function persistColumnOrder() {
    const cols = [];
    for (let i = 0; i < 3; i++) {
      const colEl = document.querySelector('#dbBoard .db-col[data-col="' + i + '"]');
      cols.push(Array.from(colEl.children).map(function (el) { return el.dataset.widgetId; }));
    }
    DB.reorderTab(activeTabId, cols);
  }

  function wireSortable() {
    if (typeof Sortable === 'undefined') return;
    const reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const groupName = 'dbcol-' + activeTabId;
    document.querySelectorAll('#dbBoard .db-col').forEach(function (col) {
      sortableInstances.push(new Sortable(col, {
        group: groupName,
        handle: '.dw-drag-handle',
        animation: reduced ? 0 : 150,
        ghostClass: 'dw-card-ghost',
        onEnd: function () { persistColumnOrder(); renderBoard(); }
      }));
    });
  }

  // Sequential 01/02/03… numbering across the whole tab, read left-to-right
  // then top-to-bottom across the three columns (row-major), purely a
  // cosmetic label — not stored, recomputed fresh on every render.
  function computeDisplayIndexes(cols) {
    const indexMap = {};
    let counter = 1;
    const maxLen = Math.max(cols[0].length, cols[1].length, cols[2].length);
    for (let row = 0; row < maxLen; row++) {
      for (let c = 0; c < 3; c++) { if (cols[c][row]) { indexMap[cols[c][row].id] = counter++; } }
    }
    return indexMap;
  }

  function renderBoard() {
    destroySortables();
    const board = $('dbBoard');
    board.innerHTML = '';
    if (!activeTabId) return;
    const cols = DB.columnsForTab(activeTabId);
    const indexMap = computeDisplayIndexes(cols);
    for (let i = 0; i < 3; i++) {
      const colEl = document.createElement('div');
      colEl.className = 'db-col'; colEl.dataset.col = String(i);
      cols[i].forEach(function (w) { colEl.appendChild(buildWidgetCard(w, indexMap[w.id])); });
      board.appendChild(colEl);
    }
    wireSortable();
  }

  // ============================================================
  // ADD WIDGET / RESET
  // ============================================================
  function addWidgetToActiveTab(type, title) {
    if (!activeTabId) return;
    const cols = DB.columnsForTab(activeTabId);
    let colIdx = 0, minLen = cols[0].length;
    for (let i = 1; i < 3; i++) { if (cols[i].length < minLen) { minLen = cols[i].length; colIdx = i; } }
    DB.Widgets.add({ tabId: activeTabId, column: colIdx, order: cols[colIdx].length, type: type, title: title, data: DB.defaultWidgetData(type) });
    closeModal($('dbAddWidgetModalBg'));
    renderBoard();
  }

  function wireAddWidgetMenu() {
    document.querySelectorAll('.db-widget-menu-item').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const type = btn.dataset.wtype;
        addWidgetToActiveTab(type, WIDGET_TYPE_LABELS[type] || 'New Widget');
      });
    });
  }

  function resetBoard() {
    if (!confirm('Reset the Dream Board to its default tabs and widgets? This deletes everything currently on the board.')) return;
    Object.keys(sessionVideoBlobs).forEach(function (id) { try { URL.revokeObjectURL(sessionVideoBlobs[id]); } catch (e) {} });
    sessionVideoBlobs = {};
    Object.keys(heroVideoBlobs).forEach(function (id) { try { URL.revokeObjectURL(heroVideoBlobs[id]); } catch (e) {} });
    heroVideoBlobs = {};
    DB.seedDefaultBoard();
    const tabs = DB.tabsSorted();
    activeTabId = (tabs[0] || {}).id || null;
    storeSet(ACTIVE_TAB_KEY, activeTabId);
    renderHero();
    renderTabs();
    renderBoard();
  }

  // ============================================================
  // PHOTO MODAL — shared by the Photos widget (multi-slot) and the
  // Feature Card widget (a single photo field); `single` picks which.
  // ============================================================
  function openPhotoModal(widgetId, opts) {
    opts = opts || {};
    addSlotTargetWidgetId = widgetId;
    addSlotSingleTarget = !!opts.single;
    $('dbPhotoModalTitle').textContent = addSlotSingleTarget ? 'Add photo' : 'Add photo or video';
    $('dbSlotTypeField').style.display = addSlotSingleTarget ? 'none' : '';
    $('dbSlotTypeSelect').value = 'image';
    // A single accept="image/*,video/*" is known to behave unpredictably
    // in some mobile pickers (same reasoning as the hero cover picker
    // above) — since this modal already has a Photo/Video type select,
    // drive the file input's accept from whichever one is currently
    // chosen instead, so the OS picker always gets one unambiguous type.
    $('dbSlotFileInput').accept = (addSlotSingleTarget || $('dbSlotTypeSelect').value !== 'video') ? 'image/*' : 'video/*';
    $('dbSlotFileInput').value = '';
    $('dbSlotUrlInput').value = '';
    openModal($('dbPhotoModalBg'));
  }
  function addSlotToWidget(widgetId, slot) {
    const w = DB.Widgets.get(widgetId);
    if (!w) return;
    const slots = (w.data.slots || []).concat([slot]);
    DB.Widgets.update(widgetId, { data: Object.assign({}, w.data, { slots: slots }) });
    renderBoard();
  }
  function setFeaturePhoto(widgetId, url) {
    const w = DB.Widgets.get(widgetId);
    if (!w) return;
    DB.Widgets.update(widgetId, { data: Object.assign({}, w.data, { photo: url }) });
    renderBoard();
  }
  // Replaces one photo/video grid slot's url in place (e.g. once a
  // background PhotoStore upload finishes) without touching any of that
  // slot's other fields or the rest of the widget's slots.
  function updateSlotUrl(widgetId, slotId, url) {
    const w = DB.Widgets.get(widgetId); if (!w) return;
    const slots = (w.data.slots || []).map(function (s) { return s.id === slotId ? Object.assign({}, s, { url: url }) : s; });
    DB.Widgets.update(widgetId, { data: Object.assign({}, w.data, { slots: slots }) });
    renderBoard();
  }
  function handleAddSlotSubmit() {
    const widgetId = addSlotTargetWidgetId;
    const single = addSlotSingleTarget;
    const file = $('dbSlotFileInput').files[0];
    const urlVal = $('dbSlotUrlInput').value.trim();
    const selectedType = single ? 'image' : $('dbSlotTypeSelect').value;
    if (file) {
      const isVideo = !single && (file.type.indexOf('video') === 0 || (file.type.indexOf('image') !== 0 && selectedType === 'video'));
      if (isVideo) {
        if (file.size > 8 * 1024 * 1024) { alert('Video files are capped at 8MB for this session-only feature.'); return; }
        const slotId = DB.uid('slot');
        sessionVideoBlobs[slotId] = URL.createObjectURL(file);
        addSlotToWidget(widgetId, { id: slotId, type: 'video', url: '', sessionOnly: true, name: file.name });
        closeModal($('dbPhotoModalBg'));
      } else {
        const reader = new FileReader();
        reader.onload = async function () {
          const compressed = await DB.compressImageDataUrl(String(reader.result), single ? 900 : 640, 0.8);
          if (single) {
            setFeaturePhoto(widgetId, compressed);
            if (window.PhotoStore) window.PhotoStore.upload(compressed, function (url) { setFeaturePhoto(widgetId, url); });
          } else {
            const slotId = DB.uid('slot');
            addSlotToWidget(widgetId, { id: slotId, type: 'image', url: compressed, sessionOnly: false, name: file.name });
            if (window.PhotoStore) window.PhotoStore.upload(compressed, function (url) { updateSlotUrl(widgetId, slotId, url); });
          }
          closeModal($('dbPhotoModalBg'));
        };
        reader.readAsDataURL(file);
      }
    } else if (urlVal) {
      if (!DB.isValidMediaUrl(urlVal)) { alert('Please enter a valid http(s) URL.'); return; }
      if (single) setFeaturePhoto(widgetId, urlVal);
      else addSlotToWidget(widgetId, { id: DB.uid('slot'), type: selectedType, url: urlVal, sessionOnly: false, name: '' });
      closeModal($('dbPhotoModalBg'));
    } else {
      alert('Choose a file or paste a URL first.');
    }
  }

  // ============================================================
  // DAY NOTE MODAL
  // ============================================================
  function openDayNoteModal(widgetId, dateStr) {
    const w = DB.Widgets.get(widgetId);
    if (!w) return;
    dayNoteTarget = { widgetId: widgetId, dateStr: dateStr };
    $('dbDayNoteDateLabel').textContent = dateStr;
    $('dbDayNoteInput').value = (w.data.notes && w.data.notes[dateStr]) || '';
    openModal($('dbDayNoteModalBg'));
    setTimeout(function () { autosize($('dbDayNoteInput')); }, 0);
  }
  function saveDayNote() {
    if (!dayNoteTarget) return;
    const w = DB.Widgets.get(dayNoteTarget.widgetId);
    if (!w) return;
    const notes = Object.assign({}, w.data.notes);
    const val = $('dbDayNoteInput').value.trim();
    if (val) notes[dayNoteTarget.dateStr] = val; else delete notes[dayNoteTarget.dateStr];
    DB.Widgets.update(dayNoteTarget.widgetId, { data: Object.assign({}, w.data, { notes: notes }) });
    closeModal($('dbDayNoteModalBg'));
    renderBoard();
  }

  // ============================================================
  // BOOT
  // ============================================================
  function migrateLegacyBanner() {
    // The page's first version had one global editable banner
    // ("a new era of me"). This version replaces it with a per-tab hero,
    // so a user who'd already customized that banner gets it folded into
    // the first tab's hero title/eyebrow once, rather than silently lost.
    const legacy = storeGet(LEGACY_BANNER_KEY);
    if (!legacy) return;
    const tabs = DB.tabsSorted();
    const first = tabs[0];
    if (first && !first.hero.title && legacy.title) {
      DB.Tabs.update(first.id, { hero: Object.assign({}, first.hero, { title: legacy.title, subtext: legacy.subtitle || first.hero.subtext }) });
    }
    try { localStorage.removeItem(LEGACY_BANNER_KEY); } catch (e) {}
  }

  function init() {
    DB = window.DreamBoardData;
    if (!DB) return;

    migrateLegacyBanner();

    const tabs = DB.tabsSorted();
    const savedTab = storeGet(ACTIVE_TAB_KEY);
    activeTabId = (tabs.find(function (t) { return t.id === savedTab; }) || tabs[0] || {}).id || null;
    renderHero();
    renderTabs();
    renderBoard();
    setTimeout(migratePhotosToStorage, 3000);

    setSyncStatus(navigator.onLine ? null : 'offline', navigator.onLine ? 'Changes save automatically' : 'Offline — will sync when reconnected');
    window.addEventListener('dreamboard:save', handleSaveEvent);
    window.addEventListener('online', function () { setSyncStatus('saved', 'Back online — syncing…'); });
    window.addEventListener('offline', function () { setSyncStatus('offline', 'Offline — will sync when reconnected'); });

    wireInlineEdit($('dbHeroEyebrow'), function (v) { patchHero({ eyebrow: v }); }, { allowEmpty: true });
    wireInlineEdit($('dbHeroSubtext'), function (v) { patchHero({ subtext: v }); }, { allowEmpty: true });
    wireInlineEdit($('dbHeroCtaLabel'), function (v) { patchHero({ ctaLabel: v }); }, { allowEmpty: false });
    $('dbHeroTitle').addEventListener('input', function () { autosize($('dbHeroTitle')); });
    $('dbHeroTitle').addEventListener('blur', function () { patchHero({ title: $('dbHeroTitle').value }); });
    $('dbHeroAddPhotoBtn').addEventListener('click', function () { openHeroFilePicker('image'); });
    $('dbHeroAddVideoBtn').addEventListener('click', function () { openHeroFilePicker('video'); });
    $('dbHeroPhotoChangeBtn').addEventListener('click', function (e) {
      e.stopPropagation();
      openHeroFilePicker(currentHero().mediaType === 'video' ? 'video' : 'image');
    });
    $('dbHeroPhotoRemoveBtn').addEventListener('click', function (e) {
      e.stopPropagation();
      revokeHeroVideoBlob(activeTabId);
      patchHero({ photo: '', photoColor: '', mediaType: 'image' });
      renderHero();
      renderBoard();
    });
    $('dbHeroReattachBtn').addEventListener('click', function (e) { e.stopPropagation(); reattachHeroVideo(); });
    $('dbHeroPhotoInput').addEventListener('change', handleHeroMediaFile);
    $('dbHeroCta').addEventListener('click', function () {
      $('dbBoard').scrollIntoView({ behavior: window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 'auto' : 'smooth', block: 'start' });
    });

    $('dbAddWidgetBtn').addEventListener('click', function () { openModal($('dbAddWidgetModalBg')); });
    $('dbAddWidgetCloseBtn').addEventListener('click', function () { closeModal($('dbAddWidgetModalBg')); });
    $('dbAddWidgetModalBg').addEventListener('click', function (e) { if (e.target === this) closeModal(this); });
    wireAddWidgetMenu();

    $('dbResetBtn').addEventListener('click', resetBoard);

    $('dbPhotoModalCloseBtn').addEventListener('click', function () { closeModal($('dbPhotoModalBg')); });
    $('dbPhotoModalBg').addEventListener('click', function (e) { if (e.target === this) closeModal(this); });
    $('dbSlotAddBtn').addEventListener('click', handleAddSlotSubmit);
    $('dbSlotTypeSelect').addEventListener('change', function () {
      $('dbSlotFileInput').accept = $('dbSlotTypeSelect').value === 'video' ? 'video/*' : 'image/*';
    });

    $('dbDayNoteCloseBtn').addEventListener('click', function () { closeModal($('dbDayNoteModalBg')); });
    $('dbDayNoteModalBg').addEventListener('click', function (e) { if (e.target === this) closeModal(this); });
    $('dbDayNoteClearBtn').addEventListener('click', function () { $('dbDayNoteInput').value = ''; });
    $('dbDayNoteSaveBtn').addEventListener('click', saveDayNote);

    // ------------------------------------------------------------
    // Seeding a default board is now deliberately deferred until AFTER
    // the cloud has had a real chance to answer (see the note at the
    // bottom of dreamboard-data.js). Seeding immediately and
    // unconditionally, like this used to, meant: a device with empty
    // local storage — its first-ever visit, or storage that got cleared —
    // would write a full default board *before* ever checking whether
    // real cloud data existed, and that write would then get pushed to
    // Supabase as "this device's changes," overwriting another device's
    // real data. That's the exact failure mode reported: editing on one
    // device, then reloading a device with no local copy yet, wiping the
    // first device's progress.
    let remoteAppliedOnce = false;
    function maybeSeedAfterSyncAttempt() {
      if (remoteAppliedOnce) return; // real cloud data already arrived — never seed over it
      if (DB.Tabs.list().length > 0 || DB.Widgets.list().length > 0) return; // something already showed up locally
      DB.seedIfEmpty();
      const freshTabs = DB.tabsSorted();
      activeTabId = (freshTabs[0] || {}).id || null;
      storeSet(ACTIVE_TAB_KEY, activeTabId);
      renderHero();
      renderTabs();
      renderBoard();
    }

    if (typeof initCloudSync === 'function') {
      initCloudSync({
        appKey: 'dreamboard',
        syncedPrefixes: ['dreamboard:'],
        onApplied: function () {
          remoteAppliedOnce = true;
          const tabs2 = DB.tabsSorted();
          if (!tabs2.find(function (t) { return t.id === activeTabId; })) activeTabId = (tabs2[0] || {}).id || null;
          renderHero();
          renderTabs();
          renderBoard();
        }
      });
      if (tabs.length === 0) {
        // Nothing locally yet on this device. Give the cloud pull a
        // window before assuming this is genuinely a first-ever use
        // rather than just "hasn't synced down yet." Bumped from 2.5s to
        // 5s after a real report of this still racing — a typical
        // Supabase read resolves in under a second, but "typical" isn't
        // "always": a slow/flaky mobile connection can genuinely take
        // several seconds for DNS + TLS + the request itself. This is
        // still a timing heuristic, not a guarantee — see the note on
        // `maybeSeedAfterSyncAttempt()` for why a fully race-proof fix
        // needs a change in sync.js itself.
        setTimeout(maybeSeedAfterSyncAttempt, 5000);
      }
    } else if (tabs.length === 0) {
      // No cloud sync available at all (e.g. the Supabase SDK failed to
      // load) — nothing to race against, so it's safe to seed right away.
      maybeSeedAfterSyncAttempt();
    }

    // One-time repair: the Vision Board tab got stuck with mediaType:
    // 'video' pointing at a session-only blob that's gone after any
    // reload (by design — see CLAUDE.md §2/§4), with no local file to
    // re-attach. Resets it back to a clean "no cover yet" photo state so
    // it's usable again. Placed *after* initCloudSync() above (not in
    // dreamboard-data.js's own load-time IIFE) specifically so this
    // write happens once the localStorage.setItem monkeypatch is already
    // active — that marks it "dirty," which protects it from being
    // silently overwritten by a stale (still-stuck) remote copy the
    // instant the cloud pull resolves, and ensures it actually gets
    // pushed so the other device converges to the same fixed state
    // instead of only fixing whichever device happens to load first.
    // Guarded so it only ever runs once, not every load.
    if (!storeGet('dreamboard:visionboard_video_fix_v1')) {
      const vb = DB.Tabs.list().find(function (t) { return t.title === 'Vision Board'; });
      if (vb && vb.hero && vb.hero.mediaType === 'video') {
        revokeHeroVideoBlob(vb.id);
        DB.Tabs.update(vb.id, { hero: Object.assign({}, vb.hero, { mediaType: 'image', photo: '', photoColor: '' }) });
        if (vb.id === activeTabId) { renderHero(); renderBoard(); }
      }
      storeSet('dreamboard:visionboard_video_fix_v1', true);
    }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
