<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0509">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Nutrition</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<script src="nutrition-data.js" defer></script>
<style>
:root {
  --bg: #170a12;
  --bg-deep: #0b0509;
  --bg-card: rgba(255, 255, 255, 0.035);
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --border: rgba(224, 138, 159, 0.18);
  --accent: #e08a9f;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --info: #7DD3FC;
  --cream: #f3e8da;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --font-serif: Georgia, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
  color-scheme: dark;
}

/* Reuses this app's shared near-black wine / dusty-rose aesthetic already
   established by index.html (Main), entertainment.html (Media),
   braindump.html (Brain Dump) and study.html (Study) — same base
   gradient, same --accent hue, same cream button gradient — rather than
   inventing a new palette for this new page. */
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  min-height: 100%;
}
body::before {
  content: '';
  position: fixed; inset: -10%; z-index: -2;
  background:
    radial-gradient(60% 45% at 82% 12%, rgba(232, 164, 99, 0.10) 0%, transparent 55%),
    radial-gradient(55% 45% at 18% 90%, rgba(224, 138, 159, 0.08) 0%, transparent 55%),
    linear-gradient(180deg, #170a12 0%, #0b0509 100%);
  filter: blur(40px) saturate(1.05);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.7;
  pointer-events: none;
}
html, body { scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { width: 0 !important; height: 0 !important; display: none !important; }

.shell { max-width: 1000px; margin: 0 auto; padding: 24px 16px 60px; }

/* ===== Back to dashboard — same recipe as study.html/braindump.html ===== */
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px 8px 10px; margin: 0 0 14px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px; color: var(--text-secondary);
  font-family: var(--font); font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
  text-decoration: none; -webkit-tap-highlight-color: transparent;
  transition: background 0.15s ease, color 0.15s ease;
}
.back-btn:hover, .back-btn:active { background: rgba(255,255,255,0.07); color: var(--text-primary); }
.back-btn svg { display: block; }

/* ===== Header ===== */
.nutr-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
.nutr-title { font-family: var(--font-serif); font-size: 26px; font-weight: 700; letter-spacing: -0.01em; }

/* ===== Secondary nav — same tab/underline pattern as finance.html's
   .fin-tab, restyled with this file's own tokens (My Kitchen / Grocery
   List), plus a URL hash router so a section is directly linkable
   (nutrition.html#kitchen, nutrition.html#grocery). ===== */
.nutr-tabs { display: flex; gap: 22px; margin: 4px 0 22px; border-bottom: 1px solid var(--border); overflow-x: auto; }
.nutr-tab {
  background: none; border: none; padding: 6px 0 14px; margin-bottom: -1px;
  font-family: inherit; font-size: 14px; font-weight: 600; white-space: nowrap;
  color: var(--text-tertiary); cursor: pointer; position: relative;
  -webkit-tap-highlight-color: transparent;
}
.nutr-tab:hover { color: var(--text-secondary); }
.nutr-tab.active { color: var(--accent); }
.nutr-tab.active::after {
  content: '';
  position: absolute; left: 0; right: 0; bottom: -1px; height: 2px;
  background: var(--accent); border-radius: 2px;
}

/* ===== Placeholder panel — My Kitchen is still shell-only; real content lands next. ===== */
.nutr-placeholder {
  background: var(--bg-card); border: 1px dashed var(--border); border-radius: var(--radius-lg);
  padding: 64px 24px; text-align: center; color: var(--text-tertiary);
}
.nutr-placeholder-icon { font-size: 34px; margin-bottom: 12px; opacity: 0.6; }
.nutr-placeholder-title { font-family: var(--font-serif); font-size: 18px; color: var(--text-primary); margin-bottom: 6px; }
.nutr-placeholder-sub { font-size: 13px; max-width: 360px; margin: 0 auto; line-height: 1.5; }

/* ===== Shared modal / form / button components — copied verbatim from
   study.html's recipe (same class names, same look), the established
   cross-file convention for these widgets rather than inventing new
   ones. topbar.js's MODAL_SELECTORS already treats .modal-bg as a modal
   for mobile full-screen + scroll-lock behavior. ===== */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(6px); z-index: 100; align-items: center; justify-content: center; padding: 24px; }
.modal-bg.show { display: flex; }
.modal { width: 100%; max-width: 460px; background: #17090f; border: 1px solid var(--border); border-radius: 16px; padding: 22px; max-height: 88vh; overflow-y: auto; }
.modal h3 { margin: 0 0 16px; font-size: 17px; font-weight: 700; font-family: var(--font-serif); }
.field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.field > label { font-size: 10.5px; color: var(--text-tertiary); font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; }
.field input[type="text"], .field select {
  padding: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.28);
  color: var(--text-primary); border-radius: 10px; font-family: inherit; font-size: 14px;
}
.field select { appearance: none; -webkit-appearance: none; }
.field input:focus, .field select:focus {
  outline: none; border-color: rgba(255,255,255,0.40); box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
}
.field-row { display: flex; gap: 10px; }
.field-row .field { flex: 1; }
.btn-primary {
  width: 100%; padding: 13px; border: 1px solid rgba(243,232,218,0.85);
  background: linear-gradient(180deg, var(--cream) 0%, #d9a0ae 100%);
  color: #2a0d14; border-radius: 12px; font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer; box-shadow: inset 0 1px 0 rgba(255,255,255,0.45), 0 4px 14px rgba(61,15,26,0.45);
  -webkit-tap-highlight-color: transparent;
}
.btn-primary:hover { transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0) scale(0.98); }
.btn-secondary {
  padding: 11px 16px; border: 1px solid var(--border); background: rgba(255,255,255,0.04);
  color: var(--text-primary); border-radius: 12px; font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.btn-secondary:hover { background: rgba(255,255,255,0.10); }
.btn-secondary:disabled { opacity: 0.35; cursor: default; }
.btn-secondary:disabled:hover { background: rgba(255,255,255,0.04); }
.modal-actions { display: flex; gap: 8px; margin-top: 18px; }
.modal-actions button { flex: 1; }
.delete-link { display: block; text-align: center; margin-top: 12px; font-size: 12px; color: var(--danger); cursor: pointer; text-decoration: underline; padding: 6px; }

/* ===== Grocery List ===== */
.nutr-quick-add { display: flex; flex-wrap: wrap; gap: 8px; margin: 4px 0 18px; }
.nutr-quick-add input, .nutr-quick-add select {
  padding: 9px 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.28);
  color: var(--text-primary); border-radius: 8px; font-family: inherit; font-size: 13px;
}
.nutr-quick-add input:focus, .nutr-quick-add select:focus { outline: none; border-color: rgba(255,255,255,0.40); }
.nutr-qa-name { flex: 2 1 160px; min-width: 120px; }
.nutr-qa-qty { flex: 0 1 70px; min-width: 60px; }
.nutr-qa-unit { flex: 0 1 90px; min-width: 70px; }
.nutr-qa-store { flex: 1 1 140px; min-width: 110px; }
.nutr-qa-add {
  padding: 9px 18px; border: 1px solid rgba(243,232,218,0.85);
  background: linear-gradient(180deg, var(--cream) 0%, #d9a0ae 100%);
  color: #2a0d14; border-radius: 8px; font-family: inherit; font-size: 12.5px; font-weight: 700;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.nutr-qa-add:hover { transform: translateY(-1px); }

.nutr-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin: 0 0 18px; }
.nutr-checked-banner {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: 10px 14px; font-size: 13px; color: var(--text-secondary); flex: 1 1 auto;
}
.nutr-checked-banner strong { color: var(--accent); }
.nutr-toolbar-actions { display: flex; gap: 8px; flex-shrink: 0; }
.nutr-toolbar-actions button { padding: 10px 14px; font-size: 12.5px; white-space: nowrap; }

.nutr-empty { color: var(--text-tertiary); font-size: 13px; padding: 40px 10px; text-align: center; }

.nutr-store-group { margin-bottom: 20px; }
.nutr-store-head { display: flex; align-items: center; gap: 8px; padding: 6px; margin-bottom: 2px; }
.nutr-store-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.nutr-store-name { font-family: var(--font-serif); font-size: 15px; font-weight: 700; color: var(--text-primary); }
.nutr-store-count { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); margin-left: auto; flex-shrink: 0; }

.nutr-item-row { display: flex; align-items: center; gap: 10px; padding: 9px 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.nutr-item-row:last-child { border-bottom: none; }
.nutr-item-check { width: 18px; height: 18px; accent-color: var(--accent); flex-shrink: 0; cursor: pointer; }
.nutr-item-body { flex: 1; min-width: 0; }
.nutr-item-name { font-size: 13.5px; font-weight: 600; color: var(--text-primary); }
.nutr-item-meta { font-size: 11.5px; color: var(--text-tertiary); margin-top: 2px; }
.nutr-item-actions { display: flex; gap: 4px; flex-shrink: 0; }
.nutr-item-actions button {
  background: transparent; border: 1px solid rgba(255,255,255,0.10); color: var(--text-tertiary);
  cursor: pointer; font-size: 11.5px; padding: 4px 8px; border-radius: 6px; font-family: inherit; line-height: 1;
  -webkit-tap-highlight-color: transparent;
}
.nutr-item-actions button:hover { color: var(--text-primary); }

/* ===== Manage Stores modal ===== */
.nutr-store-row { display: flex; align-items: center; gap: 8px; padding: 8px 4px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.nutr-store-row:last-child { border-bottom: none; }
.nutr-store-reorder { display: flex; flex-direction: column; gap: 1px; flex-shrink: 0; }
.nutr-store-reorder button {
  background: transparent; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 9px; padding: 1px 4px; line-height: 1;
}
.nutr-store-reorder button:hover:not(:disabled) { color: var(--text-primary); }
.nutr-store-reorder button:disabled { opacity: 0.2; cursor: default; }
.nutr-store-row input[type="text"] {
  flex: 1; min-width: 0; padding: 8px 10px; border: 1px solid var(--border); background: rgba(0,0,0,0.28);
  color: var(--text-primary); border-radius: 8px; font-family: inherit; font-size: 13px;
}
.nutr-store-row input[type="text"]:focus { outline: none; border-color: rgba(255,255,255,0.40); }
.nutr-store-delete {
  background: transparent; border: 1px solid rgba(255,255,255,0.10); color: var(--danger);
  cursor: pointer; font-size: 11.5px; padding: 6px 10px; border-radius: 6px; font-family: inherit; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.nutr-store-delete:hover { background: rgba(255,107,107,0.10); }
.nutr-add-store-row { display: flex; gap: 8px; margin-top: 14px; }
.nutr-add-store-row input { flex: 1; min-width: 0; }

@media (max-width: 480px) {
  .nutr-title { font-size: 21px; }
}
</style>
</head>
<body>

<div class="shell">
  <a href="index.html" class="back-btn" aria-label="Back to dashboard">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    Dashboard
  </a>

  <div class="nutr-header">
    <h1 class="nutr-title">Nutrition</h1>
  </div>

  <div class="nutr-tabs" id="nutrTabs" role="tablist" aria-label="Nutrition sections">
    <button type="button" class="nutr-tab active" data-section="kitchen" role="tab" aria-selected="true">My Kitchen</button>
    <button type="button" class="nutr-tab" data-section="grocery" role="tab" aria-selected="false">Grocery List</button>
  </div>

  <section class="section" data-section="kitchen">
    <div class="nutr-placeholder">
      <div class="nutr-placeholder-icon">🍳</div>
      <div class="nutr-placeholder-title">My Kitchen</div>
      <div class="nutr-placeholder-sub">Recipes and stores will live here. Coming soon.</div>
    </div>
  </section>

  <section class="section" data-section="grocery" hidden>
    <div class="nutr-quick-add" id="nutrQuickAdd">
      <input type="text" id="nutrQaName" class="nutr-qa-name" placeholder="Item name…">
      <input type="text" id="nutrQaQty" class="nutr-qa-qty" placeholder="Qty">
      <input type="text" id="nutrQaUnit" class="nutr-qa-unit" placeholder="Unit">
      <select id="nutrQaStore" class="nutr-qa-store" aria-label="Store"></select>
      <button type="button" id="nutrQaAddBtn" class="nutr-qa-add">+ Add</button>
    </div>

    <div class="nutr-toolbar">
      <div class="nutr-checked-banner" id="nutrCheckedBanner" hidden></div>
      <div class="nutr-toolbar-actions">
        <button class="btn-secondary" id="nutrManageStoresBtn" type="button">Manage Stores</button>
        <button class="btn-secondary" id="nutrResetListBtn" type="button">Reset list</button>
      </div>
    </div>

    <div id="nutrGroceryGroups"></div>
    <p class="nutr-empty" id="nutrGroceryEmpty" hidden></p>
  </section>
</div>

<!-- Edit Item Modal -->
<div class="modal-bg" id="nutrItemModalBg">
  <div class="modal" id="nutrItemModal">
    <h3>Edit item</h3>
    <div class="field">
      <label>Name</label>
      <input type="text" id="nutrItemName">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Quantity</label>
        <input type="text" id="nutrItemQty">
      </div>
      <div class="field">
        <label>Unit</label>
        <input type="text" id="nutrItemUnit">
      </div>
    </div>
    <div class="field">
      <label>Store</label>
      <select id="nutrItemStore"></select>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="nutrItemCancelBtn" type="button">Cancel</button>
      <button class="btn-primary" id="nutrItemSaveBtn" type="button">Save</button>
    </div>
    <span class="delete-link" id="nutrItemDeleteLink">Delete this item</span>
  </div>
</div>

<!-- Manage Stores Modal -->
<div class="modal-bg" id="nutrStoresModalBg">
  <div class="modal" id="nutrStoresModal">
    <h3>Manage Stores</h3>
    <div id="nutrStoresList"></div>
    <p class="nutr-empty" id="nutrStoresEmpty" hidden>No stores yet — add one below.</p>
    <div class="nutr-add-store-row">
      <input type="text" id="nutrNewStoreName" placeholder="New store name…">
      <button class="btn-secondary" id="nutrAddStoreBtn" type="button">Add</button>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="nutrStoresCloseBtn" type="button">Close</button>
    </div>
  </div>
</div>

<script>
(function () {
  // ============================================================
  // STORAGE — same localStorage shim used by every other page.
  // ============================================================
  function storeGet(key) {
    try { const raw = localStorage.getItem(key); return raw == null ? null : JSON.parse(raw); }
    catch (e) { return null; }
  }
  function storeSet(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
  }

  // ============================================================
  // SECONDARY NAV — My Kitchen / Grocery List. Active section persists
  // in localStorage AND is reflected in the URL hash so a section is
  // directly linkable/bookmarkable (e.g. nutrition.html#grocery) — same
  // pattern as finance.html's tab router.
  // ============================================================
  const SECTION_KEY = 'nutrition_active_section';
  const VALID_SECTIONS = ['kitchen', 'grocery'];
  const tabs = document.querySelectorAll('.nutr-tab');
  const sections = document.querySelectorAll('.section[data-section]');

  function setActiveSection(name, opts) {
    if (VALID_SECTIONS.indexOf(name) === -1) name = 'kitchen';
    tabs.forEach(function (b) {
      const active = b.dataset.section === name;
      b.classList.toggle('active', active);
      b.setAttribute('aria-selected', active ? 'true' : 'false');
    });
    sections.forEach(function (s) {
      if (s.dataset.section === name) s.removeAttribute('hidden');
      else s.setAttribute('hidden', '');
    });
    storeSet(SECTION_KEY, name);
    if (!opts || !opts.skipHash) {
      history.replaceState(null, '', '#' + name);
    }
  }
  tabs.forEach(function (b) { b.addEventListener('click', function () { setActiveSection(b.dataset.section); }); });

  function sectionFromHash() {
    const h = (location.hash || '').replace('#', '');
    return VALID_SECTIONS.indexOf(h) !== -1 ? h : null;
  }
  // Back/forward between hash states, or a hash edited by hand.
  window.addEventListener('hashchange', function () {
    const h = sectionFromHash();
    if (h) setActiveSection(h, { skipHash: true });
  });

  const savedSection = storeGet(SECTION_KEY);
  const initialSection = sectionFromHash() || (VALID_SECTIONS.indexOf(savedSection) !== -1 ? savedSection : 'kitchen');
  setActiveSection(initialSection);
})();
</script>

<script>
// ============================================================
// GROCERY LIST — backed by nutrition-data.js (window.NutritionData),
// loaded with `defer` like sync.js/topbar.js, so this whole block waits
// for DOMContentLoaded (same convention finance.html/study.html use).
// Every mutation goes through NutritionData's collections/selectors —
// this file never touches localStorage directly.
// ============================================================
document.addEventListener('DOMContentLoaded', function () {
  if (typeof NutritionData === 'undefined') return;
  var ND = NutritionData;

  // Rotates through hues already used elsewhere in this app (finance
  // account colors, gym's day tags) for new stores' dots, rather than
  // inventing new colors.
  var STORE_COLOR_PALETTE = ['#7DD3FC', '#6EE7B7', '#F2C063', '#FF8A8A', '#B794F4', '#e08a9f'];

  function sortedStores() {
    return ND.Stores.list().slice().sort(function (a, b) { return a.order - b.order; });
  }

  function populateStoreSelect(selectEl, selectedId) {
    var stores = sortedStores();
    selectEl.innerHTML = '';
    var unassignedOpt = document.createElement('option');
    unassignedOpt.value = '';
    unassignedOpt.textContent = 'Unassigned';
    selectEl.appendChild(unassignedOpt);
    stores.forEach(function (s) {
      var opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = s.name;
      selectEl.appendChild(opt);
    });
    selectEl.value = selectedId || '';
  }

  function showModal(bg) { bg.classList.add('show'); }
  function hideModal(bg) { bg.classList.remove('show'); }

  // ---------- Grocery list rendering ----------
  var groupsEl = document.getElementById('nutrGroceryGroups');
  var emptyEl = document.getElementById('nutrGroceryEmpty');
  var bannerEl = document.getElementById('nutrCheckedBanner');
  var resetBtn = document.getElementById('nutrResetListBtn');
  var qaStoreSelect = document.getElementById('nutrQaStore');

  function buildItemRow(item) {
    var row = document.createElement('div');
    row.className = 'nutr-item-row';

    var checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.className = 'nutr-item-check';
    checkbox.setAttribute('aria-label', 'Check off ' + item.name);
    checkbox.addEventListener('change', function () {
      ND.toggleItemChecked(item.id);
      renderGroceryList();
    });
    row.appendChild(checkbox);

    var body = document.createElement('div');
    body.className = 'nutr-item-body';
    var nameEl = document.createElement('div');
    nameEl.className = 'nutr-item-name';
    nameEl.textContent = item.name;
    body.appendChild(nameEl);
    var metaBits = [];
    var qty = (item.quantity == null ? '' : String(item.quantity)).trim();
    var unit = (item.unit || '').trim();
    if (qty || unit) metaBits.push((qty + ' ' + unit).trim());
    if (item.notes) metaBits.push(item.notes);
    if (metaBits.length) {
      var metaEl = document.createElement('div');
      metaEl.className = 'nutr-item-meta';
      metaEl.textContent = metaBits.join(' · ');
      body.appendChild(metaEl);
    }
    row.appendChild(body);

    var actions = document.createElement('div');
    actions.className = 'nutr-item-actions';
    var editBtn = document.createElement('button');
    editBtn.type = 'button';
    editBtn.textContent = 'Edit';
    editBtn.addEventListener('click', function () { openItemModal(item); });
    var delBtn = document.createElement('button');
    delBtn.type = 'button';
    delBtn.textContent = 'Delete';
    delBtn.addEventListener('click', function () {
      if (!confirm('Delete "' + item.name + '"?')) return;
      ND.GroceryItems.remove(item.id);
      renderGroceryList();
    });
    actions.appendChild(editBtn);
    actions.appendChild(delBtn);
    row.appendChild(actions);

    return row;
  }

  function buildStoreGroup(group) {
    var wrap = document.createElement('div');
    wrap.className = 'nutr-store-group';

    var head = document.createElement('div');
    head.className = 'nutr-store-head';
    if (group.color) {
      var dot = document.createElement('span');
      dot.className = 'nutr-store-dot';
      dot.style.background = group.color;
      head.appendChild(dot);
    }
    var name = document.createElement('span');
    name.className = 'nutr-store-name';
    name.textContent = group.storeName;
    head.appendChild(name);
    var count = document.createElement('span');
    count.className = 'nutr-store-count';
    count.textContent = group.items.length;
    head.appendChild(count);
    wrap.appendChild(head);

    group.items.forEach(function (item) { wrap.appendChild(buildItemRow(item)); });
    return wrap;
  }

  function renderGroceryList() {
    var groups = ND.groceryItemsByStore();
    var checked = ND.checkedCount();

    if (checked > 0) {
      bannerEl.hidden = false;
      bannerEl.innerHTML = '<strong>' + checked + '</strong> item' + (checked === 1 ? '' : 's') + ' checked — Reset to show them';
    } else {
      bannerEl.hidden = true;
    }
    resetBtn.disabled = checked === 0;

    groupsEl.innerHTML = '';
    if (!groups.length) {
      var hasAnyItems = ND.GroceryItems.list().length > 0;
      emptyEl.hidden = false;
      emptyEl.textContent = hasAnyItems
        ? 'All items are checked off. Reset the list to see them again.'
        : 'No items yet — add one above.';
      groupsEl.hidden = true;
    } else {
      emptyEl.hidden = true;
      groupsEl.hidden = false;
      groups.forEach(function (g) { groupsEl.appendChild(buildStoreGroup(g)); });
    }

    populateStoreSelect(qaStoreSelect, qaStoreSelect.value);
  }

  resetBtn.addEventListener('click', function () {
    var n = ND.checkedCount();
    if (n === 0) return;
    if (!confirm('Un-check all ' + n + ' checked item' + (n === 1 ? '' : 's') + '? They will all reappear on the list.')) return;
    ND.resetGroceryList();
    renderGroceryList();
  });

  // ---------- Quick add ----------
  var qaName = document.getElementById('nutrQaName');
  var qaQty = document.getElementById('nutrQaQty');
  var qaUnit = document.getElementById('nutrQaUnit');
  var qaAddBtn = document.getElementById('nutrQaAddBtn');

  function submitQuickAdd() {
    var name = qaName.value.trim();
    if (!name) { qaName.focus(); return; }
    ND.GroceryItems.add({
      name: name,
      quantity: qaQty.value.trim(),
      unit: qaUnit.value.trim(),
      storeId: qaStoreSelect.value || null,
      checked: false
    });
    qaName.value = '';
    qaQty.value = '';
    qaUnit.value = '';
    renderGroceryList();
    qaName.focus();
  }
  qaAddBtn.addEventListener('click', submitQuickAdd);
  [qaName, qaQty, qaUnit].forEach(function (el) {
    el.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); submitQuickAdd(); }
    });
  });

  // ---------- Edit item modal ----------
  var itemModalBg = document.getElementById('nutrItemModalBg');
  var itemNameInput = document.getElementById('nutrItemName');
  var itemQtyInput = document.getElementById('nutrItemQty');
  var itemUnitInput = document.getElementById('nutrItemUnit');
  var itemStoreSelect = document.getElementById('nutrItemStore');
  var editingItemId = null;

  function openItemModal(item) {
    editingItemId = item.id;
    itemNameInput.value = item.name;
    itemQtyInput.value = item.quantity == null ? '' : item.quantity;
    itemUnitInput.value = item.unit || '';
    populateStoreSelect(itemStoreSelect, item.storeId);
    showModal(itemModalBg);
  }
  document.getElementById('nutrItemCancelBtn').addEventListener('click', function () { hideModal(itemModalBg); });
  itemModalBg.addEventListener('click', function (e) { if (e.target === itemModalBg) hideModal(itemModalBg); });
  document.getElementById('nutrItemSaveBtn').addEventListener('click', function () {
    if (!editingItemId) return;
    var name = itemNameInput.value.trim();
    if (!name) { itemNameInput.focus(); return; }
    ND.GroceryItems.update(editingItemId, {
      name: name,
      quantity: itemQtyInput.value.trim(),
      unit: itemUnitInput.value.trim(),
      storeId: itemStoreSelect.value || null
    });
    hideModal(itemModalBg);
    renderGroceryList();
  });
  document.getElementById('nutrItemDeleteLink').addEventListener('click', function () {
    if (!editingItemId) return;
    if (!confirm('Delete this item?')) return;
    ND.GroceryItems.remove(editingItemId);
    hideModal(itemModalBg);
    renderGroceryList();
  });

  // ---------- Manage Stores modal ----------
  var storesModalBg = document.getElementById('nutrStoresModalBg');
  var storesListEl = document.getElementById('nutrStoresList');
  var storesEmptyEl = document.getElementById('nutrStoresEmpty');
  var newStoreNameInput = document.getElementById('nutrNewStoreName');

  function moveStore(id, dir) {
    var ordered = sortedStores();
    var idx = ordered.findIndex(function (s) { return s.id === id; });
    var swapIdx = idx + dir;
    if (idx === -1 || swapIdx < 0 || swapIdx >= ordered.length) return;
    var aOrder = ordered[idx].order;
    var bOrder = ordered[swapIdx].order;
    ND.Stores.update(ordered[idx].id, { order: bOrder });
    ND.Stores.update(ordered[swapIdx].id, { order: aOrder });
    renderStoresModal();
    renderGroceryList();
  }

  function renderStoresModal() {
    var stores = sortedStores();
    storesListEl.innerHTML = '';
    storesEmptyEl.hidden = stores.length !== 0;

    stores.forEach(function (s, idx) {
      var row = document.createElement('div');
      row.className = 'nutr-store-row';

      var reorder = document.createElement('div');
      reorder.className = 'nutr-store-reorder';
      var up = document.createElement('button');
      up.type = 'button'; up.textContent = '▲'; up.setAttribute('aria-label', 'Move up');
      up.disabled = idx === 0;
      up.addEventListener('click', function () { moveStore(s.id, -1); });
      var down = document.createElement('button');
      down.type = 'button'; down.textContent = '▼'; down.setAttribute('aria-label', 'Move down');
      down.disabled = idx === stores.length - 1;
      down.addEventListener('click', function () { moveStore(s.id, 1); });
      reorder.appendChild(up);
      reorder.appendChild(down);
      row.appendChild(reorder);

      var dot = document.createElement('span');
      dot.className = 'nutr-store-dot';
      dot.style.background = s.color;
      row.appendChild(dot);

      var nameInput = document.createElement('input');
      nameInput.type = 'text';
      nameInput.value = s.name;
      nameInput.setAttribute('aria-label', 'Store name');
      nameInput.addEventListener('change', function () {
        var val = nameInput.value.trim();
        if (!val) { nameInput.value = s.name; return; }
        ND.Stores.update(s.id, { name: val });
        renderGroceryList();
      });
      row.appendChild(nameInput);

      var delBtn = document.createElement('button');
      delBtn.type = 'button';
      delBtn.className = 'nutr-store-delete';
      delBtn.textContent = 'Delete';
      delBtn.addEventListener('click', function () {
        if (!confirm('Delete "' + s.name + '"? Its items will move to Unassigned.')) return;
        ND.Stores.remove(s.id);
        renderStoresModal();
        renderGroceryList();
      });
      row.appendChild(delBtn);

      storesListEl.appendChild(row);
    });
  }

  document.getElementById('nutrManageStoresBtn').addEventListener('click', function () {
    renderStoresModal();
    showModal(storesModalBg);
  });
  document.getElementById('nutrStoresCloseBtn').addEventListener('click', function () { hideModal(storesModalBg); });
  storesModalBg.addEventListener('click', function (e) { if (e.target === storesModalBg) hideModal(storesModalBg); });

  function submitNewStore() {
    var name = newStoreNameInput.value.trim();
    if (!name) { newStoreNameInput.focus(); return; }
    var count = ND.Stores.list().length;
    ND.Stores.add({ name: name, color: STORE_COLOR_PALETTE[count % STORE_COLOR_PALETTE.length] });
    newStoreNameInput.value = '';
    renderStoresModal();
    renderGroceryList();
  }
  document.getElementById('nutrAddStoreBtn').addEventListener('click', submitNewStore);
  newStoreNameInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { e.preventDefault(); submitNewStore(); }
  });

  // ---------- Boot ----------
  renderGroceryList();

  if (typeof initCloudSync === 'function') {
    initCloudSync({
      appKey: 'nutrition',
      syncedPrefixes: ['nutrition:'],
      onApplied: function () { renderGroceryList(); }
    });
  }
});
</script>
</body>
</html>
